						// Mermaid diagram lightbox — click to zoom, scroll to scale, drag to pan
						document.addEventListener('click', e => {
							const img = e.target.closest('img[id^="mermaid"]');
							if (!img) return;

							let scale = 1, tx = 0, ty = 0, dragging = false, sx, sy;

							const overlay = document.createElement('div');
							overlay.className = 'mermaid-lightbox';
							const clone = img.cloneNode();
							clone.removeAttribute('width');
							clone.removeAttribute('height');
							clone.style.cssText = 'max-width:90vw; max-height:90vh; cursor:grab;';
							overlay.appendChild(clone);
							document.body.appendChild(overlay);

							const apply = () => { clone.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')'; };

							overlay.addEventListener('wheel', e => {
								e.preventDefault();
								scale = Math.max(0.2, Math.min(10, scale * (e.deltaY < 0 ? 1.15 : 0.87)));
								apply();
							}, { passive: false });

							clone.addEventListener('pointerdown', e => {
								dragging = true; sx = e.clientX - tx; sy = e.clientY - ty;
								clone.style.cursor = 'grabbing'; clone.setPointerCapture(e.pointerId);
							});
							clone.addEventListener('pointermove', e => {
								if (!dragging) return; tx = e.clientX - sx; ty = e.clientY - sy; apply();
							});
							clone.addEventListener('pointerup', () => { dragging = false; clone.style.cursor = 'grab'; });

							overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

								if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', esc); }
