robe_findings__probe_revenue_leakage',\n    'probe_findings__probe_missing_mandatory_implants',\n    'probe_findings__probe_cost_center_billing_mismatch',\n    'probe_findings__probe_io_coefficient',\n    'probe_findings__probe_io_coefficient_trend',\n    'probe_findings__probe_duplicate_billing',\n    'probe_findings__probe_missing_standard_price',\n    'probe_findings__probe_orphan_billing',\n    'probe_findings__probe_billing_before_usage',\n    'probe_findings__probe_procedure_without_usage',\n    'probe_findings__assessment_material_health',\n    'probe_findings__assessment_case_financial_integrity',\n    'probe_findings__probe_stale_article',\n    'probe_findings__probe_migel_reimbursement_gap',\n    'probe_findings__probe_barcode_duplicate',\n    'probe_findings__probe_conversion_factor_anomaly',\n    'probe_findings__probe_cross_site_billing',\n    'probe_findings__probe_cc_producteur_mismatch',\n    'probe_findings__probe_negative_margin',\n    'probe_findings__probe_controlled_substance_traceability',\n    'probe_findings__probe_shelf_life_risk',\n    'probe_findings__probe_invoice_integrity',\n    'probe_findings__probe_drg_cost_outlier',\n    'probe_findings__probe_billing_below_internal_price',\n    'probe_findings__assessment_material_compliance',\n    'probe_findings__assessment_billing_quality',\n    'probe_findings__assessment_material_overall',\n    'probe_findings__probe_io_coefficient_weekly',\n    'probe_findings__probe_io_coefficient_weekly_trend',\n] %}\n\n{% for t in tenants %}\n  {% for model in probe_models %}\n    SELECT * FROM {{ t }}.{{ model }}\n    {% if not loop.last %} UNION ALL BY NAME {% endif %}\n  {% endfor %}\n  {% if not loop.last %} UNION ALL BY NAME {% endif %}\n{% endfor %}\n", "lang": "sql"}, "classes": "platform"}, {"data": {"id": "platform_probe_registry", "label": "Registry", "fullName": "platform_probe_registry", "layer": "platform", "layerLabel": "Platform", "color": "#9b7ec8", "shape": "round-rectangle", "layerShape": "round-rectangle", "kindShape": "ellipse", "kind": "view", "path": "dbt/numetrix/models/platform/platform_probe_registry.sql", "layerOrder": 8, "source": "{{ config(materialized='view') }}\n\n-- depends_on: {{ ref('probe_registry') }}\n\n{% set tenants = var('tenants', [var('tenant_id', 'hospital_alpha')]) %}\n\nselect * from {{ tenants[0] }}.probe_registry\n", "lang": "sql"}, "classes": "platform"}, {"data": {"id": "diagnosis_registry", "label": "Registry", "fullName": "diagnosis_registry", "layer": "diagnosis", "layerLabel": "Diagnoses", "color": "#b99ad4", "shape": "star", "layerShape": "star", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/diagnosis_registry.sql", "layerOrder": 7, "source": "-- diagnosis_registry: Tri-lingual diagnosis metadata\n-- Auto-generated by diagnosiscompile.py \u2014 do not edit manually.\n{{ config(materialized='table', tags=['diagnosis']) }}\n\nselect\n    'diag_billing_workflow_gap' as diagnosis_id,\n    '1.0.0' as diagnosis_version,\n    'hyp_revenue_leakage_unbilled' as hypothesis_id,\n    'process_failure' as root_cause_category,\n    'billing_workflow_gap' as root_cause_id,\n    'probe_revenue_leakage, probe_missing_mandatory_implants' as condition_probes,\n    'assessment_case_financial_integrity' as boost_probes,\n    0.7 as confidence_base,\n    'Der Abrechnungs-Workflow weist Luecken auf \u2014 {finding_count} Faelle zeigen verwendete aber nicht verrechnete Materialien. Das Muster ueber mehrere Kostenstellen deutet auf ein systemisches Prozessproblem hin.' as explanation_de,\n    'Billing workflow has gaps \u2014 {finding_count} cases show materials used but not billed. The pattern across multiple cost centers suggests a systemic process issue rather than isolated errors.' as explanation_en,\n    'Le flux de facturation presente des lacunes \u2014 {finding_count} cas montrent des materiaux utilises mais non factures. Le schema sur plusieurs centres de couts suggere un probleme de processus systemique.' as explanation_fr,\n    'Ueberpruefen Sie die Abrechnungs-Schnittstellen-Logs der betroffenen Kostenstellen. Pruefen Sie, ob die Schnittstelle ausgefallen war oder manuelle Schritte uebersprungen wurden.' as recommendation_de,\n    'Review billing interface logs for affected cost centers. Check whether the interface was down or whether manual billing steps were skipped.' as recommendation_en,\n    'Examinez les journaux de l''interface de facturation des centres de couts concernes. Verifiez si l''interface etait en panne ou si des etapes manuelles ont ete ignorees.' as recommendation_fr\nunion all\n\nselect\n    'diag_catalogue_maintenance_lag' as diagnosis_id,\n    '1.0.0' as diagnosis_version,\n    'hyp_stale_catalogue' as hypothesis_id,\n    'process_failure' as root_cause_category,\n    'catalogue_update_process_gap' as root_cause_id,\n    'probe_stale_article, probe_missing_standard_price' as condition_probes,\n    'assessment_material_compliance' as boost_probes,\n    0.65 as confidence_base,\n    'Der Materialkatalog enthaelt {finding_count} veraltete Artikel mit abgelaufenen Gueltigkeitsdaten und fehlenden Standardpreisen. Dies zeigt, dass der Katalogpflegeprozess nicht Schritt haelt.' as explanation_de,\n    'The material catalogue contains {finding_count} stale articles with expired validity dates and missing standard prices. This indicates the catalogue maintenance process has fallen behind \u2014 articles are not being reviewed and updated on schedule.' as explanation_en,\n    'Le catalogue de materiaux contient {finding_count} articles obsoletes avec des dates de validite expirees et des prix standard manquants. Cela indique que le processus de maintenance du catalogue a pris du retard.' as explanation_fr,\n    'Etablieren Sie einen regelmaessigen Katalog-Review-Rhythmus (quartalsweise empfohlen). Priorisieren Sie Artikel mit aktiver Nutzung aber abgelaufener Gueltigkeit.' as recommendation_de,\n    'Establish a regular catalogue review cadence (quarterly recommended). Prioritize articles with active usage but expired validity. Verify the supplier price update feed is functioning.' as recommendation_en,\n    'Etablissez une cadence reguliere de revision du catalogue (trimestrielle recommandee). Priorisez les articles avec utilisation active mais validite expiree.' as recommendation_fr\nunion all\n\nselect\n    'diag_cc_master_data_drift' as diagnosis_id,\n    '1.0.0' as diagnosis_version,\n    'hyp_cost_center_misallocation' as hypothesis_id,\n    'data_quality' as root_cause_category,\n    'cost_center_mapping_outdated' as root_cause_id,\n    'probe_cost_center_billing_mismatch, probe_cc_producteur_mismatch' as condition_probes,\n    'probe_cross_site_billing, assessment_billing_quality' as boost_probes,\n    0.6 as confidence_base,\n    'Kostenstellenzuordnungen weichen von der Realitaet ab \u2014 {finding_count} Abrechnungen landen auf falschen Kostenstellen. In Kombination mit Producteur-Abweichungen deutet dies auf veraltete Kostenstellen-Stammdaten nach Umstrukturierungen hin.' as explanation_de,\n    'Cost center assignments are drifting from reality \u2014 {finding_count} billing events land on mismatched cost centers. When combined with producteur mismatches, this indicates the cost center master data has not been updated after organizational restructuring.' as explanation_en,\n    'Les affectations de centres de couts derivent de la realite \u2014 {finding_count} evenements de facturation atterrissent sur des centres de couts errones. Combine aux ecarts de producteurs, cela indique des donnees maitres non mises a jour apres une restructuration.' as explanation_fr,\n    'Vergleichen Sie die aktuellen Kostenstellen-Stammdaten mit dem neuesten Organigramm. Pruefen Sie das letzte Umstrukturierungsdatum und die Aktualisierung aller Zuordnungen.' as recommendation_de,\n    'Compare current cost center master data against the latest organizational chart. Review the most recent restructuring date and verify all cost center mappings were updated.' as recommendation_en,\n    'Comparez les donnees maitres des centres de couts avec le dernier organigramme. Verifiez la date de la derniere restructuration et la mise a jour de toutes les affectations.' as recommendation_fr\nunion all\n\nselect\n    'diag_cross_site_routing_error' as diagnosis_id,\n    '1.0.0' as diagnosis_version,\n    'hyp_cross_site_leakage' as hypothesis_id,\n    'process_failure' as root_cause_category,\n    'inter_site_material_routing' as root_cause_id,\n    'probe_cross_site_billing' as condition_probes,\n    'probe_cc_producteur_mismatch, assessment_billing_quality' as boost_probes,\n    0.6 as confidence_base,\n    'Materialien werden an einem anderen Standort verrechnet als wo sie verwendet wurden \u2014 {finding_count} standortubergreifende Abrechnungen erkannt. Dies geschieht typischerweise, wenn standortubergreifende Transferauftraege vor der Abrechnung nicht abgeschlossen werden.' as explanation_de,\n    'Materials are being billed at a different site than where they were used \u2014 {finding_count} cross-site billing events detected. This typically occurs when inter-site transfer orders are not closed before billing, causing revenue to be attributed to the wrong location.' as explanation_en,\n    'Des materiaux sont factures sur un site different de celui ou ils ont ete utilises \u2014 {finding_count} facturations inter-sites detectees. Cela se produit lorsque les ordres de transfert inter-sites ne sont pas clotures avant la facturation.' as explanation_fr,\n    'Ueberpruefen Sie den standortubergreifenden Transferprozess. Stellen Sie sicher, dass Transferauftraege vor der Abrechnungserstellung abgeschlossen sind.' as recommendation_de,\n    'Review the inter-site transfer workflow. Verify that transfer orders are completed and closed before billing events are generated. Check if site-specific billing rules are configured correctly.' as recommendation_en,\n    'Examinez le processus de transfert inter-sites. Verifiez que les ordres de transfert sont clotures avant la generation des ecritures de facturation.' as recommendation_fr\nunion all\n\nselect\n    'diag_duplicate_interface_error' as diagnosis_id,\n    '1.0.0' as diagnosis_version,\n    'hyp_duplicate_billing' as hypothesis_id,\n    'system_failure' as root_cause_category,\n    'duplicate_interface_transmission' as root_cause_id,\n    'probe_duplicate_billing, probe_invoice_integrity' as condition_probes,\n    'assessment_billing_quality' as boost_probes,\n    0.65 as confidence_base,\n    'Doppelte Abrechnungseintraege deuten auf ein Schnittstellenproblem hin \u2014 {finding_count} Abrechnungsereignisse erscheinen mehrfach. In Kombination mit Rechnungsintegritaetsluecken spricht dies fuer einen systemseitigen Doppelversand.' as explanation_de,\n    'Duplicate billing entries indicate an interface transmission issue \u2014 {finding_count} billing events appear more than once. Combined with invoice integrity gaps, this points to a system-level double-send rather than manual entry errors.' as explanation_en,\n    'Les doublons de facturation indiquent un probleme de transmission d''interface \u2014 {finding_count} evenements de facturation apparaissent plus d''une fois. Combine aux lacunes d''integrite des factures, cela suggere un double envoi systemique.' as explanation_fr,\n    'Ueberpruefen Sie die Idempotenz-Kontrollen der Abrechnungsschnittstelle. Pruefen Sie fehlende Deduplizierungslogik in der ERP-Abrechnungs-Pipeline.' as recommendation_de,\n    'Audit the billing interface idempotency controls. Check for missing deduplication logic in the ERP-to-billing pipeline. Review transmission logs around peak hours.' as recommendation_en,\n    'Auditez les controles d''idempotence de l''interface de facturation. Verifiez la logique de deduplication manquante dans le pipeline ERP-facturation.' as recommendation_fr\nunion all\n\nselect\n    'diag_inventory_process_gap' as diagnosis_id,\n illing probes indicate systematic data quality issues in the billing workflow.\n{{ config(materialized='table', tags=['probe', 'assessment']) }}\n\nwith\n\nsource_findings as (\n    select *, 2 as probe_weight from {{ ref('probe_findings__probe_cross_site_billing') }}\n    union all\n    select *, 2 as probe_weight from {{ ref('probe_findings__probe_cc_producteur_mismatch') }}\n    union all\n    select *, 3 as probe_weight from {{ ref('probe_findings__probe_invoice_integrity') }}\n),\n\nper_probe as (\n    select\n        entity_id,\n        probe_id,\n        any_value(probe_weight) as probe_weight,\n        count(*) as probe_finding_count,\n        coalesce(sum(money_at_risk), 0) as probe_risk,\n        coalesce(sum(qty_at_risk), 0) as probe_qty_at_risk,\n        max(case severity when 'high' then 3 when 'medium' then 2 else 1 end) as probe_sev_ord,\n        min(time_bucket) as probe_first_bucket,\n        max(time_bucket) as probe_last_bucket\n    from source_findings\n    group by entity_id, probe_id\n),\n\naggregated as (\n    select\n        entity_id,\n        count(*) as probe_count,\n        sum(probe_finding_count) as finding_count,\n        sum(probe_risk) as total_risk,\n        sum(probe_qty_at_risk) as total_qty_at_risk,\n        sum(probe_risk * probe_weight) as weighted_risk,\n        sum(probe_weight) as weighted_probe_score,\n        round(1.0 - (cast(sum(probe_weight) as double) / 7), 4) as health_score,\n        max(probe_sev_ord) as worst_severity_ord,\n        case max(probe_sev_ord)\n            when 3 then 'high' when 2 then 'medium' else 'low'\n        end as worst_severity,\n        string_agg(probe_id, ', ' order by probe_id) as probes_flagged,\n        min(probe_first_bucket) as first_bucket,\n        max(probe_last_bucket) as last_bucket\n    from per_probe\n    group by entity_id\n)\n\nselect\n    md5(\n        'assessment_billing_quality' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(entity_id as varchar) || '|' || firs ", "label": "MaterialOverall", "fullName": "probe_findings__assessment_material_overall", "layer": "assessment", "layerLabel": "Assessments", "color": "#8b8fd4", "shape": "octagon", "layerShape": "octagon", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__assessment_material_overall.sql", "layerOrder": 5, "source": "-- Probe: assessment_material_overall (assessment)\n-- Composite assessment of overall material health by aggregating supply-chain health (I/O coefficient, trends, pricing) and compliance health (controlled substances, MiGEL, barcodes) into a single entity score. Materials flagged by both domains indicate systemic cross-functional issues.\n{{ config(materialized='table', tags=['probe', 'assessment']) }}\n\nwith\n\nsource_findings as (\n    select *, 3 as probe_weight from {{ ref('probe_findings__assessment_material_health') }}\n    union all\n    select *, 2 as probe_weight from {{ ref('probe_findings__assessment_material_compliance') }}\n),\n\nper_probe as (\n    select\n        entity_id,\n        probe_id,\n        any_value(probe_weight) as probe_weight,\n        count(*) as probe_finding_count,\n        coalesce(sum(money_at_risk), 0) as probe_risk,\n        coalesce(sum(qty_at_risk), 0) as probe_qty_at_risk,\n        max(case severity when 'high' then 3 when 'medium' then 2 else 1 end) as probe_sev_ord,\n        min(time_bucket) as probe_first_bucket,\n        max(time_bucket) as probe_last_bucket\n    from source_findings\n    group by entity_id, probe_id\n),\n\naggregated as (\n    select\n        entity_id,\n        count(*) as probe_count,\n        sum(probe_finding_count) as finding_count,\n        sum(probe_risk) as total_risk,\n        sum(probe_qty_at_risk) as total_qty_at_risk,\n        sum(probe_risk * probe_weight) as weighted_risk,\n        sum(probe_weight) as weighted_probe_score,\n        round(1.0 - (cast(sum(probe_weight) as double) / 5), 4) as health_score,\n        max(probe_sev_ord) as worst_severity_ord,\n        case max(probe_sev_ord)\n            when 3 then 'high' when 2 then 'medium' else 'low'\n        end as worst_severity,\n        string_agg(probe_id, ', ' order by probe_id) as probes_flagged,\n        min(probe_first_bucket) as first_bucket,\n        max(probe_last_bucket) as last_bucket\n    from per_probe\n    group by entity_id\n)\n\nselect\n    md5(\n        'assessment_material_overall' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(entity_id as varchar) || '|' || first_bucket || '-' || last_bucket\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'assessment_material_overall' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when probe_count > 1 and total_risk > 10000 then 'high'\n            when total_risk > 1000 then 'medium'\n            else 'low'\n        end as severity,\n    'Material' as entity_type,\n    cast(entity_id as varchar) as entity_id,\n    first_bucket || '-' || last_bucket as time_bucket,\n    round(total_risk, 2) as money_at_risk,\n    total_qty_at_risk as qty_at_risk,\n    health_score,\n    '{\"probe\": \"assessment_material_overall\"'\n        || ', \"probe_count\": \"' || cast(probe_count as varchar) || '\"'\n        || ', \"finding_count\": \"' || cast(finding_count as varchar) || '\"'\n        || ', \"total_risk\": \"' || cast(round(total_risk, 2) as varchar) || '\"'\n        || ', \"weighted_probe_score\": \"' || cast(weighted_probe_score as varchar) || '\"'\n        || ', \"health_score\": \"' || cast(health_score as varchar) || '\"'\n        || ', \"worst_severity\": \"' || worst_severity || '\"'\n        || ', \"probes_flagged\": \"' || probes_flagged || '\"'\n        || '}' as evidence\nfrom aggregated\n", "lang": "sql"}, "classes": "assessment"}, {"data": {"id": "probe_findings__probe_barcode_duplicate", "label": "BarcodeDuplicate", "fullName": "probe_findings__probe_barcode_duplicate", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_barcode_duplicate.sql", "layerOrder": 4, "source": "-- Probe: probe_barcode_duplicate (duplicate)\n-- Detects materials sharing the same barcode. Duplicate barcodes cause scanning errors and misidentification in warehouse and OR workflows.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nduplicate_groups as (\n    select\n        barcode,\n        count(*) as duplicate_count,\n        min(material_id) as first_id,\n        min(standard_price) as standard_price\n    from {{ ref('gold_materials') }}\n    where barcode is not null and trim(barcode) != ''\n    group by barcode\n    having count(*) > 1\n),\n\nenriched as (\n    select\n        dg.*,\n        cast(dg.barcode as varchar) as time_bucket,\n        dg.standard_price * (dg.duplicate_count - 1) as excess_value\n    from duplicate_groups dg\n)\n\nselect\n    md5(\n        'probe_barcode_duplicate' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(first_id as varchar) || '|' || coalesce(time_bucket, '')\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_barcode_duplicate' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when excess_value > 0 then 'high'\n            else 'high'\n        end as severity,\n    'Material' as entity_type,\n    cast(first_id as varchar) as entity_id,\n    coalesce(time_bucket, 'unknown') as time_bucket,\n    greatest(excess_value, 0) as money_at_risk,\n    duplicate_count - 1 as qty_at_risk,\n    '{\"probe\": \"probe_barcode_duplicate\", \"duplicate_count\": \"' || cast(duplicate_count as varchar)\n        || '\", \"excess_value\": \"' || cast(round(excess_value, 2) as varchar)\n        || '\", \"barcode\": \"' || coalesce(cast(barcode as varchar), '') || '\"}' as evidence\nfrom enriched\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_billing_before_usage", "label": "BillingBeforeUsage", "fullName": "probe_findings__probe_billing_before_usage", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_billing_before_usage.sql", "layerOrder": 4, "source": "-- Probe: probe_billing_before_usage (temporal_sequence)\n-- Flags case+material combinations where the earliest billing timestamp precedes the earliest usage timestamp. This temporal anomaly suggests backdated billing, data entry errors, or system integration gaps.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nfirst_events as (\n    select\n        case_token, material_id,\n        min(billing_timestamp) as first_billing,\n        count(*) as billing_count,\n        sum(billed_amount) as total_billed_amount\n    from {{ ref('gold_billing_events') }}\n    group by case_token, material_id\n),\n\nsecond_events as (\n    select\n        case_token, material_id,\n        min(usage_timestamp) as first_usage,\n        count(*) as usage_count\n    from {{ ref('gold_case_material_usage') }}\n    group by case_token, material_id\n),\n\njoined as (\n    select\n        f.*,\n        s.first_usage,\n        s.usage_count,\n        extract(epoch from (s.first_usage - f.first_billing)) / 3600.0 as gap_hours\n    from first_events f\n    inner join second_events s\n        on f.case_token = s.case_token and f.material_id = s.material_id\n    where f.first_billing < s.first_usage\n),\n\nenriched as (\n    select\n        j.*,\n        cast(extract(isoyear from cast(j.first_billing as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(j.first_billing as date)) as varchar), 2, '0') as time_bucket,\n        gm.material_description\n    from joined j\n    left join {{ ref('gold_materials') }} gm on j.material_id = gm.material_id\n)\n\nselect\n    md5(\n        'probe_billing_before_usage' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(case_token as varchar) || '|' || cast(material_id as varchar)\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_billing_before_usage' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when gap_hours > 168.0 then 'high'\n            when gap_hours > 24.0 then 'medium'\n            else 'low'\n        end as severity,\n    'Case' as entity_type,\n    cast(case_token as varchar) as entity_id,\n    coalesce(time_bucket, 'unknown') as time_bucket,\n    round(total_billed_amount, 2) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_billing_before_usage\", \"case_token\": \"' || cast(case_token as varchar)\n        || '\", \"material_id\": \"' || cast(material_id as varchar)\n        || '\", \"material_description\": \"' || coalesce(replace(cast(material_description as varchar), '\"', ''), '')\n        || '\", \"first_billing\": \"' || cast(first_billing as varchar)\n        || '\", \"first_usage\": \"' || cast(first_usage as varchar)\n        || '\", \"gap_hours\": \"' || cast(round(gap_hours, 1) as varchar)\n        || '\", \"billing_count\": \"' || cast(billing_count as varchar)\n        || '\", \"usage_count\": \"' || cast(usage_count as varchar)\n        || '\"}' as evidence\nfrom enriched\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_billing_below_internal_price", "label": "BillingBelowInternalPrice", "fullName": "probe_findings__probe_billing_below_internal_price", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_billing_below_internal_price.sql", "layerOrder": 4, "source": "-- Probe: probe_billing_below_internal_price (enrichment)\n-- Identifies materials where the average billed unit price is below the internal sales price. Indicates potential revenue loss from underpricing or missing markup.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\ndim_filter as (\n    select material_id, material_description, internal_sales_price, standard_price\n    from {{ ref('gold_materials') }}\n    where internal_sales_price is not null and internal_sales_price > 0\n),\n\nfact_agg as (\n    select\n        f.material_id, cast(extract(isoyear from cast(f.billing_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(f.billing_timestamp as date)) as varchar), 2, '0') as month,\n        sum(billed_amount) as revenue,\n        sum(quantity) as qty_billed\n    from {{ ref('gold_billing_events') }} f\n    group by f.material_id, cast(extract(isoyear from cast(f.billing_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(f.billing_timestamp as date)) as varchar), 2, '0')\n),\n\nenriched as (\n    select\n        fa.*,\n        dim.material_description,\n        dim.internal_sales_price,\n        dim.standard_price,\n        case when qty_billed > 0 then round(revenue / qty_billed, 2) else 0 end as avg_unit_price,\n        dim.internal_sales_price - avg_unit_price as price_gap,\n        case when dim.internal_sales_price > 0 then round(100.0 * price_gap / dim.internal_sales_price, 2) else 0 end as gap_pct\n    from fact_agg fa\n    inner join dim_filter dim on fa.material_id = dim.material_id\n),\n\nflagged as (\n    select\n        *,\n        greatest(round(qty_billed * price_gap, 2), 0) as money_at_risk_val\n    from enriched\n    where avg_unit_price < internal_sales_price and qty_billed > 0\n)\n\nselect\n    md5(\n        'probe_billing_below_internal_price' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || coalesce(month, '')\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_billing_below_internal_price' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when money_at_risk_val > 1000 then 'high'\n            when money_at_risk_val > 100 then 'medium'\n            else 'low'\n        end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    coalesce(month, 'unknown') as time_bucket,\n    greatest(round(money_at_risk_val, 2), 0) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_billing_below_internal_price\"'\n        || ', \"material_id\": \"' || coalesce(cast(material_id as varchar), '') || '\"'\n        || ', \"material_description\": \"' || coalesce(cast(material_description as varchar), '') || '\"'\n        || ', \"month\": \"' || coalesce(cast(month as varchar), '') || '\"'\n        || ', \"revenue\": \"' || coalesce(cast(revenue as varchar), '') || '\"'\n        || ', \"qty_billed\": \"' || coalesce(cast(qty_billed as varchar), '') || '\"'\n        || ', \"avg_unit_price\": \"' || coalesce(cast(avg_unit_price as varchar), '') || '\"'\n        || ', \"internal_sales_price\": \"' || coalesce(cast(internal_sales_price as varchar), '') || '\"'\n        || ', \"price_gap\": \"' || coalesce(cast(price_gap as varchar), '') || '\"'\n        || ', \"gap_pct\": \"' || coalesce(cast(gap_pct as varchar), '') || '\"'\n        || '}' as evidence\nfrom flagged\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_cc_producteur_mismatch", "label": "CcProducteurMismatch", "fullName": "probe_findings__probe_cc_producteur_mismatch", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_cc_producteur_mismatch.sql", "layerOrder": 4, "source": "-- Probe: probe_cc_producteur_mismatch (entity_filter)\n-- Flags cases where the billing cost center (cc_demandeur) differs from cc_producteur. A high mismatch rate per case may indicate systematic cost center attribution errors or inter-department charging issues.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nfiltered as (\n    select *\n    from {{ ref('gold_billing_events') }}\n    where cc_producteur_id is not null and trim(cc_producteur_id) != '' and cost_center_id is not null and trim(cost_center_id) != '' and cost_center_id != cc_producteur_id\n),\n\ngrouped as (\n    select\n        case_token,\n        count(*) as event_count,\n        sum(billed_amount) as total_billed_amount\n    from filtered\n    group by case_token\n),\n\nenriched as (\n    select\n        g.*,\n        e.case_type,\n        e.cost_center_id\n    from grouped g\n    left join {{ ref('gold_cases') }} e on g.case_token = e.case_token\n)\n\nselect\n    md5(\n        'probe_cc_producteur_mismatch' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(case_token as varchar) || '|' || 'all'\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_cc_producteur_mismatch' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when event_count > 10 then 'high'\n            else 'medium'\n        end as severity,\n    'Case' as entity_type,\n    cast(case_token as varchar) as entity_id,\n    'all' as time_bucket,\n    greatest(total_billed_amount, 0) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_cc_producteur_mismatch\"'\n        || ', \"case_token\": \"' || coalesce(cast(case_token as varchar), '') || '\"'\n        || ', \"event_count\": \"' || coalesce(cast(event_count as varchar), '') || '\"'\n        || ', \"total_billed_amount\": \"' || coalesce(cast(total_billed_amount as varchar), '') || '\"'\n        || ', \"case_type\": \"' || coalesce(cast(case_type as varchar), '') || '\"'\n        || ', \"cost_center_id\": \"' || coalesce(cast(cost_center_id as varchar), '') || '\"'\n        || '}' as evidence\nfrom enriched\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_controlled_substance_traceability", "label": "ControlledSubstanceTraceability", "fullName": "probe_findings__probe_controlled_substance_traceability", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_controlled_substance_traceability.sql", "layerOrder": 4, "source": "-- Probe: probe_controlled_substance_traceability (reconciliation)\n-- For controlled substances: compares received quantity (RECEIVE movements) minus issued quantity (ISSUE/TRANSFER movements) minus patient usage per material per month. Gaps indicate unaccounted stock \u2014 a regulatory compliance risk.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\ndim_filter as (\n    select material_id, material_description, standard_price\n    from {{ ref('gold_materials') }}\n    where is_controlled_substance = true\n),\n\nleft_agg as (\n    select\n        l_src.material_id,\n        cast(extract(isoyear from cast(l_src.movement_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(l_src.movement_timestamp as date)) as varchar), 2, '0') as month,\n        sum(case when movement_type = 'RECEIVE' then quantity else 0 end) as received_qty,\n        sum(case when movement_type in ('ISSUE', 'TRANSFER') then quantity else 0 end) as issued_qty\n    from {{ ref('gold_material_movements') }} l_src\n    inner join dim_filter dim_f on l_src.material_id = dim_f.material_id\n    group by l_src.material_id, cast(extract(isoyear from cast(l_src.movement_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(l_src.movement_timestamp as date)) as varchar), 2, '0')\n),\n\nright_agg as (\n    select\n        r_src.material_id,\n        cast(extract(isoyear from cast(r_src.usage_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(r_src.usage_timestamp as date)) as varchar), 2, '0') as month,\n        sum(quantity) as used_qty\n    from {{ ref('gold_case_material_usage') }} r_src\n    inner join dim_filter dim_f on r_src.material_id = dim_f.material_id\n    group by r_src.material_id, cast(extract(isoyear from cast(r_src.usage_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(r_src.usage_timestamp as date)) as varchar), 2, '0')\n),\n\ncombined as (\n    select\n        coalesce(l.material_id, r.material_id) as material_id,\n        coalesce(l.month, r.month) as month,\n        coalesce(l.received_qty, 0) as received_qty,\n        coalesce(l.issued_qty, 0) as issued_qty,\n        coalesce(r.used_qty, 0) as used_qty,\n        coalesce(l.received_qty, 0) - coalesce(l.issued_qty, 0) - coalesce(r.used_qty, 0) as gap_qty\n    from left_agg l\n    full outer join right_agg r\n        on l.material_id = r.material_id and l.month = r.month\n    where abs(coalesce(l.received_qty, 0) - coalesce(l.issued_qty, 0) - coalesce(r.used_qty, 0)) > 0\n),\n\nflagged as (\n    select\n        c.*,\n        dim_f.material_description,\n        dim_f.standard_price,\n        abs(gap_qty) * dim_f.standard_price as money_at_risk_val\n    from combined c\n    inner join dim_filter dim_f on c.material_id = dim_f.material_id\n)\n\nselect\n    md5(\n        'probe_controlled_substance_traceability' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || coalesce(month, '')\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_controlled_substance_traceability' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when money_at_risk_val > 100 then 'high'\n            else 'medium'\n        end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    coalesce(month, 'unknown') as time_bucket,\n    greatest(round(money_at_risk_val, 2), 0) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_controlled_substance_traceability\"'\n        || ', \"material_id\": \"' || coalesce(cast(material_id as varchar), '') || '\"'\n        || ', \"material_description\": \"' || coalesce(cast(material_description as varchar), '') || '\"'\n        || ', \"month\": \"' || coalesce(cast(month as varchar), '') || '\"'\n        || ', \"received_qty\": \"' || coalesce(cast(received_qty as varchar), '') || '\"'\n        || ', \"issued_qty\": \"' || coalesce(cast(issued_qty as varchar), '') || '\"'\n        || ', \"used_qty\": \"' || coalesce(cast(used_qty as varchar), '') || '\"'\n        || ', \"gap_qty\": \"' || coalesce(cast(gap_qty as varchar), '') || '\"'\n        || '}' as evidence\nfrom flagged\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_conversion_factor_anomaly", "label": "ConversionFactorAnomaly", "fullName": "probe_findings__probe_conversion_factor_anomaly", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_conversion_factor_anomaly.sql", "layerOrder": 4, "source": "-- Probe: probe_conversion_factor_anomaly (entity_filter)\n-- Flags materials with implausible unit conversion factors \u2014 zero, negative, extremely large, or factor=1 where unit codes differ. Bad conversion factors corrupt quantity calculations across all downstream analytics.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nfiltered as (\n    select *\n    from {{ ref('gold_materials') }}\n    where (conversion_factor_medium is not null and (conversion_factor_medium <= 0 or conversion_factor_medium > 10000)) or (conversion_factor_large is not null and (conversion_factor_large <= 0 or conversion_factor_large > 10000)) or (conversion_factor_medium = 1 and unit_medium_code is not null and unit_of_measure is not null and unit_medium_code != unit_of_measure) or (conversion_factor_large = 1 and unit_large_code is not null and unit_of_measure is not null and unit_large_code != unit_of_measure)\n)\n\nselect\n    md5(\n        'probe_conversion_factor_anomaly' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || 'all'\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_conversion_factor_anomaly' as probe_id,\n    '1.0.0' as probe_version,\n    'medium' as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    'all' as time_bucket,\n    greatest(0, 0) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_conversion_factor_anomaly\"'\n        || ', \"material_id\": \"' || coalesce(cast(material_id as varchar), '') || '\"'\n        || ', \"material_description\": \"' || coalesce(cast(material_description as varchar), '') || '\"'\n        || ', \"unit_of_measure\": \"' || coalesce(cast(unit_of_measure as varchar), '') || '\"'\n        || ', \"unit_medium_code\": \"' || coalesce(cast(unit_medium_code as varchar), '') || '\"'\n        || ', \"unit_large_code\": \"' || coalesce(cast(unit_large_code as varchar), '') || '\"'\n        || ', \"conversion_factor_medium\": \"' || coalesce(cast(conversion_factor_medium as varchar), '') || '\"'\n        || ', \"conversion_factor_large\": \"' || coalesce(cast(conversion_factor_large as varchar), '') || '\"'\n        || '}' as evidence\nfrom filtered\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_cost_center_billing_mismatch", "label": "CostCenterBillingMismatch", "fullName": "probe_findings__probe_cost_center_billing_mismatch", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_cost_center_billing_mismatch.sql", "layerOrder": 4, "source": "-- Probe: probe_cost_center_billing_mismatch (balance)\n-- Detects cases where billing events are posted to a different cost center than the case's assigned cost center, indicating cross-department attribution errors.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nleft_agg as (\n    select\n        case_token,\n        sum(billed_amount) as left_value\n    from {{ ref('gold_billing_events') }}\n    where billing_status = 'POSTED'\n    group by case_token\n),\n\nright_agg as (\n    select\n        r.case_token,\n        sum(r.billed_amount) as right_value\n    from {{ ref('gold_billing_events') }} r\n    inner join {{ ref('gold_cases') }} a\n        on r.case_token = a.case_token\n        and r.cost_center_id = a.cost_center_id\n    where r.billing_status = 'POSTED'\n    group by r.case_token\n),\n\ntime_buckets as (\n    select\n        case_token,\n        min(cast(extract(isoyear from cast(billing_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(billing_timestamp as date)) as varchar), 2, '0')) as time_bucket\n    from {{ ref('gold_billing_events') }}\n    group by case_token\n),\n\ncompared as (\n    select\n        l.case_token,\n        t.time_bucket,\n        l.left_value,\n        coalesce(r.right_value, 0) as right_value,\n        case\n            when l.left_value = 0 then 0\n            else 100.0 * (l.left_value - coalesce(r.right_value, 0)) / l.left_value\n        end as pct_diff\n    from left_agg l\n    left join right_agg r on l.case_token = r.case_token\n    left join time_buckets t on l.case_token = t.case_token\n    where abs(\n        case\n            when l.left_value = 0 then 0\n            else 100.0 * (l.left_value - coalesce(r.right_value, 0)) / l.left_value\n        end\n    ) > 0.0\n)\n\nselect\n    md5(\n        'probe_cost_center_billing_mismatch' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(case_token as varchar) || '|' || coalesce(time_bucket, '')\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_cost_center_billing_mismatch' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when abs(pct_diff) > 50.0 then 'high'\n            when abs(pct_diff) > 10.0 then 'medium'\n            else 'low'\n        end as severity,\n    'Case' as entity_type,\n    cast(case_token as varchar) as entity_id,\n    coalesce(time_bucket, 'unknown') as time_bucket,\n    greatest(left_value - right_value, 0) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_cost_center_billing_mismatch\", \"left\": \"' || cast(round(left_value, 2) as varchar)\n        || '\", \"right\": \"' || cast(round(right_value, 2) as varchar)\n        || '\", \"pct_diff\": \"' || cast(round(pct_diff, 2) as varchar) || '\"}' as evidence\nfrom compared\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_cross_site_billing", "label": "CrossSiteBilling", "fullName": "probe_findings__probe_cross_site_billing", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_cross_site_billing.sql", "layerOrder": 4, "source": "-- Probe: probe_cross_site_billing (entity_filter)\n-- Flags cases where billing events have different requesting and producing sites. Cross-site billing may indicate inter-site transfers that need separate accounting treatment or data entry errors.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nfiltered as (\n    select *\n    from {{ ref('gold_billing_events') }}\n    where site_demandeur is not null and site_producteur is not null and trim(site_demandeur) != '' and trim(site_producteur) != '' and site_demandeur != site_producteur\n),\n\ngrouped as (\n    select\n        case_token,\n        count(*) as event_count,\n        sum(billed_amount) as total_billed_amount\n    from filtered\n    group by case_token\n),\n\nenriched as (\n    select\n        g.*,\n        e.case_type,\n        e.cost_center_id\n    from grouped g\n    left join {{ ref('gold_cases') }} e on g.case_token = e.case_token\n)\n\nselect\n    md5(\n        'probe_cross_site_billing' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(case_token as varchar) || '|' || 'all'\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_cross_site_billing' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when event_count > 10 then 'high'\n            else 'medium'\n        end as severity,\n    'Case' as entity_type,\n    cast(case_token as varchar) as entity_id,\n    'all' as time_bucket,\n    greatest(total_billed_amount, 0) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_cross_site_billing\"'\n        || ', \"case_token\": \"' || coalesce(cast(case_token as varchar), '') || '\"'\n        || ', \"event_count\": \"' || coalesce(cast(event_count as varchar), '') || '\"'\n        || ', \"total_billed_amount\": \"' || coalesce(cast(total_billed_amount as varchar), '') || '\"'\n        || ', \"case_type\": \"' || coalesce(cast(case_type as varchar), '') || '\"'\n        || ', \"cost_center_id\": \"' || coalesce(cast(cost_center_id as varchar), '') || '\"'\n        || '}' as evidence\nfrom enriched\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_drg_cost_outlier", "label": "DrgCostOutlier", "fullName": "probe_findings__probe_drg_cost_outlier", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_drg_cost_outlier.sql", "layerOrder": 4, "source": "-- Probe: probe_drg_cost_outlier (hand_written)\n-- Per DRG: z-score on total_billed per case within DRG peer group\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\ncase_billing as (\n    select\n        b.case_token,\n        sum(b.billed_amount) as total_billed\n    from {{ ref('gold_billing_events') }} b\n    group by b.case_token\n),\n\ncase_drg as (\n    select\n        c.case_token,\n        c.drg_code,\n        cb.total_billed\n    from {{ ref('gold_cases') }} c\n    inner join case_billing cb on c.case_token = cb.case_token\n    where c.drg_code is not null\n      and trim(c.drg_code) != ''\n),\n\ndrg_stats as (\n    select\n        drg_code,\n        count(*) as case_count,\n        avg(total_billed) as drg_avg,\n        stddev_pop(total_billed) as drg_stddev\n    from case_drg\n    group by drg_code\n    having count(*) >= 10\n),\n\nflagged as (\n    select\n        cd.case_token,\n        cd.drg_code,\n        cd.total_billed,\n        ds.drg_avg,\n        ds.drg_stddev,\n        case\n            when ds.drg_stddev > 0\n            then (cd.total_billed - ds.drg_avg) / ds.drg_stddev\n            else 0\n        end as z_score\n    from case_drg cd\n    inner join drg_stats ds on cd.drg_code = ds.drg_code\n    where ds.drg_stddev > 0\n      and abs((cd.total_billed - ds.drg_avg) / ds.drg_stddev) > 2\n)\n\nselect\n    md5(\n        'probe_drg_cost_outlier' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(case_token as varchar) || '|' || drg_code\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_drg_cost_outlier' as probe_id,\n    '1.0.0' as probe_version,\n    case\n        when abs(z_score) > 3 then 'high'\n        when abs(z_score) > 2 then 'medium'\n        else 'low'\n    end as severity,\n    'Case' as entity_type,\n    cast(case_token as varchar) as entity_id,\n    drg_code as time_bucket,\n    greatest(round(total_billed - drg_avg, 2), 0) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_drg_cost_outlier\"'\n        || ', \"drg_code\": \"' || drg_code || '\"'\n        || ', \"total_billed\": \"' || cast(round(total_billed, 2) as varchar) || '\"'\n        || ', \"drg_avg\": \"' || cast(round(drg_avg, 2) as varchar) || '\"'\n        || ', \"drg_stddev\": \"' || cast(round(drg_stddev, 2) as varchar) || '\"'\n        || ', \"z_score\": \"' || cast(round(z_score, 2) as varchar) || '\"'\n        || '}' as evidence\nfrom flagged\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_duplicate_billing", "label": "DuplicateBilling", "fullName": "probe_findings__probe_duplicate_billing", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_duplicate_billing.sql", "layerOrder": 4, "source": "-- Probe: probe_duplicate_billing (duplicate)\n-- Detects billing events that appear more than once with identical case_token, material_id, quantity, billed_amount, and billing_timestamp, indicating potential double-invoicing.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nduplicate_groups as (\n    select\n        case_token, material_id, quantity, billed_amount, billing_timestamp,\n        count(*) as duplicate_count,\n        min(billing_id) as first_id\n    from {{ ref('gold_billing_events') }}\n    group by case_token, material_id, quantity, billed_amount, billing_timestamp\n    having count(*) > 1\n),\n\nenriched as (\n    select\n        dg.*,\n        cast(extract(isoyear from cast(dg.billing_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(dg.billing_timestamp as date)) as varchar), 2, '0') as time_bucket,\n        dg.billed_amount * (dg.duplicate_count - 1) as excess_value,\n        enr.material_description\n    from duplicate_groups dg\n    left join {{ ref('gold_materials') }} enr on dg.material_id = enr.material_id\n)\n\nselect\n    md5(\n        'probe_duplicate_billing' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(first_id as varchar) || '|' || coalesce(time_bucket, '')\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_duplicate_billing' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when excess_value > 1000.0 then 'high'\n            when excess_value > 100.0 then 'medium'\n            else 'low'\n        end as severity,\n    'BillingEvent' as entity_type,\n    cast(first_id as varchar) as entity_id,\n    coalesce(time_bucket, 'unknown') as time_bucket,\n    greatest(excess_value, 0) as money_at_risk,\n    duplicate_count - 1 as qty_at_risk,\n    '{\"probe\": \"probe_duplicate_billing\", \"duplicate_count\": \"' || cast(duplicate_count as varchar)\n        || '\", \"excess_value\": \"' || cast(round(excess_value, 2) as varchar)\n        || '\", \"case_token\": \"' || coalesce(cast(case_token as varchar), '')\n        || '\", \"material_id\": \"' || coalesce(cast(material_id as varchar), '')\n        || '\", \"quantity\": \"' || coalesce(cast(quantity as varchar), '')\n        || '\", \"billed_amount\": \"' || coalesce(cast(billed_amount as varchar), '')\n        || '\", \"billing_timestamp\": \"' || coalesce(cast(billing_timestamp as varchar), '')\n        || '\", \"material_description\": \"' || coalesce(cast(material_description as varchar), '') || '\"}' as evidence\nfrom enriched\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_invoice_integrity", "label": "InvoiceIntegrity", "fullName": "probe_findings__probe_invoice_integrity", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_invoice_integrity.sql", "layerOrder": 4, "source": "-- Probe: probe_invoice_integrity (hand_written)\n-- Per case: invoiced vs uninvoiced billing events\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\ncase_invoice_stats as (\n    select\n        case_token,\n        count(*) as total_events,\n        count(case when invoice_number is not null and trim(invoice_number) != '' then 1 end) as invoiced_events,\n        count(case when invoice_number is null or trim(invoice_number) = '' then 1 end) as uninvoiced_events,\n        sum(case when invoice_number is null or trim(invoice_number) = '' then billed_amount else 0 end) as uninvoiced_amount,\n        sum(billed_amount) as total_billed\n    from {{ ref('gold_billing_events') }}\n    group by case_token\n),\n\nflagged as (\n    select\n        *,\n        round(100.0 * uninvoiced_events / total_events, 2) as uninvoiced_pct\n    from case_invoice_stats\n    where invoiced_events > 0\n      and uninvoiced_events > 0\n)\n\nselect\n    md5(\n        'probe_invoice_integrity' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(case_token as varchar) || '|' || 'all'\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_invoice_integrity' as probe_id,\n    '1.0.0' as probe_version,\n    case\n        when uninvoiced_pct > 20 then 'high'\n        when uninvoiced_pct > 5 then 'medium'\n        else 'low'\n    end as severity,\n    'Case' as entity_type,\n    cast(case_token as varchar) as entity_id,\n    'all' as time_bucket,\n    greatest(round(uninvoiced_amount, 2), 0) as money_at_risk,\n    uninvoiced_events as qty_at_risk,\n    '{\"probe\": \"probe_invoice_integrity\"'\n        || ', \"total_events\": \"' || cast(total_events as varchar) || '\"'\n        || ', \"invoiced_events\": \"' || cast(invoiced_events as varchar) || '\"'\n        || ', \"uninvoiced_events\": \"' || cast(uninvoiced_events as varchar) || '\"'\n        || ', \"uninvoiced_pct\": \"' || cast(uninvoiced_pct as varchar) || '\"'\n        || ', \"uninvoiced_amount\": \"' || cast(round(uninvoiced_amount, 2) as varchar) || '\"'\n        || '}' as evidence\nfrom flagged\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_io_coefficient", "label": "IoCoefficient", "fullName": "probe_findings__probe_io_coefficient", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_io_coefficient.sql", "layerOrder": 4, "source": "-- Probe: probe_io_coefficient (ratio)\n-- Flags materials where the aggregated I/O coefficient deviates >20% from 1.0, indicating untracked ward-level consumption or over-delivery.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nmaterial_agg as (\n    select\n        material_id, material_description, standard_price, material_group,\n        min(month) as first_period,\n        max(month) as last_period,\n        count(*) as periods_observed,\n        sum(transfer_qty) as sum_numerator,\n        sum(usage_qty) as sum_denominator\n    from {{ ref('gold_io_coefficient') }}\n    where population = 'both_present'\n    group by material_id, material_description, standard_price, material_group\n),\n\nflagged as (\n    select\n        *,\n        case\n            when sum_numerator = 0 then null\n            else round(cast(sum_denominator as double) / sum_numerator, 4)\n        end as ratio_value,\n        sum_denominator - sum_numerator as qty_delta,\n        abs(1.0 - cast(sum_denominator as double) / sum_numerator) as deviation\n    from material_agg\n    where sum_numerator > 0\n      and abs(1.0 - cast(sum_denominator as double) / sum_numerator) > 0.2\n)\n\nselect\n    md5(\n        'probe_io_coefficient' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || first_period || '-' || last_period\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_io_coefficient' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when deviation > 0.5 then 'high'\n            else 'medium'\n        end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    first_period || '-' || last_period as time_bucket,\n    round(abs(qty_delta) * standard_price, 2) as money_at_risk,\n    abs(qty_delta) as qty_at_risk,\n    '{\"probe\": \"probe_io_coefficient\", \"transfer_qty\": \"' || cast(sum_numerator as varchar)\n        || '\", \"usage_qty\": \"' || cast(sum_denominator as varchar)\n        || '\", \"io_coefficient\": \"' || cast(round(ratio_value, 4) as varchar)\n        || '\", \"months_observed\": \"' || cast(periods_observed as varchar) || '\"}' as evidence\nfrom flagged\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_io_coefficient_trend", "label": "IoCoefficientTrend", "fullName": "probe_findings__probe_io_coefficient_trend", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_io_coefficient_trend.sql", "layerOrder": 4, "source": "-- Probe: probe_io_coefficient_trend (trend)\n-- Flags materials with worsening I/O coefficient trends \u2014 coefficient moving further from 1.0 over time, indicating systematic process degradation rather than one-time spikes. Requires at least 4 months of data.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nmaterial_trend as (\n    select\n        material_id, material_description, standard_price, material_group, months_active, trend_direction,\n        min(month) as first_period,\n        max(month) as last_period,\n        sum(abs(qty_delta)) as total_abs_qty_delta\n    from {{ ref('gold_io_coefficient_trend') }}\n    where population = 'both_present'\n    group by material_id, material_description, standard_price, material_group, months_active, trend_direction\n),\n\nearliest_latest as (\n    select\n        material_id,\n        first_value(rolling_avg_3m) over (\n            partition by material_id order by month\n        ) as earliest_rolling_avg,\n        last_value(rolling_avg_3m) over (\n            partition by material_id order by month\n            rows between unbounded preceding and unbounded following\n        ) as latest_rolling_avg\n    from {{ ref('gold_io_coefficient_trend') }}\n    where rolling_avg_3m is not null and population = 'both_present'\n),\n\nearliest_latest_dedup as (\n    select distinct\n        material_id,\n        earliest_rolling_avg,\n        latest_rolling_avg,\n        abs(latest_rolling_avg - earliest_rolling_avg) as drift\n    from earliest_latest\n),\n\nflagged as (\n    select\n        mt.*,\n        el.earliest_rolling_avg,\n        el.latest_rolling_avg,\n        el.drift\n    from material_trend mt\n    inner join earliest_latest_dedup el on mt.material_id = el.material_id\n    where mt.trend_direction = 'worsening'\n      and mt.months_active >= 4\n      and el.drift > 0.15\n)\n\nselect\n    md5(\n        'probe_io_coefficient_trend' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || first_period || '-' || last_period\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_io_coefficient_trend' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when drift > 0.3 then 'high'\n            else 'medium'\n        end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    first_period || '-' || last_period as time_bucket,\n    round(total_abs_qty_delta * standard_price, 2) as money_at_risk,\n    total_abs_qty_delta as qty_at_risk,\n    '{\"probe\": \"probe_io_coefficient_trend\", \"earliest_rolling_avg\": \"'\n        || cast(round(earliest_rolling_avg, 4) as varchar)\n        || '\", \"latest_rolling_avg\": \"'\n        || cast(round(latest_rolling_avg, 4) as varchar)\n        || '\", \"drift\": \"' || cast(round(drift, 4) as varchar)\n        || '\", \"months_active\": \"' || cast(months_active as varchar)\n        || '\", \"trend_direction\": \"' || trend_direction || '\"}' as evidence\nfrom flagged\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_io_coefficient_weekly", "label": "IoCoefficientWeekly", "fullName": "probe_findings__probe_io_coefficient_weekly", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_io_coefficient_weekly.sql", "layerOrder": 4, "source": "-- Probe: probe_io_coefficient_weekly (ratio)\n-- Weekly-grain I/O coefficient analysis. Flags materials where the weekly aggregated I/O coefficient deviates >20% from 1.0, providing higher-resolution visibility into ward consumption patterns than the monthly variant.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nmaterial_agg as (\n    select\n        material_id, material_description, standard_price, material_group,\n        min(week) as first_period,\n        max(week) as last_period,\n        count(*) as periods_observed,\n        sum(transfer_qty) as sum_numerator,\n        sum(usage_qty) as sum_denominator\n    from {{ ref('gold_io_coefficient_weekly') }}\n    where population = 'both_present'\n    group by material_id, material_description, standard_price, material_group\n),\n\nflagged as (\n    select\n        *,\n        case\n            when sum_numerator = 0 then null\n            else round(cast(sum_denominator as double) / sum_numerator, 4)\n        end as ratio_value,\n        sum_denominator - sum_numerator as qty_delta,\n        abs(1.0 - cast(sum_denominator as double) / sum_numerator) as deviation\n    from material_agg\n    where sum_numerator > 0\n      and abs(1.0 - cast(sum_denominator as double) / sum_numerator) > 0.2\n)\n\nselect\n    md5(\n        'probe_io_coefficient_weekly' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || first_period || '-' || last_period\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_io_coefficient_weekly' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when deviation > 0.5 then 'high'\n            else 'medium'\n        end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    first_period || '-' || last_period as time_bucket,\n    round(abs(qty_delta) * standard_price, 2) as money_at_risk,\n    abs(qty_delta) as qty_at_risk,\n    '{\"probe\": \"probe_io_coefficient_weekly\", \"transfer_qty\": \"' || cast(sum_numerator as varchar)\n        || '\", \"usage_qty\": \"' || cast(sum_denominator as varchar)\n        || '\", \"io_coefficient\": \"' || cast(round(ratio_value, 4) as varchar)\n        || '\", \"weeks_observed\": \"' || cast(periods_observed as varchar) || '\"}' as evidence\nfrom flagged\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_io_coefficient_weekly_trend", "label": "IoCoefficientWeeklyTrend", "fullName": "probe_findings__probe_io_coefficient_weekly_trend", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_io_coefficient_weekly_trend.sql", "layerOrder": 4, "source": "-- Probe: probe_io_coefficient_weekly_trend (trend)\n-- Weekly-grain I/O coefficient trend detection. Flags materials with worsening coefficient trends at weekly resolution, using a 4-week rolling average. Requires at least 8 weeks of data.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nmaterial_trend as (\n    select\n        material_id, material_description, standard_price, material_group, weeks_active, trend_direction,\n        min(week) as first_period,\n        max(week) as last_period,\n        sum(abs(qty_delta)) as total_abs_qty_delta\n    from {{ ref('gold_io_coefficient_weekly_trend') }}\n    where population = 'both_present'\n    group by material_id, material_description, standard_price, material_group, weeks_active, trend_direction\n),\n\nearliest_latest as (\n    select\n        material_id,\n        first_value(rolling_avg_4w) over (\n            partition by material_id order by week\n        ) as earliest_rolling_avg,\n        last_value(rolling_avg_4w) over (\n            partition by material_id order by week\n            rows between unbounded preceding and unbounded following\n        ) as latest_rolling_avg\n    from {{ ref('gold_io_coefficient_weekly_trend') }}\n    where rolling_avg_4w is not null and population = 'both_present'\n),\n\nearliest_latest_dedup as (\n    select distinct\n        material_id,\n        earliest_rolling_avg,\n        latest_rolling_avg,\n        abs(latest_rolling_avg - earliest_rolling_avg) as drift\n    from earliest_latest\n),\n\nflagged as (\n    select\n        mt.*,\n        el.earliest_rolling_avg,\n        el.latest_rolling_avg,\n        el.drift\n    from material_trend mt\n    inner join earliest_latest_dedup el on mt.material_id = el.material_id\n    where mt.trend_direction = 'worsening'\n      and mt.weeks_active >= 8\n      and el.drift > 0.15\n)\n\nselect\n    md5(\n        'probe_io_coefficient_weekly_trend' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || first_period || '-' || last_period\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_io_coefficient_weekly_trend' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when drift > 0.3 then 'high'\n            else 'medium'\n        end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    first_period || '-' || last_period as time_bucket,\n    round(total_abs_qty_delta * standard_price, 2) as money_at_risk,\n    total_abs_qty_delta as qty_at_risk,\n    '{\"probe\": \"probe_io_coefficient_weekly_trend\", \"earliest_rolling_avg\": \"'\n        || cast(round(earliest_rolling_avg, 4) as varchar)\n        || '\", \"latest_rolling_avg\": \"'\n        || cast(round(latest_rolling_avg, 4) as varchar)\n        || '\", \"drift\": \"' || cast(round(drift, 4) as varchar)\n        || '\", \"weeks_active\": \"' || cast(weeks_active as varchar)\n        || '\", \"trend_direction\": \"' || trend_direction || '\"}' as evidence\nfrom flagged\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_migel_reimbursement_gap", "label": "MigelReimbursementGap", "fullName": "probe_findings__probe_migel_reimbursement_gap", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_migel_reimbursement_gap.sql", "layerOrder": 4, "source": "-- Probe: probe_migel_reimbursement_gap (silver_audit)\n-- Flags billable materials without a MiGEL code that have billing activity. Without a MiGEL code, reimbursement claims may be rejected by insurers \u2014 a compliance and revenue risk.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nzero_price_materials as (\n    select\n        material_id,\n        material_description,\n        material_group,\n        is_billable,\n        migel_code\n    from {{ ref('silver_materials') }}\n    where (migel_code is null or trim(migel_code) = '') and is_billable = true and trim(material_id) is not null and trim(material_id) != ''\n),\n\nbilling_agg as (\n    select material_id, count(*) as billing_count, sum(cast(billed_amount as decimal(12, 2))) as total_billed_amount\n    from {{ ref('silver_billing_events') }}\n    group by material_id\n),\n\nwith_activity as (\n    select\n        z.*,\n        coalesce(billing.billing_count, 0) as billing_count,\n        coalesce(billing.total_billed_amount, 0) as total_billed_amount\n    from zero_price_materials z\n    left join billing_agg billing on z.material_id = billing.material_id\n    where billing_count > 0\n)\n\nselect\n    md5(\n        'probe_migel_reimbursement_gap' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || 'all'\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_migel_reimbursement_gap' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when total_billed_amount > 10000 then 'high'\n            when total_billed_amount > 1000 then 'medium'\n            else 'low'\n        end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    'all' as time_bucket,\n    round(round(total_billed_amount, 2), 2) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_migel_reimbursement_gap\"'\n        || ', \"material_description\": \"' || coalesce(cast(material_description as varchar), '') || '\"'\n        || ', \"material_group\": \"' || coalesce(cast(material_group as varchar), '') || '\"'\n        || ', \"is_billable\": \"' || coalesce(cast(is_billable as varchar), '') || '\"'\n        || ', \"migel_code\": \"' || coalesce(cast(migel_code as varchar), '') || '\"'\n        || ', \"billing_count\": \"' || coalesce(cast(billing_count as varchar), '') || '\"'\n        || ', \"total_billed_amount\": \"' || coalesce(cast(total_billed_amount as varchar), '') || '\"'\n        || '}' as evidence\nfrom with_activity\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_missing_mandatory_implants", "label": "MissingMandatoryImplants", "fullName": "probe_findings__probe_missing_mandatory_implants", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_missing_mandatory_implants.sql", "layerOrder": 4, "source": "-- Probe: probe_missing_mandatory_implants (mandatory_item)\n-- Flags implant-requiring procedures (hip/knee replacement) that have no matching implant material usage, indicating a documentation or billing gap.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nqualifying_cases as (\n    select distinct case_token\n    from {{ ref('gold_procedures') }}\n    where procedure_type in ('HIP_REPLACEMENT', 'KNEE_REPLACEMENT')\n),\n\nrequired_items as (\n    select\n        u.case_token,\n        count(*) as item_count\n    from {{ ref('gold_case_material_usage') }} u\n    inner join {{ ref('gold_materials') }} m\n        on u.material_id = m.material_id\n    where material_group = 'IMPLANT'\n    group by u.case_token\n),\n\ntime_buckets as (\n    select\n        case_token,\n        min(cast(extract(isoyear from cast(procedure_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(procedure_timestamp as date)) as varchar), 2, '0')) as time_bucket\n    from {{ ref('gold_procedures') }}\n    group by case_token\n),\n\nmissing as (\n    select\n        q.case_token,\n        t.time_bucket,\n        coalesce(r.item_count, 0) as item_count\n    from qualifying_cases q\n    left join required_items r on q.case_token = r.case_token\n    left join time_buckets t on q.case_token = t.case_token\n    where coalesce(r.item_count, 0) < 1\n)\n\nselect\n    md5(\n        'probe_missing_mandatory_implants' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(case_token as varchar) || '|' || coalesce(time_bucket, '')\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_missing_mandatory_implants' as probe_id,\n    '1.0.0' as probe_version,\n    'high' as severity,\n    'Case' as entity_type,\n    cast(case_token as varchar) as entity_id,\n    coalesce(time_bucket, 'unknown') as time_bucket,\n    2500.0 as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_missing_mandatory_implants\", \"item_count\": \"' || cast(item_count as varchar) || '\"}' as evidence\nfrom missing\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_missing_standard_price", "label": "MissingStandardPrice", "fullName": "probe_findings__probe_missing_standard_price", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_missing_standard_price.sql", "layerOrder": 4, "source": "-- Probe: probe_missing_standard_price (silver_audit)\n-- Flags active materials with zero or negative standard_price that have transactional activity (usage or billing). Without a price, value calculations in Gold models are impossible \u2014 an invisible gap.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nzero_price_materials as (\n    select\n        material_id,\n        trim(material_description) as material_description,\n        trim(material_group) as material_group,\n        cast(standard_price as decimal(12, 2)) as standard_price,\n        is_active,\n        is_billable\n    from {{ ref('silver_materials') }}\n    where (cast(standard_price as decimal(12, 2)) is null\n or cast(standard_price as decimal(12, 2)) <= 0)\nand (null_price_allowed is null or null_price_allowed = false) and trim(material_id) is not null and trim(material_id) != ''\n),\n\nusage_agg as (\n    select material_id, count(*) as usage_count\n    from {{ ref('silver_case_material_usage') }}\n    group by material_id\n),\n\nbilling_agg as (\n    select material_id, count(*) as billing_count, sum(cast(billed_amount as decimal(12, 2))) as total_billed_amount\n    from {{ ref('silver_billing_events') }}\n    group by material_id\n),\n\nwith_activity as (\n    select\n        z.*,\n        coalesce(usage.usage_count, 0) as usage_count,\n        coalesce(billing.billing_count, 0) as billing_count,\n        coalesce(billing.total_billed_amount, 0) as total_billed_amount\n    from zero_price_materials z\n    left join usage_agg usage on z.material_id = usage.material_id\n    left join billing_agg billing on z.material_id = billing.material_id\n    where usage_count > 0 or billing_count > 0\n)\n\nselect\n    md5(\n        'probe_missing_standard_price' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || 'all'\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_missing_standard_price' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when usage_count > 500 then 'high'\n            when usage_count > 100 then 'medium'\n            else 'low'\n        end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    'all' as time_bucket,\n    0 as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_missing_standard_price\"'\n        || ', \"material_description\": \"' || coalesce(cast(material_description as varchar), '') || '\"'\n        || ', \"material_group\": \"' || coalesce(cast(material_group as varchar), '') || '\"'\n        || ', \"standard_price\": \"' || coalesce(cast(standard_price as varchar), '') || '\"'\n        || ', \"is_active\": \"' || coalesce(cast(is_active as varchar), '') || '\"'\n        || ', \"is_billable\": \"' || coalesce(cast(is_billable as varchar), '') || '\"'\n        || ', \"usage_count\": \"' || coalesce(cast(usage_count as varchar), '') || '\"'\n        || ', \"billing_count\": \"' || coalesce(cast(billing_count as varchar), '') || '\"'\n        || ', \"total_billed_amount\": \"' || coalesce(cast(total_billed_amount as varchar), '') || '\"'\n        || '}' as evidence\nfrom with_activity\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_negative_margin", "label": "NegativeMargin", "fullName": "probe_findings__probe_negative_margin", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_negative_margin.sql", "layerOrder": 4, "source": "-- Probe: probe_negative_margin (enrichment)\n-- Identifies materials where the total billed revenue is less than the purchase cost (negative margin). Indicates pricing errors, missing markup, or contract misalignment.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\ndim_filter as (\n    select material_id, material_description, purchase_price, standard_price\n    from {{ ref('gold_materials') }}\n    where coalesce(purchase_price, standard_price) is not null and coalesce(purchase_price, standard_price) > 0\n),\n\nfact_agg as (\n    select\n        f.material_id, cast(extract(isoyear from cast(f.billing_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(f.billing_timestamp as date)) as varchar), 2, '0') as month,\n        sum(billed_amount) as revenue,\n        sum(quantity) as qty_billed\n    from {{ ref('gold_billing_events') }} f\n    group by f.material_id, cast(extract(isoyear from cast(f.billing_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(f.billing_timestamp as date)) as varchar), 2, '0')\n),\n\nenriched as (\n    select\n        fa.*,\n        dim.material_description,\n        dim.purchase_price,\n        dim.standard_price,\n        qty_billed * coalesce(dim.purchase_price, dim.standard_price) as cost,\n        case when revenue = 0 then null else round(100.0 * (revenue - qty_billed * coalesce(dim.purchase_price, dim.standard_price)) / revenue, 2) end as margin_pct\n    from fact_agg fa\n    inner join dim_filter dim on fa.material_id = dim.material_id\n),\n\nflagged as (\n    select\n        *,\n        greatest(round(cost - revenue, 2), 0) as money_at_risk_val\n    from enriched\n    where cost > revenue and revenue > 0\n)\n\nselect\n    md5(\n        'probe_negative_margin' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || coalesce(month, '')\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_negative_margin' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when margin_pct < -20 then 'high'\n            when margin_pct < -5 then 'medium'\n            else 'low'\n        end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    coalesce(month, 'unknown') as time_bucket,\n    greatest(round(money_at_risk_val, 2), 0) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_negative_margin\"'\n        || ', \"material_id\": \"' || coalesce(cast(material_id as varchar), '') || '\"'\n        || ', \"material_description\": \"' || coalesce(cast(material_description as varchar), '') || '\"'\n        || ', \"month\": \"' || coalesce(cast(month as varchar), '') || '\"'\n        || ', \"revenue\": \"' || coalesce(cast(revenue as varchar), '') || '\"'\n        || ', \"cost\": \"' || coalesce(cast(cost as varchar), '') || '\"'\n        || ', \"margin_pct\": \"' || coalesce(cast(margin_pct as varchar), '') || '\"'\n        || '}' as evidence\nfrom flagged\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_orphan_billing", "label": "OrphanBilling", "fullName": "probe_findings__probe_orphan_billing", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_orphan_billing.sql", "layerOrder": 4, "source": "-- Probe: probe_orphan_billing (silver_audit)\n-- Surfaces billing events that reference non-existent cases or materials. These records are filtered by Gold, but the data gap is real \u2014 an invisible hole in billing.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\norphans as (\n    select *\n    from {{ ref('silver_billing_events') }}\n    where is_valid = false and invalid_reason in ('orphan case_token', 'orphan material_id')\n),\n\naggregated as (\n    select\n        invalid_reason as orphan_type,\n        case when invalid_reason = 'orphan case_token'\n  then cast(case_token as varchar)\n  else cast(material_id as varchar)\nend as orphan_ref,\n        count(*) as record_count,\n        sum(coalesce(cast(billed_amount as decimal(12, 2)), 0)) as total_billed_amount,\n        min(cast(billing_timestamp as timestamp)) as first_seen,\n        max(cast(billing_timestamp as timestamp)) as last_seen\n    from orphans\n    group by 1, 2\n)\n\nselect\n    md5(\n        'probe_orphan_billing' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || orphan_ref || '|' || orphan_type\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_orphan_billing' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when record_count > 500 then 'high'\n            when record_count > 50 then 'medium'\n            else 'low'\n        end as severity,\n    'BillingEvent' as entity_type,\n    orphan_ref as entity_id,\n    coalesce(strftime(first_seen, '%Y-%m') || ' \u2014 ' || strftime(last_seen, '%Y-%m'), 'unknown') as time_bucket,\n    0 as money_at_risk,\n    record_count as qty_at_risk,\n    '{\"probe\": \"probe_orphan_billing\", \"orphan_type\": \"' || orphan_type\n        || '\", \"orphan_ref\": \"' || orphan_ref\n        || '\", \"record_count\": \"' || cast(record_count as varchar)\n        || '\", \"total_billed\": \"' || cast(round(total_billed_amount, 2) as varchar)\n        || '\", \"first_seen\": \"' || coalesce(cast(first_seen as varchar), '')\n        || '\", \"last_seen\": \"' || coalesce(cast(last_seen as varchar), '')\n        || '\"}' as evidence\nfrom aggregated\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_procedure_without_usage", "label": "ProcedureWithoutUsage", "fullName": "probe_findings__probe_procedure_without_usage", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_procedure_without_usage.sql", "layerOrder": 4, "source": "-- Probe: probe_procedure_without_usage (mandatory_item)\n-- Flags cases that have documented
