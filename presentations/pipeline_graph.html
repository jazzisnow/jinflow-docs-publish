 f\"{probe_header(pid, 'silver_audit', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"{ctes[0]},\\n\\n\"\n        f\"{activity_ctes_str},\\n\\n\"\n        f\"with_activity as (\\n\"\n        f\"    select\\n\"\n        f\"        z.*,\\n\"\n        f\"        {(','+chr(10)+'        ').join(coalesce_fields)}\\n\"\n        f\"    from zero_price_materials z\\n\"\n        f\"    {(chr(10)+'    ').join(join_clauses)}\\n\"\n        f\"    where {activity_filter}\\n\"\n        f\")\\n\\n\"\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast({entity_id_field} as varchar) || '|' || 'all'\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{probe['version']}' as probe_version,\\n\"\n        f\"    {sev_case} as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast({entity_id_field} as varchar) as entity_id,\\n\"\n        f\"    'all' as time_bucket,\\n\"\n        f\"    {mar_expr} as money_at_risk,\\n\"\n        f\"    null as qty_at_risk,\\n\"\n        f\"    {evidence_expr} as evidence\\n\"\n        f\"from with_activity\\n\"\n    )\n    return sql\n\n\ndef compile_entity_filter(probe, contract):\n    \"\"\"Compile an entity_filter probe to SQL.\n\n    Filters entity rows by a WHERE clause, optionally groups and aggregates,\n    optionally enriches with a second entity, emits standard findings.\n    \"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    source = probe[\"source\"]\n\n    src_ref = resolve_ref(contract, source[\"entity\"])\n    where_expr = source[\"where\"].strip()\n    entity_id_field = source[\"entity_id_field\"]\n    group_by = source.get(\"group_by\")\n    aggregates = source.get(\"aggregates\", {})\n    enrichment = probe.get(\"enrichment\")\n\n    # Build severity expression \u2014 check if we have real WHEN clauses\n    sev_when_parts = []\n    sev_default = probe.get(\"severity\", \"medium\")\n    for rule in probe[\"severity_rules\"]:\n        if \"above\" in rule:\n            field = rule.get(\"field\", \"event_count\")\n            sev_when_parts.append(f\"when {field} > {rule['above']} then '{rule['level']}'\")\n        elif \"above_pct\" in rule:\n            field = rule.get(\"field\", \"mismatch_pct\")\n            sev_when_parts.append(f\"when {field} > {rule['above_pct']} then '{rule['level']}'\")\n        elif \"default\" in rule:\n            sev_default = rule[\"default\"]\n\n    if sev_when_parts:\n        all_parts = sev_when_parts + [f\"else '{sev_default}'\"]\n        sev_case = \"case\\n            \" + \"\\n            \".join(all_parts) + \"\\n        end\"\n    else:\n        sev_case = f\"'{sev_default}'\"\n\n    mar = probe.get(\"money_at_risk\", \"0\")\n\n    if group_by:\n        # Grouped mode\n        group_by_str = \", \".join(group_by)\n        agg_cols = []\n        if \"count\" in aggregates:\n            agg_cols.append(f\"count(*) as {aggregates['count']}\")\n        for sf in aggregates.get(\"sum\", []):\n            agg_cols.append(f\"sum({sf}) as total_{sf}\")\n        for af in aggregates.get(\"avg\", []):\n            agg_cols.append(f\"avg({af}) as avg_{af}\")\n\n        # Additional computed columns from YAML\n        computed_cols = source.get(\"computed_columns\", [])\n        computed_str = \"\"\n        for cc in computed_cols:\n            computed_str += f\",\\n        {cc['expression']} as {cc['alias']}\"\n\n        agg_cols_str = \",\\n        \".join(agg_cols) if agg_cols else \"count(*) as event_count\"\n\n        ctes = (\n            f\"filtered as (\\n\"\n            f\"    select *\\n\"\n            f\"    from {src_ref}\\n\"\n            f\"    where {where_expr}\\n\"\n            f\"),\\n\\n\"\n            f\"grouped as (\\n\"\n            f\"    sel e_id,\\n\"\n            f\"    '{probe['version']}' as probe_version,\\n\"\n            f\"    {sev_case} as severity,\\n\"\n            f\"    '{scope['entity_type']}' as entity_type,\\n\"\n            f\"    cast({entity_id_field} as varchar) as entity_id,\\n\"\n            f\"    'all' as time_bucket,\\n\"\n            f\"    greatest({mar}, 0) as money_at_risk,\\n\"\n            f\"    null as qty_at_risk,\\n\"\n            f\"    {evidence_expr} as evidence\\n\"\n            f\"from {final_cte}\\n\"\n        )\n\n    else:\n        # Per-row mode (no grouping)\n        ctes = (\n            f\"filtered as (\\n\"\n            f\"    select *\\n\"\n            f\"    from {src_ref}\\n\"\n            f\"    where {where_expr}\\n\"\n            f\")\"\n        )\n\n        evidence_fields = probe.get(\"evidence_fields\", [])\n        if evidence_fields:\n            ev_parts = [f\"'{{\\\"probe\\\": \\\"{pid}\\\"'\"]\n            for ef in evidence_fields:\n                ev_parts.append(\n                    f\"', \\\"{ef}\\\": \\\"' || coalesce(cast({ef} as varchar), '') || '\\\"'\"\n                )\n            ev_parts.append(\"'}'\")\n            evidence_expr = \"\\n        || \".join(ev_parts)\n        else:\n            evidence_expr = f\"'{{\\\"probe\\\": \\\"{pid}\\\"}}'\"\n\n        sql = (\n            f\"{probe_header(pid, 'entity_filter', probe['description'])}\\n\"\n            f\"with\\n\\n\"\n            f\"{ctes}\\n\\n\"\n            f\"select\\n\"\n            f\"    md5(\\n\"\n            f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n            f\"        || cast({entity_id_field} as varchar) || '|' || 'all'\\n\"\n            f\"    ) as finding_id,\\n\"\n            f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n            f\"    '{pid}' as probe_id,\\n\"\n            f\"    '{probe['version']}' as probe_version,\\n\"\n            f\"    {sev_case} as severity,\\n\"\n            f\"    '{scope['entity_type']}' as entity_type,\\n\"\n            f\"    cast({entity_id_field} as varchar) as entity_id,\\n\"\n            f\"    'all' as time_bucket,\\n\"\n            f\"    greatest({mar}, 0) as money_at_risk,\\n\"\n            f\"    null as qty_at_risk,\\n\"\n            f\"    {evidence_expr} as evidence\\n\"\n            f\"from filtered\\n\"\n        )\n\n    return sql\n\n\ndef compile_enrichment(probe, contract):\n    \"\"\"Compile an enrichment-type probe to SQL.\n\n    Aggregates a single fact table, INNER JOINs to a filtered dimension,\n    computes derived metrics, flags deviations.\n    \"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    dim = probe[\"dimension\"]\n    fact = probe[\"fact\"]\n    derived = probe[\"derived\"]\n    flag = probe[\"flag\"]\n    entity_id_field = probe[\"entity_id_field\"]\n    time_bucket_field = probe[\"time_bucket_field\"]\n\n    # Resolve refs\n    dim_ref = resolve_ref(contract, dim[\"entity\"])\n    fact_ref = resolve_ref(contract, fact[\"entity\"])\n\n    # Time bucket\n    time_field = scope[\"time\"][\"field\"]\n    bucket = scope[\"time\"][\"bucket\"]\n\n    # Resolve fact time column \u2014 look for exact match first, then *timestamp*\n    fact_entity_def = contract[\"entities\"][fact[\"entity\"]]\n    fact_time_col = None\n    for f in fact_entity_def[\"fields\"]:\n        if f == time_field:\n            fact_time_col = f\n            break\n    if fact_time_col is None:\n        for f in fact_entity_def[\"fields\"]:\n            if \"timestamp\" in f:\n                fact_time_col = f\n                break\n    fact_bucket_expr = time_bucket_sql(f\"f.{fact_time_col}\", bucket)\n\n    # --- dim_filter CTE ---\n    dim_fields = [dim[\"key\"]] + [f for f in dim.get(\"fields\", []) if f != dim[\"key\"]]\n    dim_where = \"\"\n    if dim.get(\"where\"):\n        dim_where = f\"\\n    where {dim['where']}\"\n    dim_cte = (\n        f\"dim_filter as (\\n\"\n        f\"    select {', '.join(dim_fields)}\\n\"\n        f\"    from {dim_ref}{dim_where}\\n\"\n        f\")\"\n    )\n\n    # --- fact_agg CTE ---\n    fact_group_cols = [f\"f.{g}\" for g in fact[\"group_by\"]]\n    fact_select_cols = [f\"f.{g}\" for g in fact[\"group_by\"]]\n\n    if fact.get(\"time_bucket\", True):\n        fact_select_cols.append(f\"{fact_bucket_expr} as {time_bucket_field}\")\n        fact_group_cols.append(fact_bucket_expr)\n\n    fact_agg_lines = []\n    for agg in fact[\"aggregates\"]:\n        fact_agg_lines.append(\n            f\"        {agg['aggregate']}({agg['expression']}) as {agg['alias']}\"\n        )\n\n    fact_where = \"\"\n    if fact.get(\"where\"):\n        fact_where = f\"\\n    where {fact['where']}\"\n\n    fact_cte = (\n        f\"fact_agg as (\\n\"\n        f\"    select\\n\"\n        f\"        {', '.join(fact_select_cols)},\\n\"\n        f\"{(','+chr(10)).join(fact_agg_lines)}\\n\"\n        f\"    from {fact_ref} f{fact_where}\\n\"\n        f\"    group by {', '.join(fact_group_cols)}\\n\"\n        f\")\"\n    )\n\n    # --- enriched CTE ---\n    # Start with all fact_agg columns\n    enriched_cols = [\"fa.*\"]\n    # Add dimension fields (excluding the join key, already in fact_agg)\n    for f in dim.get(\"fields\", []):\n        enriched_cols.append(f\"dim.{f}\")\n\n    # Add derived columns\n    derived_lines = []\n    for d in derived:\n        derived_lines.append(f\"        {d['expression']} as {d['alias']}\")\n\n    derived_str = \"\"\n    if derived_lines:\n        derived_str = \",\\n\" + \",\\n\".join(derived_lines)\n\n    join_key = fact.get(\"join_key\", dim[\"key\"])\n    enriched_cte = (\n        f\"enriched as (\\n\"\n        f\"    select\\n\"\n        f\"        {(','+chr(10)+'        ').join(enriched_cols)}{derived_str}\\n\"\n        f\"    from fact_agg fa\\n\"\n        f\"    inner join dim_filter dim on fa.{join_key} = dim.{dim['key']}\\n\"\n        f\")\"\n    )\n\n    # --- flagged CTE ---\n    flagged_cte = (\n        f\"flagged as (\\n\"\n        f\"    select\\n\"\n        f\"        *,\\n\"\n        f\"        {probe['money_at_risk']} as money_at_risk_val\\n\"\n        f\"    from enriched\\n\"\n        f\"    where {flag}\\n\"\n        f\")\"\n    )\n\n    # --- Severity ---\n    # Check if severity_rules reference a specific field\n    sev_rules = probe[\"severity_rules\"]\n    # Determine metric column for severity \u2014 check if any rule specifies \"field\"\n    first_field = None\n    for rule in sev_rules:\n        if rule.get(\"field\"):\n            first_field = rule[\"field\"]\n            break\n    if first_field:\n        sev_case = severity_case_sql(sev_rules, first_field)\n    else:\n        sev_case = severity_case_sql(sev_rules, \"money_at_risk_val\")\n\n    # --- Evidence ---\n    evidence_fields = probe.get(\"evidence_fields\", [])\n    if evidence_fields:\n        ev_parts = [f\"'{{\\\"probe\\\": \\\"{pid}\\\"'\"]\n        for ef in evidence_fields:\n            ev_parts.append(\n                f\"', \\\"{ef}\\\": \\\"' || coalesce(cast({ef} as varchar), '') || '\\\"'\"\n            )\n        ev_parts.append(\"'}'\")\n        evidence_expr = \"\\n        || \".join(ev_parts)\n    else:\n        evidence_expr = f\"'{{\\\"probe\\\": \\\"{pid}\\\"}}'\"\n\n    # --- Time bucket for findings ---\n    if fact.get(\"time_bucket\", True):\n        tb_expr = time_bucket_field\n    else:\n        tb_expr = \"'all'\"\n\n    # --- Final SELECT ---\n    sql = (\n        f\"{probe_header(pid, 'enrichment', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"{dim_cte},\\n\\n\"\n        f\"{fact_cte},\\n\\n\"\n        f\"{enriched_cte},\\n\\n\"\n        f\"{flagged_cte}\\n\\n\"\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast({entity_id_field} as varchar) || '|' || coalesce({tb_expr}, '')\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{probe['version']}' as probe_version,\\n\"\n        f\"    {sev_case} as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast({entity_id_field} as varchar) as entity_id,\\n\"\n        f\"    coalesce({tb_expr}, 'unknown') as time_bucket,\\n\"\n        f\"    greatest(round(money_at_risk_val, 2), 0) as money_at_risk,\\n\"\n        f\"    null as qty_at_risk,\\n\"\n        f\"    {evidence_expr} as evidence\\n\"\n        f\"from flagged\\n\"\n    )\n    return sql\n\n\ndef compile_reconciliation(probe, contract):\n    \"\"\"Compile a reconciliation-type probe to SQL.\n\n    Independently aggregates two fact tables by common keys, joins the\n    results, computes derived metrics, and flags deviations.\n    \"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    left = probe[\"left\"]\n    right = probe[\"right\"]\n    join_spec = probe[\"join\"]\n    derived = probe[\"derived\"]\n    flag = probe[\"flag\"]\n    entity_id_field = probe[\"entity_id_field\"]\n    time_bucket_field = probe[\"time_bucket_field\"]\n    dim_filter = probe.get(\"dimension_filter\")\n\n    time_field = scope[\"time\"][\"field\"]\n    time_entity = scope[\"time\"][\"entity\"]\n    bucket = scope[\"time\"][\"bucket\"]\n    time_key = join_spec[\"time_key\"]\n\n    join_type_sql = {\"full_outer\": \"full outer join\", \"left\": \"left join\", \"inner\": \"inner join\"}\n    join_sql = join_type_sql[join_spec[\"type\"]]\n\n    # Build join ON clause\n    join_keys = join_spec[\"keys\"]\n    join_on_parts = [f\"l.{k} = r.{k}\" for k in join_keys]\n    join_on_parts.append(f\"l.{time_key} = r.{time_key}\")\n    join_on_clause = \" and \".join(join_on_parts)\n\n    # --- Optional dimension_filter CTE ---\n    dim_cte = \"\"\n    dim_join_left = \"\"\n    dim_join_right = \"\"\n    if dim_filter:\n        df_ref = resolve_ref(contract, dim_filter[\"entity\"])\n        df_key = dim_filter[\"key\"]\n        df_fields = [df_key] + [f for f in dim_filter.get(\"fields\", []) if f != df_key]\n        df_where = \"\"\n        if dim_filter.get(\"where\"):\n            df_where = f\"\\n    where {where_to_sql(dim_filter['where'])}\"\n        dim_cte = (\n            f\"dim_filter as (\\n\"\n            f\"    select {', '.join(df_fields)}\\n\"\n            f\"    from {df_ref}{df_where}\\n\"\n            f\"),\\n\\n\"\n        )\n        dim_join_left = f\"\\n    inner join dim_filter dim_f on l_src.{df_key} = dim_f.{df_key}\"\n        dim_join_right = f\"\\n    inner join dim_filter dim_f on r_src.{df_key} = dim_f.{df_key}\"\n\n    # --- Left aggregate CTE ---\n    left_ref = resolve_ref(contract, left[\"entity\"])\n    left_time_field = scope[\"time\"][\"field\"]\n    # Determine which time field to use for left side\n    left_entity_def = contract[\"entities\"][left[\"entity\"]]\n    left_time_col = None\n    for f in left_entity_def[\"fields\"]:\n        if f == time_field:\n            left_time_col = f\n            break\n    if left_time_col is None:\n        # time_field comes from the scope time entity, look for timestamp fields\n        for f in left_entity_def[\"fields\"]:\n            if \"timestamp\" in f:\n                left_time_col = f\n                break\n    left_bucket_expr = time_bucket_sql(f\"l_src.{left_time_col}\", bucket)\n\n    left_group_by = [f\"l_src.{g}\" for g in left[\"group_by\"]]\n    left_group_by.append(left_bucket_expr)\n\n    left_agg_lines = []\n    for agg in left[\"aggregates\"]:\n        left_agg_lines.append(\n            f\"        {agg['aggregate']}({agg['expression']}) as {agg['alias']}\"\n        )\n\n    left_where = \"\"\n    if left.get(\"where\"):\n        left_where = f\"\\n    where {where_to_sql(left['where'])}\"\n\n    left_agg_str = (\",\\n\").join(left_agg_lines)\n    left_cte = (\n        f\"left_agg as (\\n\"\n        f\"    select\\n\"\n        f\"        {', '.join(f'l_src.{g}' for g in left['group_by'])},\\n\"\n        f\"        {left_bucket_expr} as {time_key},\\n\"\n        f\"{left_agg_str}\\n\"\n        f\"    from {left_ref} l_src{dim_join_left}{left_where}\\n\"\n        f\"    group by {', '.join(left_group_by)}\\n\"\n        f\")\"\n    )\n\n    # --- Right aggregate CTE ---\n    right_ref = resolve_ref(contract, right[\"entity\"])\n    right_entity_def = contract[\"entities\"][right[\"entity\"]]\n    right_time_col = None\n    for f in right_entity_def[\"fields\"]:\n        if f == time_field:\n            right_time_col = f\n            break\n    if right_time_col is None:\n        for f in right_entity_def[\"fields\"]:\n            if \"timestamp\" in f:\n                right_time_col = f\n                break\n    right_bucket_expr = time_bucket_sql(f\"r_src.{right_time_col}\", bucket)\n\n    right_group_by = [f\"r_src.{g}\" for g in right[\"group_by\"]]\n    right_group_by.append(right_bucket_expr)\n\n    right_agg_lines = []\n    for agg in right[\"aggregates\"]:\n        right_agg_lines.append(\n            f\"        {agg['aggregate']}({agg['expression']}) as {agg['alias']}\"\n        )\n\n    right_where = \"\"\n    if right.get(\"where\"):\n        right_where = f\"\\n    where {where_to_sql(right['where'])}\"\n\n    right_agg_str = (\",\\n\").join(right_agg_lines)\n    right_cte = (\n        f\"right_agg as (\\n\"\n        f\"    select\\n\"\n        f\"        {', '.join(f'r_src.{g}' for g in right['group_by'])},\\n\"\n        f\"        {right_bucket_expr} as {time_key},\\n\"\n        f\"{right_agg_str}\\n\"\n        f\"    from {right_ref} r_src{dim_join_right}{right_where}\\n\"\n        f\"    group by {', '.join(right_group_by)}\\n\"\n        f\")\"\n    )\n\n    # --- Combined CTE ---\n    # Coalesce join keys\n    coalesce_keys = []\n    for k in join_keys:\n        coalesce_keys.append(f\"coalesce(l.{k}, r.{k}) as {k}\")\n    coalesce_keys.append(f\"coalesce(l.{time_key}, r.{time_key}) as {time_key}\")\n\n    # Coalesce aggregate aliases to 0\n    coalesce_aggs = []\n    for agg in left[\"aggregates\"]:\n        coalesce_aggs.append(f\"coalesce(l.{agg['alias']}, 0) as {agg['alias']}\")\n    for agg in right[\"aggregates\"]:\n        coalesce_aggs.append(f\"coalesce(r.{agg['alias']}, 0) as {agg['alias']}\")\n\n    # Derived columns\n    derived_lines = []\n    for d in derived:\n        derived_lines.append(f\"        {d['expression']} as {d['alias']}\")\n\n    all_combined_cols = coalesce_keys + coalesce_aggs\n    combined_select = \",\\n        \".join(all_combined_cols)\n    derived_str = \",\\n\" + \",\\n\".join(derived_lines) if derived_lines else \"\"\n\n    combined_cte = (\n        f\"combined as (\\n\"\n        f\"    select\\n\"\n        f\"        {combined_select}{derived_str}\\n\"\n        f\"    from left_agg l\\n\"\n        f\"    {join_sql} right_agg r\\n\"\n        f\"        on {join_on_clause}\\n\"\n        f\"    where {flag}\\n\"\n        f\")\"\n    )\n\n    # --- Flagged CTE (if dimension_filter, enrich with dim fields + money_at_risk) ---\n    final_cte = \"combined\"\n    mar_expr = probe[\"money_at_risk\"]\n    flagged_cte = \"\"\n    if dim_filter:\n        df_key = dim_filter[\"key\"]\n        dim_fields = dim_filter.get(\"fields\", [])\n        dim_field_select = \"\".join(f\",\\n        dim_f.{f}\" for f in dim_fields)\n        flagged_cte = (\n            f\",\\n\\n\"\n            f\"flagged as (\\n\"\n            f\"    select\\n\"\n            f\"        c.*{dim_field_select},\\n\"\n            f\"        {mar_expr} as money_at_risk_val\\n\"\n            f\"    from combined c\\n\"\n            f\"    inner join dim_filter dim_f on c.{df_key} = dim_f.{df_key}\\n\"\n            f\")\"\n        )\n        final_cte = \"flagged\"\n        mar_expr = \"money_at_risk_val\"\n\n    # --- Severity ---\n    sev_case = severity_case_sql(probe[\"severity_rules\"], mar_expr)\n\n    # --- Evidence ---\n    evidence_fields = probe.get(\"evidence_fields\", [])\n    if evidence_fields:\n        ev_parts = [f\"'{{\\\"probe\\\": \\\"{pid}\\\"'\"]\n        for ef in evidence_fields:\n            ev_parts.append(\n                f\"', \\\"{ef}\\\": \\\"' || coalesce(cast({ef} as varchar), '') || '\\\"'\"\n            )\n        ev_parts.append(\"'}'\")\n        evidence_expr = \"\\n        || \".join(ev_parts)\n    else:\n        evidence_expr = f\"'{{\\\"probe\\\": \\\"{pid}\\\"}}'\"\n\n    # --- Final SELECT (no health_score \u2014 only assessments emit that) ---\n    mar_final = f\"greatest(round({mar_expr}, 2), 0)\"\n    sql = (\n        f\"{probe_header(pid, 'reconciliation', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"{dim_cte}\"\n        f\"{left_cte},\\n\\n\"\n        f\"{right_cte},\\n\\n\"\n        f\"{combined_cte}{flagged_cte}\\n\\n\"\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast({entity_id_field} as varchar) || '|' || coalesce({time_bucket_field}, '')\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{probe['version']}' as probe_version,\\n\"\n        f\"    {sev_case} as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast({entity_id_field} as varchar) as entity_id,\\n\"\n        f\"    coalesce({time_bucket_field}, 'unknown') as time_bucket,\\n\"\n        f\"    {mar_final} as money_at_risk,\\n\"\n        f\"    null as qty_at_risk,\\n\"\n        f\"    {evidence_expr} as evidence\\n\"\n        f\"from {final_cte}\\n\"\n    )\n    return sql\n\n\ndef compile_hand_written(probe, contract):\n    \"\"\"Read the hand-written SQL file from probes/ directory.\"\"\"\n    pid = probe[\"probe_id\"]\n    sql_path = PROBES_DIR / f\"{pid}.sql\"\n    return sql_path.read_text()\n\n\ndef _normalize_source_probes(source_probes):\n    \"\"\"Normalize source_probes list: accept plain strings or dicts with weight.\"\"\"\n    result = []\n    for sp in source_probes:\n        if isinstance(sp, str):\n            result.append({\"probe_id\": sp, \"weight\": 1})\n        else:\n            result.append({\"probe_id\": sp[\"probe_id\"], \"weight\": sp.get(\"weight\", 1)})\n    return result\n\n\ndef _assessment_severity_case(severity_rules):\n    \"\"\"Generate CASE expression for assessment severity rules.\n\n    Supports three rule forms:\n    1. Simple:   { field: \"probe_count\", above: 2, level: \"high\" }\n    2. Compound: { conditions: [{field: \"probe_count\", above: 2}, {field: \"total_risk\", above: 50000}], level: \"high\" }\n    3. Default:  { default: \"low\" }\n    \"\"\"\n    parts = []\n    for rule in severity_rules:\n        if \"conditions\" in rule:\n            # Compound rule: AND-join all conditions\n            conds = []\n            for c in rule[\"conditions\"]:\n                field = c[\"field\"]\n                conds.append(f\"{field} > {c['above']}\")\n            parts.append(f\"when {' and '.join(conds)} then '{rule['level']}'\")\n        elif \"above\" in rule:\n            field = rule.get(\"field\", \"probe_count\")\n            parts.append(f\"when {field} > {rule['above']} then '{rule['level']}'\")\n        elif \"default\" in rule:\n            parts.append(f\"else '{rule['default']}'\")\n    return \"case\\n            \" + \"\\n            \".join(parts) + \"\\n        end\"\n\n\ndef compile_assessment(probe, contract):\n    \"\"\"Compile an assessment-type probe to SQL.\n\n    Unions source probe findings, groups by entity_id, computes fixed\n    aggregates (probe_count, finding_count, total_risk, worst_severity,\n    probes_flagged, weighted_probe_score, health_score), applies severity\n    rules (simple, multi-field, or compound), emits standard findings.\n    \"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    source_probes = _normalize_source_probes(probe[\"source_probes\"])\n    mar_field = probe[\"money_at_risk\"]\n\n    # Compute max possible weighted score at compile time\n    max_weighted_score = sum(sp[\"weight\"] for sp in source_probes)\n\n    # Build UNION ALL of source probe findings with per-probe weight\n    union_parts = []\n    for sp in source_probes:\n        sp_id = sp[\"probe_id\"]\n        weight = sp[\"weight\"]\n        ref = \"{{ ref('probe_findings__\" + sp_id + \"') }}\"\n        union_parts.append(\n            f\"    select *, {weight} as probe_weight from {ref}\"\n        )\n    union_sql = \"\\n    union all\\n\".join(union_parts)\n\n    # Severity rules \u2014 supports simple, multi-field, and compound rules\n    sev_case = _assessment_severity_case(probe[\"severity_rules\"])\n\n    sql = (\n        f\"{probe_header(pid, 'assessment', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"source_findings as (\\n\"\n        f\"{union_sql}\\n\"\n        f\"),\\n\\n\"\n        f\"per_probe as (\\n\"\n        f\"    select\\n\"\n        f\"        entity_id,\\n\"\n        f\"        probe_id,\\n\"\n        f\"        any_value(probe_weight) as probe_weight,\\n\"\n        f\"        count(*) as probe_finding_count,\\n\"\n        f\"        coalesce(sum(money_at_risk), 0) as probe_risk,\\n\"\n        f\"        coalesce(sum(qty_at_risk), 0) as probe_qty_at_risk,\\n\"\n        f\"        max(case severity when 'high' then 3 when 'medium' then 2 else 1 end) as probe_sev_ord,\\n\"\n        f\"        min(time_bucket) as probe_first_bucket,\\n\"\n        f\"        max(time_bucket) as probe_last_bucket\\n\"\n        f\"    from source_findings\\n\"\n        f\"    group by entity_id, probe_id\\n\"\n        f\"),\\n\\n\"\n        f\"aggregated as (\\n\"\n        f\"    select\\n\"\n        f\"        entity_id,\\n\"\n        f\"        count(*) as probe_count,\\n\"\n        f\"        sum(probe_finding_count) as finding_count,\\n\"\n        f\"        sum(probe_risk) as total_risk,\\n\"\n        f\"        sum(probe_qty_at_risk) as total_qty_at_risk,\\n\"\n        f\"        sum(probe_risk * probe_weight) as weighted_risk,\\n\"\n        f\"        sum(probe_weight) as weighted_probe_score,\\n\"\n        f\"        round(1.0 - (cast(sum(probe_weight) as double) / {max_weighted_score}), 4) as health_score,\\n\"\n        f\"        max(probe_sev_ord) as worst_severity_ord,\\n\"\n        f\"        case max(probe_sev_ord)\\n\"\n        f\"            when 3 then 'high' when 2 then 'medium' else 'low'\\n\"\n        f\"        end as worst_severity,\\n\"\n        f\"        string_agg(probe_id, ', ' order by probe_id) as probes_flagged,\\n\"\n        f\"        min(probe_first_bucket) as first_bucket,\\n\"\n        f\"        max(probe_last_bucket) as last_bucket\\n\"\n        f\"    from per_probe\\n\"\n        f\"    group by entity_id\\n\"\n        f\")\\n\\n\"\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast(entity_id as varchar) || '|' || first_bucket || '-' || last_bucket\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{probe['version']}' as probe_version,\\n\"\n        f\"    {sev_case} as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast(entity_id as varchar) as entity_id,\\n\"\n        f\"    first_bucket || '-' || last_bucket as time_bucket,\\n\"\n        f\"    round({mar_field}, 2) as money_at_risk,\\n\"\n        f\"    total_qty_at_risk as qty_at_risk,\\n\"\n        f\"    health_score,\\n\"\n        f\"    '{{\\\"probe\\\": \\\"{pid}\\\"'\\n\"\n        f\"        || ', \\\"probe_count\\\": \\\"' || cast(probe_count as varchar) || '\\\"'\\n\"\n        f\"        || ', \\\"finding_count\\\": \\\"' || cast(finding_count as varchar) || '\\\"'\\n\"\n        f\"        || ', \\\"total_risk\\\": \\\"' || cast(round(total_risk, 2) as varchar) || '\\\"'\\n\"\n        f\"        || ', \\\"weighted_probe_score\\\": \\\"' || cast(weighted_probe_score as varchar) || '\\\"'\\n\"\n        f\"        || ', \\\"health_score\\\": \\\"' || cast(health_score as varchar) || '\\\"'\\n\"\n        f\"        || ', \\\"worst_severity\\\": \\\"' || worst_severity || '\\\"'\\n\"\n        f\"        || ', \\\"probes_flagged\\\": \\\"' || probes_flagged || '\\\"'\\n\"\n        f\"        || '}}' as evidence\\n\"\n        f\"from aggregated\\n\"\n    )\n    return sql\n\n\nCOMPILERS = {\n    \"balance\": compile_balance,\n    \"mandatory_item\": compile_mandatory_item,\n    \"distribution_outlier\": compile_distribution_outlier,\n    \"duplicate\": compile_duplicate,\n    \"ratio\": compile_ratio,\n    \"trend\": compile_trend,\n    \"temporal_sequence\": compile_temporal_sequence,\n    \"silver_audit\": compile_silver_audit,\n    \"entity_filter\": compile_entity_filter,\n    \"enrichment\": compile_enrichment,\n    \"reconciliation\": compile_reconciliation,\n    \"hand_written\": compile_hand_written,\n    \"assessment\": compile_assessment,\n}\n\n\n# ---------------------------------------------------------------------------\n# YAML generation + main\n# ---------------------------------------------------------------------------\n\nFINDINGS_COLUMNS = [\n    {\"name\": \"finding_id\", \"description\": \"Deterministic MD5 hash of (probe_id, tenant_id, entity_id, time_bucket)\"},\n    {\"name\": \"tenant_id\", \"description\": \"Current tenant identifier\"},\n    {\"name\": \"probe_id\", \"description\": \"Probe identifier from YAML\"},\n    {\"name\": \"probe_version\", \"description\": \"Probe version from YAML\"},\n    {\"name\": \"severity\", \"description\": \"high/medium/low\"},\n    {\"name\": \"entity_type\", \"description\": \"Gold entity name from scope\"},\n    {\"name\": \"entity_id\", \"description\": \"Primary identifier of flagged entity\"},\n    {\"name\": \"time_bucket\", \"description\": \"YYYY-MM or YYYY-QN\"},\n    {\"name\": \"money_at_risk\", \"description\": \"Estimated monetary impact\"},\n    {\"name\": \"qty_at_risk\", \"description\": \"Estimated quantity impact (units, null if not applicable)\"},\n    {\"name\": \"health_score\", \"description\": \"Numeric health score 0.0-1.0 (assessments only, null for probes)\"},\n    {\"name\": \"evidence\", \"description\": \"JSON object with probe-specific details\"},\n]\n\n\ndef generate_probe_yml(probe):\n    \"\"\"Generate a per-probe dbt schema YAML file.\"\"\"\n    model_name = f\"probe_findings__{probe['probe_id']}\"\n    tags = [\"probe\", \"assessment\"] if probe[\"type\"] == \"assessment\" else [\"probe\"]\n    doc = {\n        \"version\": 2,\n        \"models\": [{\n            \"name\": model_name,\n            \"description\": probe[\"description\"].strip(),\n            \"config\": {\"tags\": tags},\n            \"columns\": FINDINGS_COLUMNS,\n        }],\n    }\n    return yaml.dump(doc, default_flow_style=False, sort_keys=False)\n\n\ndef main():\n    check_only = \"--check\" in sys.argv\n\n    probe_paths = sorted(PROBES_DIR.glob(\"*.yaml\"))\n\n    if not probe_paths:\n        print(\"No probe YAML files found in probes/\")\n        sys.exit(1)\n\n    # Validate all probes first (each probe loads its own contract)\n    all_probes = []\n    has_errors = False\n    for path in probe_paths:\n        with open(path) as f:\n            probe = yaml.safe_load(f)\n        contract_version = probe.get(\"contract\", \"gold.v1\")\n        contract = load_contract(contract_version)\n        errors = validate_probe(probe, contract)\n        if errors:\n            print(f\"FAIL  {path.name}\")\n            for e in errors:\n                print(f\"  - {e}\")\n            has_errors = True\n        else:\n            all_probes.append(probe)\n\n    if has_errors:\n        print(\"\\nValidation failed. Fix errors before compiling.\")\n        sys.exit(1)\n\n    # Compile each probe (SQL + dbt schema YML in one pass)\n    OUTPUT_DIR.mkdir(parents=True, exist_ok=True)\n    changes = []\n\n    for probe in all_probes:\n        contract_version = probe.get(\"contract\", \"gold.v1\")\n        contract = load_contract(contract_version)\n        compiler = COMPILERS[probe[\"type\"]]\n        sql = compiler(probe, contract)\n        yml_content = generate_probe_yml(probe)\n\n        model_name = f\"probe_findings__{probe['probe_id']}\"\n        sql_path = OUTPUT_DIR / f\"{model_name}.sql\"\n        yml_path = OUTPUT_DIR / f\"{model_name}.yml\"\n\n        if check_only:\n            sql_changed = not sql_path.exists() or sql_path.read_text() != sql\n            yml_changed = not yml_path.exists() or yml_path.read_text() != yml_content\n            if sql_changed or yml_changed:\n                label = \"NEW\" if not sql_path.exists() else \"CHANGED\"\n                changes.append(f\"{label:8s} {probe['probe_id']}\")\n            else:\n                print(f\"OK       {probe['probe_id']}\")\n        else:\n            sql_path.write_text(sql)\n            yml_path.write_text(yml_content)\n            label = \"COPY (hand_written)\" if probe[\"type\"] == \"hand_written\" else probe[\"type\"]\n            print(f\"  {probe['probe_id']}  ({label})  \u2192  .sql + .yml\")\n\n    if check_only:\n        if changes:\n            print()\n            for c in changes:\n                print(c)\n            print(f\"\\n{len(changes)} probe(s) would change.\")\n            sys.exit(1)\n        else:\n            print(\"\\nAll generated files up to date.\")\n    else:\n        print(f\"\\n{len(all_probes)} probe(s) compiled to {OUTPUT_DIR.relative_to(REPO_ROOT)}\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "lang": "python"}, "classes": "compiler"}, {"data": {"id": "probecheck", "label": "probe\u2713", "fullName": "probecheck", "layer": "compiler", "layerLabel": "Compilers", "color": "#d47e7e", "shape": "triangle", "layerShape": "triangle", "kindShape": "triangle", "kind": "python_script", "path": "scripts/probecheck.py", "layerOrder": -1, "source": "#!/usr/bin/env python3\n\"\"\"probecheck.py - Validate probe YAML definitions against contracts.\n\nSupports both gold.v1 and silver.v1 contracts. Each probe declares its\ncontract in the YAML; the validator loads the appropriate contract.\n\nUsage:\n    python3 scripts/probecheck.py                   # validate all probes\n    python3 scripts/probecheck.py probes/foo.yaml   # validate one probe\n\"\"\"\n\nimport json\nimport sys\nfrom pathlib import Path\n\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent\nCONTRACTS_DIR = REPO_ROOT / \"contracts\"\nPROBES_DIR = REPO_ROOT / \"probes\"\n\nVALID_TYPES = {\n    \"balance\", \"mandatory_item\", \"distribution_outlier\", \"duplicate\",\n    \"ratio\", \"trend\", \"temporal_sequence\", \"silver_audit\", \"assessment\",\n    \"entity_filter\", \"hand_written\", \"reconciliation\", \"enrichment\",\n}\nVALID_SEVERITIES = {\"high\", \"medium\", \"low\"}\nVALID_RISK_TIERS = {\"direct_financial\", \"compliance_exposure\", \"operational_signal\"}\nVALID_BUCKETS = {\"week\", \"month\", \"quarter\", \"raw\"}\nVALID_AGGREGATES = {\"sum\", \"count\", \"avg\", \"min\", \"max\"}\n\n# Tokens allowed in expression strings (field refs validated separately)\nSAFE_EXPRESSION_CHARS = set(\"abcdefghijklmnopqrstuvwxyz_0123456789 *+-/().\")\n\n# ---------------------------------------------------------------------------\n# Contract loading\n# ---------------------------------------------------------------------------\n\n_contracts_cache: dict[str, dict] = {}\n\n\ndef load_contract(version: str) -> dict:\n    \"\"\"Load and cache a contract by version string (e.g. 'gold.v1').\"\"\"\n    if version not in _contracts_cache:\n        prefix = version.split(\".\")[0]  # 'gold' or 'silver'\n        path = CONTRACTS_DIR / f\"{prefix}_contract.v1.json\"\n        with open(path) as f:\n            _contracts_cache[version] = json.load(f)\n    return _contracts_cache[version]\n\n\n# ---------------------------------------------------------------------------\n# Helpers\n# ---------------------------------------------------------------------------\n\ndef get_entity(contract, name):\n    return contract[\"entities\"].get(name)\n\n\ndef validate_entity_ref(contract, entity_name, errors, context):\n    entity = get_entity(contract, entity_name)\n    if entity is None:\n        errors.append(f\"{context}: unknown entity '{entity_name}'. \"\n                      f\"Valid: {sorted(contract['entities'].keys())}\")\n        return None\n    return entity\n\n\ndef validate_field_ref(entity_def, entity_name, field_name, errors, context):\n    if field_name not in entity_def[\"fields\"]:\n        errors.append(f\"{context}: entity '{entity_name}' has no field '{field_name}'. \"\n                      f\"Valid: {sorted(entity_def['fields'].keys())}\")\n        return False\n    return True\n\n\ndef validate_expression_tokens(expression, entity_def, entity_name, errors, context):\n    \"\"\"Check that expression only references valid fields and safe operators.\"\"\"\n    clean = expression.lower().strip()\n    if not all(c in SAFE_EXPRESSION_CHARS for c in clean):\n        bad = [c for c in clean if c not in SAFE_EXPRESSION_CHARS]\n        errors.append(f\"{context}: expression contains unsafe characters: {bad}\")\n        return\n    tokens = clean.replace(\"*\", \" \").replace(\"+\", \" \").replace(\"-\", \" \")\n    tokens = tokens.replace(\"/\", \" \").replace(\"(\", \" \").replace(\")\", \" \")\n    for token in tokens.split():\n        if token.replace(\".\", \"\").isdigit():\n            continue\n        if token not in entity_def[\"fields\"]:\n            errors.append(f\"{context}: expression token '{token}' is not a field of \"\n                          f\"'{entity_name}'. Valid: {sorted(entity_def['fields'].keys())}\")\n\n\ndef validate_where(where_dict, entity_def, entity_name, errors, context):\n    if not isinstance(where_dict, dict):\n        errors.append(f\"{context}: 'where' must be a mapping\")\n        return\n    for field_name, value in where_dict.items():\n        validate_field_ref(entity_def, entity_name, field_name, errors, context)\n\n\ndef validate_scope(probe, contract, errors):\n    \"\"\"Validate scope block.\n\n    scope.entity_type is a label string (appears in findings output). It is NOT\n    required to be a contract entity name \u2014 silver_audit probes use Gold entity\n    names while reading Silver contracts. group_by is validated against the\n    entity only when entity_type resolves in the contract.\n    \"\"\"\n    scope = probe.get(\"scope\")\n    if not scope:\n        errors.append(\"Missing 'scope'\")\n        return\n    entity_type = scope.get(\"entity_type\")\n    if not entity_type:\n        errors.append(\"scope: missing 'entity_type'\")\n    else:\n        # Try to resolve \u2014 if found, validate group_by; if not, skip gracefully\n        entity_def = get_entity(contract, entity_type)\n        if entity_def:\n            for gb in scope.get(\"group_by\", []):\n                validate_field_ref(entity_def, entity_type, gb, errors, \"scope.group_by\")\n\n    time_spec = scope.get(\"time\")\n    if not time_spec:\n        errors.append(\"scope: missing 'time'\")\n    else:\n        t_entity = time_spec.get(\"entity\")\n        if t_entity:\n            t_def = validate_entity_ref(contract, t_entity, errors, \"scope.time.entity\")\n            if t_def and time_spec.get(\"field\"):\n                validate_field_ref(t_def, t_entity, time_spec[\"field\"], errors, \"scope.time.field\")\n        bucket = time_spec.get(\"bucket\")\n        if bucket and bucket not in VALID_BUCKETS:\n            errors.append(f\"scope.time.bucket: invalid '{bucket}', must be one of {VALID_BUCKETS}\")\n\n\ndef validate_enrichment(probe, contract, source_entity_name, errors):\n    \"\"\"Validate optional enrichment block (shared by duplicate, temporal_sequence).\"\"\"\n    enrichment = probe.get(\"enrichment\")\n    if not enrichment:\n        return\n    e_entity = enrichment.get(\"entity\")\n    if e_entity:\n        e_def = validate_entity_ref(contract, e_entity, errors, \"enrichment\")\n        if e_def:\n            for field in enrichment.get(\"fields\", []):\n                validate_field_ref(e_def, e_entity, field, errors, \"enrichment.fields\")\n            jk = enrichment.get(\"join_key\")\n            if jk:\n                s_def = get_entity(contract, source_entity_name) if source_entity_name else None\n                if s_def:\n                    validate_field_ref(s_def, source_entity_name, jk, errors,\n                                       \"enrichment.join_key (source)\")\n                validate_field_ref(e_def, e_entity, jk, errors, \"enrichment.join_key (enrichment)\")\n            else:\n                errors.append(\"enrichment: missing 'join_key'\")\n\n\n# ---------------------------------------------------------------------------\n# Type validators\n# ---------------------------------------------------------------------------\n\ndef validate_aggregate_side(side, side_name, contract, errors):\n    entity_name = side.get(\"entity\")\n    if not entity_name:\n        errors.append(f\"{side_name}: missing 'entity'\")\n        return\n    entity_def = validate_entity_ref(contract, entity_name, errors, side_name)\n    if not entity_def:\n        return\n    if side.get(\"expression\"):\n        validate_expression_tokens(side[\"expression\"], entity_def, entity_name, errors, side_name)\n    agg = side.get(\"aggregate\")\n    if agg and agg not in VALID_AGGREGATES:\n        errors.append(f\"{side_name}: invalid aggregate '{agg}'\")\n    if side.get(\"where\"):\n        validate_where(side[\"where\"], entity_def, entity_name, errors, side_name)\n    xfilter = side.get(\"cross_entity_filter\")\n    if xfilter:\n        validate_field_ref(entity_def, entity_name, xfilter[\"match_field\"], errors,\n                           f\"{side_name}.cross_entity_filter.match_field\")\n        against = xfilter.get(\"against_entity\")\n        if against:\n            a_def = validate_entity_ref(contract, against, errors,\n                                        f\"{side_name}.cross_entity_filter.against_entity\")\n            if a_def and xfilter.get(\"against_field\"):\n                validate_field_ref(a_def, against, xfilter[\"against_field\"], errors,\n                                   f\"{side_name}.cross_entity_filter.against_field\")\n\n\ndef validate_balance(probe, contract, errors):\n    left = probe.get(\"left\")\n    right = probe.get(\"right\")\n    if not left:\n        errors.append(\"balance probe: missing 'left'\")\n    else:\n        validate_aggregate_side(left, \"left\", contract, errors)\n    if not right:\n        errors.append(\"balance probe: missing 'right'\")\n    else:\n        validate_aggregate_side(right, \"right\", contract, errors)\n    if not probe.get(\"join_key\"):\n        errors.append(\"balance probe: missing 'join_key'\")\n    if probe.get(\"tolerance_pct\") is None:\n        errors.append(\"balance probe: missing 'tolerance_pct'\")\n    if not probe.get(\"severity_rules\"):\n        errors.append(\"balance probe: missing 'severity_rules'\")\n    if not probe.get(\"money_at_risk\"):\n        errors.append(\"balance probe: missing 'money_at_risk'\")\n\n\ndef validate_mandatory_item(probe, contract, errors):\n    qualifying = probe.get(\"qualifying\")\n    if not qualifying:\n        errors.append(\"mandatory_item probe: missing 'qualifying'\")\n    else:\n        q_entity = qualifying.get(\"entity\")\n        if q_entity:\n            q_def = validate_entity_ref(contract, q_entity, errors, \"qualifying\")\n            if q_def and qualifying.get(\"where\"):\n                validate_where(qualifying[\"where\"], q_def, q_entity, errors, \"qualifying.where\")\n        if not qualifying.get(\"join_key\"):\n            errors.append(\"qualifying: missing 'join_key'\")\n\n    req = probe.get(\"required\")\n    if not req:\n        errors.append(\"mandatory_item probe: missing 'required'\")\n    else:\n        r_entity = req.get(\"entity\")\n        if r_entity:\n            validate_entity_ref(contract, r_entity, errors, \"required\")\n        if not req.get(\"join_key\"):\n            errors.append(\"required: missing 'join_key'\")\n        lookup = req.get(\"lookup\")\n        if lookup:\n            l_entity = lookup.get(\"entity\")\n            if l_entity:\n                l_def = validate_entity_ref(contract, l_entity, errors, \"required.lookup\")\n                if l_def and lookup.get(\"where\"):\n                    validate_where(lookup[\"where\"], l_def, l_entity, errors,\n                                   \"required.lookup.where\")\n        if req.get(\"min_count\") is None:\n            errors.append(\"required: missing 'min_count'\")\n\n    if probe.get(\"money_at_risk_fixed\") is None:\n        errors.append(\"mandatory_item probe: missing 'money_at_risk_fixed'\")\n\n\ndef validate_distribution_outlier(probe, contract, errors):\n    metric = probe.get(\"metric\")\n    if not metric:\n        errors.append(\"distribution_outlier probe: missing 'metric'\")\n    else:\n        m_entity = metric.get(\"entity\")\n        if m_entity:\n            m_def = validate_entity_ref(contract, m_entity, errors, \"metric\")\n            if m_def and metric.get(\"expression\"):\n                validate_expression_tokens(metric[\"expression\"], m_def, m_entity, errors, \"metric\")\n        agg = metric.get(\"aggregate\")\n        if agg and agg not in VALID_AGGREGATES:\n            errors.append(f\"metric: invalid aggregate '{agg}'\")\n    if probe.get(\"threshold_stddev\") is None:\n        errors.append(\"distribution_outlier probe: missing 'threshold_stddev'\")\n    if probe.get(\"min_sample_size\") is None:\n        errors.append(\"distribution_outlier probe: missing 'min_sample_size'\")\n\n\ndef validate_duplicate(probe, contract, errors):\n    source = probe.get(\"source\")\n    if not source:\n        errors.append(\"duplicate probe: missing 'source'\")\n    else:\n        s_entity = source.get(\"entity\")\n        if not s_entity:\n            errors.append(\"source: missing 'entity'\")\n        else:\n            s_def = validate_entity_ref(contract, s_entity, errors, \"source\")\n            if s_def:\n                for field in source.get(\"duplicate_fields\", []):\n                    validate_field_ref(s_def, s_entity, field, errors, \"source.duplicate_fields\")\n                id_field = source.get(\"id_field\")\n                if id_field:\n                    validate_field_ref(s_def, s_entity, id_field, errors, \"source.id_field\")\n                else:\n                    errors.append(\"source: missing 'id_field'\")\n                value_field = source.get(\"value_field\")\n                if value_field:\n                    validate_field_ref(s_def, s_entity, value_field, errors, \"source.value_field\")\n                else:\n                    errors.append(\"source: missing 'value_field'\")\n        if not source.get(\"duplicate_fields\"):\n            errors.append(\"source: missing 'duplicate_fields'\")\n\n    validate_enrichment(probe, contract, source.get(\"entity\") if source else None, errors)\n\n    if not probe.get(\"severity_rules\"):\n        errors.append(\"duplicate probe: missing 'severity_rules'\")\n\n\ndef validate_ratio(probe, contract, errors):\n    \"\"\"Validate a ratio-type probe.\"\"\"\n    source = probe.get(\"source\")\n    if not source:\n        errors.append(\"ratio probe: missing 'source'\")\n        return\n\n    s_entity = source.get(\"entity\")\n    if not s_entity:\n        errors.append(\"source: missing 'entity'\")\n    else:\n        s_def = validate_entity_ref(contract, s_entity, errors, \"source\")\n        if s_def:\n            for gb in source.get(\"group_by\", []):\n                validate_field_ref(s_def, s_entity, gb, errors, \"source.group_by\")\n            num = source.get(\"numerator\")\n            if num:\n                if num.get(\"expression\"):\n                    validate_expression_tokens(num[\"expression\"], s_def, s_entity, errors,\n                                               \"source.numerator\")\n                agg = num.get(\"aggregate\")\n                if agg and agg not in VALID_AGGREGATES:\n                    errors.append(f\"source.numerator: invalid aggregate '{agg}'\")\n            else:\n                errors.append(\"source: missing 'numerator'\")\n\n            den = source.get(\"denominator\")\n            if den:\n                if den.get(\"expression\"):\n                    validate_expression_tokens(den[\"expression\"], s_def, s_entity, errors,\n                                               \"source.denominator\")\n                agg = den.get(\"aggregate\")\n                if agg and agg not in VALID_AGGREGATES:\n                    errors.append(f\"source.denominator: invalid aggregate '{agg}'\")\n            else:\n                errors.append(\"source: missing 'denominator'\")\n\n    if probe.get(\"expected_ratio\") is None:\n        errors.append(\"ratio probe: missing 'expected_ratio'\")\n    if probe.get(\"tolerance_ratio\") is None:\n        errors.append(\"ratio probe: missing 'tolerance_ratio'\")\n    if not probe.get(\"severity_rules\"):\n        errors.append(\"ratio probe: missing 'severity_rules'\")\n\n\ndef validate_trend(probe, contract, errors):\n    \"\"\"Validate a trend-type probe.\"\"\"\n    source = probe.get(\"source\")\n    if not source:\n        errors.append(\"trend probe: missing 'source'\")\n        return\n\n    s_entity = source.get(\"entity\")\n    if not s_entity:\n        errors.append(\"source: missing 'entity'\")\n    else:\n        s_def = validate_entity_ref(contract, s_entity, errors, \"source\")\n        if s_def:\n            for gb in source.get(\"group_by\", []):\n                validate_field_ref(s_def, s_entity, gb, errors, \"source.group_by\")\n            for field_key in (\"trend_field\", \"direction_field\", \"min_periods_field\", \"qty_delta_field\"):\n                fval = source.get(field_key)\n                if fval:\n                    validate_field_ref(s_def, s_entity, fval, errors, f\"source.{field_key}\")\n                else:\n                    errors.append(f\"source: missing '{field_key}'\")\n\n    if not source.get(\"direction_value\"):\n        errors.append(\"source: missing 'direction_value'\")\n    if source.get(\"min_periods\") is None:\n        errors.append(\"source: missing 'min_periods'\")\n    if probe.get(\"drift_threshold\") is None:\n        errors.append(\"trend probe: missing 'drift_threshold'\")\n    if not probe.get(\"severity_rules\"):\n        errors.append(\"trend probe: missing 'severity_rules'\")\n\n\ndef validate_temporal_sequence(probe, contract, errors):\n    \"\"\"Validate a temporal_sequence probe.\"\"\"\n    for side_name in (\"first_event\", \"second_event\"):\n        side = probe.get(side_name)\n        if not side:\n            errors.append(f\"temporal_sequence probe: missing '{side_name}'\")\n            continue\n\n        s_entity = side.get(\"entity\")\n        if not s_entity:\n            errors.append(f\"{side_name}: missing 'entity'\")\n        else:\n            s_def = validate_entity_ref(contract, s_entity, errors, side_name)\n            if s_def:\n                time_field = side.get(\"time_field\")\n                if time_field:\n                    validate_field_ref(s_def, s_entity, time_field, errors,\n                                       f\"{side_name}.time_field\")\n                else:\n                    errors.append(f\"{side_name}: missing 'time_field'\")\n\n                for jk in side.get(\"join_key\", []):\n                    validate_field_ref(s_def, s_entity, jk, errors, f\"{side_name}.join_key\")\n\n        if not side.get(\"join_key\"):\n            errors.append(f\"{side_name}: missing 'join_key'\")\n        if not side.get(\"aggregates\"):\n            errors.append(f\"{side_name}: missing 'aggregates'\")\n\n    if not probe.get(\"expected_order\"):\n        errors.append(\"temporal_sequence probe: missing 'expected_order'\")\n    if not probe.get(\"severity_rules\"):\n        errors.append(\"temporal_sequence probe: missing 'severity_rules'\")\n\n    first = probe.get(\"first_event\")\n    validate_enrichment(probe, contract, first.get(\"entity\") if first else None, errors)\n\n\ndef validate_silver_audit(probe, contract, errors):\n    \"\"\"Validate a silver_audit probe (validity or activity variant).\"\"\"\n    source = probe.get(\"source\")\n    if not source:\n        errors.append(\"silver_audit probe: missing 'source'\")\n        return\n\n    s_entity = source.get(\"entity\")\n    if not s_entity:\n        errors.append(\"source: missing 'entity'\")\n    else:\n        s_def = validate_entity_ref(contract, s_entity, errors, \"source\")\n        if s_def:\n            # Validate validity_filter fields\n            vf = source.get(\"validity_filter\")\n            if vf:\n                for field_name in vf:\n                    if field_name == \"invalid_reason\":\n                        validate_field_ref(s_def, s_entity, \"invalid_reason\", errors,\n                                           \"source.validity_filter\")\n                    elif field_name == \"is_valid\":\n                        validate_field_ref(s_def, s_entity, \"is_valid\", errors,\n                                           \"source.validity_filter\")\n\n    # Determine variant and validate accordingly\n    if source.get(\"validity_filter\"):\n        # Validity variant\n        if not probe.get(\"group_by_field\"):\n            errors.append(\"silver_audit (validity): missing 'group_by_field'\")\n        if not probe.get(\"entity_id_expression\"):\n            errors.append(\"silver_audit (validity): missing 'entity_id_expression'\")\n        if not probe.get(\"aggregates\"):\n            errors.append(\"silver_audit (validity): missing 'aggregates'\")\n    elif source.get(\"filter_expression\"):\n        # Activity variant\n        if not probe.get(\"activity_joins\"):\n            errors.append(\"silver_audit (activity): missing 'activity_joins'\")\n        else:\n            for i, aj in enumerate(probe[\"activity_joins\"]):\n                aj_entity = aj.get(\"entity\")\n                if aj_entity:\n                    validate_entity_ref(contract, aj_entity, errors,\n                                        f\"activity_joins[{i}]\")\n                if not aj.get(\"join_key\"):\n                    errors.append(f\"activity_joins[{i}]: missing 'join_key'\")\n        if not probe.get(\"activity_filter\"):\n            errors.append(\"silver_audit (activity): missing 'activity_filter'\")\n    else:\n        errors.append(\"silver_audit source: needs 'validity_filter' or 'filter_expression'\")\n\n    if not probe.get(\"severity_rules\"):\n        errors.append(\"silver_audit probe: missing 'severity_rules'\")\n\n\ndef validate_entity_filter(probe, contract, errors):\n    \"\"\"Validate an entity_filter probe.\"\"\"\n    source = probe.get(\"source\")\n    if not source:\n        errors.append(\"entity_filter probe: missing 'source'\")\n        return\n\n    s_entity = source.get(\"entity\")\n    if not s_entity:\n        errors.append(\"source: missing 'entity'\")\n    else:\n        s_def = validate_entity_ref(contract, s_entity, errors, \"source\")\n        if s_def:\n            eid_field = source.get(\"entity_id_field\")\n            if eid_field:\n                validate_field_ref(s_def, s_entity, eid_field, errors, \"source.entity_id_field\")\n            else:\n                errors.append(\"source: missing 'entity_id_field'\")\n            for gb in source.get(\"group_by\", []):\n                validate_field_ref(s_def, s_entity, gb, errors, \"source.group_by\")\n\n    if not source.get(\"where\"):\n        errors.append(\"entity_filter source: missing 'where'\")\n\n    enrichment = probe.get(\"enrichment\")\n    if enrichment:\n        e_entity = enrichment.get(\"entity\")\n        if e_entity:\n            e_def = validate_entity_ref(contract, e_entity, errors, \"enrichment\")\n            if e_def:\n                for field in enrichment.get(\"fields\", []):\n                    validate_field_ref(e_def, e_entity, field, errors, \"enrichment.fields\")\n                jk = enrichment.get(\"join_key\")\n                if jk and s_entity:\n                    s_def2 = get_entity(contract, s_entity)\n                    if s_def2:\n                        validate_field_ref(s_def2, s_entity, jk, errors, \"enrichment.join_key (source)\")\n                    validate_field_ref(e_def, e_entity, jk, errors, \"enrichment.join_key (enrichment)\")\n\n    if not probe.get(\"severity_rules\"):\n        errors.append(\"entity_filter probe: missing 'severity_rules'\")\n\n\ndef validate_enrichment_type(probe, contract, errors):\n    \"\"\"Validate an enrichment-type probe (dimension + fact + derived + flag).\"\"\"\n    # --- dimension ---\n    dim = probe.get(\"dimension\")\n    if not dim:\n        errors.append(\"enrichment probe: missing 'dimension'\")\n    else:\n        d_entity = dim.get(\"entity\")\n        if not d_entity:\n            errors.append(\"dimension: missing 'entity'\")\n        else:\n            d_def = validate_entity_ref(contract, d_entity, errors, \"dimension\")\n            if d_def:\n                dk = dim.get(\"key\")\n                if dk:\n                    validate_field_ref(d_def, d_entity, dk, errors, \"dimension.key\")\n                else:\n                    errors.append(\"dimension: missing 'key'\")\n                for field in dim.get(\"fields\", []):\n                    validate_field_ref(d_def, d_entity, field, errors, \"dimension.fields\")\n        # dimension.where is raw SQL string \u2014 no structural validation\n\n    # --- fact ---\n    fact = probe.get(\"fact\")\n    if not fact:\n        errors.append(\"enrichment probe: missing 'fact'\")\n    else:\n        f_entity = fact.get(\"entity\")\n        if not f_entity:\n            errors.append(\"fact: missing 'entity'\")\n        else:\n            f_def = validate_entity_ref(contract, f_entity, errors, \"fact\")\n            if f_def:\n                jk = fact.get(\"join_key\")\n                if jk:\n                    validate_field_ref(f_def, f_entity, jk, errors, \"fact.join_key\")\n                else:\n                    errors.append(\"fact: missing 'join_key'\")\n                for gb in fact.get(\"group_by\", []):\n                    validate_field_ref(f_def, f_entity, gb, errors, \"fact.group_by\")\n        if not fact.get(\"group_by\"):\n            errors.append(\"fact: missing 'group_by'\")\n        aggs = fact.get(\"aggregates\")\n        if not aggs or not isinstance(aggs, list):\n            errors.append(\"fact: missing or invalid 'aggregates' (must be a list)\")\n        else:\n            for i, agg in enumerate(aggs):\n                if not agg.get(\"alias\"):\n                    errors.append(f\"fact.aggregates[{i}]: missing 'alias'\")\n                if not agg.get(\"expression\"):\n                    errors.append(f\"fact.aggregates[{i}]: missing 'expression'\")\n                a = agg.get(\"aggregate\")\n                if not a:\n                    errors.append(f\"fact.aggregates[{i}]: missing 'aggregate'\")\n                elif a not in VALID_AGGREGATES:\n                    errors.append(f\"fact.aggregates[{i}]: invalid aggregate '{a}'\")\n\n    # --- derived ---\n    derived = probe.get(\"derived\")\n    if not derived or not isinstance(derived, list):\n        errors.append(\"enrichment probe: missing or invalid 'derived' (must be a list)\")\n    else:\n        for i, d in enumerate(derived):\n            if not d.get(\"alias\"):\n                errors.append(f\"derived[{i}]: missing 'alias'\")\n            if not d.get(\"expression\"):\n                errors.append(f\"derived[{i}]: missing 'expression'\")\n\n    # --- required fields ---\n    if not probe.get(\"flag\"):\n        errors.append(\"enrichment probe: missing 'flag'\")\n    if not probe.get(\"entity_id_field\"):\n        errors.append(\"enrichment probe: missing 'entity_id_field'\")\n    if not probe.get(\"time_bucket_field\"):\n        errors.append(\"enrichment probe: missing 'time_bucket_field'\")\n    if not probe.get(\"money_at_risk\"):\n        errors.append(\"enrichment probe: missing 'money_at_risk'\")\n    if not probe.get(\"severity_rules\"):\n        errors.append(\"enrichment probe: missing 'severity_rules'\")\n\n\ndef validate_reconciliation(probe, contract, errors):\n    \"\"\"Validate a reconciliation-type probe (dual fact-table join + derived metrics).\"\"\"\n    VALID_JOIN_TYPES = {\"full_outer\", \"left\", \"inner\"}\n\n    # --- left / right sides ---\n    for side_name in (\"left\", \"right\"):\n        side = probe.get(side_name)\n        if not side:\n            errors.append(f\"reconciliation probe: missing '{side_name}'\")\n            continue\n        s_entity = side.get(\"entity\")\n        if not s_entity:\n            errors.append(f\"{side_name}: missing 'entity'\")\n        else:\n            validate_entity_ref(contract, s_entity, errors, side_name)\n        if not side.get(\"group_by\"):\n            errors.append(f\"{side_name}: missing 'group_by'\")\n        aggs = side.get(\"aggregates\")\n        if not aggs or not isinstance(aggs, list):\n            errors.append(f\"{side_name}: missing or invalid 'aggregates' (must be a list)\")\n        else:\n            for i, agg in enumerate(aggs):\n                if not agg.get(\"alias\"):\n                    errors.append(f\"{side_name}.aggregates[{i}]: missing 'alias'\")\n                if not agg.get(\"expression\"):\n                    errors.append(f\"{side_name}.aggregates[{i}]: missing 'expression'\")\n                a = agg.get(\"aggregate\")\n                if not a:\n                    errors.append(f\"{side_name}.aggregates[{i}]: missing 'aggregate'\")\n                elif a not in VALID_AGGREGATES:\n                    errors.append(f\"{side_name}.aggregates[{i}]: invalid aggregate '{a}'\")\n\n    # --- join ---\n    join = probe.get(\"join\")\n    if not join:\n        errors.append(\"reconciliation probe: missing 'join'\")\n    else:\n        jt = join.get(\"type\")\n        if not jt:\n            errors.append(\"join: missing 'type'\")\n        elif jt not in VALID_JOIN_TYPES:\n            errors.append(f\"join: invalid type '{jt}', must be one of {VALID_JOIN_TYPES}\")\n        jkeys = join.get(\"keys\")\n        if not jkeys or not isinstance(jkeys, list):\n            errors.append(\"join: missing or invalid 'keys' (must be a list)\")\n        else:\n            left_gb = set(probe.get(\"left\", {}).get(\"group_by\", []))\n            right_gb = set(probe.get(\"right\", {}).get(\"group_by\", []))\n            for k in jkeys:\n                if left_gb and k not in left_gb:\n                    errors.append(f\"join.keys: '{k}' not in left.group_by {sorted(left_gb)}\")\n                if right_gb and k not in right_gb:\n                    errors.append(f\"join.keys: '{k}' not in right.group_by {sorted(right_gb)}\")\n        if not join.get(\"time_key\"):\n            errors.append(\"join: missing 'time_key'\")\n\n    # --- optional dimension_filter ---\n    dim_filter = probe.get(\"dimension_filter\")\n    if dim_filter:\n        df_entity = dim_filter.get(\"entity\")\n        if not df_entity:\n            errors.append(\"dimension_filter: missing 'entity'\")\n        else:\n            df_def = validate_entity_ref(contract, df_entity, errors, \"dimension_filter\")\n            if df_def:\n                dk = dim_filter.get(\"key\")\n                if dk:\n                    validate_field_ref(df_def, df_entity, dk, errors, \"dimension_filter.key\")\n                else:\n                    errors.append(\"dimension_filter: missing 'key'\")\n                if dim_filter.get(\"where\"):\n                    validate_where(dim_filter[\"where\"], df_def, df_entity, errors,\n                                   \"dimension_filter.where\")\n                for field in dim_filter.get(\"fields\", []):\n                    validate_field_ref(df_def, df_entity, field, errors, \"dimension_filter.fields\")\n\n    # --- derived ---\n    derived = probe.get(\"derived\")\n    if not derived or not isinstance(derived, list):\n        errors.append(\"reconciliation probe: missing or invalid 'derived' (must be a list)\")\n    else:\n        for i, d in enumerate(derived):\n            if not d.get(\"alias\"):\n                errors.append(f\"derived[{i}]: missing 'alias'\")\n            if not d.get(\"expression\"):\n                errors.append(f\"derived[{i}]: missing 'expression'\")\n\n    # --- required fields ---\n    if not probe.get(\"flag\"):\n        errors.append(\"reconciliation probe: missing 'flag'\")\n    if not probe.get(\"entity_id_field\"):\n        errors.append(\"reconciliation probe: missing 'entity_id_field'\")\n    if not probe.get(\"time_bucket_field\"):\n        errors.append(\"reconciliation probe: missing 'time_bucket_field'\")\n    if not probe.get(\"money_at_risk\"):\n        errors.append(\"reconciliation probe: missing 'money_at_risk'\")\n    if not probe.get(\"severity_rules\"):\n        errors.append(\"reconciliation probe: missing 'severity_rules'\")\n\n\ndef validate_hand_written(probe, contract, errors):\n    \"\"\"Validate a hand_written probe \u2014 only check that the SQL file exists.\"\"\"\n    pid = probe.get(\"probe_id\")\n    if pid:\n        sql_path = PROBES_DIR / f\"{pid}.sql\"\n        if not sql_path.exists():\n            errors.append(f\"hand_written probe: SQL file probes/{pid}.sql not found\")\n\n\nVALID_ASSESSMENT_AGG_FIELDS = {\n    \"probe_count\", \"finding_count\", \"total_risk\",\n    \"weighted_risk\", \"weighted_probe_score\",\n}\n\n\ndef _validate_assessment_severity_rules(probe, errors):\n    \"\"\"Validate assessment severity rules \u2014 simple, multi-field, and compound.\"\"\"\n    rules = probe.get(\"severity_rules\")\n    if not rules:\n        errors.append(\"assessment probe: missing 'severity_rules'\")\n        return\n\n    for i, rule in enumerate(rules):\n        if \"conditions\" in rule:\n            # Compound rule: list of AND conditions\n            if not isinstance(rule[\"conditions\"], list) or len(rule[\"conditions\"]) == 0:\n                errors.append(f\"severity_rules[{i}]: 'conditions' must be a non-empty list\")\n                continue\n            if \"level\" not in rule:\n                errors.append(f\"severity_rules[{i}]: compound rule missing 'level'\")\n            for j, cond in enumerate(rule[\"conditions\"]):\n                field = cond.get(\"field\")\n                if not field:\n                    errors.append(f\"severity_rules[{i}].conditions[{j}]: missing 'field'\")\n                elif field not in VALID_ASSESSMENT_AGG_FIELDS:\n                    errors.append(\n                        f\"severity_rules[{i}].conditions[{j}]: unknown field '{field}'. \"\n                        f\"Valid: {sorted(VALID_ASSESSMENT_AGG_FIELDS)}\")\n                if \"above\" not in cond:\n                    errors.append(f\"severity_rules[{i}].conditions[{j}]: missing 'above'\")\n        elif \"above\" in rule:\n            # Simple rule (single field)\n            field = rule.get(\"field\", \"probe_count\")\n            if field not in VALID_ASSESSMENT_AGG_FIELDS:\n                errors.append(\n                    f\"severity_rules[{i}]: unknown field '{field}'. \"\n                    f\"Valid: {sorted(VALID_ASSESSMENT_AGG_FIELDS)}\")\n            if \"level\" not in rule:\n                errors.append(f\"severity_rules[{i}]: missing 'level'\")\n        elif \"default\" in rule:\n            pass  # default rules are always valid\n        else:\n            errors.append(f\"severity_rules[{i}]: rule must have 'above', 'conditions', or 'default'\")\n\n\ndef validate_assessment(probe, contract, errors):\n    \"\"\"Validate an assessment-type probe.\"\"\"\n    source_probes = probe.get(\"source_probes\")\n    if not source_probes:\n        errors.append(\"assessment probe: missing 'source_probes'\")\n    elif not isinstance(source_probes, list) or len(source_probes) == 0:\n        errors.append(\"assessment probe: 'source_probes' must be a non-empty list\")\n    else:\n        for i, sp in enumerate(source_probes):\n            # Accept plain string (weight=1) or dict with probe_id + weight\n            if isinstance(sp, str):\n                pid = sp\n            elif isinstance(sp, dict):\n                pid = sp.get(\"probe_id\")\n                if not pid:\n                    errors.append(f\"source_probes[{i}]: missing 'probe_id'\")\n                    continue\n                weight = sp.get(\"weight\", 1)\n                if not isinstance(weight, int) or weight < 1 or weight > 5:\n                    errors.append(f\"source_probes[{i}]: weight must be an integer 1-5, got {weight}\")\n            else:\n                errors.append(f\"source_probes[{i}]: must be a string or dict, got {type(sp).__name__}\")\n                continue\n            # Allow both probe_* and assessment_* YAML files as sources\n            yaml_path = PROBES_DIR / f\"{pid}.yaml\"\n            if not yaml_path.exists():\n                errors.append(f\"assessment probe: source_probe '{pid}' has no \"\n                              f\"corresponding probes/{pid}.yaml\")\n\n    _validate_assessment_severity_rules(probe, errors)\n\n    mar = probe.get(\"money_at_risk\")\n    valid_agg_columns = {\"probe_count\", \"finding_count\", \"total_risk\",\n                         \"worst_severity\", \"probes_flagged\",\n                         \"weighted_probe_score\", \"weighted_risk\"}\n    if not mar:\n        errors.append(\"assessment probe: missing 'money_at_risk'\")\n    elif mar not in valid_agg_columns:\n        errors.append(f\"assessment probe: 'money_at_risk' must be one of \"\n                      f\"{sorted(valid_agg_columns)}, got '{mar}'\")\n\n\n# ---------------------------------------------------------------------------\n# Main validation\n# ---------------------------------------------------------------------------\n\ndef validate_probe(probe, contract):\n    errors = []\n    for field in (\"probe_id\", \"version\", \"contract\", \"type\", \"severity\", \"description\"):\n        if not probe.get(field):\n            errors.append(f\"Missing required field: '{field}'\")\n\n    probe_type = probe.get(\"type\")\n    if probe_type and probe_type not in VALID_TYPES:\n        errors.append(f\"Invalid type '{probe_type}'. Valid: {VALID_TYPES}\")\n\n    sev = probe.get(\"severity\")\n    if sev and sev not in VALID_SEVERITIES:\n        errors.append(f\"Invalid severity '{sev}'. Valid: {VALID_SEVERITIES}\")\n\n    contract_ref = probe.get(\"contract\")\n    if contract_ref and contract_ref != contract[\"version\"]:\n        errors.append(f\"Contract mismatch: probe says '{contract_ref}', \"\n                      f\"loaded contract is '{contract['version']}'\")\n\n    # Validate registry.risk_tier if present\n    reg = probe.get(\"registry\", {})\n    risk_tier = reg.get(\"risk_tier\")\n    if risk_tier and risk_tier not in VALID_RISK_TIERS:\n        errors.append(f\"registry.risk_tier: invalid '{risk_tier}'. \"\n                      f\"Valid: {sorted(VALID_RISK_TIERS)}\")\n\n    # Validate registry.confidence_weight if present\n    cw = reg.get(\"confidence_weight\")\n    if cw is not None:\n        try:\n            cw_float = float(cw)\n            if cw_float < 0.0 or cw_float > 1.0:\n                errors.append(f\"registry.confidence_weight: {cw} out of range [0.0, 1.0]\")\n        except (TypeError, ValueError):\n            errors.append(f\"registry.confidence_weight: '{cw}' is not a valid number\")\n\n    validate_scope(probe, contract, errors)\n\n    validators = {\n        \"balance\": validate_balance,\n        \"mandatory_item\": validate_mandatory_item,\n        \"distribution_outlier\": validate_distribution_outlier,\n        \"duplicate\": validate_duplicate,\n        \"ratio\": validate_ratio,\n        \"trend\": validate_trend,\n        \"temporal_sequence\": validate_temporal_sequence,\n        \"silver_audit\": validate_silver_audit,\n        \"assessment\": validate_assessment,\n        \"entity_filter\": validate_entity_filter,\n        \"reconciliation\": validate_reconciliation,\n        \"enrichment\": validate_enrichment_type,\n        \"hand_written\": validate_hand_written,\n    }\n    if probe_type in validators:\n        validators[probe_type](probe, contract, errors)\n\n    return errors\n\n\ndef main():\n    if len(sys.argv) > 1:\n        paths = [Path(a) for a in sys.argv[1:]]\n    else:\n        paths = sorted(PROBES_DIR.glob(\"*.yaml\"))\n\n    if not paths:\n        print(\"No probe YAML files found.\")\n        sys.exit(1)\n\n    total_errors = 0\n    for path in paths:\n        with open(path) as f:\n            probe = yaml.safe_load(f)\n        contract_version = probe.get(\"contract\", \"gold.v1\")\n        contract = load_contract(contract_version)\n        errors = validate_probe(probe, contract)\n        if errors:\n            print(f\"FAIL  {path.name}\")\n            for e in errors:\n                print(f\"  - {e}\")\n            total_errors += len(errors)\n        else:\n            print(f\"OK    {path.name}\")\n\n    print()\n    if total_errors:\n        print(f\"{total_errors} error(s) found.\")\n        sys.exit(1)\n    else:\n        print(f\"All {len(paths)} probe(s) valid.\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "lang": "python"}, "classes": "compiler"}, {"data": {"id": "proberegistry", "label": "probereg", "fullName": "proberegistry", "layer": "compiler", "layerLabel": "Compilers", "color": "#d47e7e", "shape": "triangle", "layerShape": "triangle", "kindShape": "triangle", "kind": "python_script", "path": "scripts/proberegistry.py", "layerOrder": -1, "source": "#!/usr/bin/env python3\n\"\"\"proberegistry.py - Generate probe_registry.sql from probe YAML + glossary.\n\nReads probe YAML definitions and a tri-lingual glossary to produce the\nprobe_registry.sql model.  Hand-tuned text can be provided via a `registry:`\nkey in each probe YAML; auto-generated text fills any gaps.\n\nUsage:\n    python3 scripts/proberegistry.py           # generate\n    python3 scripts/proberegistry.py --check   # dry-run, exit 1 if different\n    python3 scripts/proberegistry.py --diff    # show unified diff to stdout\n\"\"\"\n\nimport difflib\nimport sys\nfrom pathlib import Path\n\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent\nGLOSSARY_PATH = REPO_ROOT / \"scripts\" / \"registry_glossary.yaml\"\nPROBES_DIR = REPO_ROOT / \"probes\"\nOUTPUT_PATH = (\n    REPO_ROOT / \"dbt\" / \"numetrix\" / \"models\" / \"probes\" / \"probe_registry.sql\"\n)\n\nLANGS = (\"de\", \"en\", \"fr\")\n\n\n# ---------------------------------------------------------------------------\n# Loading\n# ---------------------------------------------------------------------------\n\ndef load_glossary() -> dict:\n    with open(GLOSSARY_PATH) as f:\n        return yaml.safe_load(f)\n\n\ndef load_all_probes() -> list[dict]:\n    probes = []\n    for path in sorted(PROBES_DIR.glob(\"*.yaml\")):\n        with open(path) as f:\n            probe = yaml.safe_load(f)\n        if probe and \"probe_id\" in probe:\n            probes.append(probe)\n    return probes\n\n\n# ---------------------------------------------------------------------------\n# Label helpers\n# ---------------------------------------------------------------------------\n\ndef humanize(name: str) -> str:\n    \"\"\"Convert snake_case to Title Case.\"\"\"\n    return name.replace(\"_\", \" \").title()\n\n\ndef entity_label(entity: str, lang: str, glossary: dict) -> str:\n    \"\"\"Look up tri-lingual label for an entity name.\"\"\"\n    entities = glossary.get(\"entities\", {})\n    if entity in entities and lang in entities[entity]:\n        return entities[entity][lang]\n    return humanize(entity)\n\n\ndef field_label(field: str, lang: str, glossary: dict) -> str:\n    \"\"\"Look up tri-lingual label for a field name.\"\"\"\n    for section in (\"fields\", \"derived_fields\"):\n        fields = glossary.get(section, {})\n        if field in fields and lang in fields[field]:\n            return fields[field][lang]\n    return humanize(field)\n\n\n# ---------------------------------------------------------------------------\n# Data layer / category resolution\n# ---------------------------------------------------------------------------\n\ndef resolve_data_layer(probe: dict) -> str:\n    if probe.get(\"type\") == \"assessment\":\n        return \"assessment\"\n    contract = probe.get(\"contract\", \"gold.v1\")\n    if contract.startswith(\"silver\"):\n        return \"silver\"\n    return \"gold\"\n\n\ndef resolve_category(probe: dict, glossary: dict) -> str:\n    # Check for registry override first\n    reg = probe.get(\"registry\", {})\n    if reg.get(\"probe_category\"):\n        return reg[\"probe_category\"]\n    # Then glossary default\n    category_map = glossary.get(\"category_map\", {})\n    probe_type = probe.get(\"type\", \"\")\n    return category_map.get(probe_type, \"financial_anomaly\")\n\n\nRISK_TIER_DEFAULTS = {\n    \"financial_anomaly\": \"direct_financial\",\n    \"compliance\": \"compliance_exposure\",\n    \"data_quality\": \"operational_signal\",\n}\n\nCONFIDENCE_WEIGHT_DEFAULTS = {\n    \"direct_financial\": 1.0,\n    \"compliance_exposure\": 0.5,\n    \"operational_signal\": 0.2,\n}\n\n\ndef resolve_risk_tier(probe: dict, glossary: dict) -> str:\n    \"\"\"Resolve the risk tier for a probe.\n\n    Checks registry.risk_tier first, then falls back to a default\n    based on probe_category.\n    \"\"\"\n    reg = probe.get(\"registry\", {})\n    if reg.get(\"risk_tier\"):\n        return reg[\"risk_tier\"]\n    category = resolve_category(probe, glossary)\n    return RISK_TIER_DEFAULTS.get(category, \"operational_signal\")\n\n\ndef resolve_confidence_weight(probe: dict, glossary: dict) -> float:\n    \"\"\"Resolve confidence weight for a probe.\n\n    Checks registry.confidence_weight first, then falls back to a default\n    based on risk_tier.\n    \"\"\"\n    reg = probe.get(\"registry\", {})\n    cw = reg.get(\"confidence_weight\")\n    if cw is not None:\n        return float(cw)\n    risk_tier = resolve_risk_tier(probe, glossary)\n    return CONFIDENCE_WEIGHT_DEFAULTS.get(risk_tier, 0.2)\n\n\ndef resolve_source_probes(probe: dict) -> str:\n    \"\"\"For assessments, return comma-separated source probe IDs; else NULL.\"\"\"\n    if probe.get(\"type\") != \"assessment\":\n        return \"NULL\"\n    source_probes = probe.get(\"source_probes\", [])\n    if not source_probes:\n        return \"NULL\"\n    ids = \", \".join(sp[\"probe_id\"] for sp in source_probes)\n    return f\"'{ids}'\"\n\n\n# ---------------------------------------------------------------------------\n# Per-type auto-generators (Phase 2 \u2014 currently unused since Phase 1 uses\n# overrides for all probes, but the framework is ready)\n# ---------------------------------------------------------------------------\n\ndef gen_balance(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n    left = probe.get(\"left\", {})\n    right = probe.get(\"right\", {})\n    left_alias = left.get(\"alias
