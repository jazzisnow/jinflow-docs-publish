\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: direct_financial\n  confidence_weight: 1.0\n  display_name:\n    de: \"Erl\u00f6sausfall\"\n    en: \"Revenue Leakage\"\n    fr: \"Perte de revenus\"\n  description:\n    de: \"Erkennt F\u00e4lle, bei denen der Materialverbrauchswert die Gesamtabrechnung \u00fcbersteigt. Ein Hinweis auf nicht fakturierte Leistungen und m\u00f6gliche Ertragseinbussen.\"\n    en: \"Detects cases where material usage value exceeds total billed amount. Indicates unbilled services and potential revenue loss.\"\n    fr: \"D\u00e9tecte les cas o\u00f9 la valeur de consommation d\u00e9passe le montant factur\u00e9. Indique des prestations non factur\u00e9es et une perte de revenus potentielle.\"\n  interpretation:\n    de: \"Fall {entity_id} weist eine Differenz von {money_at_risk} zwischen Materialverbrauch und Abrechnung auf ({pct_diff}% des Verbrauchs nicht fakturiert). Dies deutet auf einen m\u00f6glichen Erl\u00f6sausfall hin.\"\n    en: \"Case {entity_id} shows a gap of {money_at_risk} between material usage and billing ({pct_diff}% of usage unbilled). This indicates potential revenue leakage.\"\n    fr: \"Le cas {entity_id} pr\u00e9sente un \u00e9cart de {money_at_risk} entre la consommation et la facturation ({pct_diff}% non factur\u00e9). Cela indique une possible perte de revenus.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_shelf_life_risk", "label": "ProbeShelfLifeRisk", "fullName": "yaml_probe_shelf_life_risk", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_shelf_life_risk.yaml", "layerOrder": -1, "source": "probe_id: probe_shelf_life_risk\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: hand_written\nseverity: high\ndescription: >\n  Identifies materials with short shelf life and low movement velocity,\n  indicating high expiration risk. Materials with shelf_life < 6 months\n  and monthly velocity < 1 unit are flagged.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: MaterialMovement\n    field: movement_timestamp\n    bucket: week\n\nevidence_fields: [material_id, material_description, shelf_life_months, avg_monthly_qty, months_with_activity, money_at_risk]\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: operational_signal\n  confidence_weight: 0.2\n  display_name:\n    de: 'Haltbarkeitsrisiko'\n    en: 'Shelf Life Risk'\n    fr: 'Risque de p\u00e9remption'\n  description:\n    de: 'Erkennt Materialien mit kurzer Haltbarkeit und geringer Umschlagsh\u00e4ufigkeit. Hohe Verfallsgefahr f\u00fchrt zu Abschreibungen und Verschwendung.'\n    en: 'Identifies materials with short shelf life and low movement velocity, indicating high expiration risk. May lead to write-offs and waste.'\n    fr: 'Identifie les mat\u00e9riaux \u00e0 courte dur\u00e9e de conservation et faible v\u00e9locit\u00e9 de mouvement, indiquant un risque \u00e9lev\u00e9 de p\u00e9remption et de gaspillage.'\n  interpretation:\n    de: 'Material {entity_id} ({material_description}) hat eine Haltbarkeit von {shelf_life_months} Monaten bei einer durchschnittlichen Monatsrate von {avg_monthly_qty} Einheiten ({months_with_activity} aktive Monate).'\n    en: 'Material {entity_id} ({material_description}) has a shelf life of {shelf_life_months} months with average monthly velocity of {avg_monthly_qty} units ({months_with_activity} active months).'\n    fr: 'Le mat\u00e9riau {entity_id} ({material_description}) a une dur\u00e9e de conservation de {shelf_life_months} mois avec une v\u00e9locit\u00e9 mensuelle de {avg_monthly_qty} unit\u00e9s ({months_with_activity} mois actifs).'\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_stale_article", "label": "ProbeStaleArticle", "fullName": "yaml_probe_stale_article", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_stale_article.yaml", "layerOrder": -1, "source": "probe_id: probe_stale_article\nversion: \"1.0.0\"\ncontract: \"silver.v1\"\ntype: silver_audit\nseverity: medium\ndescription: >\n  Flags materials with valid_until in the past that still have transactional\n  activity (usage or billing). Stale articles indicate expired catalogue\n  entries being consumed \u2014 a data quality and procurement risk.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: SilverBillingEvent\n    field: billing_timestamp\n    bucket: week\n\nsource:\n  entity: SilverMaterial\n  filter_expression: >\n    valid_until is not null\n    and cast(valid_until as date) < CURRENT_DATE\n    and trim(material_id) is not null\n    and trim(material_id) != ''\n  fields: [material_id, material_description, material_group, valid_from, valid_until]\n  entity_id_field: material_id\n  join_key: material_id\n\nactivity_joins:\n  - entity: SilverCaseMaterialUsage\n    join_key: material_id\n    alias: usage\n    aggregate: count\n  - entity: SilverBillingEvent\n    join_key: material_id\n    alias: billing\n    aggregates:\n      count: billing_count\n      sum: [billed_amount]\n\nactivity_filter: \"usage_count > 0 or billing_count > 0\"\n\nseverity_rules:\n  - above_count: 100\n    field: usage_count\n    level: high\n  - above_count: 10\n    field: usage_count\n    level: medium\n  - default: low\n\nmoney_at_risk: \"round(total_billed_amount, 2)\"\n\nevidence_fields: [material_description, material_group, valid_from, valid_until, usage_count, billing_count, total_billed_amount]\n\nregistry:\n  probe_category: data_quality\n  risk_tier: operational_signal\n  confidence_weight: 0.2\n  display_name:\n    de: 'Veralteter Artikel'\n    en: 'Stale Article'\n    fr: 'Article p\u00e9rim\u00e9'\n  description:\n    de: 'Erkennt Materialien mit abgelaufenem G\u00fcltigkeitsdatum (valid_until), die dennoch Verbrauchs- oder Abrechnungsaktivit\u00e4t aufweisen. Veraltete Katalogartikel bedeuten Beschaffungs- und Datenqualit\u00e4tsrisiken.'\n    en: 'Detects materials with expired valid_until dates that still have usage or billing activity. Stale catalogue entries indicate procurement and data quality risks.'\n    fr: \"D\u00e9tecte les mat\u00e9riaux dont la date de validit\u00e9 est expir\u00e9e mais qui pr\u00e9sentent encore une activit\u00e9. Les articles p\u00e9rim\u00e9s du catalogue indiquent des risques d'approvisionnement et de qualit\u00e9 des donn\u00e9es.\"\n  interpretation:\n    de: 'Material {entity_id} ({material_description}) ist seit {valid_until} abgelaufen, wurde aber {usage_count}\u00d7 verwendet und {billing_count}\u00d7 fakturiert ({total_billed_amount} Total).'\n    en: 'Material {entity_id} ({material_description}) expired on {valid_until} but was used {usage_count} times and billed {billing_count} times ({total_billed_amount} total).'\n    fr: 'Le mat\u00e9riau {entity_id} ({material_description}) est expir\u00e9 depuis {valid_until}, mais a \u00e9t\u00e9 utilis\u00e9 {usage_count} fois et factur\u00e9 {billing_count} fois ({total_billed_amount} au total).'\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_hyp_controlled_substance_gap", "label": "HypControlledSubstanceGap", "fullName": "yaml_hyp_controlled_substance_gap", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "hypotheses/hyp_controlled_substance_gap.yaml", "layerOrder": -1, "source": "hypothesis_id: hyp_controlled_substance_gap\nshort_code: COGA\nversion: \"1.0.0\"\n\nstatement:\n  en: \"Controlled substances have unaccounted quantities \u2014 gaps between procurement, dispensing, and patient administration records.\"\n  de: \"Kontrollierte Substanzen weisen nicht nachvollziehbare Mengen auf \u2014 Luecken zwischen Beschaffung, Abgabe und Verabreichungsdokumentation.\"\n  fr: \"Les substances controlees presentent des quantites non comptabilisees \u2014 des ecarts entre approvisionnement, dispensation et administration aux patients.\"\n\ncategory: compliance\ntags: [controlled_substances, traceability, compliance]\naudience:\n  - Chief Pharmacist\n  - Chief Risk Officer\n  - Compliance Officer\n  - Quality Manager\n\nevidence:\n  - probe_id: probe_controlled_substance_traceability\n    role: primary\n    weight: 3\n  - probe_id: probe_shelf_life_risk\n    role: supporting\n    weight: 2\n  - probe_id: assessment_material_compliance\n    role: supporting\n    weight: 2\n\nverdict:\n  thresholds:\n    confirmed: 0.6\n    plausible: 0.2\n  scaling: graduated\n  saturation: 100\n\ninterpretation:\n  confirmed:\n    en: \"Controlled substance gap confirmed. {finding_count} materials show traceability gaps, with CHF {money_at_risk} in unaccounted inventory.\"\n    de: \"Luecke bei kontrollierten Substanzen bestaetigt. {finding_count} Materialien zeigen Nachverfolgbarkeitsluecken, mit CHF {money_at_risk} an nicht nachvollziehbarem Bestand.\"\n    fr: \"Ecart de substances controlees confirme. {finding_count} materiaux montrent des lacunes de tracabilite, avec CHF {money_at_risk} en stock non comptabilise.\"\n  plausible:\n    en: \"Some traceability gaps detected for controlled substances. {finding_count} items flagged. Review recommended.\"\n    de: \"Einige Nachverfolgbarkeitsluecken bei kontrollierten Substanzen erkannt. {finding_count} Artikel markiert. Ueberpruefung empfohlen.\"\n    fr: \"Quelques lacunes de tracabilite detectees pour les substances controlees. {finding_count} articles signales. Verification recommandee.\"\n  not_observed:\n    en: \"No traceability gaps found for controlled substances. Procurement-to-administration chain appears complete.\"\n    de: \"Keine Nachverfolgbarkeitsluecken bei kontrollierten Substanzen gefunden. Die Kette Beschaffung-Verabreichung scheint vollstaendig.\"\n    fr: \"Aucune lacune de tracabilite trouvee pour les substances controlees. La chaine approvisionnement-administration semble complete.\"\n  insufficient:\n    en: \"Insufficient data to evaluate controlled substance traceability. Required probes did not produce results.\"\n    de: \"Ungenuegend Daten zur Bewertung der Nachverfolgbarkeit kontrollierter Substanzen. Erforderliche Probes haben keine Ergebnisse geliefert.\"\n    fr: \"Donnees insuffisantes pour evaluer la tracabilite des substances controlees. Les probes requises n'ont pas produit de resultats.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_hyp_cost_center_misallocation", "label": "HypCostCenterMisallocation", "fullName": "yaml_hyp_cost_center_misallocation", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "hypotheses/hyp_cost_center_misallocation.yaml", "layerOrder": -1, "source": "hypothesis_id: hyp_cost_center_misallocation\nshort_code: COMA\nversion: \"1.0.0\"\n\nstatement:\n  en: \"Costs are being booked to incorrect cost centers, distorting departmental profitability and budget reporting.\"\n  de: \"Kosten werden falschen Kostenstellen zugeordnet, was die Profitabilitaet der Abteilungen und die Budgetberichterstattung verzerrt.\"\n  fr: \"Les couts sont imputes aux mauvais centres de couts, faussant la rentabilite des departements et les rapports budgetaires.\"\n\ncategory: financial_anomaly\ntags: [cost_centers, allocation, budget]\naudience:\n  - CFO\n  - Chief Risk Officer\n  - Controller\n  - Department Head\n\nevidence:\n  - probe_id: probe_cost_center_billing_mismatch\n    role: primary\n    weight: 3\n  - probe_id: probe_cc_producteur_mismatch\n    role: supporting\n    weight: 2\n  - probe_id: probe_cross_site_billing\n    role: supporting\n    weight: 2\n  - probe_id: assessment_billing_quality\n    role: context\n    weight: 1\n\nverdict:\n  thresholds:\n    confirmed: 0.6\n    plausible: 0.2\n\ninterpre risk} Risiko. Weitere Untersuchung empfohlen.\"\n    fr: \"Des indices de materiaux non factures ont ete trouves. {finding_count} cas signales avec un risque potentiel de CHF {money_at_risk}. Investigation supplementaire recommandee.\"\n  not_observed:\n    en: \"No evidence of unbilled materials found. Billing coverage appears complete for the analyzed period.\"\n    de: \"Keine Hinweise auf nicht verrechnete Materialien gefunden. Die Verrechnungsabdeckung scheint fuer den Analysezeitraum vollstaendig.\"\n    fr: \"Aucune preuve de materiaux non factures trouvee. La couverture de facturation semble complete pour la periode analysee.\"\n  insufficient:\n    en: \"Insufficient data to evaluate this hypothesis. One or more required probes did not produce results.\"\n    de: \"Ungenuegend Daten zur Bewertung dieser Hypothese. Eine oder mehrere erforderliche Probes haben keine Ergebnisse geliefert.\"\n    fr: \"Donnees insuffisantes pour evaluer cette hypothese. Une ou plusieurs probes requises n'ont pas produit de resultats.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_hyp_stale_catalogue", "label": "HypStaleCatalogue", "fullName": "yaml_hyp_stale_catalogue", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "hypotheses/hyp_stale_catalogue.yaml", "layerOrder": -1, "source": "hypothesis_id: hyp_stale_catalogue\nshort_code: STAL\nversion: \"1.0.0\"\n\nstatement:\n  en: \"Expired or outdated catalogue entries are still being consumed, leading to incorrect pricing and compliance risks.\"\n  de: \"Abgelaufene oder veraltete Katalogeintraege werden weiterhin verwendet, was zu falschen Preisen und Compliance-Risiken fuehrt.\"\n  fr: \"Des entrees de catalogue expirees ou obsoletes sont encore utilisees, entrainant des erreurs de prix et des risques de conformite.\"\n\ncategory: data_quality\ntags: [catalogue, pricing, compliance]\naudience:\n  - Head of Procurement\n  - Pharmacist\n  - Quality Manager\n\nevidence:\n  - probe_id: probe_stale_article\n    role: primary\n    weight: 3\n  - probe_id: probe_missing_standard_price\n    role: supporting\n    weight: 2\n  - probe_id: assessment_material_compliance\n    role: supporting\n    weight: 2\n\nverdict:\n  thresholds:\n    confirmed: 0.6\n    plausible: 0.2\n  scaling: graduated\n  saturation: 100\n\ninterpretation:\n  confirmed:\n    en: \"Stale catalogue confirmed. {finding_count} articles with outdated or missing pricing detected, with CHF {money_at_risk} in affected transactions.\"\n    de: \"Veralteter Katalog bestaetigt. {finding_count} Artikel mit veralteter oder fehlender Preisgestaltung erkannt, mit CHF {money_at_risk} in betroffenen Transaktionen.\"\n    fr: \"Catalogue obsolete confirme. {finding_count} articles avec prix obsoletes ou manquants detectes, avec CHF {money_at_risk} en transactions affectees.\"\n  plausible:\n    en: \"Some catalogue staleness detected. {finding_count} items flagged. Review recommended.\"\n    de: \"Einige Hinweise auf veraltete Katalogeintraege. {finding_count} Artikel markiert. Ueberpruefung empfohlen.\"\n    fr: \"Quelques indices d'obsolescence du catalogue detectes. {finding_count} articles signales. Verification recommandee.\"\n  not_observed:\n    en: \"No evidence of stale catalogue entries found. Article master data appears current.\"\n    de: \"Keine Hinweise auf veraltete Katalogeintraege gefunden. Artikelstammdaten scheinen aktuell.\"\n    fr: \"Aucune preuve d'entrees de catalogue obsoletes trouvee. Les donnees de reference articles semblent a jour.\"\n  insufficient:\n    en: \"Insufficient data to evaluate catalogue freshness. Required probes did not produce results.\"\n    de: \"Ungenuegend Daten zur Bewertung der Katalogaktualitaet. Erforderliche Probes haben keine Ergebnisse geliefert.\"\n    fr: \"Donnees insuffisantes pour evaluer la fraicheur du catalogue. Les probes requises n'ont pas produit de resultats.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_diag_billing_workflow_gap", "label": "DiagBillingWorkflowGap", "fullName": "yaml_diag_billing_workflow_gap", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "diagnoses/diag_billing_workflow_gap.yaml", "layerOrder": -1, "source": "diagnosis_id: diag_billing_workflow_gap\nversion: \"1.0.0\"\n\nhypothesis_id: hyp_revenue_leakage_unbilled\n\nroot_cause_category: process_failure\nroot_cause_id: billing_workflow_gap\n\nconditions:\n  - probe_id: probe_revenue_leakage\n    field: finding_count\n    above: 10\n  - probe_id: probe_missing_mandatory_implants\n    field: finding_count\n    above: 0\n\nconfidence:\n  base: 0.7\n  boost_if:\n    - probe_id: assessment_case_financial_integrity\n      field: finding_count\n      above: 20\n      boost: 0.15\n\nexplanation:\n  en: \"Billing workflow has gaps \u2014 {finding_count} cases show materials used but not billed. The pattern across multiple cost centers suggests a systemic process issue rather than isolated errors.\"\n  de: \"Der Abrechnungs-Workflow weist Luecken auf \u2014 {finding_count} Faelle zeigen verwendete aber nicht verrechnete Materialien. Das Muster ueber mehrere Kostenstellen deutet auf ein systemisches Prozessproblem hin.\"\n  fr: \"Le flux de facturation presente des lacunes \u2014 {finding_count} cas montrent des materiaux utilises mais non factures. Le schema sur plusieurs centres de couts suggere un probleme de processus systemique.\"\n\nrecommendation:\n  en: \"Review billing interface logs for affected cost centers. Check whether the interface was down or whether manual billing steps were skipped.\"\n  de: \"Ueberpruefen Sie die Abrechnungs-Schnittstellen-Logs der betroffenen Kostenstellen. Pruefen Sie, ob die Schnittstelle ausgefallen war oder manuelle Schritte uebersprungen wurden.\"\n  fr: \"Examinez les journaux de l'interface de facturation des centres de couts concernes. Verifiez si l'interface etait en panne ou si des etapes manuelles ont ete ignorees.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_diag_catalogue_maintenance_lag", "label": "DiagCatalogueMaintenanceLag", "fullName": "yaml_diag_catalogue_maintenance_lag", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "diagnoses/diag_catalogue_maintenance_lag.yaml", "layerOrder": -1, "source": "diagnosis_id: diag_catalogue_maintenance_lag\nversion: \"1.0.0\"\n\nhypothesis_id: hyp_stale_catalogue\n\nroot_cause_category: process_failure\nroot_cause_id: catalogue_update_process_gap\n\nconditions:\n  - probe_id: probe_stale_article\n    field: finding_count\n    above: 10\n  - probe_id: probe_missing_standard_price\n    field: finding_count\n    above: 0\n\nconfidence:\n  base: 0.65\n  boost_if:\n    - probe_id: assessment_material_compliance\n      field: finding_count\n      above: 10\n      boost: 0.2\n\nexplanation:\n  en: \"The material catalogue contains {finding_count} stale articles with expired validity dates and missing standard prices. This indicates the catalogue maintenance process has fallen behind \u2014 articles are not being reviewed and updated on schedule.\"\n  de: \"Der Materialkatalog enthaelt {finding_count} veraltete Artikel mit abgelaufenen Gueltigkeitsdaten und fehlenden Standardpreisen. Dies zeigt, dass der Katalogpflegeprozess nicht Schritt haelt.\"\n  fr: \"Le catalogue de materiaux contient {finding_count} articles obsoletes avec des dates de validite expirees et des prix standard manquants. Cela indique que le processus de maintenance du catalogue a pris du retard.\"\n\nrecommendation:\n  en: \"Establish a regular catalogue review cadence (quarterly recommended). Prioritize articles with active usage but expired validity. Verify the supplier price update feed is functioning.\"\n  de: \"Etablieren Sie einen regelmaessigen Katalog-Review-Rhythmus (quartalsweise empfohlen). Priorisieren Sie Artikel mit aktiver Nutzung aber abgelaufener Gueltigkeit.\"\n  fr: \"Etablissez une cadence reguliere de revision du catalogue (trimestrielle recommandee). Priorisez les articles avec utilisation active mais validite expiree.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_diag_cc_master_data_drift", "label": "DiagCcMasterDataDrift", "fullName": "yaml_diag_cc_master_data_drift", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "diagnoses/diag_cc_master_data_drift.yaml", "layerOrder": -1, "source": "diagnosis_id: diag_cc_master_data_drift\nversion: \"1.0.0\"\n\nhypothesis_id: hyp_cost_center_misallocation\n\nroot_cause_category: data_quality\nroot_cause_id: cost_center_mapping_outdated\n\nconditions:\n  - probe_id: probe_cost_center_billing_mismatch\n    field: finding_count\n    above: 5\n  - probe_id: probe_cc_producteur_mismatch\n    field: finding_count\n    above: 0\n\nconfidence:\n  base: 0.6\n  boost_if:\n    - probe_id: probe_cross_site_billing\n      field: finding_count\n      above: 5\n      boost: 0.15\n    - probe_id: assessment_billing_quality\n      field: finding_count\n      above: 15\n      boost: 0.1\n\nexplanation:\n  en: \"Cost center assignments are drifting from reality \u2014 {finding_count} billing events land on mismatched cost centers. When combined with producteur mismatches, this indicates the cost center master data has not been updated after organizational restructuring.\"\n  de: \"Kostenstellenzuordnungen weichen von der Realitaet ab \u2014 {finding_count} Abrechnungen landen auf falschen Kostenstellen. In Kombination mit Producteur-Abweichungen deutet dies auf veraltete Kostenstellen-Stammdaten nach Umstrukturierungen hin.\"\n  fr: \"Les affectations de centres de couts derivent de la realite \u2014 {finding_count} evenements de facturation atterrissent sur des centres de couts errones. Combine aux ecarts de producteurs, cela indique des donnees maitres non mises a jour apres une restructuration.\"\n\nrecommendation:\n  en: \"Compare current cost center master data against the latest organizational chart. Review the most recent restructuring date and verify all cost center mappings were updated.\"\n  de: \"Vergleichen Sie die aktuellen Kostenstellen-Stammdaten mit dem neuesten Organigramm. Pruefen Sie das letzte Umstrukturierungsdatum und die Aktualisierung aller Zuordnungen.\"\n  fr: \"Comparez les donnees maitres des centres de couts avec le dernier organigramme. Verifiez la date de la derniere restructuration et la mise a jour de toutes les affectations.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_diag_cross_site_routing_error", "label": "DiagCrossSiteRoutingError", "fullName": "yaml_diag_cross_site_routing_error", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "diagnoses/diag_cross_site_routing_error.yaml", "layerOrder": -1, "source": "diagnosis_id: diag_cross_site_routing_error\nversion: \"1.0.0\"\n\nhypothesis_id: hyp_cross_site_leakage\n\nroot_cause_category: process_failure\nroot_cause_id: inter_site_material_routing\n\nconditions:\n  - probe_id: probe_cross_site_billing\n    field: finding_count\n    above: 5\n\nconfidence:\n  base: 0.6\n  boost_if:\n    - probe_id: probe_cc_producteur_mismatch\n      field: finding_count\n      above: 5\n      boost: 0.2\n    - probe_id: assessment_billing_quality\n      field: finding_count\n      above: 10\n      boost: 0.1\n\nexplanation:\n  en: \"Materials are being billed at a different site than where they were used \u2014 {finding_count} cross-site billing events detected. This typically occurs when inter-site transfer orders are not closed before billing, causing revenue to be attributed to the wrong location.\"\n  de: \"Materialien werden an einem anderen Standort verrechnet als wo sie verwendet wurden \u2014 {finding_count} standortubergreifende Abrechnungen erkannt. Dies geschieht typischerweise, wenn standortubergreifende Transferauftraege vor der Abrechnung nicht abgeschlossen werden.\"\n  fr: \"Des materiaux sont factures sur un site different de celui ou ils ont ete utilises \u2014 {finding_count} facturations inter-sites detectees. Cela se produit lorsque les ordres de transfert inter-sites ne sont pas clotures avant la facturation.\"\n\nrecommendation:\n  en: \"Review the inter-site transfer workflow. Verify that transfer orders are completed and closed before billing events are generated. Check if site-specific billing rules are configured correctly.\"\n  de: \"Ueberpruefen Sie den standortubergreifenden Transferprozess. Stellen Sie sicher, dass Transferauftraege vor der Abrechnungserstellung abgeschlossen sind.\"\n  fr: \"Examinez le processus de transfert inter-sites. Verifiez que les ordres de transfert sont clotures avant la generation des ecritures de facturation.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_diag_duplicate_interface_error", "label": "DiagDuplicateInterfaceError", "fullName": "yaml_diag_duplicate_interface_error", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "diagnoses/diag_duplicate_interface_error.yaml", "layerOrder": -1, "source": "diagnosis_id: diag_duplicate_interface_error\nversion: \"1.0.0\"\n\nhypothesis_id: hyp_duplicate_billing\n\nroot_cause_category: system_failure\nroot_cause_id: duplicate_interface_transmission\n\nconditions:\n  - probe_id: probe_duplicate_billing\n    field: finding_count\n    above: 5\n  - probe_id: probe_invoice_integrity\n    field: finding_count\n    above: 0\n\nconfidence:\n  base: 0.65\n  boost_if:\n    - probe_id: assessment_billing_quality\n      field: finding_count\n      above: 15\n      boost: 0.2\n\nexplanation:\n  en: \"Duplicate billing entries indicate an interface transmission issue \u2014 {finding_count} billing events appear more than once. Combined with invoice integrity gaps, this points to a system-level double-send rather than manual entry errors.\"\n  de: \"Doppelte Abrechnungseintraege deuten auf ein Schnittstellenproblem hin \u2014 {finding_count} Abrechnungsereignisse erscheinen mehrfach. In Kombination mit Rechnungsintegritaetsluecken spricht dies fuer einen systemseitigen Doppelversand.\"\n  fr: \"Les doublons de facturation indiquent un probleme de transmission d'interface \u2014 {finding_count} evenements de facturation apparaissent plus d'une fois. Combine aux lacunes d'integrite des factures, cela suggere un double envoi systemique.\"\n\nrecommendation:\n  en: \"Audit the billing interface idempotency controls. Check for missing deduplication logic in the ERP-to-billing pipeline. Review transmission logs around peak hours.\"\n  de: \"Ueberpruefen Sie die Idempotenz-Kontrollen der Abrechnungsschnittstelle. Pruefen Sie fehlende Deduplizierungslogik in der ERP-Abrechnungs-Pipeline.\"\n  fr: \"Auditez les controles d'idempotence de l'interface de facturation. Verifiez la logique de deduplication manquante dans le pipeline ERP-facturation.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_diag_inventory_process_gap", "label": "DiagInventoryProcessGap", "fullName": "yaml_diag_inventory_process_gap", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "diagnoses/diag_inventory_process_gap.yaml", "layerOrder": -1, "source": "diagnosis_id: diag_inventory_process_gap\nversion: \"1.0.0\"\n\nhypothesis_id: hyp_io_imbalance\n\nroot_cause_category: process_failure\nroot_cause_id: inventory_patient_usage_disconnect\n\nconditions:\n  - probe_id: probe_io_coefficient\n    field: finding_count\n    above: 10\n\nconfidence:\n  base: 0.6\n  boost_if:\n    - probe_id: probe_io_coefficient_trend\n      field: finding_count\n      above: 5\n      boost: 0.15\n    - probe_id: assessment_material_health\n      field: finding_count\n      above: 10\n      boost: 0.1\n\nexplanation:\n  en: \"Inventory transfers significantly exceed patient-level usage for {finding_count} materials \u2014 the I/O coefficient indicates a disconnect between what enters the ward and what is documented as used. This points to a process gap in patient-level consumption tracking.\"\n  de: \"Lagertransfers uebersteigen den patientenbezogenen Verbrauch fuer {finding_count} Materialien deutlich \u2014 der I/O-Koeffizient zeigt eine Diskrepanz zwischen Stationseingang und dokumentiertem Verbrauch.\"\n  fr: \"Les transferts de stock depassent significativement l'utilisation par patient pour {finding_count} materiaux \u2014 le coefficient I/O indique une deconnexion entre ce qui entre dans le service et ce qui est documente comme utilise.\"\n\nrecommendation:\n  en: \"Focus on the highest-volume materials with I/O coefficient below 0.5. Audit the ward-level scanning/documentation workflow to identify where patient consumption tracking breaks down.\"\n  de: \"Konzentrieren Sie sich auf die Materialien mit hoechstem Volumen und I/O-Koeffizient unter 0.5. Ueberpruefen Sie den Stations-Scan-Workflow, um zu identifizieren, wo die Verbrauchserfassung abbricht.\"\n  fr: \"Concentrez-vous sur les materiaux a plus fort volume avec un coefficient I/O inferieur a 0.5. Auditez le flux de documentation au niveau du service pour identifier ou le suivi de consommation se perd.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_diag_orphan_case_data_entry", "label": "DiagOrphanCaseDataEntry", "fullName": "yaml_diag_orphan_case_data_entry", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "diagnoses/diag_orphan_case_data_entry.yaml", "layerOrder": -1, "source": "diagnosis_id: diag_orphan_case_data_entry\nversion: \"1.0.0\"\n\nhypothesis_id: hyp_phantom_cases\n\nroot_cause_category: data_quality\nroot_cause_id: stale_case_references\n\nconditions:\n  - probe_id: probe_orphan_billing\n    field: finding_count\n    above: 10\n\nconfidence:\n  base: 0.6\n  boost_if:\n    - probe_id: probe_duplicate_billing\n      field: finding_count\n      above: 5\n      boost: 0.15\n    - probe_id: assessment_billing_quality\n      field: finding_count\n      above: 20\n      boost: 0.1\n\nexplanation:\n  en: \"Billing entries reference {finding_count} non-existent cases \u2014 likely caused by stale case IDs in the billing system after case merges, cancellations, or delayed master data synchronization.\"\n  de: \"{finding_count} Abrechnungseintraege referenzieren nicht existierende Faelle \u2014 wahrscheinlich verursacht durch veraltete Fall-IDs im Abrechnungssystem nach Fallzusammenfuehrungen oder verzoegerter Stammdatensynchronisation.\"\n  fr: \"Des ecritures de facturation referencent {finding_count} cas inexistants \u2014 probablement cause par des identifiants de cas obsoletes apres des fusions de cas ou une synchronisation retardee des donnees maitres.\"\n\nrecommendation:\n  en: \"Cross-reference orphan billing case IDs against the case management system's merge/cancel log. Verify master data sync frequency between clinical and billing systems.\"\n  de: \"Gleichen Sie die verwaisten Fall-IDs mit dem Zusammenfuehrungs-/Stornierungsprotokoll des Fallmanagementsystems ab. Pruefen Sie die Stammdaten-Synchronisationsfrequenz.\"\n  fr: \"Croisez les identifiants de cas orphelins avec le journal de fusions/annulations du systeme de gestion des cas. Verifiez la frequence de synchronisation des donnees maitres.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_diag_procurement_pricing_mismatch", "label": "DiagProcurementPricingMismatch", "fullName": "yaml_diag_procurement_pricing_mismatch", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "diagnoses/diag_procurement_pricing_mismatch.yaml", "layerOrder": -1, "source": "diagnosis_id: diag_procurement_pricing_mismatch\nversion: \"1.0.0\"\n\nhypothesis_id: hyp_overpriced_generics\n\nroot_cause_category: structural\nroot_cause_id: procurement_vs_internal_price_gap\n\nconditions:\n  - probe_id: probe_negative_margin\n    field: finding_count\n    above: 5\n\nconfidence:\n  base: 0.6\n  boost_if:\n    - probe_id: probe_missing_standard_price\n      field: finding_count\n      above: 5\n      boost: 0.15\n    - probe_id: assessment_material_health\n      field: finding_count\n      above: 10\n      boost: 0.1\n\nexplanation:\n  en: \"Materials are being procured at prices exceeding internal sales prices \u2014 {finding_count} items show negative margins. This structural gap between procurement contracts and internal pricing suggests outdated supplier agreements or missing price renegotiation for high-volume generics.\"\n  de: \"Materialien werden zu Preisen beschafft, die ueber den internen Verkaufspreisen liegen \u2014 {finding_count} Artikel zeigen negative Margen. Diese strukturelle Luecke zwischen Beschaffungsvertraegen und interner Preisgestaltung deutet auf veraltete Lieferantenvereinbarungen hin.\"\n  fr: \"Des materiaux sont acquis a des prix superieurs aux prix de vente internes \u2014 {finding_count} articles presentent des marges negatives. Cet ecart structurel entre contrats d'approvisionnement et tarification interne suggere des accords fournisseurs obsoletes.\"\n\nrecommendation:\n  en: \"Extract the top-20 negative-margin materials by volume. Cross-reference against current supplier contracts and identify candidates for price renegotiation or supplier switch.\"\n  de: \"Extrahieren Sie die Top-20 Negativmargen-Materialien nach Volumen. Gleichen Sie mit aktuellen Lieferantenvertraegen ab und identifizieren Sie Kandidaten fuer Preisneuverhandlungen.\"\n  fr: \"Extrayez les 20 premiers materiaux a marge negative par volume. Croisez avec les contrats fournisseurs actuels et identifiez les candidats a la renegociation.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "diagnosis_contract.v1", "label": "Diagnosis", "fullName": "diagnosis_contract.v1", "layer": "contract", "layerLabel": "Contracts", "color": "#d4a06b", "shape": "rectangle", "layerShape": "rectangle", "kindShape": "rectangle", "kind": "json_schema", "path": "contracts/diagnosis_contract.v1.json", "layerOrder": -1, "source": "{\n  \"version\": \"diagnosis.v1\",\n  \"entities\": {\n    \"Diagnosis\": {\n      \"dbt_model\": \"diagnosis_verdicts\",\n      \"primary_key\": \"diagnosis_id\",\n      \"fields\": {\n        \"diagnosis_id\": \"string\",\n        \"tenant_id\": \"string\",\n        \"hypothesis_id\": \"string\",\n        \"root_cause_category\": \"string\",\n        \"root_cause_id\": \"string\",\n        \"confidence\": \"decimal\",\n        \"finding_count\": \"integer\",\n        \"money_at_risk\": \"decimal\",\n        \"hypothesis_evidence_score\": \"decimal\"\n      }\n    }\n  }\n}\n", "lang": "json"}, "classes": "contract"}, {"data": {"id": "findings_contract.v1", "label": "Findings", "fullName": "findings_contract.v1", "layer": "contract", "layerLabel": "Contracts", "color": "#d4a06b", "shape": "rectangle", "layerShape": "rectangle", "kindShape": "rectangle", "kind": "json_schema", "path": "contracts/findings_contract.v1.json", "layerOrder": -1, "source": "{\n  \"version\": \"findings.v1\",\n  \"description\": \"Probe findings contract. Describes the standard findings output schema so assessment probes can reference finding fields.\",\n  \"entities\": {\n    \"ProbeFinding\": {\n      \"dbt_model\": \"probe_findings__*\",\n      \"primary_key\": \"finding_id\",\n      \"fields\": {\n        \"finding_id\": \"string\",\n        \"tenant_id\": \"string\" pose: data quality probes \u2014 where is data broken?\",\n  \"entities\": {\n    \"SilverCase\": {\n      \"dbt_model\": \"silver_cases\",\n      \"primary_key\": \"case_key\",\n      \"fields\": {\n        \"case_key\": \"string\",\n        \"case_token\": \"string\",\n        \"start_time\": \"datetime\",\n        \"end_time\": \"datetime\",\n        \"cost_center_id\": \"string\",\n        \"case_type\": \"string\",\n        \"drg_code\": \"string\",\n        \"drg_description\": \"string\",\n        \"is_valid\": \"boolean\",\n        \"invalid_reason\": \"string\"\n      }\n    },\n    \"SilverProcedure\": {\n      \"dbt_model\": \"silver_procedures\",\n      \"primary_key\": \"procedure_key\",\n      \"fields\": {\n        \"procedure_key\": \"string\",\n        \"procedure_id\": \"string\",\n        \"procedure_type\": \"string\",\n        \"case_token\": \"string\",\n        \"procedure_timestamp\": \"datetime\",\n        \"duration_minutes\": \"integer\",\n        \"is_valid\": \"boolean\",\n        \"invalid_reason\": \"string\"\n      }\n    },\n    \"SilverMaterial\": {\n      \"dbt_model\": \"silver_materials\",\n      \"primary_key\": \"material_key\",\n      \"fields\": {\n        \"material_key\": \"string\",\n        \"material_id\": \"string\",\n        \"material_group\": \"string\",\n        \"standard_price\": \"decimal\",\n        \"material_description\": \"string\",\n        \"unit_of_measure\": \"string\",\n        \"article_group_code\": \"string\",\n        \"atc_code\": \"string\",\n        \"is_billable\": \"boolean\",\n        \"is_active\": \"boolean\",\n        \"purchase_price\": \"decimal\",\n        \"internal_sales_price\": \"decimal\",\n        \"null_price_allowed\": \"boolean\",\n        \"is_generic\": \"boolean\",\n        \"is_controlled_substance\": \"boolean\",\n        \"migel_code\": \"string\",\n        \"valid_from\": \"string\",\n        \"valid_until\": \"string\",\n        \"barcode\": \"string\",\n        \"shelf_life_months\": \"integer\",\n        \"unit_medium_code\": \"string\",\n        \"unit_large_code\": \"string\",\n        \"conversion_factor_medium\": \"decimal\",\n        \"conversion_factor_large\": \"decimal\",\n        \"veska_account\": \"string\",\n        \"is_valid\": \"boolean\",\n        \"invalid_reason\": \"string\"\n      }\n    },\n    \"SilverCostCenter\": {\n      \"dbt_model\": \"silver_cost_centers\",\n      \"primary_key\": \"cost_center_key\",\n      \"fields\": {\n        \"cost_center_key\": \"string\",\n        \"cost_center_id\": \"string\",\n        \"name\": \"string\",\n        \"cost_center_type\": \"string\",\n        \"is_valid\": \"boolean\",\n        \"invalid_reason\": \"string\"\n      }\n    },\n    \"SilverCaseMaterialUsage\": {\n      \"dbt_model\": \"silver_case_material_usage\",\n      \"primary_key\": \"usage_key\",\n      \"fields\": {\n        \"usage_key\": \"string\",\n        \"usage_id\": \"string\",\n        \"case_token\": \"string\",\n        \"material_id\": \"string\",\n        \"quantity\": \"decimal\",\n        \"usage_timestamp\": \"datetime\",\n        \"procedure_id\": \"string\",\n        \"unit_price\": \"decimal\",\n        \"is_valid\": \"boolean\",\n        \"invalid_reason\": \"string\"\n      }\n    },\n    \"SilverMaterialMovement\": {\n      \"dbt_model\": \"silver_material_movements\",\n      \"primary_key\": \"movement_key\",\n      \"fields\": {\n        \"movement_key\": \"string\",\n        \"movement_id\": \"string\",\n        \"material_id\": \"string\",\n        \"quantity\": \"decimal\",\n        \"from_location\": \"string\",\n        \"to_location\": \"string\",\n        \"cost_center_id\": \"string\",\n        \"movement_timestamp\": \"datetime\",\n        \"movement_type\": \"string\",\n        \"is_valid\": \"boolean\",\n        \"invalid_reason\": \"string\"\n      }\n    },\n    \"SilverBillingEvent\": {\n      \"dbt_model\": \"silver_billing_events\",\n      \"primary_key\": \"billing_key\",\n      \"fields\": {\n        \"billing_key\": \"string\",\n        \"billing_id\": \"string\",\n        \"case_token\": \"string\",\n        \"material_id\": \"string\",\n        \"quantity\": \"decimal\",\n        \"billed_amount\": \"decimal\",\n        \"cost_center_id\": \"string\",\n        \"billing_timestamp\": \"datetime\",\n        \"billing_status\": \"string\",\n        \"invoice_number\": \"string\",\n        \"cc_producteur_id\": \"string\",\n        \"site_demandeur\": \"string\",\n        \"site_producteur\": \"string\",\n        \"is_valid\": \"boolean\",\n        \"invalid_reason\": \"string\"\n      }\n    }\n  }\n}\n", "lang": "json"}, "classes": "contract"}, {"data": {"id": "probecompile", "label": "probe", "fullName": "probecompile", "layer": "compiler", "layerLabel": "Compilers", "color": "#d47e7e", "shape": "triangle", "layerShape": "triangle", "kindShape": "triangle", "kind": "python_script", "path": "scripts/probecompile.py", "layerOrder": -1, "source": "#!/usr/bin/env python3\n\"\"\"probecompile.py - Compile probe YAML definitions into dbt SQL models.\n\nUsage:\n    python3 scripts/probecompile.py              # compile all probes\n    python3 scripts/probecompile.py --check      # dry-run, report what would change\n\nReads:  probes/*.yaml, contracts/{gold,silver}_contract.v1.json\nWrites: dbt/numetrix/models/probes/probe_findings__*.sql\n        dbt/numetrix/models/probes/probe_findings__*.yml  (one per probe)\n\"\"\"\n\nimport json\nimport sys\nfrom pathlib import Path\n\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent\nCONTRACTS_DIR = REPO_ROOT / \"contracts\"\nPROBES_DIR = REPO_ROOT / \"probes\"\nOUTPUT_DIR = REPO_ROOT / \"dbt\" / \"numetrix\" / \"models\" / \"probes\"\n\n# Import validation from probecheck\nsys.path.insert(0, str(REPO_ROOT / \"scripts\"))\nfrom probecheck import validate_probe\n\n\n# ---------------------------------------------------------------------------\n# Contract loading\n# ---------------------------------------------------------------------------\n\n_contracts_cache: dict[str, dict] = {}\n\n\ndef load_contract(version: str) -> dict:\n    \"\"\"Load and cache a contract by version string (e.g. 'gold.v1').\"\"\"\n    if version not in _contracts_cache:\n        prefix = version.split(\".\")[0]  # 'gold' or 'silver'\n        path = CONTRACTS_DIR / f\"{prefix}_contract.v1.json\"\n        with open(path) as f:\n            _contracts_cache[version] = json.load(f)\n    return _contracts_cache[version]\n\n\ndef resolve_ref(contract: dict, entity_name: str) -> str:\n    \"\"\"Resolve entity name to dbt ref.\"\"\"\n    entity = contract[\"entities\"][entity_name]\n    return \"{{ ref('\" + entity[\"dbt_model\"] + \"') }}\"\n\n\n# ---------------------------------------------------------------------------\n# SQL helpers\n# ---------------------------------------------------------------------------\n\ndef time_bucket_sql(field: str, bucket: str) -> str:\n    \"\"\"Generate SQL for time bucketing.\"\"\"\n    if bucket == \"month\":\n        return f\"strftime(cast({field} as date), '%Y-%m')\"\n    elif bucket == \"week\":\n        return (f\"cast(extract(isoyear from cast({field} as date)) as varchar) \"\n                f\"|| '-W' || lpad(cast(extract(week from cast({field} as date)) as varchar), 2, '0')\")\n    elif bucket == \"quarter\":\n        return (f\"cast(extract(year from cast({field} as date)) as varchar) || '-Q' || \"\n                f\"cast(extract(quarter from cast({field} as date)) as varchar)\")\n    elif bucket == \"raw\":\n        return f\"cast({field} as varchar)\"\n    raise ValueError(f\"Unknown bucket type: {bucket}\")\n\n\ndef where_to_sql(where_dict: dict) -> str:\n    \"\"\"Convert a where dict to SQL WHERE fragments.\"\"\"\n    clauses = []\n    for field, value in where_dict.items():\n        if isinstance(value, dict) and \"in\" in value:\n            values = \", \".join(f\"'{v}'\" for v in value[\"in\"])\n            clauses.append(f\"{field} in ({values})\")\n        elif isinstance(value, bool):\n            clauses.append(f\"{field} = {str(value).lower()}\")\n        elif isinstance(value, str):\n            clauses.append(f\"{field} = '{value}'\")\n        elif isinstance(value, (int, float)):\n            clauses.append(f\"{field} = {value}\")\n    return \" and \".join(clauses)\n\n\ndef severity_case_sql(severity_rules: list, metric_col: str) -> str:\n    \"\"\"Generate CASE expression for dynamic severity from severity_rules.\"\"\"\n    parts = []\n    for rule in severity_rules:\n        if \"above\" in rule:\n            parts.append(f\"when {metric_col} > {rule['above']} then '{rule['level']}'\")\n        elif \"below\" in rule:\n            parts.append(f\"when {metric_col} < {rule['below']} then '{rule['level']}'\")\n        elif \"default\" in rule:\n            parts.append(f\"else '{rule['default']}'\")\n    return \"case\\n            \" + \"\\n            \".join(parts) + \"\\n        end\"\n\n\ndef findings_select(pid, version, scope, entity_id_expr, time_bucket_expr,\n                    severity_expr, money_at_risk_expr, evidence_expr,\n                    qty_at_risk_expr=\"null\"):\n    \"\"\"Generate the standard findings SELECT block.\"\"\"\n    return (\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast({entity_id_expr} as varchar) || '|' || coalesce({time_bucket_expr}, '')\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{version}' as probe_version,\\n\"\n        f\"    {severity_expr} as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast({entity_id_expr} as varchar) as entity_id,\\n\"\n        f\"    coalesce({time_bucket_expr}, 'unknown') as time_bucket,\\n\"\n        f\"    {money_at_risk_expr} as money_at_risk,\\n\"\n        f\"    {qty_at_risk_expr} as qty_at_risk,\\n\"\n        f\"    null as health_score,\\n\"\n        f\"    {evidence_expr} as evidence\\n\"\n    )\n\n\ndef probe_header(pid, probe_type, description):\n    \"\"\"Generate the probe SQL header.\"\"\"\n    tags = ['probe', 'assessment'] if probe_type == 'assessment' else ['probe']\n    return (\n        f\"-- Probe: {pid} ({probe_type})\\n\"\n        f\"-- {description.strip()}\\n\"\n        f\"{{{{ config(materialized='table', tags={tags}) }}}}\\n\"\n    )\n\n\n# ---------------------------------------------------------------------------\n# Compilers \u2014 one per probe type\n# ---------------------------------------------------------------------------\n\ndef compile_balance(probe, contract):\n    \"\"\"Compile a balance-type probe to SQL.\"\"\"\n    pid = probe[\"probe_id\"]\n    left = probe[\"left\"]\n    right = probe[\"right\"]\n    scope = probe[\"scope\"]\n    join_key = probe[\"join_key\"]\n    tol = probe[\"tolerance_pct\"]\n\n    left_ref = resolve_ref(contract, left[\"entity\"])\n    right_ref = resolve_ref(contract, right[\"entity\"])\n\n    time_entity = scope[\"time\"][\"entity\"]\n    time_field = scope[\"time\"][\"field\"]\n    time_ref = resolve_ref(contract, time_entity)\n    bucket_expr = time_bucket_sql(time_field, scope[\"time\"][\"bucket\"])\n\n    left_where_clause = \"\"\n    if left.get(\"where\"):\n        left_where_clause = f\"\\n    where {where_to_sql(left['where'])}\"\n\n    left_cte = (\n        f\"left_agg as (\\n\"\n        f\"    select\\n\"\n        f\"        {join_key},\\n\"\n        f\"        {left['aggregate']}({left['expression']}) as left_value\\n\"\n        f\"    from {left_ref}{left_where_clause}\\n\"\n        f\"    group by {join_key}\\n\"\n        f\")\"\n    )\n\n    xfilter = right.get(\"cross_entity_filter\")\n    right_where = \"\"\n    if right.get(\"where\"):\n        right_where = where_to_sql(right[\"where\"])\n\n    if xfilter:\n        against_ref = resolve_ref(contract, xfilter[\"against_entity\"])\n        right_where_clause = f\"\\n    where r.{right_where}\" if right_where else \"\"\n        right_cte = (\n            f\"right_agg as (\\n\"\n            f\"    select\\n\"\n            f\"        r.{join_key},\\n\"\n            f\"        {right['aggregate']}(r.{right['expression']}) as right_value\\n\"\n            f\"    from {right_ref} r\\n\"\n            f\"    inner join {against_ref} a\\n\"\n            f\"        on r.{xfilter['via']} = a.{xfilter['via']}\\n\"\n            f\"        and r.{xfilter['match_field']} = a.{xfilter['against_field']}{right_where_clause}\\n\"\n            f\"    group by r.{join_key}\\n\"\n            f\")\"\n        )\n    else:\n        right_where_clause = f\"\\n    where {right_where}\" if right_where else \"\"\n        right_cte = (\n            f\"right_agg as (\\n\"\n            f\"    select\\n\"\n            f\"        {join_key},\\n\"\n            f\"        {right['aggregate']}({right['expression']}) as right_value\\n\"\n            f\"    from {right_ref}{right_where_clause}\\n\"\n            f\"    group by {join_key}\\n\"\n            f\")\"\n        )\n\n    time_cte = (\n        f\"time_buckets as (\\n\"\n        f\"    select\\n\"\n        f\"        {join_key},\\n\"\n        f\"        min({bucket_expr}) as time_bucket\\n\"\n        f\"    from {time_ref}\\n\"\n        f\"    group by {join_key}\\n\"\n        f\")\"\n    )\n\n    sev_case = severity_case_sql(probe[\"severity_rules\"], \"abs(pct_diff)\")\n    mar = probe[\"money_at_risk\"]\n\n    sql = (\n        f\"{probe_header(pid, 'balance', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"{left_cte},\\n\\n\"\n        f\"{right_cte},\\n\\n\"\n        f\"{time_cte},\\n\\n\"\n        f\"compared as (\\n\"\n        f\"    select\\n\"\n        f\"        l.{join_key},\\n\"\n        f\"        t.time_bucket,\\n\"\n        f\"        l.left_value,\\n\"\n        f\"        coalesce(r.right_value, 0) as right_value,\\n\"\n        f\"        case\\n\"\n        f\"            when l.left_value = 0 then 0\\n\"\n        f\"            else 100.0 * (l.left_value - coalesce(r.right_value, 0)) / l.left_value\\n\"\n        f\"        end as pct_diff\\n\"\n        f\"    from left_agg l\\n\"\n        f\"    left join right_agg r on l.{join_key} = r.{join_key}\\n\"\n        f\"    left join time_buckets t on l.{join_key} = t.{join_key}\\n\"\n        f\"    where abs(\\n\"\n        f\"        case\\n\"\n        f\"            when l.left_value = 0 then 0\\n\"\n        f\"            else 100.0 * (l.left_value - coalesce(r.right_value, 0)) / l.left_value\\n\"\n        f\"        end\\n\"\n        f\"    ) > {tol}\\n\"\n        f\")\\n\\n\"\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast({join_key} as varchar) || '|' || coalesce(time_bucket, '')\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{probe['version']}' as probe_version,\\n\"\n        f\"    {sev_case} as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast({join_key} as varchar) as entity_id,\\n\"\n        f\"    coalesce(time_bucket, 'unknown') as time_bucket,\\n\"\n        f\"    greatest({mar}, 0) as money_at_risk,\\n\"\n        f\"    null as qty_at_risk,\\n\"\n        f\"    '{{\\\"probe\\\": \\\"{pid}\\\", \\\"left\\\": \\\"' || cast(round(left_value, 2) as varchar)\\n\"\n        f\"        || '\\\", \\\"right\\\": \\\"' || cast(round(right_value, 2) as varchar)\\n\"\n        f\"        || '\\\", \\\"pct_diff\\\": \\\"' || cast(round(pct_diff, 2) as varchar) || '\\\"}}' as evidence\\n\"\n        f\"from compared\\n\"\n    )\n    return sql\n\n\ndef compile_mandatory_item(probe, contract):\n    \"\"\"Compile a mandatory_item probe to SQL.\"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    qualifying = probe[\"qualifying\"]\n    required = probe[\"required\"]\n    mar_fixed = probe[\"money_at_risk_fixed\"]\n\n    qual_ref = resolve_ref(contract, qualifying[\"entity\"])\n    req_ref = resolve_ref(contract, required[\"entity\"])\n\n    time_entity = scope[\"time\"][\"entity\"]\n    time_field = scope[\"time\"][\"field\"]\n    time_ref = resolve_ref(contract, time_entity)\n    bucket_expr = time_bucket_sql(time_field, scope[\"time\"][\"bucket\"])\n    qual_join_key = qualifying[\"join_key\"]\n\n    qual_where_dict = qualifying.get(\"where\")\n    if qual_where_dict:\n        qual_where = where_to_sql(qual_where_dict)\n        qual_cte = (\n            f\"qualifying_cases as (\\n\"\n            f\"    select distinct {qual_join_key}\\n\"\n            f\"    from {qual_ref}\\n\"\n            f\"    where {qual_where}\\n\"\n            f\")\"\n        )\n    else:\n        qual_cte = (\n            f\"qualifying_cases as (\\n\"\n            f\"    select distinct {qual_join_key}\\n\"\n            f\"    from {qual_ref}\\n\"\n            f\")\"\n        )\n\n    lookup = required.get(\"lookup\")\n    if lookup:\n        lookup_ref = resolve_ref(contract, lookup[\"entity\"])\n        lookup_where = where_to_sql(lookup[\"where\"])\n        req_cte = (\n            f\"required_items as (\\n\"\n            f\"    select\\n\"\n            f\"        u.{required['join_key']},\\n\"\n            f\"        count(*) as item_count\\n\"\n            f\"    from {req_ref} u\\n\"\n            f\"    inner join {lookup_ref} m\\n\"\n            f\"        on u.{lookup['join_key']} = m.{lookup['join_key']}\\n\"\n            f\"    where {lookup_where}\\n\"\n            f\"    group by u.{required['join_key']}\\n\"\n            f\")\"\n        )\n    else:\n        req_cte = (\n            f\"required_items as (\\n\"\n            f\"    select\\n\"\n            f\"        {required['join_key']},\\n\"\n            f\"        count(*) as item_count\\n\"\n            f\"    from {req_ref}\\n\"\n            f\"    group by {required['join_key']}\\n\"\n            f\")\"\n        )\n\n    time_cte = (\n        f\"time_buckets as (\\n\"\n        f\"    select\\n\"\n        f\"        {qual_join_key},\\n\"\n        f\"        min({bucket_expr}) as time_bucket\\n\"\n        f\"    from {time_ref}\\n\"\n        f\"    group by {qual_join_key}\\n\"\n        f\")\"\n    )\n\n    min_count = required[\"min_count\"]\n\n    sql = (\n        f\"{probe_header(pid, 'mandatory_item', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"{qual_cte},\\n\\n\"\n        f\"{req_cte},\\n\\n\"\n        f\"{time_cte},\\n\\n\"\n        f\"missing as (\\n\"\n        f\"    select\\n\"\n        f\"        q.{qual_join_key},\\n\"\n        f\"        t.time_bucket,\\n\"\n        f\"        coalesce(r.item_count, 0) as item_count\\n\"\n        f\"    from qualifying_cases q\\n\"\n        f\"    left join required_items r on q.{qual_join_key} = r.{required['join_key']}\\n\"\n        f\"    left join time_buckets t on q.{qual_join_key} = t.{qual_join_key}\\n\"\n        f\"    where coalesce(r.item_count, 0) < {min_count}\\n\"\n        f\")\\n\\n\"\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast({qual_join_key} as varchar) || '|' || coalesce(time_bucket, '')\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{probe['version']}' as probe_version,\\n\"\n        f\"    '{probe['severity']}' as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast({qual_join_key} as varchar) as entity_id,\\n\"\n        f\"    coalesce(time_bucket, 'unknown') as time_bucket,\\n\"\n        f\"    {mar_fixed} as money_at_risk,\\n\"\n        f\"    null as qty_at_risk,\\n\"\n        f\"    '{{\\\"probe\\\": \\\"{pid}\\\", \\\"item_count\\\": \\\"' || cast(item_count as varchar) || '\\\"}}' as evidence\\n\"\n        f\"from missing\\n\"\n    )\n    return sql\n\n\ndef compile_distribution_outlier(probe, contract):\n    \"\"\"Compile a distribution_outlier probe to SQL.\"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    metric = probe[\"metric\"]\n    threshold = probe[\"threshold_stddev\"]\n    min_sample = probe[\"min_sample_size\"]\n\n    m_ref = resolve_ref(contract, metric[\"entity\"])\n    group_by = \", \".join(metric[\"group_by\"])\n\n    time_entity = scope[\"time\"][\"entity\"]\n    time_field = scope[\"time\"][\"field\"]\n    time_ref = resolve_ref(contract, time_entity)\n    bucket_expr = time_bucket_sql(time_field, scope[\"time\"][\"bucket\"])\n    join_key = scope[\"group_by\"][0]\n\n    sql = (\n        f\"{probe_header(pid, 'distribution_outlier', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"metric_values as (\\n\"\n        f\"    select\\n\"\n        f\"        {group_by},\\n\"\n        f\"        {metric['aggregate']}({metric['expression']}) as metric_value\\n\"\n        f\"    from {m_ref}\\n\"\n        f\"    group by {group_by}\\n\"\n        f\"),\\n\\n\"\n        f\"stats as (\\n\"\n        f\"    select\\n\"\n        f\"        avg(metric_value) as mean_val,\\n\"\n        f\"        stddev_pop(metric_value) as stddev_val,\\n\"\n        f\"        count(*) as sample_size\\n\"\n        f\"    from metric_values\\n\"\n        f\"),\\n\\n\"\n        f\"time_buckets as (\\n\"\n        f\"    select\\n\"\n        f\"        {join_key},\\n\"\n        f\"        min({bucket_expr}) as time_bucket\\n\"\n        f\"    from {time_ref}\\n\"\n        f\"    group by {join_key}\\n\"\n        f\"),\\n\\n\"\n        f\"outliers as (\\n\"\n        f\"    select\\n\"\n        f\"        m.{join_key},\\n\"\n        f\"        t.time_bucket,\\n\"\n        f\"        m.metric_value,\\n\"\n        f\"        s.mean_val,\\n\"\n        f\"        s.stddev_val,\\n\"\n        f\"        case when s.stddev_val > 0\\n\"\n        f\"            then (m.metric_value - s.mean_val) / s.stddev_val\\n\"\n        f\"            else 0\\n\"\n        f\"        end as z_score\\n\"\n        f\"    from metric_values m\\n\"\n        f\"    cross join stats s\\n\"\n        f\"    left join time_buckets t on m.{join_key} = t.{join_key}\\n\"\n        f\"    where s.sample_size >= {min_sample}\\n\"\n        f\"      and s.stddev_val > 0\\n\"\n        f\"      and abs(\\n\"\n        f\"          (m.metric_value - s.mean_val) / s.stddev_val\\n\"\n        f\"      ) > {threshold}\\n\"\n        f\")\\n\\n\"\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast({join_key} as varchar) || '|' || coalesce(time_bucket, '')\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{probe['version']}' as probe_version,\\n\"\n        f\"    case\\n\"\n        f\"        when abs(z_score) > {threshold * 2} then 'high'\\n\"\n        f\"        when abs(z_score) > {threshold} then 'medium'\\n\"\n        f\"        else 'low'\\n\"\n        f\"    end as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast({join_key} as varchar) as entity_id,\\n\"\n        f\"    coalesce(time_bucket, 'unknown') as time_bucket,\\n\"\n        f\"    greatest(metric_value - mean_val, 0) as money_at_risk,\\n\"\n        f\"    null as qty_at_risk,\\n\"\n        f\"    '{{\\\"probe\\\": \\\"{pid}\\\", \\\"metric_value\\\": \\\"' || cast(round(metric_value, 2) as varchar)\\n\"\n        f\"        || '\\\", \\\"z_score\\\": \\\"' || cast(round(z_score, 2) as varchar)\\n\"\n        f\"        || '\\\", \\\"mean\\\": \\\"' || cast(round(mean_val, 2) as varchar)\\n\"\n        f\"        || '\\\", \\\"stddev\\\": \\\"' || cast(round(stddev_val, 2) as varchar) || '\\\"}}' as evidence\\n\"\n        f\"from outliers\\n\"\n    )\n    return sql\n\n\ndef compile_duplicate(probe, contract):\n    \"\"\"Compile a duplicate-type probe to SQL.\"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    source = probe[\"source\"]\n\n    src_ref = resolve_ref(contract, source[\"entity\"])\n    dup_fields = source[\"duplicate_fields\"]\n    dup_fields_str = \", \".join(dup_fields)\n    id_field = source[\"id_field\"]\n    value_field = source[\"value_field\"]\n\n    time_field = scope[\"time\"][\"field\"]\n    bucket_expr = time_bucket_sql(time_field, scope[\"time\"][\"bucket\"])\n\n    sev_case = severity_case_sql(probe[\"severity_rules\"], \"excess_value\")\n\n    enrichment = probe.get(\"enrichment\")\n    enrich_join = \"\"\n    enrich_fields = \"\"\n    enrich_evidence = \"\"\n    if enrichment:\n        enrich_ref = resolve_ref(contract, enrichment[\"entity\"])\n        jk = enrichment[\"join_key\"]\n        enrich_join = f\"\\n    left join {enrich_ref} enr on dg.{jk} = enr.{jk}\"\n        for f in enrichment.get(\"fields\", []):\n            enrich_fields += f\",\\n        enr.{f}\"\n            enrich_evidence += (\n                f\"\\n        || '\\\", \\\"{f}\\\": \\\"' || coalesce(cast({f} as varchar), '')\"\n            )\n\n    evidence_parts = []\n    for f in dup_fields:\n        evidence_parts.append(\n            f\"'\\\", \\\"{f}\\\": \\\"' || coalesce(cast({f} as varchar), '')\"\n        )\n    evidence_str = (\n        f\"'{{\\\"probe\\\": \\\"{pid}\\\", \\\"duplicate_count\\\": \\\"' || cast(duplicate_count as varchar)\"\n        f\"\\n        || '\\\", \\\"excess_value\\\": \\\"' || cast(round(excess_value, 2) as varchar)\"\n    )\n    for part in evidence_parts:\n        evidence_str += f\"\\n        || {part}\"\n    evidence_str += enrich_evidence\n    evidence_str += \" || '\\\"}'\"\"\"\n\n    where_clause = \"\"\n    if source.get(\"where\"):\n        where_clause = f\"\\n    where {source['where'].strip()}\"\n\n    # If value_field is not in duplicate_fields, carry it through via min()\n    extra_agg = \"\"\n    if value_field not in dup_fields:\n        extra_agg = f\",\\n        min({value_field}) as {value_field}\"\n\n    sql = (\n        f\"{probe_header(pid, 'duplicate', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"duplicate_groups as (\\n\"\n        f\"    select\\n\"\n        f\"        {dup_fields_str},\\n\"\n        f\"        count(*) as duplicate_count,\\n\"\n        f\"        min({id_field}) as first_id{extra_agg}\\n\"\n        f\"    from {src_ref}{where_clause}\\n\"\n        f\"    group by {dup_fields_str}\\n\"\n        f\"    having count(*) > 1\\n\"\n        f\"),\\n\\n\"\n        f\"enriched as (\\n\"\n        f\"    select\\n\"\n        f\"        dg.*,\\n\"\n        f\"        {bucket_expr.replace(time_field, 'dg.' + time_field)} as time_bucket,\\n\"\n        f\"        dg.{value_field} * (dg.duplicate_count - 1) as excess_value{enrich_fields}\\n\"\n        f\"    from duplicate_groups dg{enrich_join}\\n\"\n        f\")\\n\\n\"\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast(first_id as varchar) || '|' || coalesce(time_bucket, '')\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{probe['version']}' as probe_version,\\n\"\n        f\"    {sev_case} as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast(first_id as varchar) as entity_id,\\n\"\n        f\"    coalesce(time_bucket, 'unknown') as time_bucket,\\n\"\n        f\"    greatest(excess_value, 0) as money_at_risk,\\n\"\n        f\"    duplicate_count - 1 as qty_at_risk,\\n\"\n        f\"    {evidence_str} as evidence\\n\"\n        f\"from enriched\\n\"\n    )\n    return sql\n\n\ndef compile_ratio(probe, contract):\n    \"\"\"Compile a ratio-type probe to SQL.\n\n    Aggregates numerator and denominator from a single source entity,\n    computes ratio, flags deviations from expected_ratio.\n    \"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    source = probe[\"source\"]\n    tol = probe[\"tolerance_ratio\"]\n    expected = probe[\"expected_ratio\"]\n\n    src_ref = resolve_ref(contract, source[\"entity\"])\n    join_key = scope[\"group_by\"][0]\n    group_by_str = \", \".join(source[\"group_by\"])\n    time_col = scope[\"time\"][\"field\"]\n\n    num = source[\"numerator\"]\n    den = source[\"denominator\"]\n\n    where_clause = \"\"\n    if source.get(\"where\"):\n        where_clause = f\"\\n    where {where_to_sql(source['where'])}\"\n\n    sev_case = severity_case_sql(probe[\"severity_rules\"], \"deviation\")\n\n    sql = (\n        f\"{probe_header(pid, 'ratio', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"material_agg as (\\n\"\n        f\"    select\\n\"\n        f\"        {group_by_str},\\n\"\n        f\"        min({time_col}) as first_period,\\n\"\n        f\"        max({time_col}) as last_period,\\n\"\n        f\"        count(*) as periods_observed,\\n\"\n        f\"        {num['aggregate']}({num['expression']}) as sum_numerator,\\n\"\n        f\"        {den['aggregate']}({den['expression']}) as sum_denominator\\n\"\n        f\"    from {src_ref}{where_clause}\\n\"\n        f\"    group by {group_by_str}\\n\"\n        f\"),\\n\\n\"\n        f\"flagged as (\\n\"\n        f\"    select\\n\"\n        f\"        *,\\n\"\n        f\"        case\\n\"\n        f\"            when sum_numerator = 0 then null\\n\"\n        f\"            else round(cast(sum_denominator as double) / sum_numerator, 4)\\n\"\n        f\"        end as ratio_value,\\n\"\n        f\"        sum_denominator - sum_numerator as qty_delta,\\n\"\n        f\"        abs({expected} - cast(sum_denominator as double) / sum_numerator) as deviation\\n\"\n        f\"    from material_agg\\n\"\n        f\"    where sum_numerator > 0\\n\"\n        f\"      and abs({expected} - cast(sum_denominator as double) / sum_numerator) > {tol}\\n\"\n        f\")\\n\\n\"\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast({join_key} as varchar) || '|' || first_period || '-' || last_period\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{probe['version']}' as probe_version,\\n\"\n        f\"    {sev_case} as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast({join_key} as varchar) as entity_id,\\n\"\n        f\"    first_period || '-' || last_period as time_bucket,\\n\"\n        f\"    round(abs(qty_delta) * standard_price, 2) as money_at_risk,\\n\"\n        f\"    abs(qty_delta) as qty_at_risk,\\n\"\n        f\"    '{{\\\"probe\\\": \\\"{pid}\\\", \\\"transfer_qty\\\": \\\"' || cast(sum_numerator as varchar)\\n\"\n        f\"        || '\\\", \\\"usage_qty\\\": \\\"' || cast(sum_denominator as varchar)\\n\"\n        f\"        || '\\\", \\\"io_coefficient\\\": \\\"' || cast(round(ratio_value, 4) as varchar)\\n\"\n        f\"        || '\\\", \\\"{time_col}s_observed\\\": \\\"' || cast(periods_observed as varchar) || '\\\"}}' as evidence\\n\"\n        f\"from flagged\\n\"\n    )\n    return sql\n\n\ndef compile_trend(probe, contract):\n    \"\"\"Compile a trend-type probe to SQL.\n\n    Uses window functions on a time-series source to detect drift in a\n    rolling metric, flags worsening trends.\n    \"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    source = probe[\"source\"]\n    drift_threshold = probe[\"drift_threshold\"]\n\n    src_ref = resolve_ref(contract, source[\"entity\"])\n    join_key = scope[\"group_by\"][0]\n    group_by_str = \", \".join(source[\"group_by\"])\n    time_col = scope[\"time\"][\"field\"]\n    trend_field = source[\"trend_field\"]\n    direction_field = source[\"direction_field\"]\n    direction_value = source[\"direction_value\"]\n    min_periods = source[\"min_periods\"]\n    min_periods_field = source[\"min_periods_field\"]\n    qty_delta_field = source[\"qty_delta_field\"]\n\n    where_clause = \"\"\n    if source.get(\"where\"):\n        where_clause = f\"\\n    where {where_to_sql(source['where'])}\"\n\n    trend_where = f\"    where {trend_field} is not null\"\n    if source.get(\"where\"):\n        trend_where += f\" and {where_to_sql(source['where'])}\"\n\n    sev_case = severity_case_sql(probe[\"severity_rules\"], \"drift\")\n\n    sql = (\n        f\"{probe_header(pid, 'trend', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"material_trend as (\\n\"\n        f\"    select\\n\"\n        f\"        {group_by_str},\\n\"\n        f\"        min({time_col}) as first_period,\\n\"\n        f\"        max({time_col}) as last_period,\\n\"\n        f\"        sum(abs({qty_delta_field})) as total_abs_qty_delta\\n\"\n        f\"    from {src_ref}{where_clause}\\n\"\n        f\"    group by {group_by_str}\\n\"\n        f\"),\\n\\n\"\n        f\"earliest_latest as (\\n\"\n        f\"    select\\n\"\n        f\"        {join_key},\\n\"\n        f\"        first_value({trend_field}) over (\\n\"\n        f\"            partition by {join_key} order by {time_col}\\n\"\n        f\"        ) as earliest_rolling_avg,\\n\"\n        f\"        last_value({trend_field}) over (\\n\"\n        f\"            partition by {join_key} order by {time_col}\\n\"\n        f\"            rows between unbounded preceding and unbounded following\\n\"\n        f\"        ) as latest_rolling_avg\\n\"\n        f\"    from {src_ref}\\n\"\n        f\"{trend_where}\\n\"\n        f\"),\\n\\n\"\n        f\"earliest_latest_dedup as (\\n\"\n        f\"    select distinct\\n\"\n        f\"        {join_key},\\n\"\n        f\"        earliest_rolling_avg,\\n\"\n        f\"        latest_rolling_avg,\\n\"\n        f\"        abs(latest_rolling_avg - earliest_rolling_avg) as drift\\n\"\n        f\"    from earliest_latest\\n\"\n        f\"),\\n\\n\"\n        f\"flagged as (\\n\"\n        f\"    select\\n\"\n        f\"        mt.*,\\n\"\n        f\"        el.earliest_rolling_avg,\\n\"\n        f\"        el.latest_rolling_avg,\\n\"\n        f\"        el.drift\\n\"\n        f\"    from material_trend mt\\n\"\n        f\"    inner join earliest_latest_dedup el on mt.{join_key} = el.{join_key}\\n\"\n        f\"    where mt.{direction_field} = '{direction_value}'\\n\"\n        f\"      and mt.{min_periods_field} >= {min_periods}\\n\"\n        f\"      and el.drift > {drift_threshold}\\n\"\n        f\")\\n\\n\"\n        f\"select\\n\"\n        f\"    md5(\\n\"\n        f\"        '{pid}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}' || '|'\\n\"\n        f\"        || cast({join_key} as varchar) || '|' || first_period || '-' || last_period\\n\"\n        f\"    ) as finding_id,\\n\"\n        f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n        f\"    '{pid}' as probe_id,\\n\"\n        f\"    '{probe['version']}' as probe_version,\\n\"\n        f\"    {sev_case} as severity,\\n\"\n        f\"    '{scope['entity_type']}' as entity_type,\\n\"\n        f\"    cast({join_key} as varchar) as entity_id,\\n\"\n        f\"    first_period || '-' || last_period as time_bucket,\\n\"\n        f\"    round(total_abs_qty_delta * standard_price, 2) as money_at_risk,\\n\"\n        f\"    total_abs_qty_delta as qty_at_risk,\\n\"\n        f\"    '{{\\\"probe\\\": \\\"{pid}\\\", \\\"earliest_rolling_avg\\\": \\\"'\\n\"\n        f\"        || cast(round(earliest_rolling_avg, 4) as varchar)\\n\"\n        f\"        || '\\\", \\\"latest_rolling_avg\\\": \\\"'\\n\"\n        f\"        || cast(round(latest_rolling_avg, 4) as varchar)\\n\"\n        f\"        || '\\\", \\\"drift\\\": \\\"' || cast(round(drift, 4) as varchar)\\n\"\n        f\"        || '\\\", \\\"{min_periods_field}\\\": \\\"' || cast({min_periods_field} as varchar)\\n\"\n        f\"        || '\\\", \\\"trend_direction\\\": \\\"' || {direction_field} || '\\\"}}' as evidence\\n\"\n        f\"from flagged\\n\"\n    )\n    return sql\n\n\ndef compile_temporal_sequence(probe, contract):\n    \"\"\"Compile a temporal_sequence probe to SQL.\n\n    Joins two fact tables on composite key, compares their earliest\n    timestamps, flags when expected order is violated.\n    \"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    first = probe[\"first_event\"]\n    second = probe[\"second_event\"]\n\n    first_ref = resolve_ref(contract, first[\"entity\"])\n    second_ref = resolve_ref(contract, second[\"entity\"])\n    join_keys = first[\"join_key\"]\n    join_key_str = \", \".join(join_keys)\n    first_time = first[\"time_field\"]\n    second_time = second[\"time_field\"]\n\n    bucket_expr = time_bucket_sql(first_time, scope[\"time\"][\"bucket\"])\n\n    # Build aggregate columns for first_event\n    first_agg_cols = f\"min({first_time}) as first_{first_time.replace('_timestamp', '')}\"\n    first_agg_cols += f\",\\n        count(*) as {first['aggregates']['count']}\"\n    for sum_field in first[\"aggregates\"].get(\"sum\", []):\n        first_agg_cols += f\",\\n        sum({sum_field}) as total_{sum_field}\"\n\n    # Build aggregate columns for second_event\n    second_agg_cols = f\"min({second_time}) as first_{second_time.replace('_timestamp', '')}\"\n    second_agg_cols += f\",\\n        count(*) as {second['aggregates']['count']}\"\n\n    # Enrichment\n    enrichment = probe.get(\"enrichment\")\n    enrich_join = \"\"\n    enrich_fields = \"\"\n    enrich_evidence = \"\"\n    if enrichment:\n        enrich_ref = resolve_ref(contract, enrichment[\"entity\"])\n        jk = enrichment[\"join_key\"]\n        enrich_join = f\"\\n    left join {enrich_ref} gm on j.{jk} = gm.{jk}\"\n        for f in enrichment.get(\"fields\", []):\n            enrich_fields += f\",\\n        gm.{f}\"\n            enrich_evidence += (\n                f\"\\n        || '\\\", \\\"{f}\\\": \\\"' || coalesce(replace(cast({f} as varchar), '\\\"', ''), '')\"\n            )\n\n    sev_case = severity_case_sql(probe[\"severity_rules\"], \"gap_hours\")\n\n    sql = (\n        f\"{probe_header(pid, 'temporal_sequence', probe['description'])}\\n\"\n        f\"with\\n\\n\"\n        f\"first_events as (\\n\"\n        f\"    select\\n\"\n        f\"        {join_key_str},\\n\"\n        f\"        {first_agg_cols}\\n\"\n        f\"    from {first_ref}\\n\"\n        f\"    group by {join_key_str}\\n\"\n        f\"),\\n\\n\"\n        f\"second_events as (\\n\"\n        f\"    select\\n\"\n        f\"        {join_key_str},\\n\"\n        f\"        {second_agg_cols}\\n\"\n        f\"    from {second_ref}\\n\"\n        f\"    group by {join_key_str}\\n\"\n        f\"),\\n\\n\"\n        f\"joined as (\\n\"\n        f\"    select\\n\"\n        f\"        f.*,\\n\"\n        f\"        s.first_usage,\\n\"\n        f\"        s.{second['aggregates']['count']},\\n\"\n        f\"        extract(epoch from (s.first_usage - f.first_billing)) / 3600.0 as gap_hours\\n\"\n        f\"    from first_events f\\n\"\n        f\"    inner join second_events s\\n\"\n        f\"        on {' and '.join(f'f.{k} = s.{k}' for k in join_keys)}\\n\"\n        f\"    where f.first_billing < s.first_usage\\n\"\n        f\"),\\n\\n\"\n        f\"enriched as (\\n\"\n        f\"    select\\n\"\n        f\"        j.*,\\n\"\n        f\"        {bucket_expr.replace(first_time, 'j.first_billing')} as time_bucket{enrich_fields}\\n\"\n        f\"    from joined ope\"]\n    source = probe[\"source\"]\n\n    src_ref = resolve_ref(contract, source[\"entity\"])\n\n    # Determine which silver_audit pattern to use\n    if \"validity_filter\" in source:\n        return _compile_silver_audit_validity(probe, contract, src_ref)\n    else:\n        return _compile_silver_audit_activity(probe, contract, src_ref)\n\n\ndef _compile_silver_audit_validity(probe, contract, src_ref):\n    \"\"\"Silver audit: filter by is_valid/invalid_reason, group and aggregate.\"\"\"\n    pid = probe[\"probe_id\"]\n    scope = probe[\"scope\"]\n    source = probe[\"source\"]\n\n    vf = source[\"validity_filter\"]\n    where_parts = where_to_sql(vf)\n    group_field = probe[\"group_by_field\"]\n    entity_id_expr = probe[\"entity_id_expression\"].strip()\n\n    agg = probe[\"aggregates\"]\n    sum_fields = agg.get(\"sum\", [])\n    min_fields = agg.get(\"min\", [])\n    max_fields = agg.get(\"max\", [])\n\n    agg_cols = f\"count(*) as {agg['count']}\"\n    for f in sum_fields:\n        agg_cols += f\",\\n        sum(coalesce(cast({f} as decimal(12, 2)), 0)) as total_{f}\"\n    for f in min_fields:\n        agg_cols += f\",\\n        min(cast({f} as timestamp)) as first_seen\"\n    for f in max_fields:\n        agg_cols += f\",\\n        max(cast({f} as timestamp)) as last_seen\"\n\n    # Severity\n    sev_parts = []\n    for rule in probe[\"severity_rules\"]:\n        if \"above_money\" in rule:\n            sev_parts.append(f\"when total_{sum_fields[0]} > {rule['above_money']} then '{rule['level']}'\")\n        elif \"above_count\" in rule:\n            sev_parts.append(f\"when {agg['count']} > {rule['above_count']} then '{rule['level']}'\")\n        elif \"default\" in rule:\n            sev_parts.append(f\"else '{rule['default']}'\")\n    sev_case = \"case\\n            \" + \"\\n            \".join(sev_parts) + \"\\n        end\"\n\n    mar = probe.get(\"money_at_risk\", 0)\n    if mar == 0:\n        mar_expr = \"0\"\n    else:\n        mar_expr = f
