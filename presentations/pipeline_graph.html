3", "fullName": "lineagecheck", "layer": "compiler", "layerLabel": "Compilers", "color": "#d47e7e", "shape": "triangle", "layerShape": "triangle", "kindShape": "triangle", "kind": "python_script", "path": "scripts/lineagecheck.py", "layerOrder": -1, "source": "#!/usr/bin/env python3\n\"\"\"lineagecheck.py - Validate lineage YAML definitions.\n\nChecks structure, required fields, filename-entity_id match,\ntri-lingual keys, and validation rule entries.\n\nUsage:\n    python3 scripts/lineagecheck.py                       # validate all\n    python3 scripts/lineagecheck.py lineage/cases.yaml    # validate one\n\"\"\"\n\nimport sys\nfrom pathlib import Path\n\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent\nLINEAGE_DIR = REPO_ROOT / \"lineage\"\n\nREQUIRED_LANGS = {\"en\", \"de\", \"fr\"}\nVALID_SOURCE_SYSTEMS = {\"opale\", \"sap\", \"navision\"}\n\n\ndef validate_lineage(entity: dict, filename: str) -> list[str]:\n    errors = []\n\n    # Required top-level fields\n    for field in (\"entity_id\", \"version\", \"display_name\", \"description\",\n                  \"source_files\", \"bronze\", \"silver\", \"gold\"):\n        if not entity.get(field):\n            errors.append(f\"Missing required field: '{field}'\")\n\n    # entity_id matches filename\n    eid = entity.get(\"entity_id\", \"\")\n    expected_id = Path(filename).stem\n    if eid != expected_id:\n        errors.append(f\"entity_id '{eid}' does not match filename '{expected_id}'\")\n\n    # display_name has en/de/fr\n    display_name = entity.get(\"display_name\")\n    if isinstance(display_name, dict):\n        missing = REQUIRED_LANGS - set(display_name.keys())\n        if missing:\n            errors.append(f\"display_name: missing languages: {sorted(missing)}\")\n    elif display_name is not None:\n        errors.append(\"display_name: must be a mapping with en/de/fr keys\")\n\n    # top-level description has en/de/fr\n    description = entity.get(\"description\")\n    if isinstance(description, dict):\n        missing = REQUIRED_LANGS - set(description.keys())\n        if missing:\n            errors.append(f\"description: missing languages: {sorted(missing)}\")\n    elif description is not None:\n        errors.append(\"description: must be a mapping with en/de/fr keys\")\n\n    # source_files has at least one valid source system\n    source_files = entity.get(\"source_files\")\n    if isinstance(source_files, dict):\n        for ss in source_files:\n            if ss not in VALID_SOURCE_SYSTEMS:\n                errors.append(f\"source_files: unknown source system '{ss}'. \"\n                              f\"Valid: {sorted(VALID_SOURCE_SYSTEMS)}\")\n    elif source_files is not None:\n        errors.append(\"source_files: must be a mapping (opale/sap/navision \u2192 filename)\")\n\n    # Layer descriptions (bronze, silver, gold)\n    for layer in (\"bronze\", \"silver\", \"gold\"):\n        layer_data = entity.get(layer)\n        if not isinstance(layer_data, dict):\n            continue\n\n        layer_desc = layer_data.get(\"description\")\n        if isinstance(layer_desc, dict):\n            missing = REQUIRED_LANGS - set(layer_desc.keys())\n            if missing:\n                errors.append(f\"{layer}.description: missing languages: {sorted(missing)}\")\n        elif layer_desc is not None:\n            errors.append(f\"{layer}.description: must be a mapping with en/de/fr keys\")\n        else:\n            errors.append(f\"{layer}: missing 'description'\")\n\n    # Silver validations\n    silver = entity.get(\"silver\")\n    if isinstance(silver, dict):\n        validations = silver.get(\"validations\")\n        if validations is None:\n            errors.append(\"silver: missing 'validations' list\")\n        elif not isinstance(validations, list):\n            errors.append(\"silver.validations: must be a list\")\n        elif len(validations) == 0:\n            errors.append(\"silver.validations: must have at least one entry\")\n        else:\n            for i, v in enumerate(validations):\n                ctx = f\"silver.validations[{i}]\"\n                if not isinstance(v, dict):\n                    errors.append(f\"{ctx}: must be a mapping\")\n                    continue\n\n                if not v.get(\"invalid_reason\"):\n                    errors.append(f\"{ctx}: missing 'invalid_reason'\")\n\n                vdesc = v.get(\"description\")\n                if isinstance(vdesc, dict):\n                    missing = REQUIRED_LANGS - set(vdesc.keys())\n                    if missing:\n                        errors.append(f\"{ctx}.description: missing languages: {sorted(missing)}\")\n                elif vdesc is not None:\n                    errors.append(f\"{ctx}.description: must be a mapping with en/de/fr keys\")\n                else:\n                    errors.append(f\"{ctx}: missing 'description'\")\n\n    return errors\n\n\ndef main():\n    if len(sys.argv) > 1:\n        paths = [Path(a) for a in sys.argv[1:]]\n    else:\n        paths = sorted(LINEAGE_DIR.glob(\"*.yaml\"))\n\n    if not paths:\n        print(\"No lineage YAML files found.\")\n        sys.exit(1)\n\n    total_errors = 0\n    for path in paths:\n        with open(path) as f:\n            entity = yaml.safe_load(f)\n        errors = validate_lineage(entity, path.name)\n        if errors:\n            print(f\"FAIL  {path.name}\")\n            for e in errors:\n                print(f\"  - {e}\")\n            total_errors += len(errors)\n        else:\n            print(f\"OK    {path.name}\")\n\n    print()\n    if total_errors:\n        print(f\"{total_errors} error(s) found.\")\n        sys.exit(1)\n    else:\n        print(f\"All {len(paths)} lineage definition(s) valid.\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "lang": "python"}, "classes": "compiler"}, {"data": {"id": "explorer", "label": "Explorer", "fullName": "explorer", "layer": "frontend", "layerLabel": "Frontends", "color": "#6bb8a8   // Select / Deselect All
  document.getElementById('btn-toggle-all').addEventListener('click', () => {
    const allLayers = layerEntries.map(e => e[0]);
    const allHidden = allLayers.every(l => hiddenLayers.has(l));
    if (allHidden) {
      // Select all
      hiddenLayers.clear();
      legendItems.forEach(({ item }) => item.classList.remove('dimmed'));
    } else {
      // Deselect all
      allLayers.forEach(l => hiddenLayers.add(l));
      legendItems.forEach(({ item }) => item.classList.add('dimmed'));
    }
    applyLayerVisibility();
  });

  // ── Search ────────────────────────────────────────────────────────────────

  const searchInput = document.getElementById('search');
  const searchCountEl = document.getElementById('search-count');
  const searchNavEl = document.getElementById('search-nav');
  let searchMatchIndex = 0;
  let searchMatchCount = 0;

  function runSearch() {
    const q = searchInput.value.toLowerCase().trim();
    // Clear lineage highlight + search state
    cy.batch(() => {
      cy.elements().removeClass('dimmed highlighted highlighted-upstream highlighted-downstream search-match search-dimmed search-active');
    });
    selectedNode = null;
    updateDetail();
    if (!q) {
      searchMatchCount = 0;
      searchMatchIndex = 0;
      searchCountEl.style.display = 'none';
      searchNavEl.style.display = 'none';
      return;
    }
    cy.nodes().forEach(n => {
      const name = (n.data('fullName') || '').toLowerCase();
      const label = (n.data('label') || '').toLowerCase();
      if (name.includes(q) || label.includes(q)) n.addClass('search-match');
      else n.addClass('search-dimmed');
    });
    cy.edges().addClass('search-dimmed');
    const matches = cy.nodes('.search-match');
    searchMatchCount = matches.length;
    searchCountEl.style.display = 'inline';
    if (matches.length > 0) {
      searchMatchIndex = 1;
      matches.first().addClass('search-active');
      cy.animate({ center: { eles: matches.first() }, zoom: 1.5, duration: 300 });
      searchNavEl.style.display = 'flex';
    } else {
      searchMatchIndex = 0;
      searchNavEl.style.display = 'none';
    }
    searchCountEl.textContent = searchMatchIndex + '/' + searchMatchCount;
  }

  function navigateSearch(delta) {
    if (searchMatchCount === 0) return;
    const matches = cy.nodes('.search-match');
    matches.removeClass('search-active');
    searchMatchIndex = ((searchMatchIndex - 1 + delta + matches.length) % matches.length) + 1;
    const target = matches[searchMatchIndex - 1];
    cy.$(target).addClass('search-active');
    cy.animate({ center: { eles: cy.$(target) }, zoom: 1.5, duration: 300 });
    searchCountEl.textContent = searchMatchIndex + '/' + searchMatchCount;
  }

  function clearSearch() {
    searchInput.value = '';
    searchMatchCount = 0;
    searchMatchIndex = 0;
    searchCountEl.style.display = 'none';
    searchNavEl.style.display = 'none';
    cy.batch(() => {
      cy.elements().removeClass('search-match search-dimmed search-active');
    });
  }

  searchInput.addEventListener('input', runSearch);

  document.getElementById('btn-search-prev').addEventListener('click', () => navigateSearch(-1));
  document.getElementById('btn-search-next').addEventListener('click', () => navigateSearch(1));
  document.getElementById('btn-search-clear').addEventListener('click', clearSearch);

  // ── Trace mode ────────────────────────────────────────────────────────────

  let traceMode = 'both';

  function setTraceMode(mode) {
    traceMode = mode;
    document.querySelectorAll('#btn-upstream, #btn-downstream, #btn-both').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + mode).classList.add('active');
    const indicator = document.getElementById('mode-indicator');
    indicator.textContent = 'Trace: ' + mode;
    indicator.style.display = 'block';
    setTimeout(() => indicator.style.display = 'none', 1500);
  }

  document.getElementById('btn-upstream').addEventListener('click', () => setTraceMode('upstream'));
  document.getElementById('btn-downstream').addEventListener('click', () => setTraceMode('downstream'));
  document.getElementById('btn-both').addEventListener('click', () => setTraceMode('both'));
  setTraceMode('both');

  // ── Lineage tracing ───────────────────────────────────────────────────────

  function getUpstream(node) {
    const visited = new Set();
    const edgeList = [];
    function walk(n) {
      if (visited.has(n.id())) return;
      visited.add(n.id());
      n.incomers('edge').forEach(e => {
        if (!e.hasClass('layer-hidden')) {
          edgeList.push(e);
          walk(e.source());
        }
      });
    }
    walk(node);
    return { nodes: cy.nodes().filter(n => visited.has(n.id())), edges: cy.collection(edgeList) };
  }

  function getDownstream(node) {
    const visited = new Set();
    const edgeList = [];
    function walk(n) {
      if (visited.has(n.id())) return;
      visited.add(n.id());
      n.outgoers('edge').forEach(e => {
        if (!e.hasClass('layer-hidden')) {
          edgeList.push(e);
          walk(e.target());
        }
      });
    }
    walk(node);
    return { nodes: cy.nodes().filter(n => visited.has(n.id())), edges: cy.collection(edgeList) };
  }

  let selectedNode = null;

  function updateDetail() {
    const panel = document.getElementById('detail-panel');
    if (!selectedNode) {
      panel.innerHTML = '<div class="detail-empty">Click a node to see details</div>';
    }
  }

  function clearHighlight() {
    cy.batch(() => {
      cy.elements().removeClass('dimmed highlighted highlighted-upstream highlighted-downstream search-match search-dimmed search-active');
    });
    selectedNode = null;
    updateDetail();
  }

  function highlightNode(node) {
    clearHighlight();
    const empty = { nodes: cy.collection(), edges: cy.collection() };
    const up = (traceMode === 'upstream' || traceMode === 'both') ? getUpstream(node) : empty;
    const down = (traceMode === 'downstream' || traceMode === 'both') ? getDownstream(node) : empty;

    const allHighlighted = up.nodes.union(down.nodes).union(node);
    const allEdges = up.edges.union(down.edges);

    cy.batch(() => {
      cy.nodes().addClass('dimmed');
      cy.edges().addClass('dimmed');
      allHighlighted.removeClass('dimmed');
      allEdges.removeClass('dimmed');
      up.nodes.addClass('highlighted-upstream');
      up.edges.addClass('highlighted-upstream');
      down.nodes.addClass('highlighted-downstream');
      down.edges.addClass('highlighted-downstream');
      node.addClass('highlighted');
    });

    selectedNode = node;
    showDetail(node, up.nodes.length - 1, down.nodes.length - 1);
  }

  cy.on('tap', 'node', function(evt) { highlightNode(evt.target); });
  cy.on('tap', function(evt) { if (evt.target === cy) clearHighlight(); });

  // ── Detail panel ──────────────────────────────────────────────────────────

  function showDetail(node, upCount, downCount) {
    const d = node.data();
    const incomers = node.incomers('node').map(n => ({ id: n.id(), fullName: n.data('fullName') }));
    const outgoers = node.outgoers('node').map(n => ({ id: n.id(), fullName: n.data('fullName') }));

    const hasSource = d.source != null;
    const panel = document.getElementById('detail-panel');
    panel.innerHTML =
      '<div class="detail-panel">' +
      '<div class="node-name" style="color:' + d.color + '">' + d.fullName + '</div>' +
      '<div class="node-layer-tag" style="background:' + d.color + '22;color:' + d.color + '">' + d.layerLabel + '</div>' +
      '<div class="detail-row"><span class="detail-label">Path</span><span class="detail-value" style="font-size:11px">' + d.path + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">Direct in</span><span class="detail-value">' + incomers.length + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">Direct out</span><span class="detail-value">' + outgoers.length + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">Total upstream</span><span class="detail-value" style="color:#38bdf8">' + upCount + '</span></div>' +
      '<div class="detail-row"><span class="detail-label">Total downstream</span><span class="detail-value" style="color:#fb923c">' + downCount + '</span></div>' +
      (hasSource ? '<button class="view-source-btn" id="btn-view-source">View Source</button>' : '') +
      (incomers.length > 0 ?
        '<h4 style="margin-top:12px;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em">Dependencies</h4>' +
        '<div class="dep-list">' + incomers.map(n => '<div class="dep-item" data-node="' + n.id + '">' + n.fullName + '</div>').join('') + '</div>'
        : '') +
      (outgoers.length > 0 ?
        '<h4 style="margin-top:12px;font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.06em">Dependents</h4>' +
        '<div class="dep-list">' + outgoers.map(n => '<div class="dep-item" data-node="' + n.id + '">' + n.fullName + '</div>').join('') + '</div>'
        : '') +
      '</div>';

    if (hasSource) {
      document.getElementById('btn-view-source').addEventListener('click', () => openSource(d));
    }

    panel.querySelectorAll('.dep-item').forEach(el => {
      el.addEventListener('click', () => {
        const target = cy.getElementById(el.dataset.node);
        if (target.length > 0) {
          cy.animate({ center: { eles: target }, zoom: 1.5, duration: 300 });
          highlightNode(target);
        }
      });
    });
  }

  // ── Tooltip ───────────────────────────────────────────────────────────────

  const tooltip = document.getElementById('tooltip');

  cy.on('mouseover', 'node', function(evt) {
    const d = evt.target.data();
    const pos = evt.renderedPosition;
    tooltip.innerHTML = '<div class="tt-name">' + d.fullName + '</div><div class="tt-layer">' + d.layerLabel + '</div><div class="tt-path">' + d.path + '</div>';
    tooltip.style.display = 'block';
    tooltip.style.left = (pos.x + 15) + 'px';
    tooltip.style.top = (pos.y + 15) + 'px';
  });

  cy.on('mouseout', 'node', function() { tooltip.style.display = 'none'; });

  cy.on('mousemove', 'node', function(evt) {
    const pos = evt.renderedPosition;
    tooltip.style.left = (pos.x + 15) + 'px';
    tooltip.style.top = (pos.y + 15) + 'px';
  });

  // ── Buttons ───────────────────────────────────────────────────────────────

  var sourcePanel = document.getElementById('source-panel');
  var spTitle = document.getElementById('sp-title');
  var spMeta = document.getElementById('sp-meta');
  var spBody = document.getElementById('sp-body');
  var sourcePanelOpen = false;

  function openSource(d) {
    if (!d || d.source == null) return;
    var lines = d.source.split('\n').length;
    var lang = d.lang || '';
    spTitle.textContent = d.path || d.fullName;
    spMeta.textContent = lines + ' lines' + (lang ? ' \u00b7 ' + lang : '');
    var escaped = d.source.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    var langClass = lang ? ' class="language-' + lang + '"' : '';
    spBody.innerHTML = '<pre><code' + langClass + '>' + escaped + '</code></pre>';
    if (typeof hljs !== 'undefined') {
      var codeEl = spBody.querySelector('code');
      if (codeEl) hljs.highlightElement(codeEl);
    }
    sourcePanel.classList.add('open');
    sourcePanelOpen = true;
  }

  function closeSource() {
    sourcePanel.classList.remove('open');
    sourcePanelOpen = false;
  }

  function toggleSource() {
    if (sourcePanelOpen) { closeSource(); }
    else if (selectedNode) { openSource(selectedNode.data()); }
  }

  document.getElementById('sp-close').addEventListener('click', closeSource);
  document.getElementById('sp-copy').addEventListener('click', function() {
    if (!selectedNode) return;
    var src = selectedNode.data().source;
    if (src) {
      navigator.clipboard.writeText(src).then(function() {
        var btn = document.getElementById('sp-copy');
        btn.textContent = 'Copied!';
        setTimeout(function() { btn.textContent = 'Copy'; }, 1500);
      });
    }
  });

  // ── Outline mode ─────────────────────────────────────────────────────

  var outlineMode = false;
  var outlineBtn = document.getElementById('btn-outline');

  function toggleOutline() {
    outlineMode = !outlineMode;
    cy.batch(function() {
      if (outlineMode) {
        cy.nodes().addClass('outline-mode');
        cy.edges().addClass('outline-mode');
      } else {
        cy.nodes().removeClass('outline-mode');
        cy.edges().removeClass('outline-mode');
      }
    });
    document.getElementById('cy').classList.toggle('outline-canvas', outlineMode);
    outlineBtn.classList.toggle('active', outlineMode);
    runLayout(outlineMode);
  }

  outlineBtn.addEventListener('click', toggleOutline);

  document.getElementById('btn-fit').addEventListener('click', () => cy.fit(undefined, 40));
  document.getElementById('btn-reset').addEventListener('click', clearHighlight);
  document.getElementById('btn-layout').addEventListener('click', runLayout);

  // ── Keyboard shortcuts ────────────────────────────────────────────────────

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    switch (e.key) {
      case 'Escape':
        if (sourcePanelOpen) closeSource();
        else clearHighlight();
        break;
      case 'f': case 'F': cy.fit(undefined, 40); break;
      case 's': case 'S': toggleSource(); break;
      case 'o': case 'O': toggleOutline(); break;
      case '/': e.preventDefault(); searchInput.focus(); break;
      case '1': setTraceMode('upstream'); break;
      case '2': setTraceMode('downstream'); break;
      case '3': setTraceMode('both'); break;
    }
  });

  searchInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      clearSearch();
      searchInput.blur();
    }
    if (e.key === 'Enter') {
      e.preventDefault();
      navigateSearch(e.shiftKey ? -1 : 1);
    }
  });

})();
</script>
</body>
</html>
