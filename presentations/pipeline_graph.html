Finding\n    field: time_bucket\n    bucket: raw\n\nsource_probes:\n  - probe_id: probe_cross_site_billing\n    weight: 2\n  - probe_id: probe_cc_producteur_mismatch\n    weight: 2\n  - probe_id: probe_invoice_integrity\n    weight: 3\n\nseverity_rules:\n  - conditions:\n      - field: probe_count\n        above: 1\n      - field: total_risk\n        above: 5000\n    level: high\n  - field: total_risk\n    above: 500\n    level: medium\n  - field: probe_count\n    above: 0\n    level: low\n  - default: low\n\nmoney_at_risk: total_risk\n\nevidence_fields: [probe_count, finding_count, total_risk, worst_severity, probes_flagged]\n\nregistry:\n  probe_category: data_quality\n  display_name:\n    de: 'Abrechnungsqualit\u00e4tsbewertung'\n    en: 'Billing Quality Assessment'\n    fr: '\u00c9valuation qualit\u00e9 facturation'\n  description:\n    de: 'Bewertet die Abrechnungsqualit\u00e4t pro Fall durch Aggregation von standort\u00fcbergreifender Abrechnung, KSt-Producteur-Abweichung und Rechnungsintegrit\u00e4ts-Probes. Mehrfach markierte F\u00e4lle deuten auf systematische Datenqualit\u00e4tsprobleme hin.'\n    en: 'Assesses case-level billing quality by aggregating findings from cross-site billing, CC producteur mismatch, and invoice integrity probes. Cases flagged by multiple probes indicate systematic data quality issues.'\n    fr: '\u00c9value la qualit\u00e9 de facturation par cas en agr\u00e9geant les constats de facturation inter-sites, \u00e9cart CC producteur et int\u00e9grit\u00e9 des factures. Les cas signal\u00e9s par plusieurs probes indiquent des probl\u00e8mes syst\u00e9miques.'\n  interpretation:\n    de: \"Fall {entity_id} wird von {probe_count} Qualit\u00e4ts-Probe(s) markiert ({probes_flagged}) mit insgesamt {finding_count} Befund(en) und einem Gesamtrisiko von {total_risk}. Schwerster Befund: {worst_severity}.\"\n    en: \"Case {entity_id} is flagged by {probe_count} quality probe(s) ({probes_flagged}) with {finding_count} total finding(s) and {total_risk} at risk. Worst severity: {worst_severity}.\"\n    fr: \"Le cas {entity_id} est signal\u00e9 par {probe_count} probe(s) de qualit\u00e9 ({probes_flagged}) avec {finding_count} constat(s) et {total_risk} \u00e0 risque. Gravit\u00e9 maximale: {worst_severity}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_assessment_case_financial_integrity", "label": "AssessmentCaseFinancialIntegrity", "fullName": "yaml_assessment_case_financial_integrity", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/assessment_case_financial_integrity.yaml", "layerOrder": -1, "source": "probe_id: assessment_case_financial_integrity\nversion: \"1.0.0\"\ncontract: \"findings.v1\"\ntype: assessment\nseverity: medium\ndescription: >\n  Assesses case-level financial integrity by aggregating findings from\n  revenue leakage, implant documentation, cost center mismatch, billing\n  timing, and procedure usage probes. Cases flagged by multiple probes\n  indicate systemic billing or documentation issues.\n\nscope:\n  entity_type: Case\n  group_by: [entity_id]\n  time:\n    entity: ProbeFinding\n    field: time_bucket\n    bucket: raw\n\nsource_probes:\n  - probe_id: probe_revenue_leakage\n    weight: 3\n  - probe_id: probe_missing_mandatory_implants\n    weight: 2\n  - probe_id: probe_cost_center_billing_mismatch\n    weight: 2\n  - probe_id: probe_billing_before_usage\n    weight: 1\n  - probe_id: probe_procedure_without_usage\n    weight: 1\n\nseverity_rules:\n  - conditions:\n      - field: probe_count\n        above: 2\n      - field: total_risk\n        above: 5000\n    level: high\n  - field: total_risk\n    above: 500\n    level: medium\n  - field: probe_count\n    above: 0\n    level: low\n  - default: low\n\nmoney_at_risk: total_risk\n\nevidence_fields: [probe_count, finding_count, total_risk, worst_severity, probes_flagged]\n\nregistry:\n  probe_category: financial_anomaly\n  display_name:\n    de: 'Finanzielle Integrit\u00e4t des Falls'\n    en: 'Case Financial Integrity'\n    fr: 'Int\u00e9grit\u00e9 financi\u00e8re du cas'\n  description:\n    de: 'Bewertet die finanzielle Integrit\u00e4t pro Fall durch Aggregation von Erl\u00f6sausfall-, Implantat-, Kostenstellen-, Abrechnungszeitpunkt- und Prozedur-Probes. F\u00e4lle mit mehreren Befunden deuten auf systematische Abrechnungs- oder Dokumentationsprobleme hin.'\n    en: 'Assesses case-level financial integrity by aggregating findings from revenue leakage, implant, cost center, billing timing, and procedure probes. Cases flagged by multiple probes indicate systemic billing or documentation issues.'\n    fr: \"\u00c9value l'int\u00e9grit\u00e9 financi\u00e8re par cas en agr\u00e9geant les constats des probes de revenus, implants, centres de co\u00fbts, chronologie de facturation et proc\u00e9dures. Les cas signal\u00e9s par plusieurs probes indiquent des probl\u00e8mes syst\u00e9miques.\"\n  interpretation:\n    de: \"Fall {entity_id} wird von {probe_count} Probe(s) markiert ({probes_flagged}) mit insgesamt {finding_count} Befund(en) und einem Gesamtrisiko von {total_risk}. Schwerster Befund: {worst_severity}.\"\n    en: \"Case {entity_id} is flagged by {probe_count} probe(s) ({probes_flagged}) with {finding_count} total finding(s) and {total_risk} at risk. Worst severity: {worst_severity}.\"\n    fr: \"Le cas {entity_id} est signal\u00e9 par {probe_count} probe(s) ({probes_flagged}) avec {finding_count} constat(s) et {total_risk} \u00e0 risque. Gravit\u00e9 maximale: {worst_severity}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_assessment_material_compliance", "label": "AssessmentMaterialCompliance", "fullName": "yaml_assessment_material_compliance", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/assessment_material_compliance.yaml", "layerOrder": -1, "source": "probe_id: assessment_material_compliance\nversion: \"1.0.0\"\ncontract: \"findings.v1\"\ntype: assessment\nseverity: medium\ndescription: >\n  Assesses material-level compliance health by aggregating findings from\n  controlled substance traceability, MiGEL reimbursement gap, stale article,\n  and barcode duplicate probes. Materials flagged by multiple compliance\n  probes indicate systemic regulatory risk.\n\nscope:\n  entity_type: Material\n  group_by: [entity_id]\n  time:\n    entity: ProbeFinding\n    field: time_bucket\n    bucket: raw\n\nsource_probes:\n  - probe_id: probe_controlled_substance_traceability\n    weight: 3\n  - probe_id: probe_migel_reimbursement_gap\n    weight: 2\n  - probe_id: probe_stale_article\n    weight: 2\n  - probe_id: probe_barcode_duplicate\n    weight: 1\n\nseverity_rules:\n  - conditions:\n      - field: probe_count\n        above: 1\n      - field: total_risk\n        above: 5000\n    level: high\n  - field: total_risk\n    above: 500\n    level: medium\n  - field: probe_count\n    above: 0\n    level: low\n  - default: low\n\nmoney_at_risk: total_risk\n\nevidence_fields: [probe_count, finding_count, total_risk, worst_severity, probes_flagged]\n\nregistry:\n  probe_category: compliance\n  display_name:\n    de: 'Material-Compliance-Bewertung'\n    en: 'Material Compliance Assessment'\n    fr: '\u00c9valuation conformit\u00e9 mat\u00e9riau'\n  description:\n    de: 'Bewertet die Compliance-Gesundheit pro Material durch Aggregation von BtM-R\u00fcckverfolgbarkeit, MiGEL-L\u00fccke, veralteten Artikeln und Barcode-Duplikaten. Mehrfach markierte Materialien deuten auf systemische Compliance-Risiken hin.'\n    en: 'Assesses material compliance health by aggregating findings from controlled substance traceability, MiGEL gap, stale article, and barcode duplicate probes. Materials flagged by multiple probes indicate systemic compliance risk.'\n    fr: '\u00c9value la conformit\u00e9 par mat\u00e9riau en agr\u00e9geant les constats de tra\u00e7abilit\u00e9 BtM, \u00e9cart MiGEL, articles p\u00e9rim\u00e9s et doublons de code-barres. Les mat\u00e9riaux signal\u00e9s par plusieurs probes indiquent un risque syst\u00e9mique.'\n  interpretation:\n    de: \"Material {entity_id} wird von {probe_count} Compliance-Probe(s) markiert ({probes_flagged}) mit insgesamt {finding_count} Befund(en) und einem Gesamtrisiko von {total_risk}. Schwerster Befund: {worst_severity}.\"\n    en: \"Material {entity_id} is flagged by {probe_count} compliance probe(s) ({probes_flagged}) with {finding_count} total finding(s) and {total_risk} at risk. Worst severity: {worst_severity}.\"\n    fr: \"Le mat\u00e9riau {entity_id} est signal\u00e9 par {probe_count} probe(s) de conformit\u00e9 ({probes_flagged}) avec {finding_count} constat(s) et {total_risk} \u00e0 risque. Gravit\u00e9 maximale: {worst_severity}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_assessment_material_health", "label": "AssessmentMaterialHealth", "fullName": "yaml_assessment_material_health", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/assessment_material_health.yaml", "layerOrder": -1, "source": "probe_id: assessment_material_health\nversion: \"1.0.0\"\ncontract: \"findings.v1\"\ntype: assessment\nseverity: medium\ndescription: >\n  Assesses material supply chain health by aggregating findings from\n  I/O coefficient, trend, and pricing probes. Materials flagged by\n  multiple probes indicate systemic issues.\n\nscope:\n  entity_type: Material\n  group_by: [entity_id]\n  time:\n    entity: ProbeFinding\n    field: time_bucket\n    bucket: raw\n\nsource_probes:\n  - probe_id: probe_io_coefficient\n    weight: 3\n  - probe_id: probe_io_coefficient_trend\n    weight: 2\n  - probe_id: probe_missing_standard_price\n    weight: 1\n  - probe_id: probe_negative_margin\n    weight: 2\n  - probe_id: probe_billing_below_internal_price\n    weight: 2\n  - probe_id: probe_shelf_life_risk\n    weight: 1\n\nseverity_rules:\n  - conditions:\n      - field: probe_count\n        above: 2\n      - field: total_risk\n        above: 10000\n    level: high\n  - field: total_risk\n    above: 1000\n    level: medium\n  - field: probe_count\n    above: 0\n    level: low\n  - default: low\n\nmoney_at_risk: total_risk\n\nevidence_fields: [probe_count, finding_count, total_risk, worst_severity, probes_flagged]\n\nregistry:\n  probe_category: financial_anomaly\n  display_name:\n    de: 'Material-Gesundheitsbewertung'\n    en: 'Material Health Assessment'\n    fr: '\u00c9valuation sant\u00e9 mat\u00e9riau'\n  description:\n    de: 'Bewertet die Lieferketten-Gesundheit pro Material durch Aggregation von I/O-Koeffizient, Trend- und Preis-Probes. Materialien, die von mehreren Probes markiert werden, weisen auf systemische Probleme hin.'\n    en: 'Assesses material supply chain health by aggregating findings from I/O coefficient, trend, and pricing probes. Materials flagged by multiple probes indicate systemic issues.'\n    fr: \"\u00c9value la sant\u00e9 de la cha\u00eene d'approvisionnement par mat\u00e9riau en agr\u00e9geant les constats des probes I/O, tendance et prix. Les mat\u00e9riaux signal\u00e9s par plusieurs probes indiquent des probl\u00e8mes syst\u00e9miques.\"\n  interpretation:\n    de: \"Material {entity_id} wird von {probe_count} Probe(s) markiert ({probes_flagged}) mit insgesamt {finding_count} Befund(en) und einem Gesamtrisiko von {total_risk}. Schwerster Befund: {worst_severity}.\"\n    en: \"Material {entity_id} is flagged by {probe_count} probe(s) ({probes_flagged}) with {finding_count} total finding(s) and {total_risk} at risk. Worst severity: {worst_severity}.\"\n    fr: \"Le mat\u00e9riau {entity_id} est signal\u00e9 par {probe_count} probe(s) ({probes_flagged}) avec {finding_count} constat(s) et {total_risk} \u00e0 risque. Gravit\u00e9 maximale: {worst_severity}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_assessment_material_overall", "label": "AssessmentMaterialOverall", "fullName": "yaml_assessment_material_overall", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/assessment_material_overall.yaml", "layerOrder": -1, "source": "probe_id: assessment_material_overall\nversion: \"1.0.0\"\ncontract: \"findings.v1\"\ntype: assessment\nseverity: medium\ndescription: >\n  Composite assessment of overall material health by aggregating supply-chain\n  health (I/O coefficient, trends, pricing) and compliance health (controlled\n  substances, MiGEL, barcodes) into a single entity score. Materials flagged\n  by both domains indicate systemic cross-functional issues.\n\nscope:\n  entity_type: Material\n  group_by: [entity_id]\n  time:\n    entity: ProbeFinding\n    field: time_bucket\n    bucket: raw\n\nsource_probes:\n  - probe_id: assessment_material_health\n    weight: 3\n  - probe_id: assessment_material_compliance\n    weight: 2\n\nseverity_rules:\n  - conditions:\n      - field: probe_count\n        above: 1\n      - field: total_risk\n        above: 10000\n    level: high\n  - field: total_risk\n    above: 1000\n    level: medium\n  - default: low\n\nmoney_at_risk: total_risk\n\nevidence_fields: [probe_count, finding_count, total_risk, worst_severity, probes_flagged]\n\nregistry:\n  probe_category: financial_anomaly\n  display_name:\n    de: 'Material-Gesamtbewertung'\n    en: 'Material Overall Assessment'\n    fr: '\u00c9valuation globale mat\u00e9riau'\n  description:\n    de: 'Zusammengesetzte Bewertung der Material-Gesamtgesundheit durch Aggregation der Lieferketten- und Compliance-Bewertungen. Materialien, die in beiden Bereichen auff\u00e4llig sind, weisen auf bereichs\u00fcbergreifende Probleme hin.'\n    en: 'Composite assessment of overall material health by aggregating supply-chain and compliance assessments. Materials flagged in both domains indicate systemic cross-functional issues.'\n    fr: '\u00c9valuation composite de la sant\u00e9 globale des mat\u00e9riaux en agr\u00e9geant les \u00e9valuations logistiques et de conformit\u00e9. Les mat\u00e9riaux signal\u00e9s dans les deux domaines indiquent des probl\u00e8mes transversaux.'\n  interpretation:\n    de: \"Material {entity_id} wird von {probe_count} Bewertung(en) markiert ({probes_flagged}) mit insgesamt {finding_count} Befund(en) und einem Gesamtrisiko von {total_risk}. Gesundheitswert: {health_score}. Schwerster Befund: {worst_severity}.\"\n    en: \"Material {entity_id} is flagged by {probe_count} assessment(s) ({probes_flagged}) with {finding_count} total finding(s) and {total_risk} at risk. Health score: {health_score}. Worst severity: {worst_severity}.\"\n    fr: \"Le mat\u00e9riau {entity_id} est signal\u00e9 par {probe_count} \u00e9valuation(s) ({probes_flagged}) avec {finding_count} constat(s) et {total_risk} \u00e0 risque. Score de sant\u00e9: {health_score}. Gravit\u00e9 maximale: {worst_severity}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_barcode_duplicate", "label": "ProbeBarcodeDuplicate", "fullName": "yaml_probe_barcode_duplicate", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_barcode_duplicate.yaml", "layerOrder": -1, "source": "probe_id: probe_barcode_duplicate\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: duplicate\nseverity: high\ndescription: >\n  Detects materials sharing the same barcode. Duplicate barcodes cause\n  scanning errors and misidentification in warehouse and OR workflows.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: Material\n    field: barcode\n    bucket: raw\n\nsource:\n  entity: Material\n  duplicate_fields: [barcode]\n  where: \"barcode is not null and trim(barcode) != ''\"\n  id_field: material_id\n  value_field: standard_price\n\nseverity_rules:\n  - above: 0\n    level: high\n  - default: high\n\nregistry:\n  probe_category: data_quality\n  risk_tier: operational_signal\n  confidence_weight: 0.2\n  display_name:\n    de: 'Doppelter Barcode'\n    en: 'Duplicate Barcode'\n    fr: 'Code-barres en double'\n  description:\n    de: 'Erkennt Materialien mit identischem Barcode. Doppelte Barcodes verursachen Scanfehler und Fehlidentifikation im Lager und im OP.'\n    en: 'Detects materials sharing the same barcode. Duplicate barcodes cause scanning errors and misidentification in warehouse and OR workflows.'\n    fr: \"D\u00e9tecte les mat\u00e9riaux partageant le m\u00eame code-barres. Les doublons causent des erreurs de scan et d'identification en entrep\u00f4t et au bloc op\u00e9ratoire.\"\n  interpretation:\n    de: 'Material {entity_id} teilt den Barcode {barcode} mit {duplicate_count} anderen Materialien. Dies verursacht Scanfehler und Fehlidentifikation.'\n    en: 'Material {entity_id} shares barcode {barcode} with {duplicate_count} other materials. This causes scanning errors and misidentification.'\n    fr: \"Le mat\u00e9riau {entity_id} partage le code-barres {barcode} avec {duplicate_count} autres mat\u00e9riaux. Cela provoque des erreurs de scan et d'identification.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_billing_before_usage", "label": "ProbeBillingBeforeUsage", "fullName": "yaml_probe_billing_before_usage", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_billing_before_usage.yaml", "layerOrder": -1, "source": "probe_id: probe_billing_before_usage\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: temporal_sequence\nseverity: medium\ndescription: >\n  Flags case+material combinations where the earliest billing timestamp\n  precedes the earliest usage timestamp. This temporal anomaly suggests\n  backdated billing, data entry errors, or system integration gaps.\n\nscope:\n  entity_type: Case\n  group_by: [case_token]\n  time:\n    entity: BillingEvent\n    field: billing_timestamp\n    bucket: week\n\nfirst_event:\n  entity: BillingEvent\n  join_key: [case_token, material_id]\n  time_field: billing_timestamp\n  aggregates:\n    count: billing_count\n    sum: [billed_amount]\n\nsecond_event:\n  entity: CaseMaterialUsage\n  join_key: [case_token, material_id]\n  time_field: usage_timestamp\n  aggregates:\n    count: usage_count\n\nexpected_order: first_event_after_second_event\ngap_unit: hours\n\nenrichment:\n  entity: Material\n  join_key: material_id\n  fields: [material_description]\n\nseverity_rules:\n  - above: 168.0\n    level: high\n  - above: 24.0\n    level: medium\n  - default: low\n\nmoney_at_risk: total_billed\n\nevidence_fields: [case_token, material_id, material_description, first_billing, first_usage, gap_hours, billing_count, usage_count]\n\nregistry:\n  probe_category: data_quality\n  risk_tier: operational_signal\n  confidence_weight: 0.2\n  display_name:\n    de: 'Abrechnung vor Verbrauch'\n    en: 'Billing Before Usage'\n    fr: 'Facturation avant consommation'\n  description:\n    de: 'Erkennt Fall-Material-Kombinationen, bei denen die Abrechnung zeitlich vor dem Materialverbrauch liegt. Ein Hinweis auf r\u00fcckdatierte Abrechnungen, Erfassungsfehler oder Schnittstellenprobleme.'\n    en: 'Flags case-material combinations where billing precedes material usage. Indicates backdated billing, data entry errors, or system integration timing gaps.'\n    fr: \"D\u00e9tecte les combinaisons cas-mat\u00e9riau o\u00f9 la facturation pr\u00e9c\u00e8de la consommation. Indique une facturation antidat\u00e9e, des erreurs de saisie ou des probl\u00e8mes d'int\u00e9gration.\"\n  interpretation:\n    de: \"Fall {entity_id}, Material {material_id}: Die Abrechnung erfolgte {gap_hours} Stunden vor dem ersten Materialverbrauch. Bei {billing_count} Abrechnungen und {usage_count} Verbrauchsereignissen deutet dies auf eine Zeitabweichung im Prozess hin.\"\n    en: \"Case {entity_id}, material {material_id}: billing occurred {gap_hours} hours before first material usage. With {billing_count} billing and {usage_count} usage events, this indicates a process timing discrepancy.\"\n    fr: \"Cas {entity_id}, mat\u00e9riau {material_id}: la facturation a eu lieu {gap_hours} heures avant la premi\u00e8re consommation. Avec {billing_count} facturations et {usage_count} consommations, cela indique un \u00e9cart temporel dans le processus.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_billing_below_internal_price", "label": "ProbeBillingBelowInternalPrice", "fullName": "yaml_probe_billing_below_internal_price", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_billing_below_internal_price.yaml", "layerOrder": -1, "source": "probe_id: probe_billing_below_internal_price\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: enrichment\nseverity: medium\ndescription: >\n  Identifies materials where the average billed unit price is below the\n  internal sales price. Indicates potential revenue loss from underpricing\n  or missing markup.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: BillingEvent\n    field: billing_timestamp\n    bucket: week\n\ndimension:\n  entity: Material\n  key: material_id\n  where: \"internal_sales_price is not null and internal_sales_price > 0\"\n  fields: [material_description, internal_sales_price, standard_price]\n\nfact:\n  entity: BillingEvent\n  join_key: material_id\n  group_by: [material_id]\n  time_bucket: true\n  aggregates:\n    - alias: revenue\n      expression: billed_amount\n      aggregate: sum\n    - alias: qty_billed\n      expression: quantity\n      aggregate: sum\n\nderived:\n  - alias: avg_unit_price\n    expression: \"case when qty_billed > 0 then round(revenue / qty_billed, 2) else 0 end\"\n  - alias: price_gap\n    expression: \"dim.internal_sales_price - avg_unit_price\"\n  - alias: gap_pct\n    expression: \"case when dim.internal_sales_price > 0 then round(100.0 * price_gap / dim.internal_sales_price, 2) else 0 end\"\n\nflag: \"avg_unit_price < internal_sales_price and qty_billed > 0\"\n\nentity_id_field: material_id\ntime_bucket_field: month\n\nmoney_at_risk: \"greatest(round(qty_billed * price_gap, 2), 0)\"\n\nseverity_rules:\n  - above: 1000\n    field: money_at_risk_val\n    level: high\n  - above: 100\n    field: money_at_risk_val\n    level: medium\n  - default: low\n\nevidence_fields: [material_id, material_description, month, revenue, qty_billed, avg_unit_price, internal_sales_price, price_gap, gap_pct]\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: direct_financial\n  confidence_weight: 1.0\n  display_name:\n    de: 'Abrechnung unter Internpreis'\n    en: 'Billing Below Internal Price'\n    fr: 'Facturation sous prix interne'\n  description:\n    de: 'Erkennt Materialien, bei denen der durchschnittliche Abrechnungspreis unter dem internen Verkaufspreis liegt. Hinweis auf Unterbepreisung und m\u00f6glichen Ertragsverlust.'\n    en: 'Identifies materials where the average billed unit price is below the internal sales price. Indicates potential revenue loss from underpricing or missing markup.'\n    fr: 'Identifie les mat\u00e9riaux dont le prix unitaire moyen factur\u00e9 est inf\u00e9rieur au prix de vente interne. Indique une perte de revenus potentielle due \u00e0 une sous-tarification.'\n  interpretation:\n    de: \"Material {entity_id} ({material_description}) wird im Monat {month} unter dem Internpreis fakturiert: Durchschnittspreis {avg_unit_price}, Internpreis {internal_sales_price}, L\u00fccke {price_gap} ({gap_pct}%).\"\n    en: \"Material {entity_id} ({material_description}) is billed below internal price in {month}: avg unit price {avg_unit_price}, internal price {internal_sales_price}, gap {price_gap} ({gap_pct}%).\"\n    fr: \"Le mat\u00e9riau {entity_id} ({material_description}) est factur\u00e9 sous le prix interne en {month}: prix moyen {avg_unit_price}, prix interne {internal_sales_price}, \u00e9cart {price_gap} ({gap_pct}%).\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_cc_producteur_mismatch", "label": "ProbeCcProducteurMismatch", "fullName": "yaml_probe_cc_producteur_mismatch", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_cc_producteur_mismatch.yaml", "layerOrder": -1, "source": "probe_id: probe_cc_producteur_mismatch\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: entity_filter\nseverity: medium\ndescription: >\n  Flags cases where the billing cost center (cc_demandeur) differs from\n  cc_producteur. A high mismatch rate per case may indicate systematic\n  cost center attribution errors or inter-department charging issues.\n\nscope:\n  entity_type: Case\n  group_by: [case_token]\n  time:\n    entity: BillingEvent\n    field: billing_timestamp\n    bucket: week\n\nsource:\n  entity: BillingEvent\n  where: >\n    cc_producteur_id is not null and trim(cc_producteur_id) != ''\n    and cost_center_id is not null and trim(cost_center_id) != ''\n    and cost_center_id != cc_producteur_id\n  entity_id_field: case_token\n  group_by: [case_token]\n  aggregates:\n    count: event_count\n    sum: [billed_amount]\n\nenrichment:\n  entity: Case\n  join_key: case_token\n  fields: [case_type, cost_center_id]\n\nseverity_rules:\n  - above: 10\n    field: event_count\n    level: high\n  - default: medium\n\nmoney_at_risk: \"total_billed_amount\"\n\nevidence_fields: [case_token, event_count, total_billed_amount, case_type, cost_center_id]\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: compliance_exposure\n  confidence_weight: 0.5\n  display_name:\n    de: 'KSt-Producteur-Abweichung'\n    en: 'CC Producteur Mismatch'\n    fr: '\u00c9cart CC producteur'\n  description:\n    de: 'Erkennt F\u00e4lle, bei denen die Abrechnungs-Kostenstelle (Demandeur) von der produzierenden Kostenstelle (Producteur) abweicht. Hohe Abweichungsraten deuten auf systematische Zuordnungsfehler hin.'\n    en: 'Flags cases where the billing cost center differs from cc_producteur. High mismatch rates per case indicate systematic cost center attribution errors.'\n    fr: \"Signale les cas o\u00f9 le centre de co\u00fbts de facturation diff\u00e8re du cc_producteur. Un taux \u00e9lev\u00e9 de divergence indique des erreurs syst\u00e9matiques d'attribution.\"\n  interpretation:\n    de: \"Fall {entity_id} ({case_type}) hat {event_count} Abrechnungen mit abweichender Kostenstelle (Demandeur \u2260 Producteur). Gesamtwert: {total_billed_amount}.\"\n    en: \"Case {entity_id} ({case_type}) has {event_count} billing events where cost center differs from cc_producteur. Total amount: {total_billed_amount}.\"\n    fr: \"Le cas {entity_id} ({case_type}) a {event_count} \u00e9v\u00e9nements o\u00f9 le centre de co\u00fbts diff\u00e8re du cc_producteur. Montant total: {total_billed_amount}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_controlled_substance_traceability", "label": "ProbeControlledSubstanceTraceability", "fullName": "yaml_probe_controlled_substance_traceability", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_controlled_substance_traceability.yaml", "layerOrder": -1, "source": "probe_id: probe_controlled_substance_traceability\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: reconciliation\nseverity: high\ndescription: >\n  For controlled substances: compares received quantity (RECEIVE movements)\n  minus issued quantity (ISSUE/TRANSFER movements) minus patient usage per\n  material per month. Gaps indicate unaccounted stock \u2014 a regulatory\n  compliance risk.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: MaterialMovement\n    field: movement_timestamp\n    bucket: week\n\ndimension_filter:\n  entity: Material\n  key: material_id\n  where:\n    is_controlled_substance: true\n  fields: [material_description, standard_price]\n\nleft:\n  entity: MaterialMovement\n  group_by: [material_id]\n  aggregates:\n    - alias: received_qty\n      expression: \"case when movement_type = 'RECEIVE' then quantity else 0 end\"\n      aggregate: sum\n    - alias: issued_qty\n      expression: \"case when movement_type in ('ISSUE', 'TRANSFER') then quantity else 0 end\"\n      aggregate: sum\n\nright:\n  entity: CaseMaterialUsage\n  group_by: [material_id]\n  aggregates:\n    - alias: used_qty\n      expression: quantity\n      aggregate: sum\n\njoin:\n  type: full_outer\n  keys: [material_id]\n  time_key: month\n\nderived:\n  - alias: gap_qty\n    expression: \"coalesce(l.received_qty, 0) - coalesce(l.issued_qty, 0) - coalesce(r.used_qty, 0)\"\n\nflag: \"abs(coalesce(l.received_qty, 0) - coalesce(l.issued_qty, 0) - coalesce(r.used_qty, 0)) > 0\"\n\nentity_id_field: material_id\ntime_bucket_field: month\n\nmoney_at_risk: \"abs(gap_qty) * dim_f.standard_price\"\n\nseverity_rules:\n  - above: 100\n    field: money_at_risk_val\n    level: high\n  - default: medium\n\nevidence_fields: [material_id, material_description, month, received_qty, issued_qty, used_qty, gap_qty]\n\nregistry:\n  probe_category: compliance\n  risk_tier: compliance_exposure\n  confidence_weight: 0.5\n  display_name:\n    de: 'Bet\u00e4ubungsmittel-R\u00fcckverfolgbarkeit'\n    en: 'Controlled Substance Traceability'\n    fr: 'Tra\u00e7abilit\u00e9 des substances contr\u00f4l\u00e9es'\n  description:\n    de: \"Vergleicht pro BtM-Material und Monat: empfangene Menge minus abgegebene Menge minus Patientenverbrauch. L\u00fccken deuten auf nicht dokumentierten Bestand hin \u2014 ein regulatorisches Compliance-Risiko.\"\n    en: \"For controlled substances: compares received minus issued minus patient usage per material per month. Gaps indicate unaccounted stock \u2014 a regulatory compliance risk.\"\n    fr: \"Pour les substances contr\u00f4l\u00e9es: compare les quantit\u00e9s re\u00e7ues moins \u00e9mises moins consomm\u00e9es par mat\u00e9riau et par mois. Les \u00e9carts indiquent un stock non comptabilis\u00e9 \u2014 un risque r\u00e9glementaire.\"\n  interpretation:\n    de: \"BtM-Material {entity_id} ({material_description}) zeigt im Monat {month} eine Bestandsl\u00fccke: empfangen {received_qty}, abgegeben {issued_qty}, verbraucht {used_qty}, Differenz {gap_qty}.\"\n    en: \"Controlled substance {entity_id} ({material_description}) shows a stock gap in {month}: received {received_qty}, issued {issued_qty}, used {used_qty}, gap {gap_qty}.\"\n    fr: \"Substance contr\u00f4l\u00e9e {entity_id} ({material_description}) pr\u00e9sente un \u00e9cart de stock en {month}: re\u00e7u {received_qty}, \u00e9mis {issued_qty}, consomm\u00e9 {used_qty}, \u00e9cart {gap_qty}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_conversion_factor_anomaly", "label": "ProbeConversionFactorAnomaly", "fullName": "yaml_probe_conversion_factor_anomaly", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_conversion_factor_anomaly.yaml", "layerOrder": -1, "source": "probe_id: probe_conversion_factor_anomaly\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: entity_filter\nseverity: medium\ndescription: >\n  Flags materials with implausible unit conversion factors \u2014 zero, negative,\n  extremely large, or factor=1 where unit codes differ. Bad conversion factors\n  corrupt quantity calculations across all downstream analytics.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: Material\n    field: valid_from\n    bucket: raw\n\nsource:\n  entity: Material\n  where: >\n    (conversion_factor_medium is not null and (conversion_factor_medium <= 0 or conversion_factor_medium > 10000))\n    or (conversion_factor_large is not null and (conversion_factor_large <= 0 or conversion_factor_large > 10000))\n    or (conversion_factor_medium = 1 and unit_medium_code is not null and unit_of_measure is not null and unit_medium_code != unit_of_measure)\n    or (conversion_factor_large = 1 and unit_large_code is not null and unit_of_measure is not null and unit_large_code != unit_of_measure)\n  entity_id_field: material_id\n\nseverity_rules:\n  - default: medium\n\nmoney_at_risk: 0\n\nevidence_fields: [material_id, material_description, unit_of_measure, unit_medium_code, unit_large_code, conversion_factor_medium, conversion_factor_large]\n\nregistry:\n  probe_category: data_quality\n  risk_tier: operational_signal\n  confidence_weight: 0.2\n  display_name:\n    de: 'Umrechnungsfaktor-Anomalie'\n    en: 'Conversion Factor Anomaly'\n    fr: 'Anomalie du facteur de conversion'\n  description:\n    de: 'Erkennt Materialien mit unplausiblen Einheiten-Umrechnungsfaktoren (Null, negativ, extrem hoch oder Faktor=1 bei unterschiedlichen Einheiten). Fehlerhafte Faktoren verf\u00e4lschen Mengenberechnungen.'\n    en: 'Flags materials with implausible unit conversion factors \u2014 zero, negative, extremely large, or factor=1 where unit codes differ. Bad factors corrupt quantity calculations.'\n    fr: \"Signale les mat\u00e9riaux avec des facteurs de conversion d'unit\u00e9s invraisemblables \u2014 z\u00e9ro, n\u00e9gatifs, extr\u00eamement \u00e9lev\u00e9s ou facteur=1 avec des codes d'unit\u00e9 diff\u00e9rents.\"\n  interpretation:\n    de: \"Material {entity_id} hat einen unplausiblen Umrechnungsfaktor: Medium={conversion_factor_medium} ({unit_medium_code}), Gross={conversion_factor_large} ({unit_large_code}), Basiseinheit={unit_of_measure}.\"\n    en: \"Material {entity_id} has an implausible conversion factor: medium={conversion_factor_medium} ({unit_medium_code}), large={conversion_factor_large} ({unit_large_code}), base unit={unit_of_measure}.\"\n    fr: \"Le mat\u00e9riau {entity_id} a un facteur de conversion invraisemblable: moyen={conversion_factor_medium} ({unit_medium_code}), grand={conversion_factor_large} ({unit_large_code}), unit\u00e9 de base={unit_of_measure}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_cost_center_billing_mismatch", "label": "ProbeCostCenterBillingMismatch", "fullName": "yaml_probe_cost_center_billing_mismatch", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_cost_center_billing_mismatch.yaml", "layerOrder": -1, "source": "probe_id: probe_cost_center_billing_mismatch\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: balance\nseverity: medium\ndescription: >\n  Detects cases where billing events are posted to a different cost center\n  than the case's assigned cost center, indicating cross-department\n  attribution errors.\n\nscope:\n  entity_type: Case\n  group_by: [case_token]\n  time:\n    entity: BillingEvent\n    field: billing_timestamp\n    bucket: week\n\nleft:\n  entity: BillingEvent\n  expression: \"billed_amount\"\n  aggregate: sum\n  alias: total_billed\n  where:\n    billing_status: POSTED\n\nright:\n  entity: BillingEvent\n  expression: \"billed_amount\"\n  aggregate: sum\n  alias: same_cc_billed\n  where:\n    billing_status: POSTED\n  cross_entity_filter:\n    match_field: cost_center_id\n    against_entity: Case\n    against_field: cost_center_id\n    via: case_token\n\njoin_key: case_token\ntolerance_pct: 0.0\n\nseverity_rules:\n  - above: 50.0\n    level: high\n  - above: 10.0\n    level: medium\n  - default: low\n\nmoney_at_risk: \"left_value - right_value\"\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: compliance_exposure\n  confidence_weight: 0.5\n  display_name:\n    de: 'Kostenstellen-Zuordnungsfehler'\n    en: 'Cost Center Billing Mismatch'\n    fr: '\u00c9cart de facturation entre centres de co\u00fbts'\n  description:\n    de: 'Erkennt F\u00e4lle, bei denen Abrechnungen einer anderen Kostenstelle zugeordnet sind als dem Fall. Fehlerhafte Zuordnungen verf\u00e4lschen die Kostentr\u00e4gerrechnung und erschweren die Leistungssteuerung.'\n    en: 'Detects cases where billing is attributed to a different cost center than the case. Misattributions distort cost accounting and hinder performance management.'\n    fr: \"D\u00e9tecte les cas o\u00f9 la facturation est attribu\u00e9e \u00e0 un centre de co\u00fbts diff\u00e9rent. Les erreurs d'attribution faussent la comptabilit\u00e9 analytique et compliquent le pilotage.\"\n  interpretation:\n    de: 'Fall {entity_id} hat {pct_diff}% der Abrechnung einer anderen Kostenstelle zugeordnet als der Fallkostenstelle. Dies weist auf Fehlzuordnungen zwischen Abteilungen hin.'\n    en: \"Case {entity_id} has {pct_diff}% of billing attributed to a different cost center than the case's assigned cost center. This indicates cross-department attribution errors.\"\n    fr: \"Le cas {entity_id} a {pct_diff}% de la facturation attribu\u00e9e \u00e0 un centre de co\u00fbts diff\u00e9rent. Cela indique des erreurs d'attribution entre d\u00e9partements.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_cross_site_billing", "label": "ProbeCrossSiteBilling", "fullName": "yaml_probe_cross_site_billing", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_cross_site_billing.yaml", "layerOrder": -1, "source": "probe_id: probe_cross_site_billing\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: entity_filter\nseverity: medium\ndescription: >\n  Flags cases where billing events have different requesting and producing\n  sites. Cross-site billing may indicate inter-site transfers that need\n  separate accounting treatment or data entry errors.\n\nscope:\n  entity_type: Case\n  group_by: [case_token]\n  time:\n    entity: BillingEvent\n    field: billing_timestamp\n    bucket: week\n\nsource:\n  entity: BillingEvent\n  where: >\n    site_demandeur is not null and site_producteur is not null\n    and trim(site_demandeur) != '' and trim(site_producteur) != ''\n    and site_demandeur != site_producteur\n  entity_id_field: case_token\n  group_by: [case_token]\n  aggregates:\n    count: event_count\n    sum: [billed_amount]\n\nenrichment:\n  entity: Case\n  join_key: case_token\n  fields: [case_type, cost_center_id]\n\nseverity_rules:\n  - above: 10\n    field: event_count\n    level: high\n  - default: medium\n\nmoney_at_risk: \"total_billed_amount\"\n\nevidence_fields: [case_token, event_count, total_billed_amount, case_type, cost_center_id]\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: compliance_exposure\n  confidence_weight: 0.5\n  display_name:\n    de: 'Standort\u00fcbergreifende Abrechnung'\n    en: 'Cross-Site Billing'\n    fr: 'Facturation inter-sites'\n  description:\n    de: 'Erkennt F\u00e4lle mit Abrechnungsereignissen, bei denen Anforderungs- und Leistungsstandort unterschiedlich sind. Standort\u00fcbergreifende Abrechnungen ben\u00f6tigen m\u00f6glicherweise eine separate Verrechnungsbehandlung.'\n    en: 'Flags cases where billing events have different requesting and producing sites. Cross-site billing may need separate accounting treatment or indicate data entry errors.'\n    fr: 'Signale les cas dont les \u00e9v\u00e9nements de facturation ont des sites demandeur et producteur diff\u00e9rents. La facturation inter-sites peut n\u00e9cessiter un traitement comptable s\u00e9par\u00e9.'\n  interpretation:\n    de: \"Fall {entity_id} ({case_type}) hat {event_count} Abrechnungen mit unterschiedlichen Standorten (Anforderung \u2260 Leistung). Gesamtwert: {total_billed_amount}.\"\n    en: \"Case {entity_id} ({case_type}) has {event_count} billing events with different requesting and producing sites. Total amount: {total_billed_amount}.\"\n    fr: \"Le cas {entity_id} ({case_type}) a {event_count} \u00e9v\u00e9nements de facturation avec des sites demandeur et producteur diff\u00e9rents. Montant total: {total_billed_amount}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_drg_cost_outlier", "label": "ProbeDrgCostOutlier", "fullName": "yaml_probe_drg_cost_outlier", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_drg_cost_outlier.yaml", "layerOrder": -1, "source": "probe_id: probe_drg_cost_outlier\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: hand_written\nseverity: high\ndescription: >\n  Per DRG code with >=10 cases: computes z-score on total_billed per case.\n  Cases with z-score > 3 flagged as high, > 2 as medium. Indicates unusual\n  billing patterns within clinically similar case groups.\n\nscope:\n  entity_type: Case\n  group_by: [case_token]\n  time:\n    entity: BillingEvent\n    field: billing_timestamp\n    bucket: week\n\nevidence_fields: [case_token, drg_code, total_billed, drg_avg, drg_stddev, z_score]\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: operational_signal\n  confidence_weight: 0.3\n  display_name:\n    de: 'DRG-Kostenausreisser'\n    en: 'DRG Cost Outlier'\n    fr: 'Outlier de co\u00fbt DRG'\n  description:\n    de: 'Erkennt F\u00e4lle mit ungew\u00f6hnlich hohen oder niedrigen Gesamtkosten innerhalb ihrer DRG-Gruppe (z-Score > 2). Hinweis auf Codier- oder Abrechnungsfehler.'\n    en: 'Detects cases with unusually high or low total costs within their DRG peer group (z-score > 2). Indicates potential coding or billing errors.'\n    fr: 'D\u00e9tecte les cas avec des co\u00fbts inhabituellement \u00e9lev\u00e9s ou bas dans leur groupe DRG (z-score > 2). Indique des erreurs potentielles de codage ou de facturation.'\n  interpretation:\n    de: \"Fall {entity_id} (DRG {drg_code}) hat Gesamtkosten von {total_billed} bei einem DRG-Durchschnitt von {drg_avg} (z-Score: {z_score}). Dies deutet auf eine Kostenabweichung hin.\"\n    en: \"Case {entity_id} (DRG {drg_code}) has total cost of {total_billed} vs DRG average of {drg_avg} (z-score: {z_score}). This indicates a cost anomaly.\"\n    fr: \"Le cas {entity_id} (DRG {drg_code}) a un co\u00fbt total de {total_billed} vs moyenne DRG de {drg_avg} (z-score: {z_score}). Cela indique une anomalie de co\u00fbt.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_duplicate_billing", "label": "ProbeDuplicateBilling", "fullName": "yaml_probe_duplicate_billing", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_duplicate_billing.yaml", "layerOrder": -1, "source": "probe_id: probe_duplicate_billing\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: duplicate\nseverity: medium\ndescription: >\n  Detects billing events that appear more than once with identical\n  case_token, material_id, quantity, billed_amount, and billing_timestamp,\n  indicating potential double-invoicing.\n\nscope:\n  entity_type: BillingEvent\n  group_by: [billing_id]\n  time:\n    entity: BillingEvent\n    field: billing_timestamp\n    bucket: week\n\nsource:\n  entity: BillingEvent\n  duplicate_fields: [case_token, material_id, quantity, billed_amount, billing_timestamp]\n  id_field: billing_id\n  value_field: billed_amount\n\nenrichment:\n  entity: Material\n  join_key: material_id\n  fields: [material_description]\n\nseverity_rules:\n  - above: 1000.0\n    level: high\n  - above: 100.0\n    level: medium\n  - default: low\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: direct_financial\n  confidence_weight: 1.0\n  display_name:\n    de: 'Doppelte Abrechnung'\n    en: 'Duplicate Billing'\n    fr: 'Facturation en double'\n  description:\n    de: 'Erkennt Abrechnungsereignisse, die mehrfach mit identischen Werten (Fall, Material, Menge, Betrag, Zeitstempel) erscheinen. Doppelte Abrechnungen f\u00fchren zu \u00dcberfakturierung und verf\u00e4lschen Ertragsberichte.'\n    en: 'Detects billing events that appear more than once with identical case, material, quantity, amount, and timestamp. Duplicate billing leads to over-invoicing and distorts revenue reports.'\n    fr: 'D\u00e9tecte les \u00e9v\u00e9nements de facturation apparaissant plusieurs fois avec des valeurs identiques. La facturation en double entra\u00eene une surfacturation et fausse les rapports de revenus.'\n  interpretation:\n    de: 'Abrechnungsereignis {entity_id} erscheint {duplicate_count}-mal mit identischen Werten (Fall {case_token}, Material {material_id}, Menge {quantity}, Betrag {billed_amount}). Der \u00dcberschuss betr\u00e4gt {money_at_risk}.'\n    en: \"Billing event {entity_id} appears {duplicate_count} times with identical values (case {case_token}, material {material_id}, qty {quantity}, amount {billed_amount}). Excess billed: {money_at_risk}.\"\n    fr: \"L'\u00e9v\u00e9nement de facturation {entity_id} appara\u00eet {duplicate_count} fois avec des valeurs identiques (cas {case_token}, mat\u00e9riau {material_id}, qt\u00e9 {quantity}, montant {billed_amount}). Exc\u00e9dent factur\u00e9: {money_at_risk}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_invoice_integrity", "label": "ProbeInvoiceIntegrity", "fullName": "yaml_probe_invoice_integrity", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_invoice_integrity.yaml", "layerOrder": -1, "source": "probe_id: probe_invoice_integrity\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: hand_written\nseverity: high\ndescription: >\n  Per case: compares invoiced vs uninvoiced billing events. Requires at\n  least one invoiced event. Cases with >20% uninvoiced events flagged as\n  high severity \u2014 indicates incomplete invoice processing.\n\nscope:\n  entity_type: Case\n  group_by: [case_token]\n  time:\n    entity: BillingEvent\n    field: billing_timestamp\n    bucket: week\n\nevidence_fields: [case_token, total_events, invoiced_events, uninvoiced_events, uninvoiced_pct, uninvoiced_amount]\n\nregistry:\n  probe_category: data_quality\n  risk_tier: operational_signal\n  confidence_weight: 0.2\n  display_name:\n    de: 'Rechnungsintegrit\u00e4t'\n    en: 'Invoice Integrity'\n    fr: 'Int\u00e9grit\u00e9 de facturation'\n  description:\n    de: 'Pr\u00fcft pro Fall das Verh\u00e4ltnis von Abrechnungsereignissen mit und ohne Rechnungsnummer. F\u00e4lle mit hohem Anteil nicht fakturierter Positionen deuten auf unvollst\u00e4ndige Rechnungsverarbeitung hin.'\n    en: \"Per case: compares invoiced vs uninvoiced billing events. Cases with high uninvoiced ratios indicate incomplete invoice processing.\"\n    fr: \"Par cas: compare les \u00e9v\u00e9nements factur\u00e9s et non factur\u00e9s. Un taux \u00e9lev\u00e9 de non-facturation indique un traitement incomplet des factures.\"\n  interpretation:\n    de: \"Fall {entity_id} hat {uninvoiced_events} von {total_events} Abrechnungsereignissen ohne Rechnungsnummer ({uninvoiced_pct}%). Nicht fakturierter Betrag: {uninvoiced_amount}.\"\n    en: \"Case {entity_id} has {uninvoiced_events} of {total_events} billing events without invoice number ({uninvoiced_pct}%). Uninvoiced amount: {uninvoiced_amount}.\"\n    fr: \"Le cas {entity_id} a {uninvoiced_events} sur {total_events} \u00e9v\u00e9nements sans num\u00e9ro de facture ({uninvoiced_pct}%). Montant non factur\u00e9: {uninvoiced_amount}.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_io_coefficient", "label": "ProbeIoCoefficient", "fullName": "yaml_probe_io_coefficient", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_io_coefficient.yaml", "layerOrder": -1, "source": "probe_id: probe_io_coefficient\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: ratio\nseverity: medium\ndescription: >\n  Flags materials where the aggregated I/O coefficient deviates >20% from 1.0,\n  indicating untracked ward-level consumption or over-delivery.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: IOCoefficient\n    field: month\n    bucket: raw\n\nsource:\n  entity: IOCoefficient\n  group_by: [material_id, material_description, standard_price, material_group]\n  where:\n    population: \"both_present\"\n  numerator:\n    expression: transfer_qty\n    aggregate: sum\n  denominator:\n    expression: usage_qty\n    aggregate: sum\n\nexpected_ratio: 1.0\ntolerance_ratio: 0.20\n\nseverity_rules:\n  - above: 0.50\n    level: high\n  - default: medium\n\nmoney_at_risk: \"abs(sum_numerator - sum_denominator) * max(standard_price)\"\n\nevidence_fields: [transfer_qty, usage_qty, io_coefficient, months_observed]\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: operational_signal\n  confidence_weight: 0.1\n  display_name:\n    de: 'I/O-Koeffizient-Abweichung'\n    en: 'I/O Coefficient Anomaly'\n    fr: 'Anomalie du coefficient I/O'\n  description:\n    de: 'Vergleicht die an Stationen transferierte Menge mit dem dokumentierten Patientenverbrauch pro Material und Monat. Starke Abweichungen deuten auf undokumentierten Verbrauch oder \u00dcberbestellungen hin.'\n    en: 'Compares quantities transferred to wards with documented patient usage per material per month. Large deviations indicate untracked consumption or over-ordering.'\n    fr: 'Compare les quantit\u00e9s transf\u00e9r\u00e9es aux unit\u00e9s avec la consommation document\u00e9e par mat\u00e9riau et par mois. Les \u00e9carts importants indiquent une consommation non suivie ou des commandes excessives.'\n  interpretation:\n    de: \"Material {entity_id} zeigt einen I/O-Koeffizienten von {io_coefficient} \u00fcber {months_observed} Monate. Ein Wert unter 1 bedeutet: der Verbrauch \u00fcbersteigt die Transfers. Ein Wert \u00fcber 1: die Transfers \u00fcbersteigen den Verbrauch.\"\n    en: 'Material {entity_id} shows an I/O coefficient of {io_coefficient} over {months_observed} months. A value below 1 means usage exceeds transfers (possible untracked consumption). Above 1 means transfers exceed usage (possible over-ordering).'\n    fr: \"Le mat\u00e9riau {entity_id} pr\u00e9sente un coefficient I/O de {io_coefficient} sur {months_observed} mois. Une valeur inf\u00e9rieure \u00e0 1 signifie que la consommation d\u00e9passe les transferts. Sup\u00e9rieure \u00e0 1 : les transferts d\u00e9passent la consommation.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_io_coefficient_trend", "label": "ProbeIoCoefficientTrend", "fullName": "yaml_probe_io_coefficient_trend", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_io_coefficient_trend.yaml", "layerOrder": -1, "source": "probe_id: probe_io_coefficient_trend\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: trend\nseverity: medium\ndescription: >\n  Flags materials with worsening I/O coefficient trends \u2014 coefficient moving\n  further from 1.0 over time, indicating systematic process degradation\n  rather than one-time spikes. Requires at least 4 months of data.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: IOCoefficientTrend\n    field: month\n    bucket: raw\n\nsource:\n  entity: IOCoefficientTrend\n  group_by: [material_id, material_description, standard_price, material_group, months_active, trend_direction]\n  where:\n    population: \"both_present\"\n  trend_field: rolling_avg_3m\n  direction_field: trend_direction\n  direction_value: worsening\n  min_periods: 4\n  min_periods_field: months_active\n  qty_delta_field: qty_delta\n\ndrift_threshold: 0.15\n\nseverity_rules:\n  - above: 0.30\n    level: high\n  - default: medium\n\nmoney_at_risk: \"sum(abs(qty_delta)) * max(standard_price)\"\n\nevidence_fields: [earliest_rolling_avg, latest_rolling_avg, drift, months_active, trend_direction]\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: operational_signal\n  confidence_weight: 0.1\n  display_name:\n    de: 'I/O-Koeffizient-Trend'\n    en: 'I/O Coefficient Trend'\n    fr: 'Tendance du coefficient I/O'\n  description:\n    de: 'Erkennt Materialien mit sich stetig verschlechterndem I/O-Koeffizienten \u00fcber die Zeit. Ein Trend ist ein st\u00e4rkeres Signal als ein einzelner Ausreisser und deutet auf systematische Prozessprobleme hin.'\n    en: 'Detects materials with steadily worsening I/O coefficient over time. A trend is a stronger signal than a single spike and indicates systematic process degradation.'\n    fr: \"D\u00e9tecte les mat\u00e9riaux dont le coefficient I/O se d\u00e9grade progressivement. Une tendance est un signal plus fort qu'un pic isol\u00e9 et indique une d\u00e9gradation syst\u00e9matique des processus.\"\n  interpretation:\n    de: \"Material {entity_id} zeigt einen sich verschlechternden I/O-Koeffizienten: der 3-Monats-Durchschnitt verschob sich von {earliest_rolling_avg} auf {latest_rolling_avg} \u00fcber {months_active} Monate (Drift: {drift}). Dies deutet auf eine systematische Prozessverschlechterung hin.\"\n    en: \"Material {entity_id} shows a worsening I/O coefficient trend: the 3-month rolling average moved from {earliest_rolling_avg} to {latest_rolling_avg} over {months_active} months (drift: {drift}). This indicates systematic process degradation.\"\n    fr: \"Le mat\u00e9riau {entity_id} pr\u00e9sente une tendance I/O en d\u00e9gradation: la moyenne mobile 3 mois est pass\u00e9e de {earliest_rolling_avg} \u00e0 {latest_rolling_avg} sur {months_active} mois (d\u00e9rive: {drift}). Cela indique une d\u00e9gradation syst\u00e9matique du processus.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_io_coefficient_weekly", "label": "ProbeIoCoefficientWeekly", "fullName": "yaml_probe_io_coefficient_weekly", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_io_coefficient_weekly.yaml", "layerOrder": -1, "source": "probe_id: probe_io_coefficient_weekly\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: ratio\nseverity: medium\ndescription: >\n  Weekly-grain I/O coefficient analysis. Flags materials where the weekly aggregated\n  I/O coefficient deviates >20% from 1.0, providing higher-resolution visibility\n  into ward consumption patterns than the monthly variant.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: IOCoefficientWeekly\n    field: week\n    bucket: raw\n\nsource:\n  entity: IOCoefficientWeekly\n  group_by: [material_id, material_description, standard_price, material_group]\n  where:\n    population: \"both_present\"\n  numerator:\n    expression: transfer_qty\n    aggregate: sum\n  denominator:\n    expression: usage_qty\n    aggregate: sum\n\nexpected_ratio: 1.0\ntolerance_ratio: 0.20\n\nseverity_rules:\n  - above: 0.50\n    level: high\n  - default: medium\n\nmoney_at_risk: \"abs(sum_numerator - sum_denominator) * max(standard_price)\"\n\nevidence_fields: [transfer_qty, usage_qty, io_coefficient, weeks_observed]\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: operational_signal\n  confidence_weight: 0.1\n  display_name:\n    de: 'I/O-Koeffizient (w\u00f6chentlich)'\n    en: 'I/O Coefficient (Weekly)'\n    fr: 'Coefficient I/O (hebdomadaire)'\n  description:\n    de: 'W\u00f6chentliche Analyse des I/O-Koeffizienten pro Material. H\u00f6here zeitliche Aufl\u00f6sung als die monatliche Variante \u2014 erm\u00f6glicht die Erkennung kurzfristiger Verbrauchsspitzen.'\n    en: 'Weekly I/O coefficient analysis per material. Higher temporal resolution than the monthly variant \u2014 enables detection of short-term consumption spikes.'\n    fr: \"Analyse hebdomadaire du coefficient I/O par mat\u00e9riau. R\u00e9solution temporelle plus \u00e9lev\u00e9e que la variante mensuelle \u2014 permet de d\u00e9tecter les pics de consommation \u00e0 court terme.\"\n  interpretation:\n    de: \"Material {entity_id} zeigt einen w\u00f6chentlichen I/O-Koeffizienten von {io_coefficient} \u00fcber {weeks_observed} Wochen.\"\n    en: \"Material {entity_id} shows a weekly I/O coefficient of {io_coefficient} over {weeks_observed} weeks.\"\n    fr: \"Le mat\u00e9riau {entity_id} pr\u00e9sente un coefficient I/O hebdomadaire de {io_coefficient} sur {weeks_observed} semaines.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_io_coefficient_weekly_trend", "label": "ProbeIoCoefficientWeeklyTrend", "fullName": "yaml_probe_io_coefficient_weekly_trend", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_io_coefficient_weekly_trend.yaml", "layerOrder": -1, "source": "probe_id: probe_io_coefficient_weekly_trend\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: trend\nseverity: medium\ndescription: >\n  Weekly-grain I/O coefficient trend detection. Flags materials with worsening\n  coefficient trends at weekly resolution, using a 4-week rolling average.\n  Requires at least 8 weeks of data.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: IOCoefficientWeeklyTrend\n    field: week\n    bucket: raw\n\nsource:\n  entity: IOCoefficientWeeklyTrend\n  group_by: [material_id, material_description, standard_price, material_group, weeks_active, trend_direction]\n  where:\n    population: \"both_present\"\n  trend_field: rolling_avg_4w\n  direction_field: trend_direction\n  direction_value: worsening\n  min_periods: 8\n  min_periods_field: weeks_active\n  qty_delta_field: qty_delta\n\ndrift_threshold: 0.15\n\nseverity_rules:\n  - above: 0.30\n    level: high\n  - default: medium\n\nmoney_at_risk: \"sum(abs(qty_delta)) * max(standard_price)\"\n\nevidence_fields: [earliest_rolling_avg, latest_rolling_avg, drift, weeks_active, trend_direction]\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: operational_signal\n  confidence_weight: 0.1\n  display_name:\n    de: 'I/O-Koeffizient-Trend (w\u00f6chentlich)'\n    en: 'I/O Coefficient Trend (Weekly)'\n    fr: 'Tendance coefficient I/O (hebdomadaire)'\n  description:\n    de: 'W\u00f6chentliche Trenderkennung f\u00fcr I/O-Koeffizienten. Der 4-Wochen-Durchschnitt zeigt kurzfristige Verschlechterungen fr\u00fcher als der Monatstrend.'\n    en: 'Weekly trend detection for I/O coefficients. The 4-week rolling average surfaces short-term deterioration earlier than the monthly trend.'\n    fr: \"D\u00e9tection de tendance hebdomadaire pour les coefficients I/O. La moyenne mobile 4 semaines r\u00e9v\u00e8le les d\u00e9gradations \u00e0 court terme plus t\u00f4t que la tendance mensuelle.\"\n  interpretation:\n    de: \"Material {entity_id} zeigt einen sich verschlechternden w\u00f6chentlichen I/O-Trend: der 4-Wochen-Durchschnitt verschob sich von {earliest_rolling_avg} auf {latest_rolling_avg} \u00fcber {weeks_active} Wochen (Drift: {drift}).\"\n    en: \"Material {entity_id} shows a worsening weekly I/O trend: the 4-week rolling average moved from {earliest_rolling_avg} to {latest_rolling_avg} over {weeks_active} weeks (drift: {drift}).\"\n    fr: \"Le mat\u00e9riau {entity_id} pr\u00e9sente une tendance I/O hebdomadaire en d\u00e9gradation: la moyenne mobile 4 semaines est pass\u00e9e de {earliest_rolling_avg} \u00e0 {latest_rolling_avg} sur {weeks_active} semaines (d\u00e9rive: {drift}).\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_migel_reimbursement_gap", "label": "ProbeMigelReimbursementGap", "fullName": "yaml_probe_migel_reimbursement_gap", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_migel_reimbursement_gap.yaml", "layerOrder": -1, "source": "probe_id: probe_migel_reimbursement_gap\nversion: \"1.0.0\"\ncontract: \"silver.v1\"\ntype: silver_audit\nseverity: medium\ndescription: >\n  Flags billable materials without a MiGEL code that have billing activity.\n  Without a MiGEL code, reimbursement claims may be rejected by insurers \u2014\n  a compliance and revenue risk.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: SilverBillingEvent\n    field: billing_timestamp\n    bucket: week\n\nsource:\n  entity: SilverMaterial\n  filter_expression: >\n    (migel_code is null or trim(migel_code) = '')\n    and is_billable = true\n    and trim(material_id) is not null\n    and trim(material_id) != ''\n  fields: [material_id, material_description, material_group, is_billable, migel_code]\n  entity_id_field: material_id\n  join_key: material_id\n\nactivity_joins:\n  - entity: SilverBillingEvent\n    join_key: material_id\n    alias: billing\n    aggregates:\n      count: billing_count\n      sum: [billed_amount]\n\nactivity_filter: \"billing_count > 0\"\n\nseverity_rules:\n  - above_money: 10000\n    level: high\n  - above_money: 1000\n    level: medium\n  - default: low\n\nmoney_at_risk: \"round(total_billed_amount, 2)\"\n\nevidence_fields: [material_description, material_group, is_billable, migel_code, billing_count, total_billed_amount]\n\nregistry:\n  probe_category: compliance\n  risk_tier: compliance_exposure\n  confidence_weight: 0.5\n  display_name:\n    de: 'Fehlender MiGEL-Code'\n    en: 'MiGEL Reimbursement Gap'\n    fr: 'Code MiGEL manquant'\n  description:\n    de: 'Erkennt fakturierbare Materialien ohne MiGEL-Code. Ohne MiGEL-Code k\u00f6nnen R\u00fcckerstattungsantr\u00e4ge bei Versicherern abgelehnt werden \u2014 ein Compliance- und Ertragsrisiko.'\n    en: 'Flags billable materials without a MiGEL code that have billing activity. Without a MiGEL code, reimbursement claims may be rejected \u2014 a compliance and revenue risk.'\n    fr: 'Signale les mat\u00e9riaux facturables sans code MiGEL ayant une activit\u00e9 de facturation. Sans code MiGEL, les demandes de remboursement peuvent \u00eatre refus\u00e9es \u2014 un risque de conformit\u00e9 et de revenus.'\n  interpretation:\n    de: 'Material {entity_id} ({material_description}) ist fakturierbar, hat aber keinen MiGEL-Code. Es wurde {billing_count}\u00d7 fakturiert (Total {total_billed_amount}). R\u00fcckerstattungsantr\u00e4ge k\u00f6nnen abgelehnt werden.'\n    en: 'Material {entity_id} ({material_description}) is billable but has no MiGEL code. Billed {billing_count} times (total {total_billed_amount}). Reimbursement claims may be rejected.'\n    fr: \"Le mat\u00e9riau {entity_id} ({material_description}) est facturable mais n'a pas de code MiGEL. Factur\u00e9 {billing_count} fois (total {total_billed_amount}). Les demandes de remboursement peuvent \u00eatre refus\u00e9es.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_missing_mandatory_implants", "label": "ProbeMissingMandatoryImplants", "fullName": "yaml_probe_missing_mandatory_implants", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_missing_mandatory_implants.yaml", "layerOrder": -1, "source": "probe_id: probe_missing_mandatory_implants\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: mandatory_item\nseverity: high\ndescription: >\n  Flags implant-requiring procedures (hip/knee replacement) that have no\n  matching implant material usage, indicating a documentation or billing gap.\n\nscope:\n  entity_type: Case\n  group_by: [case_token]\n  time:\n    entity: Procedure\n    field: procedure_timestamp\n    bucket: week\n\nqualifying:\n  entity: Procedure\n  join_key: case_token\n  where:\n    procedure_type:\n      in: [HIP_REPLACEMENT, KNEE_REPLACEMENT]\n\nrequired:\n  entity: CaseMaterialUsage\n  join_key: case_token\n  lookup:\n    entity: Material\n    join_key: material_id\n    where:\n      material_group: IMPLANT\n  min_count: 1\n\nmoney_at_risk_fixed: 2500.00\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: compliance_exposure\n  confidence_weight: 0.5\n  display_name:\n    de: 'Fehlende Implantat-Dokumentation'\n    en: 'Missing Implant Documentation'\n    fr: \"Documentation d'implant manquante\"\n  description:\n    de: 'Identifiziert F\u00e4lle mit implantatpflichtigen Eingriffen, bei denen kein Implantat im Materialverbrauch dokumentiert ist. Fehlende Implantate bedeuten fehlende R\u00fcckverfolgbarkeit und potenzielle Compliance-Risiken.'\n    en: 'Identifies cases with implant-requiring procedures but no matching implant material usage. Missing implants mean missing traceability and potential compliance risk.'\n    fr: 'Identifie les cas avec des interventions n\u00e9cessitant un implant mais sans consommation de mat\u00e9riel correspondante. Implique un manque de tra\u00e7abilit\u00e9 et un risque de conformit\u00e9.'\n  interpretation:\n    de: 'Fall {entity_id} hatte eine implantatpflichtige Prozedur, aber nur {item_count} Implantat-Eintr\u00e4ge im Materialverbrauch. Es fehlt die Dokumentation des eingesetzten Implantats.'\n    en: 'Case {entity_id} underwent an implant-requiring procedure but has only {item_count} implant records in material usage. The implant documentation is missing.'\n    fr: \"Le cas {entity_id} a subi une proc\u00e9dure n\u00e9cessitant un implant, mais seuls {item_count} enregistrements d'implants ont \u00e9t\u00e9 trouv\u00e9s. La documentation de l'implant utilis\u00e9 est manquante.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_missing_standard_price", "label": "ProbeMissingStandardPrice", "fullName": "yaml_probe_missing_standard_price", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_missing_standard_price.yaml", "layerOrder": -1, "source": "probe_id: probe_missing_standard_price\nversion: \"1.0.0\"\ncontract: \"silver.v1\"\ntype: silver_audit\nseverity: medium\ndescription: >\n  Flags active materials with zero or negative standard_price that have\n  transactional activity (usage or billing). Without a price, value\n  calculations in Gold models are impossible \u2014 an invisible gap.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: SilverBillingEvent\n    field: billing_timestamp\n    bucket: week\n\nsource:\n  entity: SilverMaterial\n  filter_expression: >\n    (cast(standard_price as decimal(12, 2)) is null\n     or cast(standard_price as decimal(12, 2)) <= 0)\n    and (null_price_allowed is null or null_price_allowed = false)\n    and trim(material_id) is not null\n    and trim(material_id) != ''\n\nactivity_joins:\n  - entity: SilverCaseMaterialUsage\n    join_key: material_id\n    alias: usage\n    aggregate: count\n  - entity: SilverBillingEvent\n    join_key: material_id\n    alias: billing\n    aggregates:\n      count: billing_count\n      sum: [billed_amount]\n\nactivity_filter: \"usage_count > 0 or billing_count > 0\"\n\nseverity_rules:\n  - above_count: 500\n    field: usage_count\n    level: high\n  - above_count: 100\n    field: usage_count\n    level: medium\n  - default: low\n\nmoney_at_risk: 0\n\nevidence_fields: [material_description, material_group, standard_price, is_active, is_billable, usage_count, billing_count, total_billed_amount]\n\nregistry:\n  probe_category: data_quality\n  risk_tier: operational_signal\n  confidence_weight: 0.2\n  display_name:\n    de: 'Fehlender Standardpreis'\n    en: 'Missing Standard Price'\n    fr: 'Prix standard manquant'\n  description:\n    de: 'Identifiziert aktive Materialien ohne g\u00fcltigen Standardpreis, die dennoch im Verbrauch oder in der Abrechnung auftauchen. Ohne Preis sind Wertberechnungen in Gold-Modellen unm\u00f6glich \u2014 eine unsichtbare L\u00fccke.'\n    en: 'Identifies active materials with no valid standard price that still appear in usage or billing. Without a price, value calculations in Gold models are impossible \u2014 an invisible gap.'\n    fr: 'Identifie les mat\u00e9riaux actifs sans prix standard valide mais pr\u00e9sents dans la consommation ou la facturation. Sans prix, les calculs de valeur dans les mod\u00e8les Gold sont impossibles \u2014 un angle mort.'\n  interpretation:\n    de: 'Material {entity_id} ({material_description}) hat keinen g\u00fcltigen Standardpreis ({standard_price}), wurde aber {usage_count}\u00d7 verwendet und {billing_count}\u00d7 fakturiert (Total {total_billed}). Der fehlende Preis verhindert korrekte Wertberechnungen.'\n    en: 'Material {entity_id} ({material_description}) has no valid standard price ({standard_price}) but was used {usage_count} times and billed {billing_count} times (total {total_billed}). The missing price prevents accurate value calculations.'\n    fr: \"Le mat\u00e9riau {entity_id} ({material_description}) n'a pas de prix standard valide ({standard_price}), mais a \u00e9t\u00e9 utilis\u00e9 {usage_count} fois et factur\u00e9 {billing_count} fois (total {total_billed}). Le prix manquant emp\u00eache les calculs de valeur.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_negative_margin", "label": "ProbeNegativeMargin", "fullName": "yaml_probe_negative_margin", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_negative_margin.yaml", "layerOrder": -1, "source": "probe_id: probe_negative_margin\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: enrichment\nseverity: high\ndescription: >\n  Identifies materials where the total billed revenue is less than the\n  purchase cost (negative margin). Indicates pricing errors, missing\n  markup, or contract misalignment.\n\nscope:\n  entity_type: Material\n  group_by: [material_id]\n  time:\n    entity: BillingEvent\n    field: billing_timestamp\n    bucket: week\n\ndimension:\n  entity: Material\n  key: material_id\n  where: \"coalesce(purchase_price, standard_price) is not null and coalesce(purchase_price, standard_price) > 0\"\n  fields: [material_description, purchase_price, standard_price]\n\nfact:\n  entity: BillingEvent\n  join_key: material_id\n  group_by: [material_id]\n  time_bucket: true\n  aggregates:\n    - alias: revenue\n      expression: billed_amount\n      aggregate: sum\n    - alias: qty_billed\n      expression: quantity\n      aggregate: sum\n\nderived:\n  - alias: cost\n    expression: \"qty_billed * coalesce(dim.purchase_price, dim.standard_price)\"\n  - alias: margin_pct\n    expression: \"case when revenue = 0 then null else round(100.0 * (revenue - qty_billed * coalesce(dim.purchase_price, dim.standard_price)) / revenue, 2) end\"\n\nflag: \"cost > revenue and revenue > 0\"\n\nentity_id_field: material_id\ntime_bucket_field: month\n\nmoney_at_risk: \"greatest(round(cost - revenue, 2), 0)\"\n\nseverity_rules:\n  - below: -20\n    field: margin_pct\n    level: high\n  - below: -5\n    field: margin_pct\n    level: medium\n  - default: low\n\nevidence_fields: [material_id, material_description, month, revenue, cost, margin_pct]\n\nregistry:\n  probe_category: financial_anomaly\n  risk_tier: direct_financial\n  confidence_weight: 1.0\n  display_name:\n    de: 'Negative Marge'\n    en: 'Negative Margin'\n    fr: 'Marge n\u00e9gative'\n  description:\n    de: 'Identifiziert Materialien, bei denen die Abrechnungseinnahmen unter den Einkaufskosten liegen (negative Marge). Hinweis auf Preisfehler, fehlende Aufschl\u00e4ge oder Vertragsabweichungen.'\n    en: 'Identifies materials where billed revenue falls below purchase cost (negative margin). Indicates pricing errors, missing markup, or contract misalignment.'\n    fr: \"Identifie les mat\u00e9riaux dont les revenus factur\u00e9s sont inf\u00e9rieurs au co\u00fbt d'achat (marge n\u00e9gative). Indique des erreurs de prix, un manque de majoration ou un d\u00e9salignement contractuel.\"\n  interpretation:\n    de: \"Material {entity_id} ({material_description}) zeigt im Monat {month} eine negative Marge: Ertrag {revenue}, Kosten {cost}, Marge {margin_pct}%.\"\n    en: \"Material {entity_id} ({material_description}) shows negative margin in {month}: revenue {revenue}, cost {cost}, margin {margin_pct}%.\"\n    fr: \"Le mat\u00e9riau {entity_id} ({material_description}) pr\u00e9sente une marge n\u00e9gative en {month}: revenus {revenue}, co\u00fbts {cost}, marge {margin_pct}%.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_orphan_billing", "label": "ProbeOrphanBilling", "fullName": "yaml_probe_orphan_billing", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_orphan_billing.yaml", "layerOrder": -1, "source": "probe_id: probe_orphan_billing\nversion: \"1.0.0\"\ncontract: \"silver.v1\"\ntype: silver_audit\nseverity: medium\ndescription: >\n  Surfaces billing events that reference non-existent cases or materials.\n  These records are filtered by Gold, but the data gap is real \u2014 an\n  invisible hole in billing.\n\nscope:\n  entity_type: BillingEvent\n  group_by: [billing_id]\n  time:\n    entity: SilverBillingEvent\n    field: billing_timestamp\n    bucket: week\n\nsource:\n  entity: SilverBillingEvent\n  validity_filter:\n    is_valid: false\n    invalid_reason:\n      in: [orphan case_token, orphan material_id]\n\ngroup_by_field: invalid_reason\nentity_id_expression: >\n  case when invalid_reason = 'orphan case_token'\n    then cast(case_token as varchar)\n    else cast(material_id as varchar)\n  end\n\naggregates:\n  count: record_count\n  sum: [billed_amount]\n  min: [billing_timestamp]\n  max: [billing_timestamp]\n\nseverity_rules:\n  - above_count: 500\n    level: high\n  - above_count: 50\n    level: medium\n  - default: low\n\nmoney_at_risk: 0\n\nevidence_fields: [orphan_type, orphan_ref, record_count, total_billed, first_seen, last_seen]\n\nregistry:\n  probe_category: data_quality\n  risk_tier: direct_financial\n  confidence_weight: 1.0\n  display_name:\n    de: 'Verwaiste Abrechnungen'\n    en: 'Orphan Billing Records'\n    fr: 'Facturations orphelines'\n  description:\n    de: 'Macht Abrechnungen sichtbar, die auf nicht existierende F\u00e4lle oder Materialien verweisen. Diese Datens\u00e4tze werden von Gold gefiltert, aber der finanzielle Verlust bleibt real \u2014 eine unsichtbare L\u00fccke in der Abrechnung.'\n    en: 'Surfaces billing events that reference non-existent cases or materials. These records are filtered by Gold, but the financial gap is real \u2014 an invisible hole in billing.'\n    fr: \"Met en lumi\u00e8re les facturations r\u00e9f\u00e9ren\u00e7ant des cas ou mat\u00e9riaux inexistants. Ces enregistrements sont filtr\u00e9s par Gold, mais l'\u00e9cart financier est r\u00e9el \u2014 un trou invisible dans la facturation.\"\n  interpretation:\n    de: 'F\u00fcr {orphan_type} \u00ab{entity_id}\u00bb existieren {record_count} Abrechnungsdatens\u00e4tze mit einem Gesamtwert von {money_at_risk}. Diese Datens\u00e4tze verweisen auf einen nicht existierenden Stammdatensatz.'\n    en: \"{record_count} billing records totalling {money_at_risk} reference {orphan_type} \\\"{entity_id}\\\" which does not exist in master data. These records are invisible in Gold layer analytics.\"\n    fr: \"{record_count} enregistrements de facturation totalisant {money_at_risk} r\u00e9f\u00e9rencent {orphan_type} \u00ab{entity_id}\u00bb qui n'existe pas dans les donn\u00e9es de base.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_procedure_without_usage", "label": "ProbeProcedureWithoutUsage", "fullName": "yaml_probe_procedure_without_usage", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_procedure_without_usage.yaml", "layerOrder": -1, "source": "probe_id: probe_procedure_without_usage\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: mandatory_item\nseverity: medium\ndescription: >\n  Flags cases that have documented procedures but zero material usage\n  records. Every procedure consumes materials \u2014 missing usage indicates\n  a documentation or traceability gap affecting compliance.\n\nscope:\n  entity_type: Case\n  group_by: [case_token]\n  time:\n    entity: Procedure\n    field: procedure_timestamp\n    bucket: week\n\nqualifying:\n  entity: Procedure\n  join_key: case_token\n\nrequired:\n  entity: CaseMaterialUsage\n  join_key: case_token\n  min_count: 1\n\nmoney_at_risk_fixed: 0.00\n\nregistry:\n  probe_category: compliance\n  risk_tier: operational_signal\n  confidence_weight: 0.2\n  display_name:\n    de: 'Eingriff ohne Materialverbrauch'\n    en: 'Procedure Without Material Usage'\n    fr: 'Proc\u00e9dure sans consommation'\n  description:\n    de: 'Identifiziert F\u00e4lle mit dokumentierten Eingriffen, aber ohne Materialverbrauch. Jeder Eingriff verbraucht Material \u2014 fehlende Dokumentation bedeutet eine R\u00fcckverfolgbarkeitsl\u00fccke und erschwert die Kostenrechnung.'\n    en: 'Identifies cases with documented procedures but no material usage records. Every procedure consumes materials \u2014 missing documentation means a traceability gap affecting cost accounting.'\n    fr: \"Identifie les cas avec des proc\u00e9dures document\u00e9es mais aucune consommation de mat\u00e9riel. Chaque proc\u00e9dure consomme du mat\u00e9riel \u2014 l'absence de documentation cr\u00e9e un manque de tra\u00e7abilit\u00e9.\"\n  interpretation:\n    de: 'Fall {entity_id} ({case_type}) hatte {procedure_count} Eingriff(e) ({procedure_types}), aber keinen einzigen Materialverbrauch. Dies ist eine Dokumentationsl\u00fccke mit Compliance-Relevanz.'\n    en: 'Case {entity_id} ({case_type}) had {procedure_count} procedure(s) ({procedure_types}) but zero material usage records. This is a documentation gap with compliance implications.'\n    fr: \"Le cas {entity_id} ({case_type}) a eu {procedure_count} proc\u00e9dure(s) ({procedure_types}) mais aucune consommation de mat\u00e9riel. C'est une lacune documentaire avec des implications de conformit\u00e9.\"\n", "lang": "yaml"}, "classes": "yaml"}, {"data": {"id": "yaml_probe_revenue_leakage", "label": "ProbeRevenueLeakage", "fullName": "yaml_probe_revenue_leakage", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/probe_revenue_leakage.yaml", "layerOrder": -1, "source": "probe_id: probe_revenue_leakage\nversion: \"1.0.0\"\ncontract: \"gold.v1\"\ntype: balance\nseverity: high\ndescription: >\n  Detects cases where the total material usage value exceeds total billed\n  amount, indicating potential revenue leakage from unbilled consumption.\n\nscope:\n  entity_type: Case\n  group_by: [case_token]\n  time:\n    entity: CaseMaterialUsage\n    field: usage_timestamp\n    bucket: week\n\nleft:\n  entity: CaseMaterialUsage\n  expression: \"quantity * unit_price\"\n  aggregate: sum\n  alias: usage_value\n\nright:\n  entity: BillingEvent\n  expression: \"billed_amount\"\n  aggregate: sum\n  alias: billing_value\n  where:\n    billing_status: POSTED\n\njoin_key: case_token\ntolerance_pct: 2.0\n\nseverity_rules:\n  - above: 20.0\n    level: high\n  - above: 5.0\n    level: medium\n  - default: low\n\nmoney_at_risk: \"left_value - right_value\"\n
