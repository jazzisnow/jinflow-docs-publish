procedures but zero material usage records. Every procedure consumes materials \u2014 missing usage indicates a documentation or traceability gap affecting compliance.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nqualifying_cases as (\n    select distinct case_token\n    from {{ ref('gold_procedures') }}\n),\n\nrequired_items as (\n    select\n        case_token,\n        count(*) as item_count\n    from {{ ref('gold_case_material_usage') }}\n    group by case_token\n),\n\ntime_buckets as (\n    select\n        case_token,\n        min(cast(extract(isoyear from cast(procedure_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(procedure_timestamp as date)) as varchar), 2, '0')) as time_bucket\n    from {{ ref('gold_procedures') }}\n    group by case_token\n),\n\nmissing as (\n    select\n        q.case_token,\n        t.time_bucket,\n        coalesce(r.item_count, 0) as item_count\n    from qualifying_cases q\n    left join required_items r on q.case_token = r.case_token\n    left join time_buckets t on q.case_token = t.case_token\n    where coalesce(r.item_count, 0) < 1\n)\n\nselect\n    md5(\n        'probe_procedure_without_usage' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(case_token as varchar) || '|' || coalesce(time_bucket, '')\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_procedure_without_usage' as probe_id,\n    '1.0.0' as probe_version,\n    'medium' as severity,\n    'Case' as entity_type,\n    cast(case_token as varchar) as entity_id,\n    coalesce(time_bucket, 'unknown') as time_bucket,\n    0.0 as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_procedure_without_usage\", \"item_count\": \"' || cast(item_count as varchar) || '\"}' as evidence\nfrom missing\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_revenue_leakage", "label": "RevenueLeakage", "fullName": "probe_findings__probe_revenue_leakage", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_revenue_leakage.sql", "layerOrder": 4, "source": "-- Probe: probe_revenue_leakage (balance)\n-- Detects cases where the total material usage value exceeds total billed amount, indicating potential revenue leakage from unbilled consumption.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nleft_agg as (\n    select\n        case_token,\n        sum(quantity * unit_price) as left_value\n    from {{ ref('gold_case_material_usage') }}\n    group by case_token\n),\n\nright_agg as (\n    select\n        case_token,\n        sum(billed_amount) as right_value\n    from {{ ref('gold_billing_events') }}\n    where billing_status = 'POSTED'\n    group by case_token\n),\n\ntime_buckets as (\n    select\n        case_token,\n        min(cast(extract(isoyear from cast(usage_timestamp as date)) as varchar) || '-W' || lpad(cast(extract(week from cast(usage_timestamp as date)) as varchar), 2, '0')) as time_bucket\n    from {{ ref('gold_case_material_usage') }}\n    group by case_token\n),\n\ncompared as (\n    select\n        l.case_token,\n        t.time_bucket,\n        l.left_value,\n        coalesce(r.right_value, 0) as right_value,\n        case\n            when l.left_value = 0 then 0\n            else 100.0 * (l.left_value - coalesce(r.right_value, 0)) / l.left_value\n        end as pct_diff\n    from left_agg l\n    left join right_agg r on l.case_token = r.case_token\n    left join time_buckets t on l.case_token = t.case_token\n    where abs(\n        case\n            when l.left_value = 0 then 0\n            else 100.0 * (l.left_value - coalesce(r.right_value, 0)) / l.left_value\n        end\n    ) > 2.0\n)\n\nselect\n    md5(\n        'probe_revenue_leakage' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(case_token as varchar) || '|' || coalesce(time_bucket, '')\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_revenue_leakage' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when abs(pct_diff) > 20.0 then 'high'\n            when abs(pct_diff) > 5.0 then 'medium'\n            else 'low'\n        end as severity,\n    'Case' as entity_type,\n    cast(case_token as varchar) as entity_id,\n    coalesce(time_bucket, 'unknown') as time_bucket,\n    greatest(left_value - right_value, 0) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_revenue_leakage\", \"left\": \"' || cast(round(left_value, 2) as varchar)\n        || '\", \"right\": \"' || cast(round(right_value, 2) as varchar)\n        || '\", \"pct_diff\": \"' || cast(round(pct_diff, 2) as varchar) || '\"}' as evidence\nfrom compared\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_shelf_life_risk", "label": "ShelfLifeRisk", "fullName": "probe_findings__probe_shelf_life_risk", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_shelf_life_risk.sql", "layerOrder": 4, "source": "-- Probe: probe_shelf_life_risk (hand_written)\n-- Short shelf life + low movement velocity = high expiration risk\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nshort_shelf_materials as (\n    select\n        material_id,\n        material_description,\n        standard_price,\n        shelf_life_months\n    from {{ ref('gold_materials') }}\n    where shelf_life_months is not null\n      and shelf_life_months > 0\n      and shelf_life_months < 6\n),\n\nmovement_velocity as (\n    select\n        mm.material_id,\n        count(distinct strftime(cast(mm.movement_timestamp as date), '%Y-%m')) as months_with_activity,\n        sum(mm.quantity) as total_qty,\n        sum(mm.quantity) / greatest(count(distinct strftime(cast(mm.movement_timestamp as date), '%Y-%m')), 1) as avg_monthly_qty\n    from {{ ref('gold_material_movements') }} mm\n    inner join short_shelf_materials ssm on mm.material_id = ssm.material_id\n    where mm.movement_type in ('TRANSFER', 'ISSUE')\n    group by mm.material_id\n),\n\nflagged as (\n    select\n        ssm.*,\n        coalesce(mv.months_with_activity, 0) as months_with_activity,\n        coalesce(mv.avg_monthly_qty, 0) as avg_monthly_qty,\n        ssm.standard_price * coalesce(mv.avg_monthly_qty, 0) as money_at_risk\n    from short_shelf_materials ssm\n    left join movement_velocity mv on ssm.material_id = mv.material_id\n    where coalesce(mv.avg_monthly_qty, 0) < 1\n)\n\nselect\n    md5(\n        'probe_shelf_life_risk' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || 'all'\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_shelf_life_risk' as probe_id,\n    '1.0.0' as probe_version,\n    case\n        when shelf_life_months <= 3 and avg_monthly_qty < 0.5 then 'high'\n        when shelf_life_months <= 3 then 'medium'\n        else 'medium'\n    end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    'all' as time_bucket,\n    greatest(round(money_at_risk, 2), 0) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_shelf_life_risk\"'\n        || ', \"material_description\": \"' || coalesce(replace(material_description, '\"', ''), '') || '\"'\n        || ', \"shelf_life_months\": \"' || cast(shelf_life_months as varchar) || '\"'\n        || ', \"avg_monthly_qty\": \"' || cast(round(avg_monthly_qty, 2) as varchar) || '\"'\n        || ', \"months_with_activity\": \"' || cast(months_with_activity as varchar) || '\"'\n        || '}' as evidence\nfrom flagged\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_findings__probe_stale_article", "label": "StaleArticle", "fullName": "probe_findings__probe_stale_article", "layer": "probe", "layerLabel": "Probes", "color": "#6b9fd4", "shape": "diamond", "layerShape": "diamond", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_findings__probe_stale_article.sql", "layerOrder": 4, "source": "-- Probe: probe_stale_article (silver_audit)\n-- Flags materials with valid_until in the past that still have transactional activity (usage or billing). Stale articles indicate expired catalogue entries being consumed \u2014 a data quality and procurement risk.\n{{ config(materialized='table', tags=['probe']) }}\n\nwith\n\nzero_price_materials as (\n    select\n        material_id,\n        material_description,\n        material_group,\n        valid_from,\n        valid_until\n    from {{ ref('silver_materials') }}\n    where valid_until is not null and cast(valid_until as date) < CURRENT_DATE and trim(material_id) is not null and trim(material_id) != ''\n),\n\nusage_agg as (\n    select material_id, count(*) as usage_count\n    from {{ ref('silver_case_material_usage') }}\n    group by material_id\n),\n\nbilling_agg as (\n    select material_id, count(*) as billing_count, sum(cast(billed_amount as decimal(12, 2))) as total_billed_amount\n    from {{ ref('silver_billing_events') }}\n    group by material_id\n),\n\nwith_activity as (\n    select\n        z.*,\n        coalesce(usage.usage_count, 0) as usage_count,\n        coalesce(billing.billing_count, 0) as billing_count,\n        coalesce(billing.total_billed_amount, 0) as total_billed_amount\n    from zero_price_materials z\n    left join usage_agg usage on z.material_id = usage.material_id\n    left join billing_agg billing on z.material_id = billing.material_id\n    where usage_count > 0 or billing_count > 0\n)\n\nselect\n    md5(\n        'probe_stale_article' || '|' || '{{ var(\"tenant_id\") }}' || '|'\n        || cast(material_id as varchar) || '|' || 'all'\n    ) as finding_id,\n    '{{ var(\"tenant_id\") }}' as tenant_id,\n    'probe_stale_article' as probe_id,\n    '1.0.0' as probe_version,\n    case\n            when usage_count > 100 then 'high'\n            when usage_count > 10 then 'medium'\n            else 'low'\n        end as severity,\n    'Material' as entity_type,\n    cast(material_id as varchar) as entity_id,\n    'all' as time_bucket,\n    round(round(total_billed_amount, 2), 2) as money_at_risk,\n    null as qty_at_risk,\n    '{\"probe\": \"probe_stale_article\"'\n        || ', \"material_description\": \"' || coalesce(cast(material_description as varchar), '') || '\"'\n        || ', \"material_group\": \"' || coalesce(cast(material_group as varchar), '') || '\"'\n        || ', \"valid_from\": \"' || coalesce(cast(valid_from as varchar), '') || '\"'\n        || ', \"valid_until\": \"' || coalesce(cast(valid_until as varchar), '') || '\"'\n        || ', \"usage_count\": \"' || coalesce(cast(usage_count as varchar), '') || '\"'\n        || ', \"billing_count\": \"' || coalesce(cast(billing_count as varchar), '') || '\"'\n        || ', \"total_billed_amount\": \"' || coalesce(cast(total_billed_amount as varchar), '') || '\"'\n        || '}' as evidence\nfrom with_activity\n", "lang": "sql"}, "classes": "probe"}, {"data": {"id": "probe_registry", "label": "Registry", "fullName": "probe_registry", "layer": "registry", "layerLabel": "Registries", "color": "#d4829e", "shape": "ellipse", "layerShape": "ellipse", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/probes/probe_registry.sql", "layerOrder": 4, "source": "-- Probe registry -- auto-generated by proberegistry.py. Do not edit manually.\n-- Override text via the registry: key in each probe's YAML definition.\n{{ config(materialized='table', tags=['probe']) }}\n\nSELECT\n  'probe_barcode_duplicate' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'data_quality' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.2 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Doppelter Barcode' AS display_name_de,\n  'Duplicate Barcode' AS display_name_en,\n  'Code-barres en double' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt Materialien mit identischem Barcode. Doppelte Barcodes verursachen Scanfehler und Fehlidentifikation im Lager und im OP.' AS description_de,\n  'Detects materials sharing the same barcode. Duplicate barcodes cause scanning errors and misidentification in warehouse and OR workflows.' AS description_en,\n  'D\u00e9tecte les mat\u00e9riaux partageant le m\u00eame code-barres. Les doublons causent des erreurs de scan et d''identification en entrep\u00f4t et au bloc op\u00e9ratoire.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} teilt den Barcode {barcode} mit {duplicate_count} anderen Materialien. Dies verursacht Scanfehler und Fehlidentifikation.'\n    AS interpretation_de,\n  'Material {entity_id} shares barcode {barcode} with {duplicate_count} other materials. This causes scanning errors and misidentification.'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} partage le code-barres {barcode} avec {duplicate_count} autres mat\u00e9riaux. Cela provoque des erreurs de scan et d''identification.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_billing_before_usage' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'data_quality' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.2 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'Abrechnung vor Verbrauch' AS display_name_de,\n  'Billing Before Usage' AS display_name_en,\n  'Facturation avant consommation' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt Fall-Material-Kombinationen, bei denen die Abrechnung zeitlich vor dem Materialverbrauch liegt. Ein Hinweis auf r\u00fcckdatierte Abrechnungen, Erfassungsfehler oder Schnittstellenprobleme.' AS description_de,\n  'Flags case-material combinations where billing precedes material usage. Indicates backdated billing, data entry errors, or system integration timing gaps.' AS description_en,\n  'D\u00e9tecte les combinaisons cas-mat\u00e9riau o\u00f9 la facturation pr\u00e9c\u00e8de la consommation. Indique une facturation antidat\u00e9e, des erreurs de saisie ou des probl\u00e8mes d''int\u00e9gration.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id}, Material {material_id}: Die Abrechnung erfolgte {gap_hours} Stunden vor dem ersten Materialverbrauch. Bei {billing_count} Abrechnungen und {usage_count} Verbrauchsereignissen deutet dies auf eine Zeitabweichung im Prozess hin.'\n    AS interpretation_de,\n  'Case {entity_id}, material {material_id}: billing occurred {gap_hours} hours before first material usage. With {billing_count} billing and {usage_count} usage events, this indicates a process timing discrepancy.'\n    AS interpretation_en,\n  'Cas {entity_id}, mat\u00e9riau {material_id}: la facturation a eu lieu {gap_hours} heures avant la premi\u00e8re consommation. Avec {billing_count} facturations et {usage_count} consommations, cela indique un \u00e9cart temporel dans le processus.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_billing_below_internal_price' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'direct_financial' AS risk_tier,\n  1.0 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Abrechnung unter Internpreis' AS display_name_de,\n  'Billing Below Internal Price' AS display_name_en,\n  'Facturation sous prix interne' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt Materialien, bei denen der durchschnittliche Abrechnungspreis unter dem internen Verkaufspreis liegt. Hinweis auf Unterbepreisung und m\u00f6glichen Ertragsverlust.' AS description_de,\n  'Identifies materials where the average billed unit price is below the internal sales price. Indicates potential revenue loss from underpricing or missing markup.' AS description_en,\n  'Identifie les mat\u00e9riaux dont le prix unitaire moyen factur\u00e9 est inf\u00e9rieur au prix de vente interne. Indique une perte de revenus potentielle due \u00e0 une sous-tarification.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} ({material_description}) wird im Monat {month} unter dem Internpreis fakturiert: Durchschnittspreis {avg_unit_price}, Internpreis {internal_sales_price}, L\u00fccke {price_gap} ({gap_pct}%).'\n    AS interpretation_de,\n  'Material {entity_id} ({material_description}) is billed below internal price in {month}: avg unit price {avg_unit_price}, internal price {internal_sales_price}, gap {price_gap} ({gap_pct}%).'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} ({material_description}) est factur\u00e9 sous le prix interne en {month}: prix moyen {avg_unit_price}, prix interne {internal_sales_price}, \u00e9cart {price_gap} ({gap_pct}%).'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_cc_producteur_mismatch' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'compliance_exposure' AS risk_tier,\n  0.5 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'KSt-Producteur-Abweichung' AS display_name_de,\n  'CC Producteur Mismatch' AS display_name_en,\n  '\u00c9cart CC producteur' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt F\u00e4lle, bei denen die Abrechnungs-Kostenstelle (Demandeur) von der produzierenden Kostenstelle (Producteur) abweicht. Hohe Abweichungsraten deuten auf systematische Zuordnungsfehler hin.' AS description_de,\n  'Flags cases where the billing cost center differs from cc_producteur. High mismatch rates per case indicate systematic cost center attribution errors.' AS description_en,\n  'Signale les cas o\u00f9 le centre de co\u00fbts de facturation diff\u00e8re du cc_producteur. Un taux \u00e9lev\u00e9 de divergence indique des erreurs syst\u00e9matiques d''attribution.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id} ({case_type}) hat {event_count} Abrechnungen mit abweichender Kostenstelle (Demandeur \u2260 Producteur). Gesamtwert: {total_billed_amount}.'\n    AS interpretation_de,\n  'Case {entity_id} ({case_type}) has {event_count} billing events where cost center differs from cc_producteur. Total amount: {total_billed_amount}.'\n    AS interpretation_en,\n  'Le cas {entity_id} ({case_type}) a {event_count} \u00e9v\u00e9nements o\u00f9 le centre de co\u00fbts diff\u00e8re du cc_producteur. Montant total: {total_billed_amount}.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_controlled_substance_traceability' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'compliance' AS probe_category,\n  'compliance_exposure' AS risk_tier,\n  0.5 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Bet\u00e4ubungsmittel-R\u00fcckverfolgbarkeit' AS display_name_de,\n  'Controlled Substance Traceability' AS display_name_en,\n  'Tra\u00e7abilit\u00e9 des substances contr\u00f4l\u00e9es' AS display_name_fr,\n  -- descriptions (what + why)\n  'Vergleicht pro BtM-Material und Monat: empfangene Menge minus abgegebene Menge minus Patientenverbrauch. L\u00fccken deuten auf nicht dokumentierten Bestand hin \u2014 ein regulatorisches Compliance-Risiko.' AS description_de,\n  'For controlled substances: compares received minus issued minus patient usage per material per month. Gaps indicate unaccounted stock \u2014 a regulatory compliance risk.' AS description_en,\n  'Pour les substances contr\u00f4l\u00e9es: compare les quantit\u00e9s re\u00e7ues moins \u00e9mises moins consomm\u00e9es par mat\u00e9riau et par mois. Les \u00e9carts indiquent un stock non comptabilis\u00e9 \u2014 un risque r\u00e9glementaire.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'BtM-Material {entity_id} ({material_description}) zeigt im Monat {month} eine Bestandsl\u00fccke: empfangen {received_qty}, abgegeben {issued_qty}, verbraucht {used_qty}, Differenz {gap_qty}.'\n    AS interpretation_de,\n  'Controlled substance {entity_id} ({material_description}) shows a stock gap in {month}: received {received_qty}, issued {issued_qty}, used {used_qty}, gap {gap_qty}.'\n    AS interpretation_en,\n  'Substance contr\u00f4l\u00e9e {entity_id} ({material_description}) pr\u00e9sente un \u00e9cart de stock en {month}: re\u00e7u {received_qty}, \u00e9mis {issued_qty}, consomm\u00e9 {used_qty}, \u00e9cart {gap_qty}.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_conversion_factor_anomaly' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'data_quality' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.2 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Umrechnungsfaktor-Anomalie' AS display_name_de,\n  'Conversion Factor Anomaly' AS display_name_en,\n  'Anomalie du facteur de conversion' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt Materialien mit unplausiblen Einheiten-Umrechnungsfaktoren (Null, negativ, extrem hoch oder Faktor=1 bei unterschiedlichen Einheiten). Fehlerhafte Faktoren verf\u00e4lschen Mengenberechnungen.' AS description_de,\n  'Flags materials with implausible unit conversion factors \u2014 zero, negative, extremely large, or factor=1 where unit codes differ. Bad factors corrupt quantity calculations.' AS description_en,\n  'Signale les mat\u00e9riaux avec des facteurs de conversion d''unit\u00e9s invraisemblables \u2014 z\u00e9ro, n\u00e9gatifs, extr\u00eamement \u00e9lev\u00e9s ou facteur=1 avec des codes d''unit\u00e9 diff\u00e9rents.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} hat einen unplausiblen Umrechnungsfaktor: Medium={conversion_factor_medium} ({unit_medium_code}), Gross={conversion_factor_large} ({unit_large_code}), Basiseinheit={unit_of_measure}.'\n    AS interpretation_de,\n  'Material {entity_id} has an implausible conversion factor: medium={conversion_factor_medium} ({unit_medium_code}), large={conversion_factor_large} ({unit_large_code}), base unit={unit_of_measure}.'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} a un facteur de conversion invraisemblable: moyen={conversion_factor_medium} ({unit_medium_code}), grand={conversion_factor_large} ({unit_large_code}), unit\u00e9 de base={unit_of_measure}.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_cost_center_billing_mismatch' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'compliance_exposure' AS risk_tier,\n  0.5 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'Kostenstellen-Zuordnungsfehler' AS display_name_de,\n  'Cost Center Billing Mismatch' AS display_name_en,\n  '\u00c9cart de facturation entre centres de co\u00fbts' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt F\u00e4lle, bei denen Abrechnungen einer anderen Kostenstelle zugeordnet sind als dem Fall. Fehlerhafte Zuordnungen verf\u00e4lschen die Kostentr\u00e4gerrechnung und erschweren die Leistungssteuerung.' AS description_de,\n  'Detects cases where billing is attributed to a different cost center than the case. Misattributions distort cost accounting and hinder performance management.' AS description_en,\n  'D\u00e9tecte les cas o\u00f9 la facturation est attribu\u00e9e \u00e0 un centre de co\u00fbts diff\u00e9rent. Les erreurs d''attribution faussent la comptabilit\u00e9 analytique et compliquent le pilotage.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id} hat {pct_diff}% der Abrechnung einer anderen Kostenstelle zugeordnet als der Fallkostenstelle. Dies weist auf Fehlzuordnungen zwischen Abteilungen hin.'\n    AS interpretation_de,\n  'Case {entity_id} has {pct_diff}% of billing attributed to a different cost center than the case''s assigned cost center. This indicates cross-department attribution errors.'\n    AS interpretation_en,\n  'Le cas {entity_id} a {pct_diff}% de la facturation attribu\u00e9e \u00e0 un centre de co\u00fbts diff\u00e9rent. Cela indique des erreurs d''attribution entre d\u00e9partements.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_cross_site_billing' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'compliance_exposure' AS risk_tier,\n  0.5 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'Standort\u00fcbergreifende Abrechnung' AS display_name_de,\n  'Cross-Site Billing' AS display_name_en,\n  'Facturation inter-sites' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt F\u00e4lle mit Abrechnungsereignissen, bei denen Anforderungs- und Leistungsstandort unterschiedlich sind. Standort\u00fcbergreifende Abrechnungen ben\u00f6tigen m\u00f6glicherweise eine separate Verrechnungsbehandlung.' AS description_de,\n  'Flags cases where billing events have different requesting and producing sites. Cross-site billing may need separate accounting treatment or indicate data entry errors.' AS description_en,\n  'Signale les cas dont les \u00e9v\u00e9nements de facturation ont des sites demandeur et producteur diff\u00e9rents. La facturation inter-sites peut n\u00e9cessiter un traitement comptable s\u00e9par\u00e9.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id} ({case_type}) hat {event_count} Abrechnungen mit unterschiedlichen Standorten (Anforderung \u2260 Leistung). Gesamtwert: {total_billed_amount}.'\n    AS interpretation_de,\n  'Case {entity_id} ({case_type}) has {event_count} billing events with different requesting and producing sites. Total amount: {total_billed_amount}.'\n    AS interpretation_en,\n  'Le cas {entity_id} ({case_type}) a {event_count} \u00e9v\u00e9nements de facturation avec des sites demandeur et producteur diff\u00e9rents. Montant total: {total_billed_amount}.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_drg_cost_outlier' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.3 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'DRG-Kostenausreisser' AS display_name_de,\n  'DRG Cost Outlier' AS display_name_en,\n  'Outlier de co\u00fbt DRG' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt F\u00e4lle mit ungew\u00f6hnlich hohen oder niedrigen Gesamtkosten innerhalb ihrer DRG-Gruppe (z-Score > 2). Hinweis auf Codier- oder Abrechnungsfehler.' AS description_de,\n  'Detects cases with unusually high or low total costs within their DRG peer group (z-score > 2). Indicates potential coding or billing errors.' AS description_en,\n  'D\u00e9tecte les cas avec des co\u00fbts inhabituellement \u00e9lev\u00e9s ou bas dans leur groupe DRG (z-score > 2). Indique des erreurs potentielles de codage ou de facturation.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id} (DRG {drg_code}) hat Gesamtkosten von {total_billed} bei einem DRG-Durchschnitt von {drg_avg} (z-Score: {z_score}). Dies deutet auf eine Kostenabweichung hin.'\n    AS interpretation_de,\n  'Case {entity_id} (DRG {drg_code}) has total cost of {total_billed} vs DRG average of {drg_avg} (z-score: {z_score}). This indicates a cost anomaly.'\n    AS interpretation_en,\n  'Le cas {entity_id} (DRG {drg_code}) a un co\u00fbt total de {total_billed} vs moyenne DRG de {drg_avg} (z-score: {z_score}). Cela indique une anomalie de co\u00fbt.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_duplicate_billing' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'direct_financial' AS risk_tier,\n  1.0 AS confidence_weight,\n  'BillingEvent' AS entity_type,\n  -- display names\n  'Doppelte Abrechnung' AS display_name_de,\n  'Duplicate Billing' AS display_name_en,\n  'Facturation en double' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt Abrechnungsereignisse, die mehrfach mit identischen Werten (Fall, Material, Menge, Betrag, Zeitstempel) erscheinen. Doppelte Abrechnungen f\u00fchren zu \u00dcberfakturierung und verf\u00e4lschen Ertragsberichte.' AS description_de,\n  'Detects billing events that appear more than once with identical case, material, quantity, amount, and timestamp. Duplicate billing leads to over-invoicing and distorts revenue reports.' AS description_en,\n  'D\u00e9tecte les \u00e9v\u00e9nements de facturation apparaissant plusieurs fois avec des valeurs identiques. La facturation en double entra\u00eene une surfacturation et fausse les rapports de revenus.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Abrechnungsereignis {entity_id} erscheint {duplicate_count}-mal mit identischen Werten (Fall {case_token}, Material {material_id}, Menge {quantity}, Betrag {billed_amount}). Der \u00dcberschuss betr\u00e4gt {money_at_risk}.'\n    AS interpretation_de,\n  'Billing event {entity_id} appears {duplicate_count} times with identical values (case {case_token}, material {material_id}, qty {quantity}, amount {billed_amount}). Excess billed: {money_at_risk}.'\n    AS interpretation_en,\n  'L''\u00e9v\u00e9nement de facturation {entity_id} appara\u00eet {duplicate_count} fois avec des valeurs identiques (cas {case_token}, mat\u00e9riau {material_id}, qt\u00e9 {quantity}, montant {billed_amount}). Exc\u00e9dent factur\u00e9: {money_at_risk}.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_invoice_integrity' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'data_quality' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.2 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'Rechnungsintegrit\u00e4t' AS display_name_de,\n  'Invoice Integrity' AS display_name_en,\n  'Int\u00e9grit\u00e9 de facturation' AS display_name_fr,\n  -- descriptions (what + why)\n  'Pr\u00fcft pro Fall das Verh\u00e4ltnis von Abrechnungsereignissen mit und ohne Rechnungsnummer. F\u00e4lle mit hohem Anteil nicht fakturierter Positionen deuten auf unvollst\u00e4ndige Rechnungsverarbeitung hin.' AS description_de,\n  'Per case: compares invoiced vs uninvoiced billing events. Cases with high uninvoiced ratios indicate incomplete invoice processing.' AS description_en,\n  'Par cas: compare les \u00e9v\u00e9nements factur\u00e9s et non factur\u00e9s. Un taux \u00e9lev\u00e9 de non-facturation indique un traitement incomplet des factures.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id} hat {uninvoiced_events} von {total_events} Abrechnungsereignissen ohne Rechnungsnummer ({uninvoiced_pct}%). Nicht fakturierter Betrag: {uninvoiced_amount}.'\n    AS interpretation_de,\n  'Case {entity_id} has {uninvoiced_events} of {total_events} billing events without invoice number ({uninvoiced_pct}%). Uninvoiced amount: {uninvoiced_amount}.'\n    AS interpretation_en,\n  'Le cas {entity_id} a {uninvoiced_events} sur {total_events} \u00e9v\u00e9nements sans num\u00e9ro de facture ({uninvoiced_pct}%). Montant non factur\u00e9: {uninvoiced_amount}.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_io_coefficient' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.1 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'I/O-Koeffizient-Abweichung' AS display_name_de,\n  'I/O Coefficient Anomaly' AS display_name_en,\n  'Anomalie du coefficient I/O' AS display_name_fr,\n  -- descriptions (what + why)\n  'Vergleicht die an Stationen transferierte Menge mit dem dokumentierten Patientenverbrauch pro Material und Monat. Starke Abweichungen deuten auf undokumentierten Verbrauch oder \u00dcberbestellungen hin.' AS description_de,\n  'Compares quantities transferred to wards with documented patient usage per material per month. Large deviations indicate untracked consumption or over-ordering.' AS description_en,\n  'Compare les quantit\u00e9s transf\u00e9r\u00e9es aux unit\u00e9s avec la consommation document\u00e9e par mat\u00e9riau et par mois. Les \u00e9carts importants indiquent une consommation non suivie ou des commandes excessives.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} zeigt einen I/O-Koeffizienten von {io_coefficient} \u00fcber {months_observed} Monate. Ein Wert unter 1 bedeutet: der Verbrauch \u00fcbersteigt die Transfers. Ein Wert \u00fcber 1: die Transfers \u00fcbersteigen den Verbrauch.'\n    AS interpretation_de,\n  'Material {entity_id} shows an I/O coefficient of {io_coefficient} over {months_observed} months. A value below 1 means usage exceeds transfers (possible untracked consumption). Above 1 means transfers exceed usage (possible over-ordering).'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} pr\u00e9sente un coefficient I/O de {io_coefficient} sur {months_observed} mois. Une valeur inf\u00e9rieure \u00e0 1 signifie que la consommation d\u00e9passe les transferts. Sup\u00e9rieure \u00e0 1 : les transferts d\u00e9passent la consommation.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_io_coefficient_trend' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.1 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'I/O-Koeffizient-Trend' AS display_name_de,\n  'I/O Coefficient Trend' AS display_name_en,\n  'Tendance du coefficient I/O' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt Materialien mit sich stetig verschlechterndem I/O-Koeffizienten \u00fcber die Zeit. Ein Trend ist ein st\u00e4rkeres Signal als ein einzelner Ausreisser und deutet auf systematische Prozessprobleme hin.' AS description_de,\n  'Detects materials with steadily worsening I/O coefficient over time. A trend is a stronger signal than a single spike and indicates systematic process degradation.' AS description_en,\n  'D\u00e9tecte les mat\u00e9riaux dont le coefficient I/O se d\u00e9grade progressivement. Une tendance est un signal plus fort qu''un pic isol\u00e9 et indique une d\u00e9gradation syst\u00e9matique des processus.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} zeigt einen sich verschlechternden I/O-Koeffizienten: der 3-Monats-Durchschnitt verschob sich von {earliest_rolling_avg} auf {latest_rolling_avg} \u00fcber {months_active} Monate (Drift: {drift}). Dies deutet auf eine systematische Prozessverschlechterung hin.'\n    AS interpretation_de,\n  'Material {entity_id} shows a worsening I/O coefficient trend: the 3-month rolling average moved from {earliest_rolling_avg} to {latest_rolling_avg} over {months_active} months (drift: {drift}). This indicates systematic process degradation.'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} pr\u00e9sente une tendance I/O en d\u00e9gradation: la moyenne mobile 3 mois est pass\u00e9e de {earliest_rolling_avg} \u00e0 {latest_rolling_avg} sur {months_active} mois (d\u00e9rive: {drift}). Cela indique une d\u00e9gradation syst\u00e9matique du processus.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_io_coefficient_weekly' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.1 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'I/O-Koeffizient (w\u00f6chentlich)' AS display_name_de,\n  'I/O Coefficient (Weekly)' AS display_name_en,\n  'Coefficient I/O (hebdomadaire)' AS display_name_fr,\n  -- descriptions (what + why)\n  'W\u00f6chentliche Analyse des I/O-Koeffizienten pro Material. H\u00f6here zeitliche Aufl\u00f6sung als die monatliche Variante \u2014 erm\u00f6glicht die Erkennung kurzfristiger Verbrauchsspitzen.' AS description_de,\n  'Weekly I/O coefficient analysis per material. Higher temporal resolution than the monthly variant \u2014 enables detection of short-term consumption spikes.' AS description_en,\n  'Analyse hebdomadaire du coefficient I/O par mat\u00e9riau. R\u00e9solution temporelle plus \u00e9lev\u00e9e que la variante mensuelle \u2014 permet de d\u00e9tecter les pics de consommation \u00e0 court terme.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} zeigt einen w\u00f6chentlichen I/O-Koeffizienten von {io_coefficient} \u00fcber {weeks_observed} Wochen.'\n    AS interpretation_de,\n  'Material {entity_id} shows a weekly I/O coefficient of {io_coefficient} over {weeks_observed} weeks.'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} pr\u00e9sente un coefficient I/O hebdomadaire de {io_coefficient} sur {weeks_observed} semaines.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_io_coefficient_weekly_trend' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.1 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'I/O-Koeffizient-Trend (w\u00f6chentlich)' AS display_name_de,\n  'I/O Coefficient Trend (Weekly)' AS display_name_en,\n  'Tendance coefficient I/O (hebdomadaire)' AS display_name_fr,\n  -- descriptions (what + why)\n  'W\u00f6chentliche Trenderkennung f\u00fcr I/O-Koeffizienten. Der 4-Wochen-Durchschnitt zeigt kurzfristige Verschlechterungen fr\u00fcher als der Monatstrend.' AS description_de,\n  'Weekly trend detection for I/O coefficients. The 4-week rolling average surfaces short-term deterioration earlier than the monthly trend.' AS description_en,\n  'D\u00e9tection de tendance hebdomadaire pour les coefficients I/O. La moyenne mobile 4 semaines r\u00e9v\u00e8le les d\u00e9gradations \u00e0 court terme plus t\u00f4t que la tendance mensuelle.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} zeigt einen sich verschlechternden w\u00f6chentlichen I/O-Trend: der 4-Wochen-Durchschnitt verschob sich von {earliest_rolling_avg} auf {latest_rolling_avg} \u00fcber {weeks_active} Wochen (Drift: {drift}).'\n    AS interpretation_de,\n  'Material {entity_id} shows a worsening weekly I/O trend: the 4-week rolling average moved from {earliest_rolling_avg} to {latest_rolling_avg} over {weeks_active} weeks (drift: {drift}).'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} pr\u00e9sente une tendance I/O hebdomadaire en d\u00e9gradation: la moyenne mobile 4 semaines est pass\u00e9e de {earliest_rolling_avg} \u00e0 {latest_rolling_avg} sur {weeks_active} semaines (d\u00e9rive: {drift}).'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_migel_reimbursement_gap' AS probe_id,\n  '1.0.0' AS probe_version,\n  'silver' AS data_layer,\n  'compliance' AS probe_category,\n  'compliance_exposure' AS risk_tier,\n  0.5 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Fehlender MiGEL-Code' AS display_name_de,\n  'MiGEL Reimbursement Gap' AS display_name_en,\n  'Code MiGEL manquant' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt fakturierbare Materialien ohne MiGEL-Code. Ohne MiGEL-Code k\u00f6nnen R\u00fcckerstattungsantr\u00e4ge bei Versicherern abgelehnt werden \u2014 ein Compliance- und Ertragsrisiko.' AS description_de,\n  'Flags billable materials without a MiGEL code that have billing activity. Without a MiGEL code, reimbursement claims may be rejected \u2014 a compliance and revenue risk.' AS description_en,\n  'Signale les mat\u00e9riaux facturables sans code MiGEL ayant une activit\u00e9 de facturation. Sans code MiGEL, les demandes de remboursement peuvent \u00eatre refus\u00e9es \u2014 un risque de conformit\u00e9 et de revenus.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} ({material_description}) ist fakturierbar, hat aber keinen MiGEL-Code. Es wurde {billing_count}\u00d7 fakturiert (Total {total_billed_amount}). R\u00fcckerstattungsantr\u00e4ge k\u00f6nnen abgelehnt werden.'\n    AS interpretation_de,\n  'Material {entity_id} ({material_description}) is billable but has no MiGEL code. Billed {billing_count} times (total {total_billed_amount}). Reimbursement claims may be rejected.'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} ({material_description}) est facturable mais n''a pas de code MiGEL. Factur\u00e9 {billing_count} fois (total {total_billed_amount}). Les demandes de remboursement peuvent \u00eatre refus\u00e9es.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_missing_mandatory_implants' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'compliance_exposure' AS risk_tier,\n  0.5 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'Fehlende Implantat-Dokumentation' AS display_name_de,\n  'Missing Implant Documentation' AS display_name_en,\n  'Documentation d''implant manquante' AS display_name_fr,\n  -- descriptions (what + why)\n  'Identifiziert F\u00e4lle mit implantatpflichtigen Eingriffen, bei denen kein Implantat im Materialverbrauch dokumentiert ist. Fehlende Implantate bedeuten fehlende R\u00fcckverfolgbarkeit und potenzielle Compliance-Risiken.' AS description_de,\n  'Identifies cases with implant-requiring procedures but no matching implant material usage. Missing implants mean missing traceability and potential compliance risk.' AS description_en,\n  'Identifie les cas avec des interventions n\u00e9cessitant un implant mais sans consommation de mat\u00e9riel correspondante. Implique un manque de tra\u00e7abilit\u00e9 et un risque de conformit\u00e9.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id} hatte eine implantatpflichtige Prozedur, aber nur {item_count} Implantat-Eintr\u00e4ge im Materialverbrauch. Es fehlt die Dokumentation des eingesetzten Implantats.'\n    AS interpretation_de,\n  'Case {entity_id} underwent an implant-requiring procedure but has only {item_count} implant records in material usage. The implant documentation is missing.'\n    AS interpretation_en,\n  'Le cas {entity_id} a subi une proc\u00e9dure n\u00e9cessitant un implant, mais seuls {item_count} enregistrements d''implants ont \u00e9t\u00e9 trouv\u00e9s. La documentation de l''implant utilis\u00e9 est manquante.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_missing_standard_price' AS probe_id,\n  '1.0.0' AS probe_version,\n  'silver' AS data_layer,\n  'data_quality' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.2 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Fehlender Standardpreis' AS display_name_de,\n  'Missing Standard Price' AS display_name_en,\n  'Prix standard manquant' AS display_name_fr,\n  -- descriptions (what + why)\n  'Identifiziert aktive Materialien ohne g\u00fcltigen Standardpreis, die dennoch im Verbrauch oder in der Abrechnung auftauchen. Ohne Preis sind Wertberechnungen in Gold-Modellen unm\u00f6glich \u2014 eine unsichtbare L\u00fccke.' AS description_de,\n  'Identifies active materials with no valid standard price that still appear in usage or billing. Without a price, value calculations in Gold models are impossible \u2014 an invisible gap.' AS description_en,\n  'Identifie les mat\u00e9riaux actifs sans prix standard valide mais pr\u00e9sents dans la consommation ou la facturation. Sans prix, les calculs de valeur dans les mod\u00e8les Gold sont impossibles \u2014 un angle mort.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} ({material_description}) hat keinen g\u00fcltigen Standardpreis ({standard_price}), wurde aber {usage_count}\u00d7 verwendet und {billing_count}\u00d7 fakturiert (Total {total_billed}). Der fehlende Preis verhindert korrekte Wertberechnungen.'\n    AS interpretation_de,\n  'Material {entity_id} ({material_description}) has no valid standard price ({standard_price}) but was used {usage_count} times and billed {billing_count} times (total {total_billed}). The missing price prevents accurate value calculations.'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} ({material_description}) n''a pas de prix standard valide ({standard_price}), mais a \u00e9t\u00e9 utilis\u00e9 {usage_count} fois et factur\u00e9 {billing_count} fois (total {total_billed}). Le prix manquant emp\u00eache les calculs de valeur.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_negative_margin' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'direct_financial' AS risk_tier,\n  1.0 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Negative Marge' AS display_name_de,\n  'Negative Margin' AS display_name_en,\n  'Marge n\u00e9gative' AS display_name_fr,\n  -- descriptions (what + why)\n  'Identifiziert Materialien, bei denen die Abrechnungseinnahmen unter den Einkaufskosten liegen (negative Marge). Hinweis auf Preisfehler, fehlende Aufschl\u00e4ge oder Vertragsabweichungen.' AS description_de,\n  'Identifies materials where billed revenue falls below purchase cost (negative margin). Indicates pricing errors, missing markup, or contract misalignment.' AS description_en,\n  'Identifie les mat\u00e9riaux dont les revenus factur\u00e9s sont inf\u00e9rieurs au co\u00fbt d''achat (marge n\u00e9gative). Indique des erreurs de prix, un manque de majoration ou un d\u00e9salignement contractuel.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} ({material_description}) zeigt im Monat {month} eine negative Marge: Ertrag {revenue}, Kosten {cost}, Marge {margin_pct}%.'\n    AS interpretation_de,\n  'Material {entity_id} ({material_description}) shows negative margin in {month}: revenue {revenue}, cost {cost}, margin {margin_pct}%.'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} ({material_description}) pr\u00e9sente une marge n\u00e9gative en {month}: revenus {revenue}, co\u00fbts {cost}, marge {margin_pct}%.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_orphan_billing' AS probe_id,\n  '1.0.0' AS probe_version,\n  'silver' AS data_layer,\n  'data_quality' AS probe_category,\n  'direct_financial' AS risk_tier,\n  1.0 AS confidence_weight,\n  'BillingEvent' AS entity_type,\n  -- display names\n  'Verwaiste Abrechnungen' AS display_name_de,\n  'Orphan Billing Records' AS display_name_en,\n  'Facturations orphelines' AS display_name_fr,\n  -- descriptions (what + why)\n  'Macht Abrechnungen sichtbar, die auf nicht existierende F\u00e4lle oder Materialien verweisen. Diese Datens\u00e4tze werden von Gold gefiltert, aber der finanzielle Verlust bleibt real \u2014 eine unsichtbare L\u00fccke in der Abrechnung.' AS description_de,\n  'Surfaces billing events that reference non-existent cases or materials. These records are filtered by Gold, but the financial gap is real \u2014 an invisible hole in billing.' AS description_en,\n  'Met en lumi\u00e8re les facturations r\u00e9f\u00e9ren\u00e7ant des cas ou mat\u00e9riaux inexistants. Ces enregistrements sont filtr\u00e9s par Gold, mais l''\u00e9cart financier est r\u00e9el \u2014 un trou invisible dans la facturation.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'F\u00fcr {orphan_type} \u00ab{entity_id}\u00bb existieren {record_count} Abrechnungsdatens\u00e4tze mit einem Gesamtwert von {money_at_risk}. Diese Datens\u00e4tze verweisen auf einen nicht existierenden Stammdatensatz.'\n    AS interpretation_de,\n  '{record_count} billing records totalling {money_at_risk} reference {orphan_type} \"{entity_id}\" which does not exist in master data. These records are invisible in Gold layer analytics.'\n    AS interpretation_en,\n  '{record_count} enregistrements de facturation totalisant {money_at_risk} r\u00e9f\u00e9rencent {orphan_type} \u00ab{entity_id}\u00bb qui n''existe pas dans les donn\u00e9es de base.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_procedure_without_usage' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'compliance' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.2 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'Eingriff ohne Materialverbrauch' AS display_name_de,\n  'Procedure Without Material Usage' AS display_name_en,\n  'Proc\u00e9dure sans consommation' AS display_name_fr,\n  -- descriptions (what + why)\n  'Identifiziert F\u00e4lle mit dokumentierten Eingriffen, aber ohne Materialverbrauch. Jeder Eingriff verbraucht Material \u2014 fehlende Dokumentation bedeutet eine R\u00fcckverfolgbarkeitsl\u00fccke und erschwert die Kostenrechnung.' AS description_de,\n  'Identifies cases with documented procedures but no material usage records. Every procedure consumes materials \u2014 missing documentation means a traceability gap affecting cost accounting.' AS description_en,\n  'Identifie les cas avec des proc\u00e9dures document\u00e9es mais aucune consommation de mat\u00e9riel. Chaque proc\u00e9dure consomme du mat\u00e9riel \u2014 l''absence de documentation cr\u00e9e un manque de tra\u00e7abilit\u00e9.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id} ({case_type}) hatte {procedure_count} Eingriff(e) ({procedure_types}), aber keinen einzigen Materialverbrauch. Dies ist eine Dokumentationsl\u00fccke mit Compliance-Relevanz.'\n    AS interpretation_de,\n  'Case {entity_id} ({case_type}) had {procedure_count} procedure(s) ({procedure_types}) but zero material usage records. This is a documentation gap with compliance implications.'\n    AS interpretation_en,\n  'Le cas {entity_id} ({case_type}) a eu {procedure_count} proc\u00e9dure(s) ({procedure_types}) mais aucune consommation de mat\u00e9riel. C''est une lacune documentaire avec des implications de conformit\u00e9.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_revenue_leakage' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'direct_financial' AS risk_tier,\n  1.0 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'Erl\u00f6sausfall' AS display_name_de,\n  'Revenue Leakage' AS display_name_en,\n  'Perte de revenus' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt F\u00e4lle, bei denen der Materialverbrauchswert die Gesamtabrechnung \u00fcbersteigt. Ein Hinweis auf nicht fakturierte Leistungen und m\u00f6gliche Ertragseinbussen.' AS description_de,\n  'Detects cases where material usage value exceeds total billed amount. Indicates unbilled services and potential revenue loss.' AS description_en,\n  'D\u00e9tecte les cas o\u00f9 la valeur de consommation d\u00e9passe le montant factur\u00e9. Indique des prestations non factur\u00e9es et une perte de revenus potentielle.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id} weist eine Differenz von {money_at_risk} zwischen Materialverbrauch und Abrechnung auf ({pct_diff}% des Verbrauchs nicht fakturiert). Dies deutet auf einen m\u00f6glichen Erl\u00f6sausfall hin.'\n    AS interpretation_de,\n  'Case {entity_id} shows a gap of {money_at_risk} between material usage and billing ({pct_diff}% of usage unbilled). This indicates potential revenue leakage.'\n    AS interpretation_en,\n  'Le cas {entity_id} pr\u00e9sente un \u00e9cart de {money_at_risk} entre la consommation et la facturation ({pct_diff}% non factur\u00e9). Cela indique une possible perte de revenus.'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_shelf_life_risk' AS probe_id,\n  '1.0.0' AS probe_version,\n  'gold' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.2 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Haltbarkeitsrisiko' AS display_name_de,\n  'Shelf Life Risk' AS display_name_en,\n  'Risque de p\u00e9remption' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt Materialien mit kurzer Haltbarkeit und geringer Umschlagsh\u00e4ufigkeit. Hohe Verfallsgefahr f\u00fchrt zu Abschreibungen und Verschwendung.' AS description_de,\n  'Identifies materials with short shelf life and low movement velocity, indicating high expiration risk. May lead to write-offs and waste.' AS description_en,\n  'Identifie les mat\u00e9riaux \u00e0 courte dur\u00e9e de conservation et faible v\u00e9locit\u00e9 de mouvement, indiquant un risque \u00e9lev\u00e9 de p\u00e9remption et de gaspillage.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} ({material_description}) hat eine Haltbarkeit von {shelf_life_months} Monaten bei einer durchschnittlichen Monatsrate von {avg_monthly_qty} Einheiten ({months_with_activity} aktive Monate).'\n    AS interpretation_de,\n  'Material {entity_id} ({material_description}) has a shelf life of {shelf_life_months} months with average monthly velocity of {avg_monthly_qty} units ({months_with_activity} active months).'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} ({material_description}) a une dur\u00e9e de conservation de {shelf_life_months} mois avec une v\u00e9locit\u00e9 mensuelle de {avg_monthly_qty} unit\u00e9s ({months_with_activity} mois actifs).'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'probe_stale_article' AS probe_id,\n  '1.0.0' AS probe_version,\n  'silver' AS data_layer,\n  'data_quality' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.2 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Veralteter Artikel' AS display_name_de,\n  'Stale Article' AS display_name_en,\n  'Article p\u00e9rim\u00e9' AS display_name_fr,\n  -- descriptions (what + why)\n  'Erkennt Materialien mit abgelaufenem G\u00fcltigkeitsdatum (valid_until), die dennoch Verbrauchs- oder Abrechnungsaktivit\u00e4t aufweisen. Veraltete Katalogartikel bedeuten Beschaffungs- und Datenqualit\u00e4tsrisiken.' AS description_de,\n  'Detects materials with expired valid_until dates that still have usage or billing activity. Stale catalogue entries indicate procurement and data quality risks.' AS description_en,\n  'D\u00e9tecte les mat\u00e9riaux dont la date de validit\u00e9 est expir\u00e9e mais qui pr\u00e9sentent encore une activit\u00e9. Les articles p\u00e9rim\u00e9s du catalogue indiquent des risques d''approvisionnement et de qualit\u00e9 des donn\u00e9es.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} ({material_description}) ist seit {valid_until} abgelaufen, wurde aber {usage_count}\u00d7 verwendet und {billing_count}\u00d7 fakturiert ({total_billed_amount} Total).'\n    AS interpretation_de,\n  'Material {entity_id} ({material_description}) expired on {valid_until} but was used {usage_count} times and billed {billing_count} times ({total_billed_amount} total).'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} ({material_description}) est expir\u00e9 depuis {valid_until}, mais a \u00e9t\u00e9 utilis\u00e9 {usage_count} fois et factur\u00e9 {billing_count} fois ({total_billed_amount} au total).'\n    AS interpretation_fr,\n  NULL AS source_probes\n\nUNION ALL\nSELECT\n  'assessment_billing_quality' AS probe_id,\n  '1.0.0' AS probe_version,\n  'assessment' AS data_layer,\n  'data_quality' AS probe_category,\n  'operational_signal' AS risk_tier,\n  0.2 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'Abrechnungsqualit\u00e4tsbewertung' AS display_name_de,\n  'Billing Quality Assessment' AS display_name_en,\n  '\u00c9valuation qualit\u00e9 facturation' AS display_name_fr,\n  -- descriptions (what + why)\n  'Bewertet die Abrechnungsqualit\u00e4t pro Fall durch Aggregation von standort\u00fcbergreifender Abrechnung, KSt-Producteur-Abweichung und Rechnungsintegrit\u00e4ts-Probes. Mehrfach markierte F\u00e4lle deuten auf systematische Datenqualit\u00e4tsprobleme hin.' AS description_de,\n  'Assesses case-level billing quality by aggregating findings from cross-site billing, CC producteur mismatch, and invoice integrity probes. Cases flagged by multiple probes indicate systematic data quality issues.' AS description_en,\n  '\u00c9value la qualit\u00e9 de facturation par cas en agr\u00e9geant les constats de facturation inter-sites, \u00e9cart CC producteur et int\u00e9grit\u00e9 des factures. Les cas signal\u00e9s par plusieurs probes indiquent des probl\u00e8mes syst\u00e9miques.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id} wird von {probe_count} Qualit\u00e4ts-Probe(s) markiert ({probes_flagged}) mit insgesamt {finding_count} Befund(en) und einem Gesamtrisiko von {total_risk}. Schwerster Befund: {worst_severity}.'\n    AS interpretation_de,\n  'Case {entity_id} is flagged by {probe_count} quality probe(s) ({probes_flagged}) with {finding_count} total finding(s) and {total_risk} at risk. Worst severity: {worst_severity}.'\n    AS interpretation_en,\n  'Le cas {entity_id} est signal\u00e9 par {probe_count} probe(s) de qualit\u00e9 ({probes_flagged}) avec {finding_count} constat(s) et {total_risk} \u00e0 risque. Gravit\u00e9 maximale: {worst_severity}.'\n    AS interpretation_fr,\n  'probe_cross_site_billing, probe_cc_producteur_mismatch, probe_invoice_integrity' AS source_probes\n\nUNION ALL\nSELECT\n  'assessment_case_financial_integrity' AS probe_id,\n  '1.0.0' AS probe_version,\n  'assessment' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'direct_financial' AS risk_tier,\n  1.0 AS confidence_weight,\n  'Case' AS entity_type,\n  -- display names\n  'Finanzielle Integrit\u00e4t des Falls' AS display_name_de,\n  'Case Financial Integrity' AS display_name_en,\n  'Int\u00e9grit\u00e9 financi\u00e8re du cas' AS display_name_fr,\n  -- descriptions (what + why)\n  'Bewertet die finanzielle Integrit\u00e4t pro Fall durch Aggregation von Erl\u00f6sausfall-, Implantat-, Kostenstellen-, Abrechnungszeitpunkt- und Prozedur-Probes. F\u00e4lle mit mehreren Befunden deuten auf systematische Abrechnungs- oder Dokumentationsprobleme hin.' AS description_de,\n  'Assesses case-level financial integrity by aggregating findings from revenue leakage, implant, cost center, billing timing, and procedure probes. Cases flagged by multiple probes indicate systemic billing or documentation issues.' AS description_en,\n  '\u00c9value l''int\u00e9grit\u00e9 financi\u00e8re par cas en agr\u00e9geant les constats des probes de revenus, implants, centres de co\u00fbts, chronologie de facturation et proc\u00e9dures. Les cas signal\u00e9s par plusieurs probes indiquent des probl\u00e8mes syst\u00e9miques.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Fall {entity_id} wird von {probe_count} Probe(s) markiert ({probes_flagged}) mit insgesamt {finding_count} Befund(en) und einem Gesamtrisiko von {total_risk}. Schwerster Befund: {worst_severity}.'\n    AS interpretation_de,\n  'Case {entity_id} is flagged by {probe_count} probe(s) ({probes_flagged}) with {finding_count} total finding(s) and {total_risk} at risk. Worst severity: {worst_severity}.'\n    AS interpretation_en,\n  'Le cas {entity_id} est signal\u00e9 par {probe_count} probe(s) ({probes_flagged}) avec {finding_count} constat(s) et {total_risk} \u00e0 risque. Gravit\u00e9 maximale: {worst_severity}.'\n    AS interpretation_fr,\n  'probe_revenue_leakage, probe_missing_mandatory_implants, probe_cost_center_billing_mismatch, probe_billing_before_usage, probe_procedure_without_usage' AS source_probes\n\nUNION ALL\nSELECT\n  'assessment_material_compliance' AS probe_id,\n  '1.0.0' AS probe_version,\n  'assessment' AS data_layer,\n  'compliance' AS probe_category,\n  'compliance_exposure' AS risk_tier,\n  0.5 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Material-Compliance-Bewertung' AS display_name_de,\n  'Material Compliance Assessment' AS display_name_en,\n  '\u00c9valuation conformit\u00e9 mat\u00e9riau' AS display_name_fr,\n  -- descriptions (what + why)\n  'Bewertet die Compliance-Gesundheit pro Material durch Aggregation von BtM-R\u00fcckverfolgbarkeit, MiGEL-L\u00fccke, veralteten Artikeln und Barcode-Duplikaten. Mehrfach markierte Materialien deuten auf systemische Compliance-Risiken hin.' AS description_de,\n  'Assesses material compliance health by aggregating findings from controlled substance traceability, MiGEL gap, stale article, and barcode duplicate probes. Materials flagged by multiple probes indicate systemic compliance risk.' AS description_en,\n  '\u00c9value la conformit\u00e9 par mat\u00e9riau en agr\u00e9geant les constats de tra\u00e7abilit\u00e9 BtM, \u00e9cart MiGEL, articles p\u00e9rim\u00e9s et doublons de code-barres. Les mat\u00e9riaux signal\u00e9s par plusieurs probes indiquent un risque syst\u00e9mique.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} wird von {probe_count} Compliance-Probe(s) markiert ({probes_flagged}) mit insgesamt {finding_count} Befund(en) und einem Gesamtrisiko von {total_risk}. Schwerster Befund: {worst_severity}.'\n    AS interpretation_de,\n  'Material {entity_id} is flagged by {probe_count} compliance probe(s) ({probes_flagged}) with {finding_count} total finding(s) and {total_risk} at risk. Worst severity: {worst_severity}.'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} est signal\u00e9 par {probe_count} probe(s) de conformit\u00e9 ({probes_flagged}) avec {finding_count} constat(s) et {total_risk} \u00e0 risque. Gravit\u00e9 maximale: {worst_severity}.'\n    AS interpretation_fr,\n  'probe_controlled_substance_traceability, probe_migel_reimbursement_gap, probe_stale_article, probe_barcode_duplicate' AS source_probes\n\nUNION ALL\nSELECT\n  'assessment_material_health' AS probe_id,\n  '1.0.0' AS probe_version,\n  'assessment' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'direct_financial' AS risk_tier,\n  1.0 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Material-Gesundheitsbewertung' AS display_name_de,\n  'Material Health Assessment' AS display_name_en,\n  '\u00c9valuation sant\u00e9 mat\u00e9riau' AS display_name_fr,\n  -- descriptions (what + why)\n  'Bewertet die Lieferketten-Gesundheit pro Material durch Aggregation von I/O-Koeffizient, Trend- und Preis-Probes. Materialien, die von mehreren Probes markiert werden, weisen auf systemische Probleme hin.' AS description_de,\n  'Assesses material supply chain health by aggregating findings from I/O coefficient, trend, and pricing probes. Materials flagged by multiple probes indicate systemic issues.' AS description_en,\n  '\u00c9value la sant\u00e9 de la cha\u00eene d''approvisionnement par mat\u00e9riau en agr\u00e9geant les constats des probes I/O, tendance et prix. Les mat\u00e9riaux signal\u00e9s par plusieurs probes indiquent des probl\u00e8mes syst\u00e9miques.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} wird von {probe_count} Probe(s) markiert ({probes_flagged}) mit insgesamt {finding_count} Befund(en) und einem Gesamtrisiko von {total_risk}. Schwerster Befund: {worst_severity}.'\n    AS interpretation_de,\n  'Material {entity_id} is flagged by {probe_count} probe(s) ({probes_flagged}) with {finding_count} total finding(s) and {total_risk} at risk. Worst severity: {worst_severity}.'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} est signal\u00e9 par {probe_count} probe(s) ({probes_flagged}) avec {finding_count} constat(s) et {total_risk} \u00e0 risque. Gravit\u00e9 maximale: {worst_severity}.'\n    AS interpretation_fr,\n  'probe_io_coefficient, probe_io_coefficient_trend, probe_missing_standard_price, probe_negative_margin, probe_billing_below_internal_price, probe_shelf_life_risk' AS source_probes\n\nUNION ALL\nSELECT\n  'assessment_material_overall' AS probe_id,\n  '1.0.0' AS probe_version,\n  'assessment' AS data_layer,\n  'financial_anomaly' AS probe_category,\n  'direct_financial' AS risk_tier,\n  1.0 AS confidence_weight,\n  'Material' AS entity_type,\n  -- display names\n  'Material-Gesamtbewertung' AS display_name_de,\n  'Material Overall Assessment' AS display_name_en,\n  '\u00c9valuation globale mat\u00e9riau' AS display_name_fr,\n  -- descriptions (what + why)\n  'Zusammengesetzte Bewertung der Material-Gesamtgesundheit durch Aggregation der Lieferketten- und Compliance-Bewertungen. Materialien, die in beiden Bereichen auff\u00e4llig sind, weisen auf bereichs\u00fcbergreifende Probleme hin.' AS description_de,\n  'Composite assessment of overall material health by aggregating supply-chain and compliance assessments. Materials flagged in both domains indicate systemic cross-functional issues.' AS description_en,\n  '\u00c9valuation composite de la sant\u00e9 globale des mat\u00e9riaux en agr\u00e9geant les \u00e9valuations logistiques et de conformit\u00e9. Les mat\u00e9riaux signal\u00e9s dans les deux domaines indiquent des probl\u00e8mes transversaux.' AS description_fr,\n  -- interpretation templates (per-finding, with placeholders)\n  'Material {entity_id} wird von {probe_count} Bewertung(en) markiert ({probes_flagged}) mit insgesamt {finding_count} Befund(en) und einem Gesamtrisiko von {total_risk}. Gesundheitswert: {health_score}. Schwerster Befund: {worst_severity}.'\n    AS interpretation_de,\n  'Material {entity_id} is flagged by {probe_count} assessment(s) ({probes_flagged}) with {finding_count} total finding(s) and {total_risk} at risk. Health score: {health_score}. Worst severity: {worst_severity}.'\n    AS interpretation_en,\n  'Le mat\u00e9riau {entity_id} est signal\u00e9 par {probe_count} \u00e9valuation(s) ({probes_flagged}) avec {finding_count} constat(s) et {total_risk} \u00e0 risque. Score de sant\u00e9: {health_score}. Gravit\u00e9 maximale: {worst_severity}.'\n    AS interpretation_fr,\n  'assessment_material_health, assessment_material_compliance' AS source_probes\n", "lang": "sql"}, "classes": "registry"}, {"data": {"id": "silver_article_suppliers", "label": "ArticleSuppliers", "fullName": "silver_article_suppliers", "layer": "silver", "layerLabel": "Silver", "color": "#a8b5c4", "shape": "round-rectangle", "layerShape": "round-rectangle", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/silver/silver_article_suppliers.sql", "layerOrder": 2, "source": "{{ config(materialized='table') }}\n\nwith source as (\n    select * from {{ ref('bronze_article_suppliers') }}\n),\n\n-- FK validation: material_id exists in silver_materials\nvalid_materials as (\n    select distinct material_id\n    from {{ ref('silver_materials') }}\n    where is_valid = true\n),\n\nvalidated as (\n    select\n        {{ dbt_utils.generate_surrogate_key(['source.source_file', 'source.row_number']) }} as article_supplier_key,\n        trim(source.material_id) as material_id,\n        trim(source.supplier_code) as supplier_code,\n        trim(source.supplier_reference) as supplier_reference,\n        nullif(trim(source.creation_date), '') as creation_date,\n        source.source_file,\n        source.row_number,\n        case\n            when trim(source.material_id) is null or trim(source.material_id) = ''\n                then false\n            when trim(source.supplier_code) is null or trim(source.supplier_code) = ''\n                then false\n            when vm.material_id is null\n                then false\n            else true\n        end as is_valid,\n        case\n            when trim(source.material_id) is null or trim(source.material_id) = ''\n                then 'missing material_id'\n            when trim(source.supplier_code) is null or trim(source.supplier_code) = ''\n                then 'missing supplier_code'\n            when vm.material_id is null\n                then 'orphan material_id'\n            else null\n        end as invalid_reason\n    from source\n    left join valid_materials vm\n        on trim(source.material_id) = vm.material_id\n)\n\nselect * from validated\n", "lang": "sql"}, "classes": "silver"}, {"data": {"id": "silver_billing_events", "label": "BillingEvents", "fullName": "silver_billing_events", "layer": "silver", "layerLabel": "Silver", "color": "#a8b5c4", "shape": "round-rectangle", "layerShape": "round-rectangle", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/silver/silver_billing_events.sql", "layerOrder": 2, "source": "{{ config(materialized='table') }}\n\nwith source as (\n    select * from {{ ref('bronze_billing_events') }}\n),\n\nvalid_cases as (\n    select distinct case_token from {{ ref('silver_cases') }} where is_valid\n),\n\nvalid_materials as (\n    select distinct material_id from {{ ref('silver_materials') }} where is_valid\n),\n\nvalidated as (\n    select\n        {{ dbt_utils.generate_surrogate_key(['source.source_file', 'source.row_number']) }} as billing_key,\n        trim(source.billing_id) as billing_id,\n        trim(source.case_token) as case_token,\n        trim(source.material_id) as material_id,\n        cast(source.quantity as decimal(12, 2)) as quantity,\n        cast(source.billed_amount as decimal(12, 2)) as billed_amount,\n        trim(source.cost_center_id) as cost_center_id,\n        cast(source.billing_timestamp as timestamp) as billing_timestamp,\n        trim(upper(source.billing_status)) as billing_status,\n        nullif(trim(cast(source.invoice_number as varchar)), '') as invoice_number,\n        nullif(trim(cast(source.cc_producteur_id as varchar)), '') as cc_producteur_id,\n        nullif(trim(cast(source.site_demandeur as varchar)), '') as site_demandeur,\n        nullif(trim(cast(source.site_producteur as varchar)), '') as site_producteur,\n        source.source_file,\n        source.row_number,\n        case\n            when trim(source.billing_id) is null or trim(source.billing_id) = ''\n                then false\n            when trim(source.case_token) is null or trim(source.case_token) = ''\n                then false\n            when vc.case_token is null\n                then false\n            when trim(source.material_id) is null or trim(source.material_id) = ''\n                then false\n            when vm.material_id is null\n                then false\n            when cast(source.billed_amount as decimal(12, 2)) is null\n                then false\n            when trim(source.billing_status) not in (select code from {{ ref('enum_billing_status') }})\n                then false\n            else true\n        end as is_valid,\n        case\n            when trim(source.billing_id) is null or trim(source.billing_id) = ''\n                then 'missing billing_id'\n            when trim(source.case_token) is null or trim(source.case_token) = ''\n                then 'missing case_token'\n            when vc.case_token is null\n                then 'orphan case_token'\n            when trim(source.material_id) is null or trim(source.material_id) = ''\n                then 'missing material_id'\n            when vm.material_id is null\n                then 'orphan material_id'\n            when cast(source.billed_amount as decimal(12, 2)) is null\n                then 'invalid billed_amount'\n            when trim(source.billing_status) not in (select code from {{ ref('enum_billing_status') }})\n                then 'invalid billing_status'\n            else null\n        end as invalid_reason\n    from source\n    left join valid_cases vc on trim(source.case_token) = vc.case_token\n    left join valid_materials vm on trim(source.material_id) = vm.material_id\n)\n\nselect * from validated\n", "lang": "sql"}, "classes": "silver"}, {"data": {"id": "silver_case_material_usage", "label": "CaseMaterialUsage", "fullName": "silver_case_material_usage", "layer": "silver", "layerLabel": "Silver", "color": "#a8b5c4", "shape": "round-rectangle", "layerShape": "round-rectangle", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/silver/silver_case_material_usage.sql", "layerOrder": 2, "source": "{{ config(materialized='table') }}\n\nwith source as (\n    select * from {{ ref('bronze_case_material_usage') }}\n),\n\nvalid_cases as (\n    select distinct case_token from {{ ref('silver_cases') }} where is_valid\n),\n\nvalid_materials as (\n    select distinct material_id from {{ ref('silver_materials') }} where is_valid\n),\n\nvalidated as (\n    select\n        {{ dbt_utils.generate_surrogate_key(['source.source_file', 'source.row_number']) } as (\n    select * from {{ ref('bronze_taxonomy_member_mappings') }}\n),\n\n-- Valid taxonomy nodes from silver\nvalid_nodes as (\n    select distinct taxonomy_id, node_id\n    from {{ ref('silver_taxonomy_nodes') }}\n    where is_valid\n),\n\n-- Valid cost center IDs from gold (cross-layer ref, intentional)\nvalid_cost_centers as (\n    select distinct cost_center_id\n    from {{ ref('gold_cost_centers') }}\n),\n\nvalidated as (\n    select\n        {{ dbt_utils.generate_surrogate_key(['source.source_file', 'source.row_number']) }} as taxonomy_mapping_key,\n        trim(source.taxonomy_id) as taxonomy_id,\n        trim(source.node_id) as node_id,\n        trim(source.dimension_type) as dimension_type,\n        trim(source.dimension_member_id) as dimension_member_id,\n        source.source_file,\n        source.row_number,\n        case\n            when trim(source.taxonomy_id) is null or trim(source.taxonomy_id) = ''\n                then false\n            when trim(source.node_id) is null or trim(source.node_id) = ''\n                then false\n            when vn.node_id is null\n                then false\n            when trim(source.dimension_type) is null or trim(source.dimension_type) = ''\n                then false\n            when trim(source.dimension_member_id) is null or trim(source.dimension_member_id) = ''\n                then false\n            when trim(source.dimension_type) = 'cost_center' and vcc.cost_center_id is null\n                then false\n            else true\n        end as is_valid,\n        case\n            when trim(source.taxonomy_id) is null or trim(source.taxonomy_id) = ''\n                then 'missing taxonomy_id'\n            when trim(source.node_id) is null or trim(source.node_id) = ''\n                then 'missing node_id'\n            when vn.node_id is null\n                then 'orphan node reference'\n            when trim(source.dimension_type) is null or trim(source.dimension_type) = ''\n                then 'missing dimension_type'\n            when trim(source.dimension_member_id) is null or trim(source.dimension_member_id) = ''\n                then 'missing dimension_member_id'\n            when trim(source.dimension_type) = 'cost_center' and vcc.cost_center_id is null\n                then 'orphan dimension_member_id'\n            else null\n        end as invalid_reason\n    from source\n    left join valid_nodes vn\n        on trim(source.taxonomy_id) = vn.taxonomy_id\n        and trim(source.node_id) = vn.node_id\n    left join valid_cost_centers vcc\n        on trim(source.dimension_type) = 'cost_center'\n        and trim(source.dimension_member_id) = vcc.cost_center_id\n)\n\nselect * from validated\n", "lang": "sql"}, "classes": "silver"}, {"data": {"id": "silver_taxonomy_nodes", "label": "TaxonomyNodes", "fullName": "silver_taxonomy_nodes", "layer": "silver", "layerLabel": "Silver", "color": "#a8b5c4", "shape": "round-rectangle", "layerShape": "round-rectangle", "kindShape": "round-rectangle", "kind": "table", "path": "dbt/numetrix/models/silver/silver_taxonomy_nodes.sql", "layerOrder": 2, "source": "{{ config(materialized='table') }}\n\nwith source as (\n    select * from {{ ref('bronze_taxonomy_nodes') }}\n),\n\n-- Self-join to validate parent references\nparent_nodes as (\n    select distinct taxonomy_id, node_id\n    from source\n),\n\nvalidated as (\n    select\n        {{ dbt_utils.generate_surrogate_key(['source.source_file', 'source.row_number']) }} as taxonomy_node_key,\n        trim(source.taxonomy_id) as taxonomy_id,\n        trim(source.node_id) as node_id,\n        case\n            when trim(source.parent_node_id) = '' then null\n            else trim(source.parent_node_id)\n        end as parent_node_id,\n        trim(source.node_name) as node_name,\n        source.source_file,\n        source.row_number,\n        case\n            when trim(source.taxonomy_id) is null or trim(source.taxonomy_id) = ''\n                then false\n            when trim(source.node_id) is null or trim(source.node_id) = ''\n                then false\n            when trim(source.node_name) is null or trim(source.node_name) = ''\n                then false\n            when trim(source.parent_node_id) != ''\n                and pn.node_id is null\n                then false\n            else true\n        end as is_valid,\n        case\n            when trim(source.taxonomy_id) is null or trim(source.taxonomy_id) = ''\n                then 'missing taxonomy_id'\n            when trim(source.node_id) is null or trim(source.node_id) = ''\n                then 'missing node_id'\n            when trim(source.node_name) is null or trim(source.node_name) = ''\n                then 'missing node_name'\n            when trim(source.parent_node_id) != ''\n                and pn.node_id is null\n                then 'orphan parent_node_id'\n            else null\n        end as invalid_reason\n    from source\n    left join parent_nodes pn\n        on trim(source.taxonomy_id) = pn.taxonomy_id\n        and trim(source.parent_node_id) = pn.node_id\n)\n\nselect * from validated\n", "lang": "sql"}, "classes": "silver"}, {"data": {"id": "yaml_assessment_billing_quality", "label": "AssessmentBillingQuality", "fullName": "yaml_assessment_billing_quality", "layer": "yaml", "layerLabel": "YAML Sources", "color": "#d482a8", "shape": "tag", "layerShape": "tag", "kindShape": "tag", "kind": "yaml_file", "path": "probes/assessment_billing_quality.yaml", "layerOrder": -1, "source": "probe_id: assessment_billing_quality\nversion: \"1.0.0\"\ncontract: \"findings.v1\"\ntype: assessment\nseverity: medium\ndescription: >\n  Assesses case-level billing quality by aggregating findings from cross-site\n  billing, CC producteur mismatch, and invoice integrity probes. Cases\n  flagged by multiple billing probes indicate systematic data quality issues\n  in the billing workflow.\n\nscope:\n  entity_type: Case\n  group_by: [entity_id]\n  time:\n    entity: Probe
