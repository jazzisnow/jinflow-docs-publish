\", \"left\")\n    right_alias = right.get(\"alias\", \"right\")\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        result[f\"display_name_{lang}\"] = f\"{humanize(left_alias)} vs {humanize(right_alias)}\"\n        result[f\"description_{lang}\"] = (\n            f\"Compares {left_alias} against {right_alias} per {ent}. \"\n            f\"Flags deviations above {probe.get('tolerance_pct', 0)}%.\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} shows a gap of {{money_at_risk}} \"\n            f\"between {left_alias} and {right_alias} ({{pct_diff}}% difference).\"\n        )\n    return result\n\n\ndef gen_duplicate(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n    source = probe.get(\"source\", {})\n    dup_fields = source.get(\"duplicate_fields\", [])\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        fields_str = \", \".join(dup_fields)\n        result[f\"display_name_{lang}\"] = f\"Duplicate {ent.title()}\"\n        result[f\"description_{lang}\"] = (\n            f\"Detects duplicate {ent} records by [{fields_str}].\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} appears {{duplicate_count}} times \"\n            f\"with identical values. Excess: {{money_at_risk}}.\"\n        )\n    return result\n\n\ndef gen_mandatory_item(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n    qualifying = probe.get(\"qualifying\", {})\n    required = probe.get(\"required\", {})\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        q_ent = entity_label(qualifying.get(\"entity\", \"\"), lang, glossary)\n        r_ent = entity_label(required.get(\"entity\", \"\"), lang, glossary)\n        result[f\"display_name_{lang}\"] = f\"Missing {r_ent.title()} for {q_ent.title()}\"\n        result[f\"description_{lang}\"] = (\n            f\"Checks that {ent} with qualifying {q_ent} records \"\n            f\"has required {r_ent} documentation.\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} has qualifying {q_ent} but \"\n            f\"insufficient {r_ent} records ({{item_count}}).\"\n        )\n    return result\n\n\ndef gen_ratio(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        result[f\"display_name_{lang}\"] = f\"{ent.title()} Ratio Anomaly\"\n        result[f\"description_{lang}\"] = (\n            f\"Compares ratio against expected value of \"\n            f\"{probe.get('expected_ratio', 1.0)} per {ent}.\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} shows an anomalous ratio. \"\n            f\"Amount at risk: {{money_at_risk}}.\"\n        )\n    return result\n\n\ndef gen_trend(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        result[f\"display_name_{lang}\"] = f\"{ent.title()} Trend Anomaly\"\n        result[f\"description_{lang}\"] = (\n            f\"Detects worsening trends in {ent} metrics over time.\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} shows a worsening trend. \"\n            f\"Amount at risk: {{money_at_risk}}.\"\n        )\n    return result\n\n\ndef gen_temporal_sequence(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n    first = probe.get(\"first_event\", {})\n    second = probe.get(\"second_event\", {})\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        first_ent = entity_label(first.get(\"entity\", \"\"), lang, glossary)\n        second_ent = entity_label(second.get(\"entity\", \"\"), lang, glossary)\n        result[f\"display_name_{lang}\"] = f\"{first_ent.title()} Before {second_ent.title()}\"\n        result[f\"description_{lang}\"] = (\n            f\"Validates that {first_ent} occurs after {second_ent} per {ent}.\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}}: {first_ent} occurred before {second_ent} \"\n            f\"by {{gap_hours}} hours.\"\n        )\n    return result\n\n\ndef gen_silver_audit(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        result[f\"display_name_{lang}\"] = f\"Silver {ent.title()} Audit\"\n        result[f\"description_{lang}\"] = (\n            f\"Audits Silver-layer {ent} data quality.\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} has data quality issues in Silver layer.\"\n        )\n    return result\n\n\ndef gen_entity_filter(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        result[f\"display_name_{lang}\"] = f\"{ent.title()} Filter Finding\"\n        result[f\"description_{lang}\"] = (\n            f\"Filters {ent} records matching specific conditions.\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} matches filter criteria. \"\n            f\"Amount at risk: {{money_at_risk}}.\"\n        )\n    return result\n\n\ndef gen_enrichment(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        result[f\"display_name_{lang}\"] = f\"{ent.title()} Enrichment Analysis\"\n        result[f\"description_{lang}\"] = (\n            f\"Analyses {ent} by joining dimension and fact data.\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} flagged in enrichment analysis. \"\n            f\"Amount at risk: {{money_at_risk}}.\"\n        )\n    return result\n\n\ndef gen_reconciliation(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        result[f\"display_name_{lang}\"] = f\"{ent.title()} Reconciliation\"\n        result[f\"description_{lang}\"] = (\n            f\"Reconciles {ent} quantities across sources.\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} shows a reconciliation gap. \"\n            f\"Amount at risk: {{money_at_risk}}.\"\n        )\n    return result\n\n\ndef gen_hand_written(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n    desc = probe.get(\"description\", \"\").strip()\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        result[f\"display_name_{lang}\"] = humanize(probe[\"probe_id\"].replace(\"probe_\", \"\"))\n        result[f\"description_{lang}\"] = desc\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} flagged. Amount at risk: {{money_at_risk}}.\"\n        )\n    return result\n\n\ndef gen_assessment(probe: dict, glossary: dict) -> dict:\n    scope = probe.get(\"scope\", {})\n    entity = scope.get(\"entity_type\", \"\")\n    source_probes = probe.get(\"source_probes\", [])\n    n = len(source_probes)\n\n    result = {}\n    for lang in LANGS:\n        ent = entity_label(entity, lang, glossary)\n        result[f\"display_name_{lang}\"] = f\"{ent.title()} Assessment\"\n        result[f\"description_{lang}\"] = (\n            f\"Aggregates findings from {n} probes into {ent}-level health scores.\"\n        )\n        result[f\"interpretation_{lang}\"] = (\n            f\"{ent.title()} {{entity_id}} is flagged by {{probe_count}} probe(s) \"\n            f\"({{probes_flagged}}) with {{finding_count}} finding(s) and \"\n            f\"{{total_risk}} at risk. Worst severity: {{worst_severity}}.\"\n        )\n    return result\n\n\nTYPE_GENERATORS = {\n    \"balance\": gen_balance,\n    \"duplicate\": gen_duplicate,\n    \"mandatory_item\": gen_mandatory_item,\n    \"ratio\": gen_ratio,\n    \"trend\": gen_trend,\n    \"temporal_sequence\": gen_temporal_sequence,\n    \"silver_audit\": gen_silver_audit,\n    \"entity_filter\": gen_entity_filter,\n    \"enrichment\": gen_enrichment,\n    \"reconciliation\": gen_reconciliation,\n    \"hand_written\": gen_hand_written,\n    \"assessment\": gen_assessment,\n}\n\n\n# ---------------------------------------------------------------------------\n# Registry entry generation (override + auto-generated merge)\n# ---------------------------------------------------------------------------\n\ndef generate_entry(probe: dict, glossary: dict) -> dict:\n    \"\"\"Generate a complete registry entry for one probe.\n\n    Returns dict with keys: probe_id, probe_version, data_layer,\n    probe_category, entity_type, display_name_{de,en,fr},\n    description_{de,en,fr}, interpretation_{de,en,fr}, source_probes.\n    \"\"\"\n    pid = probe[\"probe_id\"]\n    version = probe.get(\"version\", \"1.0.0\")\n    data_layer = resolve_data_layer(probe)\n    category = resolve_category(probe, glossary)\n    risk_tier = resolve_risk_tier(probe, glossary)\n    entity_type = probe.get(\"scope\", {}).get(\"entity_type\", \"\")\n    source_probes = resolve_source_probes(probe)\n\n    # Auto-generate base text\n    probe_type = probe.get(\"type\", \"\")\n    generator = TYPE_GENERATORS.get(probe_type)\n    if generator:\n        auto = generator(probe, glossary)\n    else:\n        auto = {}\n\n    # Merge with registry overrides (overrides win)\n    reg = probe.get(\"registry\", {})\n\n    confidence_weight = resolve_confidence_weight(probe, glossary)\n\n    entry = {\n        \"probe_id\": pid,\n        \"probe_version\": version,\n        \"data_layer\": data_layer,\n        \"probe_category\": category,\n        \"risk_tier\": risk_tier,\n        \"confidence_weight\": confidence_weight,\n        \"entity_type\": entity_type,\n        \"source_probes\": source_probes,\n    }\n\n    for lang in LANGS:\n        for field in (\"display_name\", \"description\", \"interpretation\"):\n            key = f\"{field}_{lang}\"\n            # Override from registry: block\n            override = reg.get(field, {}).get(lang) if isinstance(reg.get(field), dict) else None\n            if override:\n                entry[key] = override\n            elif key in auto:\n                entry[key] = auto[key]\n            else:\n                entry[key] = \"\"\n\n    return entry\n\n\n# ---------------------------------------------------------------------------\n# SQL output\n# ---------------------------------------------------------------------------\n\ndef sql_escape(s: str) -> str:\n    \"\"\"Escape single quotes for SQL string literals.\"\"\"\n    return s.replace(\"'\", \"''\")\n\n\ndef render_sql(entries: list[dict]) -> str:\n    \"\"\"Render the full probe_registry.sql from a list of entries.\"\"\"\n    lines = [\n        \"-- Probe registry -- auto-generated by proberegistry.py. Do not edit manually.\",\n        \"-- Override text via the registry: key in each probe's YAML definition.\",\n        \"{{ config(materialized='table', tags=['probe']) }}\",\n        \"\",\n    ]\n\n    for i, entry in enumerate(entries):\n        pid = entry[\"probe_id\"]\n        version = entry[\"probe_version\"]\n        data_layer = entry[\"data_layer\"]\n        category = entry[\"probe_category\"]\n        risk_tier = entry[\"risk_tier\"]\n        confidence_weight = entry[\"confidence_weight\"]\n        entity_type = entry[\"entity_type\"]\n        source_probes = entry[\"source_probes\"]\n\n        if i == 0:\n            lines.append(\"SELECT\")\n        else:\n            lines.append(\"UNION ALL\")\n            lines.append(\"SELECT\")\n\n        lines.append(f\"  '{pid}' AS probe_id,\")\n        lines.append(f\"  '{version}' AS probe_version,\")\n        lines.append(f\"  '{data_layer}' AS data_layer,\")\n        lines.append(f\"  '{category}' AS probe_category,\")\n        lines.append(f\"  '{risk_tier}' AS risk_tier,\")\n        lines.append(f\"  {confidence_weight} AS confidence_weight,\")\n        lines.append(f\"  '{entity_type}' AS entity_type,\")\n\n        # Display names\n        lines.append(f\"  -- display names\")\n        for lang in LANGS:\n            val = sql_escape(entry[f\"display_name_{lang}\"])\n            lines.append(f\"  '{val}' AS display_name_{lang},\")\n\n        # Descriptions\n        lines.append(f\"  -- descriptions (what + why)\")\n        for lang in LANGS:\n            val = sql_escape(entry[f\"description_{lang}\"])\n            lines.append(f\"  '{val}' AS description_{lang},\")\n\n        # Interpretations\n        lines.append(f\"  -- interpretation templates (per-finding, with placeholders)\")\n        for lang in LANGS:\n            val = sql_escape(entry[f\"interpretation_{lang}\"])\n            comma = \",\" if lang != LANGS[-1] else \",\"\n            lines.append(f\"  '{val}'\")\n            lines.append(f\"    AS interpretation_{lang},\")\n\n        # Source probes\n        lines.append(f\"  {source_probes} AS source_probes\")\n        lines.append(\"\")\n\n    return \"\\n\".join(lines)\n\n\n# ---------------------------------------------------------------------------\n# Main\n# ---------------------------------------------------------------------------\n\ndef main():\n    check_mode = \"--check\" in sys.argv\n    diff_mode = \"--diff\" in sys.argv\n\n    glossary = load_glossary()\n    probes = load_all_probes()\n\n    if not probes:\n        print(\"ERROR: No probe YAML files found in probes/\", file=sys.stderr)\n        sys.exit(1)\n\n    # Sort: probes first (alphabetically), then assessments (alphabetically)\n    regular = sorted(\n        [p for p in probes if p.get(\"type\") != \"assessment\"],\n        key=lambda p: p[\"probe_id\"],\n    )\n    assessments = sorted(\n        [p for p in probes if p.get(\"type\") == \"assessment\"],\n        key=lambda p: p[\"probe_id\"],\n    )\n    ordered = regular + assessments\n\n    entries = [generate_entry(p, glossary) for p in ordered]\n    generated = render_sql(entries)\n\n    if check_mode or diff_mode:\n        if OUTPUT_PATH.exists():\n            existing = OUTPUT_PATH.read_text()\n        else:\n            existing = \"\"\n\n        if generated == existing:\n            if check_mode:\n                print(\"probe_registry.sql is up to date.\")\n                sys.exit(0)\n            else:\n                print(\"No differences.\")\n                sys.exit(0)\n        else:\n            diff = difflib.unified_diff(\n                existing.splitlines(keepends=True),\n                generated.splitlines(keepends=True),\n                fromfile=\"probe_registry.sql (current)\",\n                tofile=\"probe_registry.sql (generated)\",\n            )\n            sys.stdout.writelines(diff)\n            if check_mode:\n                print(\n                    \"\\nERROR: probe_registry.sql is out of date. \"\n                    \"Run: python3 scripts/proberegistry.py\",\n                    file=sys.stderr,\n                )\n                sys.exit(1)\n            sys.exit(0)\n\n    # Write output\n    OUTPUT_PATH.write_text(generated)\n    print(f\"Wrote {OUTPUT_PATH.relative_to(REPO_ROOT)} ({len(entries)} probes)\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "lang": "python"}, "classes": "compiler"}, {"data": {"id": "hypothesiscompile", "label": "hypothesis", "fullName": "hypothesiscompile", "layer": "compiler", "layerLabel": "Compilers", "color": "#d47e7e", "shape": "triangle", "layerShape": "triangle", "kindShape": "triangle", "kind": "python_script", "path": "scripts/hypothesiscompile.py", "layerOrder": -1, "source": "#!/usr/bin/env python3\n\"\"\"hypothesiscompile.py - Compile hypothesis YAMLs into dbt SQL models.\n\nGenerates:\n  - dbt/numetrix/models/probes/hypothesis_verdicts.sql\n  - dbt/numetrix/models/probes/hypothesis_verdicts.yml\n  - dbt/numetrix/models/probes/hypothesis_registry.sql\n  - dbt/numetrix/models/probes/hypothesis_registry.yml\n\nUsage:\n    python3 scripts/hypothesiscompile.py          # compile all\n    python3 scripts/hypothesiscompile.py --check  # dry-run\n\"\"\"\n\nimport sys\nfrom pathlib import Path\n\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent\nHYPOTHESES_DIR = REPO_ROOT / \"hypotheses\"\nOUTPUT_DIR = REPO_ROOT / \"dbt\" / \"numetrix\" / \"models\" / \"probes\"\n\n# Import validation\nsys.path.insert(0, str(REPO_ROOT / \"scripts\"))\nfrom hypothesischeck import validate_hypothesis\n\n\ndef sql_escape(s: str) -> str:\n    \"\"\"Escape single quotes for SQL string literals.\"\"\"\n    return s.replace(\"'\", \"''\")\n\n\ndef compile_verdicts(hypotheses: list[dict]) -> str:\n    \"\"\"Generate hypothesis_verdicts.sql with one CTE block per hypothesis.\"\"\"\n    lines = [\n        \"-- hypothesis_verdicts: Per-tenant verdict for each hypothesis\",\n        \"-- Auto-generated by hypothesiscompile.py \u2014 do not edit manually.\",\n        \"{{ config(materialized='table', tags=['hypothesis']) }}\",\n        \"\",\n        \"with\",\n        \"\",\n    ]\n\n    cte_names = []\n    for i, hyp in enumerate(hypotheses):\n        hid = hyp[\"hypothesis_id\"]\n        safe_id = hid.replace(\"-\", \"_\")\n        version = hyp[\"version\"]\n        category = hyp[\"category\"]\n        confirmed_threshold = hyp[\"verdict\"][\"thresholds\"][\"confirmed\"]\n        plausible_threshold = hyp[\"verdict\"][\"thresholds\"][\"plausible\"]\n\n        # __evidence CTE: UNION ALL of per-probe aggregates\n        evidence_parts = []\n        for ev in hyp[\"evidence\"]:\n            pid = ev[\"probe_id\"]\n            role = ev[\"role\"]\n            weight = ev[\"weight\"]\n            ref = \"{{ ref('probe_findings__\" + pid + \"') }}\"\n            evidence_parts.append(\n                f\"    select\\n\"\n                f\"        '{pid}' as probe_id,\\n\"\n                f\"        '{role}' as role,\\n\"\n                f\"        {weight} as weight,\\n\"\n                f\"        count(*) as finding_count,\\n\"\n                f\"        coalesce(sum(money_at_risk), 0) as money_at_risk,\\n\"\n                f\"        coalesce(sum(qty_at_risk), 0) as qty_at_risk,\\n\"\n                f\"        max(case severity\\n\"\n                f\"            when 'high' then 3 when 'medium' then 2 else 1\\n\"\n                f\"        end) as sev_ord\\n\"\n                f\"    from {ref}\"\n            )\n        evidence_sql = \"\\n    union all\\n\".join(evidence_parts)\n\n        lines.append(\n            f\"{safe_id}__evidence as (\\n\"\n            f\"{evidence_sql}\\n\"\n            f\"),\"\n        )\n        lines.append(\"\")\n\n        # __scored CTE \u2014 binary (default) or graduated scoring\n        scaling = hyp.get(\"verdict\", {}).get(\"scaling\", \"binary\")\n        saturation = hyp.get(\"verdict\", {}).get(\"saturation\", 100)\n\n        if scaling == \"graduated\":\n            signal_expr = (\n                f\"least(1.0, ln(1 + finding_count) / ln(1 + {saturation}))\"\n            )\n        else:\n            signal_expr = \"case when finding_count > 0 then 1 else 0 end\"\n\n        lines.append(\n            f\"{safe_id}__scored as (\\n\"\n            f\"    select\\n\"\n            f\"        '{hid}' as hypothesis_id,\\n\"\n            f\"        '{version}' as hypothesis_version,\\n\"\n            f\"        '{category}' as category,\\n\"\n            f\"        sum(finding_count) as finding_count,\\n\"\n            f\"        sum(money_at_risk) as money_at_risk,\\n\"\n            f\"        sum(qty_at_risk) as qty_at_risk,\\n\"\n            f\"        case max(sev_ord)\\n\"\n            f\"            when 3 then 'high' when 2 then 'medium' else 'low'\\n\"\n            f\"        end as worst_severity,\\n\"\n            f\"        count(*) as probes_evaluated,\\n\"\n            f\"        count(*) filter (where finding_count > 0) as probes_with_findings,\\n\"\n            f\"        max(case when role = 'primary' and finding_count > 0 then 1 else 0 end) as primary_has_findings,\\n\"\n            f\"        cast(\\n\"\n            f\"            sum(\\n\"\n            f\"                weight\\n\"\n            f\"                * ({signal_expr})\\n\"\n            f\"                * (case when role = 'counter' then -1 else 1 end)\\n\"\n            f\"            ) as double\\n\"\n            f\"        ) / nullif(sum(weight), 0) as evidence_score\\n\"\n            f\"    from {safe_id}__evidence\\n\"\n            f\"),\"\n        )\n        lines.append(\"\")\n\n        # __verdict CTE\n        lines.append(\n            f\"{safe_id}__verdict as (\\n\"\n            f\"    select\\n\"\n            f\"        hypothesis_id,\\n\"\n            f\"        hypothesis_version,\\n\"\n            f\"        category,\\n\"\n            f\"        case\\n\"\n            f\"            when primary_has_findings = 0 then 'not_observed'\\n\"\n            f\"            when evidence_score >= {confirmed_threshold} then 'confirmed'\\n\"\n            f\"            when evidence_score >= {plausible_threshold} then 'plausible'\\n\"\n            f\"            else 'not_observed'\\n\"\n            f\"        end as status,\\n\"\n            f\"        round(evidence_score, 4) as evidence_score,\\n\"\n            f\"        finding_count,\\n\"\n            f\"        round(money_at_risk, 2) as money_at_risk,\\n\"\n            f\"        round(qty_at_risk, 0) as qty_at_risk,\\n\"\n            f\"        worst_severity,\\n\"\n            f\"        probes_evaluated,\\n\"\n            f\"        probes_with_findings\\n\"\n            f\"    from {safe_id}__scored\\n\"\n            f\"){',' if i < len(hypotheses) - 1 else ''}\"\n        )\n        lines.append(\"\")\n        cte_names.append(f\"{safe_id}__verdict\")\n\n    # Final SELECT: UNION ALL of all verdict CTEs\n    lines.append(\"-- Final union of all hypothesis verdicts\")\n    for i, name in enumerate(cte_names):\n        lines.append(\n            f\"select\\n\"\n            f\"    md5(hypothesis_id || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}') as verdict_id,\\n\"\n            f\"    '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n            f\"    hypothesis_id,\\n\"\n            f\"    hypothesis_version,\\n\"\n            f\"    category,\\n\"\n            f\"    status,\\n\"\n            f\"    evidence_score,\\n\"\n            f\"    finding_count,\\n\"\n            f\"    money_at_risk,\\n\"\n            f\"    qty_at_risk,\\n\"\n            f\"    worst_severity,\\n\"\n            f\"    probes_evaluated,\\n\"\n            f\"    probes_with_findings\\n\"\n            f\"from {name}\"\n        )\n        if i < len(cte_names) - 1:\n            lines.append(\"union all\")\n        lines.append(\"\")\n\n    return \"\\n\".join(lines)\n\n\ndef compile_registry(hypotheses: list[dict]) -> str:\n    \"\"\"Generate hypothesis_registry.sql from YAML metadata.\"\"\"\n    lines = [\n        \"-- hypothesis_registry: Tri-lingual metadata for all hypotheses\",\n        \"-- Auto-generated by hypothesiscompile.py \u2014 do not edit manually.\",\n        \"{{ config(materialized='table', tags=['hypothesis']) }}\",\n        \"\",\n    ]\n\n    for i, hyp in enumerate(hypotheses):\n        hid = hyp[\"hypothesis_id\"]\n        short_code = hyp.get(\"short_code\", \"\")\n        version = hyp[\"version\"]\n        category = hyp[\"category\"]\n        audience = \", \".join(hyp.get(\"audience\", []))\n        tags = \", \".join(hyp.get(\"tags\", []))\n\n        # Build evidence_probes string: \"probe_id(role), ...\"\n        evidence_probes = \", \".join(\n            f\"{ev['probe_id']}({ev['role']})\" for ev in hyp[\"evidence\"]\n        )\n\n        stmt = hyp[\"statement\"]\n        interp = hyp[\"interpretation\"]\n\n        lines.append(\n            f\"select\\n\"\n            f\"    '{hid}' as hypothesis_id,\\n\"\n            f\"    '{short_code}' as short_code,\\n\"\n            f\"    '{version}' as hypothesis_version,\\n\"\n            f\"    '{category}' as category,\\n\"\n            f\"    '{sql_escape(audience)}' as audience,\\n\"\n            f\"    '{sql_escape(tags)}' as tags,\\n\"\n            f\"    '{sql_escape(evidence_probes)}' as evidence_probes,\\n\"\n            f\"    '{sql_escape(stmt['de'])}' as statement_de,\\n\"\n            f\"    '{sql_escape(stmt['en'])}' as statement_en,\\n\"\n            f\"    '{sql_escape(stmt['fr'])}' as statement_fr,\\n\"\n            f\"    '{sql_escape(interp['confirmed']['de'])}' as interpretation_confirmed_de,\\n\"\n            f\"    '{sql_escape(interp['confirmed']['en'])}' as interpretation_confirmed_en,\\n\"\n            f\"    '{sql_escape(interp['confirmed']['fr'])}' as interpretation_confirmed_fr,\\n\"\n            f\"    '{sql_escape(interp['plausible']['de'])}' as interpretation_plausible_de,\\n\"\n            f\"    '{sql_escape(interp['plausible']['en'])}' as interpretation_plausible_en,\\n\"\n            f\"    '{sql_escape(interp['plausible']['fr'])}' as interpretation_plausible_fr,\\n\"\n            f\"    '{sql_escape(interp['not_observed']['de'])}' as interpretation_not_observed_de,\\n\"\n            f\"    '{sql_escape(interp['not_observed']['en'])}' as interpretation_not_observed_en,\\n\"\n            f\"    '{sql_escape(interp['not_observed']['fr'])}' as interpretation_not_observed_fr,\\n\"\n            f\"    '{sql_escape(interp['insufficient']['de'])}' as interpretation_insufficient_de,\\n\"\n            f\"    '{sql_escape(interp['insufficient']['en'])}' as interpretation_insufficient_en,\\n\"\n            f\"    '{sql_escape(interp['insufficient']['fr'])}' as interpretation_insufficient_fr\"\n        )\n\n        if i < len(hypotheses) - 1:\n            lines.append(\"union all\")\n        lines.append(\"\")\n\n    return \"\\n\".join(lines)\n\n\nVERDICTS_COLUMNS = [\n    {\"name\": \"verdict_id\", \"description\": \"Deterministic MD5 hash of (hypothesis_id, tenant_id)\"},\n    {\"name\": \"tenant_id\", \"description\": \"Current tenant identifier\"},\n    {\"name\": \"hypothesis_id\", \"description\": \"Hypothesis identifier from YAML\"},\n    {\"name\": \"hypothesis_version\", \"description\": \"Hypothesis version from YAML\"},\n    {\"name\": \"category\", \"description\": \"financial_anomaly, data_quality, compliance, or operational\"},\n    {\"name\": \"status\", \"description\": \"confirmed, plausible, not_observed, or insufficient\"},\n    {\"name\": \"evidence_score\", \"description\": \"Weighted evidence score 0.0-1.0\"},\n    {\"name\": \"finding_count\", \"description\": \"Total findings across all evidence probes\"},\n    {\"name\": \"money_at_risk\", \"description\": \"Total money at risk across all evidence probes\"},\n    {\"name\": \"qty_at_risk\", \"description\": \"Total quantity at risk across all evidence probes\"},\n    {\"name\": \"worst_severity\", \"description\": \"high, medium, or low\"},\n    {\"name\": \"probes_evaluated\", \"description\": \"Number of evidence probes checked\"},\n    {\"name\": \"probes_with_findings\", \"description\": \"Number of evidence probes with findings\"},\n]\n\nREGISTRY_COLUMNS = [\n    {\"name\": \"hypothesis_id\", \"description\": \"Hypothesis identifier\"},\n    {\"name\": \"short_code\", \"description\": \"Pronounceable 3-4 letter code for quick reference\"},\n    {\"name\": \"hypothesis_version\", \"description\": \"Version string\"},\n    {\"name\": \"category\", \"description\": \"Hypothesis category\"},\n    {\"name\": \"audience\", \"description\": \"Comma-separated audience roles\"},\n    {\"name\": \"tags\", \"description\": \"Comma-separated tags\"},\n    {\"name\": \"evidence_probes\", \"description\": \"Comma-separated probe_ids with roles\"},\n    {\"name\": \"statement_de\", \"description\": \"Hypothesis statement (German)\"},\n    {\"name\": \"statement_en\", \"description\": \"Hypothesis statement (English)\"},\n    {\"name\": \"statement_fr\", \"description\": \"Hypothesis statement (French)\"},\n    {\"name\": \"interpretation_confirmed_de\", \"description\": \"Confirmed interpretation (German)\"},\n    {\"name\": \"interpretation_confirmed_en\", \"description\": \"Confirmed interpretation (English)\"},\n    {\"name\": \"interpretation_confirmed_fr\", \"description\": \"Confirmed interpretation (French)\"},\n    {\"name\": \"interpretation_plausible_de\", \"description\": \"Plausible interpretation (German)\"},\n    {\"name\": \"interpretation_plausible_en\", \"description\": \"Plausible interpretation (English)\"},\n    {\"name\": \"interpretation_plausible_fr\", \"description\": \"Plausible interpretation (French)\"},\n    {\"name\": \"interpretation_not_observed_de\", \"description\": \"Not observed interpretation (German)\"},\n    {\"name\": \"interpretation_not_observed_en\", \"description\": \"Not observed interpretation (English)\"},\n    {\"name\": \"interpretation_not_observed_fr\", \"description\": \"Not observed interpretation (French)\"},\n    {\"name\": \"interpretation_insufficient_de\", \"description\": \"Insufficient interpretation (German)\"},\n    {\"name\": \"interpretation_insufficient_en\", \"description\": \"Insufficient interpretation (English)\"},\n    {\"name\": \"interpretation_insufficient_fr\", \"description\": \"Insufficient interpretation (French)\"},\n]\n\n\ndef generate_yml(model_name: str, description: str, columns: list[dict]) -> str:\n    doc = {\n        \"version\": 2,\n        \"models\": [{\n            \"name\": model_name,\n            \"description\": description,\n            \"config\": {\"tags\": [\"hypothesis\"]},\n            \"columns\": columns,\n        }],\n    }\n    return yaml.dump(doc, default_flow_style=False, sort_keys=False)\n\n\ndef main():\n    check_only = \"--check\" in sys.argv\n\n    hyp_paths = sorted(HYPOTHESES_DIR.glob(\"*.yaml\"))\n    if not hyp_paths:\n        print(\"No hypothesis YAML files found in hypotheses/\")\n        sys.exit(1)\n\n    # Validate all hypotheses first\n    all_hyps = []\n    has_errors = False\n    for path in hyp_paths:\n        with open(path) as f:\n            hyp = yaml.safe_load(f)\n        errors = validate_hypothesis(hyp, path.name)\n        if errors:\n            print(f\"FAIL  {path.name}\")\n            for e in errors:\n                print(f\"  - {e}\")\n            has_errors = True\n        else:\n            all_hyps.append(hyp)\n\n    if has_errors:\n        print(\"\\nValidation failed. Fix errors before compiling.\")\n        sys.exit(1)\n\n    # Compile\n    OUTPUT_DIR.mkdir(parents=True, exist_ok=True)\n\n    verdicts_sql = compile_verdicts(all_hyps)\n    registry_sql = compile_registry(all_hyps)\n    verdicts_yml = generate_yml(\n        \"hypothesis_verdicts\",\n        \"Per-tenant hypothesis verdicts computed from probe evidence.\",\n        VERDICTS_COLUMNS,\n    )\n    registry_yml = generate_yml(\n        \"hypothesis_registry\",\n        \"Tri-lingual hypothesis metadata and interpretation templates.\",\n        REGISTRY_COLUMNS,\n    )\n\n    files = {\n        OUTPUT_DIR / \"hypothesis_verdicts.sql\": verdicts_sql,\n        OUTPUT_DIR / \"hypothesis_verdicts.yml\": verdicts_yml,\n        OUTPUT_DIR / \"hypothesis_registry.sql\": registry_sql,\n        OUTPUT_DIR / \"hypothesis_registry.yml\": registry_yml,\n    }\n\n    if check_only:\n        changes = []\n        for path, content in files.items():\n            if not path.exists() or path.read_text() != content:\n                label = \"NEW\" if not path.exists() else \"CHANGED\"\n                changes.append(f\"{label:8s} {path.name}\")\n            else:\n                print(f\"OK       {path.name}\")\n        if changes:\n            print()\n            for c in changes:\n                print(c)\n            print(f\"\\n{len(changes)} file(s) would change.\")\n            sys.exit(1)\n        else:\n            print(\"\\nAll generated files up to date.\")\n    else:\n        for path, content in files.items():\n            path.write_text(content)\n            print(f\"  {path.name}\")\n        print(f\"\\n{len(all_hyps)} hypothesis(es) compiled to {OUTPUT_DIR.relative_to(REPO_ROOT)}\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "lang": "python"}, "classes": "compiler"}, {"data": {"id": "hypothesischeck", "label": "hypothesis\u2713", "fullName": "hypothesischeck", "layer": "compiler", "layerLabel": "Compilers", "color": "#d47e7e", "shape": "triangle", "layerShape": "triangle", "kindShape": "triangle", "kind": "python_script", "path": "scripts/hypothesischeck.py", "layerOrder": -1, "source": "#!/usr/bin/env python3\n\"\"\"hypothesischeck.py - Validate hypothesis YAML definitions.\n\nChecks structure, cross-references probe IDs against probes/*.yaml,\nand validates verdict thresholds and interpretation keys.\n\nUsage:\n    python3 scripts/hypothesischeck.py                        # validate all\n    python3 scripts/hypothesischeck.py hypotheses/hyp_foo.yaml # validate one\n\"\"\"\n\nimport sys\nfrom pathlib import Path\n\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent\nHYPOTHESES_DIR = REPO_ROOT / \"hypotheses\"\nPROBES_DIR = REPO_ROOT / \"probes\"\n\nVALID_CATEGORIES = {\"financial_anomaly\", \"data_quality\", \"compliance\", \"operational\"}\nVALID_ROLES = {\"primary\", \"supporting\", \"context\", \"counter\"}\nREQUIRED_LANGS = {\"en\", \"de\", \"fr\"}\nREQUIRED_INTERP_STATUSES = {\"confirmed\", \"plausible\", \"not_observed\", \"insufficient\"}\nVOWELS = set(\"AEIOU\")\n\n\ndef validate_hypothesis(hyp: dict, filename: str) -> list[str]:\n    errors = []\n\n    # Required top-level fields\n    for field in (\"hypothesis_id\", \"version\", \"statement\", \"category\",\n                  \"evidence\", \"verdict\", \"interpretation\"):\n        if not hyp.get(field):\n            errors.append(f\"Missing required field: '{field}'\")\n\n    # hypothesis_id matches filename\n    hid = hyp.get(\"hypothesis_id\", \"\")\n    expected_id = Path(filename).stem\n    if hid != expected_id:\n        errors.append(f\"hypothesis_id '{hid}' does not match filename '{expected_id}'\")\n\n    # short_code: required, 3-4 uppercase letters, vowel at position 2 or 3\n    code = hyp.get(\"short_code\")\n    if not code:\n        errors.append(\"Missing required field: 'short_code'\")\n    elif not isinstance(code, str) or not code.isalpha() or not code.isupper():\n        errors.append(f\"short_code '{code}': must be 3-4 uppercase letters\")\n    elif len(code) < 3 or len(code) > 4:\n        errors.append(f\"short_code '{code}': must be 3-4 characters, got {len(code)}\")\n    elif not (code[1] in VOWELS or code[2] in VOWELS):\n        errors.append(f\"short_code '{code}': must have a vowel at position 2 or 3\")\n\n    # statement has en/de/fr\n    statement = hyp.get(\"statement\")\n    if isinstance(statement, dict):\n        missing = REQUIRED_LANGS - set(statement.keys())\n        if missing:\n            errors.append(f\"statement: missing languages: {sorted(missing)}\")\n    elif statement is not None:\n        errors.append(\"statement: must be a mapping with en/de/fr keys\")\n\n    # category\n    cat = hyp.get(\"category\")\n    if cat and cat not in VALID_CATEGORIES:\n        errors.append(f\"Invalid category '{cat}'. Valid: {sorted(VALID_CATEGORIES)}\")\n\n    # evidence\n    evidence = hyp.get(\"evidence\")\n    if evidence is not None:\n        if not isinstance(evidence, list) or len(evidence) == 0:\n            errors.append(\"evidence: must be a non-empty list\")\n        else:\n            has_primary = False\n            probe_yamls = {p.stem for p in PROBES_DIR.glob(\"*.yaml\")}\n\n            for i, ev in enumerate(evidence):\n                ctx = f\"evidence[{i}]\"\n\n                pid = ev.get(\"probe_id\")\n                if not pid:\n                    errors.append(f\"{ctx}: missing 'probe_id'\")\n                elif pid not in probe_yamls:\n                    errors.append(f\"{ctx}: probe_id '{pid}' has no \"\n                                  f\"corresponding probes/{pid}.yaml\")\n\n                role = ev.get(\"role\")\n                if not role:\n                    errors.append(f\"{ctx}: missing 'role'\")\n                elif role not in VALID_ROLES:\n                    errors.append(f\"{ctx}: invalid role '{role}'. \"\n                                  f\"Valid: {sorted(VALID_ROLES)}\")\n                if role == \"primary\":\n                    has_primary = True\n\n                weight = ev.get(\"weight\")\n                if weight is None:\n                    errors.append(f\"{ctx}: missing 'weight'\")\n                elif not isinstance(weight, int) or weight < 1 or weight > 5:\n                    errors.append(f\"{ctx}: weight must be an integer 1-5, got {weight}\")\n\n            if not has_primary:\n                errors.append(\"evidence: at least one entry must have role 'primary'\")\n\n    # verdict\n    verdict = hyp.get(\"verdict\")\n    if isinstance(verdict, dict):\n        thresholds = verdict.get(\"thresholds\")\n        if not isinstance(thresholds, dict):\n            errors.append(\"verdict: missing 'thresholds'\")\n        else:\n            confirmed = thresholds.get(\"confirmed\")\n            plausible = thresholds.get(\"plausible\")\n            if confirmed is None:\n                errors.append(\"verdict.thresholds: missing 'confirmed'\")\n            if plausible is None:\n                errors.append(\"verdict.thresholds: missing 'plausible'\")\n            if confirmed is not None and plausible is not None:\n                if not (0 <= plausible < confirmed <= 1):\n                    errors.append(\n                        f\"verdict.thresholds: need 0 <= plausible ({plausible}) \"\n                        f\"< confirmed ({confirmed}) <= 1\"\n                    )\n\n        # Optional scaling mode\n        scaling = verdict.get(\"scaling\")\n        if scaling is not None and scaling not in (\"binary\", \"graduated\"):\n            errors.append(f\"verdict.scaling: must be 'binary' or 'graduated', got '{scaling}'\")\n\n        # Optional saturation (only meaningful with graduated)\n        saturation = verdict.get(\"saturation\")\n        if saturation is not None:\n            if not isinstance(saturation, (int, float)) or saturation <= 0:\n                errors.append(f\"verdict.saturation: must be a positive number, got {saturation}\")\n    elif verdict is not None:\n        errors.append(\"verdict: must be a mapping\")\n\n    # interpretation\n    interp = hyp.get(\"interpretation\")\n    if isinstance(interp, dict):\n        missing_statuses = REQUIRED_INTERP_STATUSES - set(interp.keys())\n        if missing_statuses:\n            errors.append(f\"interpretation: missing statuses: {sorted(missing_statuses)}\")\n        for status_key in REQUIRED_INTERP_STATUSES & set(interp.keys()):\n            if isinstance(interp[status_key], dict):\n                missing_langs = REQUIRED_LANGS - set(interp[status_key].keys())\n                if missing_langs:\n                    errors.append(f\"interpretation.{status_key}: \"\n                                  f\"missing languages: {sorted(missing_langs)}\")\n            else:\n                errors.append(f\"interpretation.{status_key}: must be a mapping with en/de/fr\")\n    elif interp is not None:\n        errors.append(\"interpretation: must be a mapping\")\n\n    return errors\n\n\ndef main():\n    if len(sys.argv) > 1:\n        paths = [Path(a) for a in sys.argv[1:]]\n    else:\n        paths = sorted(HYPOTHESES_DIR.glob(\"*.yaml\"))\n\n    if not paths:\n        print(\"No hypothesis YAML files found.\")\n        sys.exit(1)\n\n    total_errors = 0\n    seen_codes: dict[str, str] = {}\n    for path in paths:\n        with open(path) as f:\n            hyp = yaml.safe_load(f)\n        errors = validate_hypothesis(hyp, path.name)\n\n        # Cross-file uniqueness check for short_code\n        code = hyp.get(\"short_code\")\n        if code and code in seen_codes:\n            errors.append(f\"short_code '{code}' is already used by {seen_codes[code]}\")\n        elif code:\n            seen_codes[code] = path.name\n\n        if errors:\n            print(f\"FAIL  {path.name}\")\n            for e in errors:\n                print(f\"  - {e}\")\n            total_errors += len(errors)\n        else:\n            print(f\"OK    {path.name}\")\n\n    print()\n    if total_errors:\n        print(f\"{total_errors} error(s) found.\")\n        sys.exit(1)\n    else:\n        print(f\"All {len(paths)} hypothesis(es) valid.\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "lang": "python"}, "classes": "compiler"}, {"data": {"id": "diagnosiscompile", "label": "diagnosis", "fullName": "diagnosiscompile", "layer": "compiler", "layerLabel": "Compilers", "color": "#d47e7e", "shape": "triangle", "layerShape": "triangle", "kindShape": "triangle", "kind": "python_script", "path": "scripts/diagnosiscompile.py", "layerOrder": -1, "source": "#!/usr/bin/env python3\n\"\"\"diagnosiscompile.py - Compile diagnosis YAMLs into dbt SQL models.\n\nGenerates:\n  - dbt/numetrix/models/probes/diagnosis_verdicts.sql\n  - dbt/numetrix/models/probes/diagnosis_verdicts.yml\n  - dbt/numetrix/models/probes/diagnosis_registry.sql\n  - dbt/numetrix/models/probes/diagnosis_registry.yml\n\nUsage:\n    python3 scripts/diagnosiscompile.py          # compile all\n    python3 scripts/diagnosiscompile.py --check  # dry-run\n\"\"\"\n\nimport sys\nfrom pathlib import Path\n\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent\nDIAGNOSES_DIR = REPO_ROOT / \"diagnoses\"\nOUTPUT_DIR = REPO_ROOT / \"dbt\" / \"numetrix\" / \"models\" / \"probes\"\n\n# Import validation\nsys.path.insert(0, str(REPO_ROOT / \"scripts\"))\nfrom diagnosischeck import validate_diagnosis\n\n\nFIELD_TO_AGGREGATE = {\n    \"finding_count\": \"count(*)\",\n    \"money_at_risk\": \"coalesce(sum(money_at_risk), 0)\",\n}\n\n\ndef field_expr(field: str) -> str:\n    \"\"\"Translate a YAML field name to a SQL aggregate expression.\"\"\"\n    return FIELD_TO_AGGREGATE.get(field, field)\n\n\ndef sql_escape(s: str) -> str:\n    \"\"\"Escape single quotes for SQL string literals.\"\"\"\n    return s.replace(\"'\", \"''\")\n\n\ndef compile_verdicts(diagnoses: list[dict]) -> str:\n    \"\"\"Generate diagnosis_verdicts.sql with one CTE block per diagnosis.\"\"\"\n    lines = [\n        \"-- diagnosis_verdicts: Per-tenant diagnosis for confirmed hypotheses\",\n        \"-- Auto-generated by diagnosiscompile.py \u2014 do not edit manually.\",\n        \"{{ config(materialized='table', tags=['diagnosis']) }}\",\n        \"\",\n        \"with\",\n        \"\",\n    ]\n\n    cte_names = []\n    for i, diag in enumerate(diagnoses):\n        did = diag[\"diagnosis_id\"]\n        safe_id = did.replace(\"-\", \"_\")\n        hid = diag[\"hypothesis_id\"]\n        rcc = diag[\"root_cause_category\"]\n        rcid = diag[\"root_cause_id\"]\n        confidence = diag[\"confidence\"]\n        base = confidence[\"base\"]\n        conditions = diag[\"conditions\"]\n        boosts = confidence.get(\"boost_if\", [])\n\n        # __hypothesis CTE: gate on confirmed hypothesis\n        lines.append(\n            f\"{safe_id}__hypothesis as (\\n\"\n            f\"    select\\n\"\n            f\"        hypothesis_id,\\n\"\n            f\"        status,\\n\"\n            f\"        evidence_score,\\n\"\n            f\"        finding_count,\\n\"\n            f\"        money_at_risk\\n\"\n            f\"    from {{{{ ref('hypothesis_verdicts') }}}}\\n\"\n            f\"    where hypothesis_id = '{hid}'\\n\"\n            f\"      and status = 'confirmed'\\n\"\n            f\"),\"\n        )\n        lines.append(\"\")\n\n        # __conditions CTE: check each condition\n        cond_parts = []\n        for cond in conditions:\n            pid = cond[\"probe_id\"]\n            field = cond[\"field\"]\n            above = cond[\"above\"]\n            ref = \"{{ ref('probe_findings__\" + pid + \"') }}\"\n            cond_parts.append(\n                f\"    select\\n\"\n                f\"        '{pid}' as probe_id,\\n\"\n                f\"        count(*) as finding_count,\\n\"\n                f\"        coalesce(sum(money_at_risk), 0) as money_at_risk\\n\"\n                f\"    from {ref}\\n\"\n                f\"    having {field_expr(field)} > {above}\"\n            )\n        cond_sql = \"\\n    union all\\n\".join(cond_parts)\n        lines.append(\n            f\"{safe_id}__conditions as (\\n\"\n            f\"{cond_sql}\\n\"\n            f\"),\"\n        )\n        lines.append(\"\")\n\n        # __confidence CTE: compute base + boosts\n        if boosts:\n            lines.append(f\"{safe_id}__confidence as (\")\n            lines.append(f\"    select least(1.0,\")\n            lines.append(f\"        {base}\")\n            for boost in boosts:\n                bpid = boost[\"probe_id\"]\n                bfield = boost[\"field\"]\n                babove = boost[\"above\"]\n                bval = boost[\"boost\"]\n                bref = \"{{ ref('probe_findings__\" + bpid + \"') }}\"\n                lines.append(\n                    f\"        + case when (select {field_expr(bfield)} from {bref} having {field_expr(bfield)} > {babove}) > 0 then {bval} else 0 end\"\n                )\n            lines.append(f\"    ) as confidence\")\n            lines.append(f\"),\")\n        else:\n            lines.append(\n                f\"{safe_id}__confidence as (\\n\"\n                f\"    select {base} as confidence\\n\"\n                f\"),\"\n            )\n        lines.append(\"\")\n\n        # __verdict CTE: final row (only if hypothesis confirmed + all conditions met)\n        expected_count = len(conditions)\n        lines.append(\n            f\"{safe_id}__verdict as (\\n\"\n            f\"    select\\n\"\n            f\"        md5('{did}' || '|' || '{{{{ var(\\\"tenant_id\\\") }}}}') as diagnosis_id,\\n\"\n            f\"        '{{{{ var(\\\"tenant_id\\\") }}}}' as tenant_id,\\n\"\n            f\"        '{hid}' as hypothesis_id,\\n\"\n            f\"        '{rcc}' as root_cause_category,\\n\"\n            f\"        '{rcid}' as root_cause_id,\\n\"\n            f\"        c.confidence,\\n\"\n            f\"        h.finding_count,\\n\"\n            f\"        h.money_at_risk,\\n\"\n            f\"        h.evidence_score as hypothesis_evidence_score\\n\"\n            f\"    from {safe_id}__hypothesis h\\n\"\n            f\"    cross join {safe_id}__confidence c\\n\"\n            f\"    where (select count(*) from {safe_id}__conditions) = {expected_count}\\n\"\n            f\"){',' if i < len(diagnoses) - 1 else ''}\"\n        )\n        lines.append(\"\")\n        cte_names.append(f\"{safe_id}__verdict\")\n\n    # Final SELECT: UNION ALL of all verdict CTEs\n    lines.append(\"-- Final union of all diagnosis verdicts\")\n    for i, name in enumerate(cte_names):\n        lines.append(\n            f\"select\\n\"\n            f\"    diagnosis_id,\\n\"\n            f\"    tenant_id,\\n\"\n            f\"    hypothesis_id,\\n\"\n            f\"    root_cause_category,\\n\"\n            f\"    root_cause_id,\\n\"\n            f\"    round(confidence, 4) as confidence,\\n\"\n            f\"    finding_count,\\n\"\n            f\"    round(money_at_risk, 2) as money_at_risk,\\n\"\n            f\"    round(hypothesis_evidence_score, 4) as hypothesis_evidence_score\\n\"\n            f\"from {name}\"\n        )\n        if i < len(cte_names) - 1:\n            lines.append(\"union all\")\n        lines.append(\"\")\n\n    return \"\\n\".join(lines)\n\n\ndef compile_registry(diagnoses: list[dict]) -> str:\n    \"\"\"Generate diagnosis_registry.sql from YAML metadata.\"\"\"\n    lines = [\n        \"-- diagnosis_registry: Tri-lingual diagnosis metadata\",\n        \"-- Auto-generated by diagnosiscompile.py \u2014 do not edit manually.\",\n        \"{{ config(materialized='table', tags=['diagnosis']) }}\",\n        \"\",\n    ]\n\n    for i, diag in enumerate(diagnoses):\n        did = diag[\"diagnosis_id\"]\n        version = diag[\"version\"]\n        hid = diag[\"hypothesis_id\"]\n        rcc = diag[\"root_cause_category\"]\n        rcid = diag[\"root_cause_id\"]\n\n        expl = diag[\"explanation\"]\n        rec = diag[\"recommendation\"]\n\n        # Build condition_probes string\n        condition_probes = \", \".join(\n            c[\"probe_id\"] for c in diag[\"conditions\"]\n        )\n        # Build boost_probes string\n        boost_probes = \", \".join(\n            b[\"probe_id\"] for b in diag.get(\"confidence\", {}).get(\"boost_if\", [])\n        )\n\n        lines.append(\n            f\"select\\n\"\n            f\"    '{did}' as diagnosis_id,\\n\"\n            f\"    '{version}' as diagnosis_version,\\n\"\n            f\"    '{hid}' as hypothesis_id,\\n\"\n            f\"    '{rcc}' as root_cause_category,\\n\"\n            f\"    '{rcid}' as root_cause_id,\\n\"\n            f\"    '{sql_escape(condition_probes)}' as condition_probes,\\n\"\n            f\"    '{sql_escape(boost_probes)}' as boost_probes,\\n\"\n            f\"    {diag['confidence']['base']} as confidence_base,\\n\"\n            f\"    '{sql_escape(expl['de'])}' as explanation_de,\\n\"\n            f\"    '{sql_escape(expl['en'])}' as explanation_en,\\n\"\n            f\"    '{sql_escape(expl['fr'])}' as explanation_fr,\\n\"\n            f\"    '{sql_escape(rec['de'])}' as recommendation_de,\\n\"\n            f\"    '{sql_escape(rec['en'])}' as recommendation_en,\\n\"\n            f\"    '{sql_escape(rec['fr'])}' as recommendation_fr\"\n        )\n\n        if i < len(diagnoses) - 1:\n            lines.append(\"union all\")\n        lines.append(\"\")\n\n    return \"\\n\".join(lines)\n\n\nVERDICTS_COLUMNS = [\n    {\"name\": \"diagnosis_id\", \"description\": \"Deterministic MD5 hash of (diagnosis_id, tenant_id)\"},\n    {\"name\": \"tenant_id\", \"description\": \"Current tenant identifier\"},\n    {\"name\": \"hypothesis_id\", \"description\": \"The confirmed hypothesis this diagnosis explains\"},\n    {\"name\": \"root_cause_category\", \"description\": \"process_failure, system_failure, data_quality, behavioral, structural, or external\"},\n    {\"name\": \"root_cause_id\", \"description\": \"Specific root cause identifier within the category\"},\n    {\"name\": \"confidence\", \"description\": \"Computed confidence score 0.0-1.0 (base + boosts)\"},\n    {\"name\": \"finding_count\", \"description\": \"Finding count from the confirmed hypothesis\"},\n    {\"name\": \"money_at_risk\", \"description\": \"Money at risk from the confirmed hypothesis\"},\n    {\"name\": \"hypothesis_evidence_score\", \"description\": \"Evidence score from the confirmed hypothesis\"},\n]\n\nREGISTRY_COLUMNS = [\n    {\"name\": \"diagnosis_id\", \"description\": \"Diagnosis identifier\"},\n    {\"name\": \"diagnosis_version\", \"description\": \"Version string\"},\n    {\"name\": \"hypothesis_id\", \"description\": \"Linked hypothesis identifier\"},\n    {\"name\": \"root_cause_category\", \"description\": \"Root cause category\"},\n    {\"name\": \"root_cause_id\", \"description\": \"Specific root cause identifier\"},\n    {\"name\": \"condition_probes\", \"description\": \"Comma-separated probe IDs used in conditions\"},\n    {\"name\": \"boost_probes\", \"description\": \"Comma-separated probe IDs used for confidence boosts\"},\n    {\"name\": \"confidence_base\", \"description\": \"Base confidence value before boosts\"},\n    {\"name\": \"explanation_de\", \"description\": \"Root cause explanation (German)\"},\n    {\"name\": \"explanation_en\", \"description\": \"Root cause explanation (English)\"},\n    {\"name\": \"explanation_fr\", \"description\": \"Root cause explanation (French)\"},\n    {\"name\": \"recommendation_de\", \"description\": \"Investigation recommendation (German)\"},\n    {\"name\": \"recommendation_en\", \"description\": \"Investigation recommendation (English)\"},\n    {\"name\": \"recommendation_fr\", \"description\": \"Investigation recommendation (French)\"},\n]\n\n\ndef generate_yml(model_name: str, description: str, columns: list[dict]) -> str:\n    doc = {\n        \"version\": 2,\n        \"models\": [{\n            \"name\": model_name,\n            \"description\": description,\n            \"config\": {\"tags\": [\"diagnosis\"]},\n            \"columns\": columns,\n        }],\n    }\n    return yaml.dump(doc, default_flow_style=False, sort_keys=False)\n\n\ndef main():\n    check_only = \"--check\" in sys.argv\n\n    diag_paths = sorted(DIAGNOSES_DIR.glob(\"*.yaml\"))\n    if not diag_paths:\n        print(\"No diagnosis YAML files found in diagnoses/\")\n        sys.exit(1)\n\n    # Validate all diagnoses first\n    all_diags = []\n    has_errors = False\n    for path in diag_paths:\n        with open(path) as f:\n            diag = yaml.safe_load(f)\n        errors = validate_diagnosis(diag, path.name)\n        if errors:\n            print(f\"FAIL  {path.name}\")\n            for e in errors:\n                print(f\"  - {e}\")\n            has_errors = True\n        else:\n            all_diags.append(diag)\n\n    if has_errors:\n        print(\"\\nValidation failed. Fix errors before compiling.\")\n        sys.exit(1)\n\n    # Compile\n    OUTPUT_DIR.mkdir(parents=True, exist_ok=True)\n\n    verdicts_sql = compile_verdicts(all_diags)\n    registry_sql = compile_registry(all_diags)\n    verdicts_yml = generate_yml(\n        \"diagnosis_verdicts\",\n        \"Per-tenant diagnosis verdicts for confirmed hypotheses.\",\n        VERDICTS_COLUMNS,\n    )\n    registry_yml = generate_yml(\n        \"diagnosis_registry\",\n        \"Tri-lingual diagnosis metadata with explanations and recommendations.\",\n        REGISTRY_COLUMNS,\n    )\n\n    files = {\n        OUTPUT_DIR / \"diagnosis_verdicts.sql\": verdicts_sql,\n        OUTPUT_DIR / \"diagnosis_verdicts.yml\": verdicts_yml,\n        OUTPUT_DIR / \"diagnosis_registry.sql\": registry_sql,\n        OUTPUT_DIR / \"diagnosis_registry.yml\": registry_yml,\n    }\n\n    if check_only:\n        changes = []\n        for path, content in files.items():\n            if not path.exists() or path.read_text() != content:\n                label = \"NEW\" if not path.exists() else \"CHANGED\"\n                changes.append(f\"{label:8s} {path.name}\")\n            else:\n                print(f\"OK       {path.name}\")\n        if changes:\n            print()\n            for c in changes:\n                print(c)\n            print(f\"\\n{len(changes)} file(s) would change.\")\n            sys.exit(1)\n        else:\n            print(\"\\nAll generated files up to date.\")\n    else:\n        for path, content in files.items():\n            path.write_text(content)\n            print(f\"  {path.name}\")\n        print(f\"\\n{len(all_diags)} diagnosis(es) compiled to {OUTPUT_DIR.relative_to(REPO_ROOT)}\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "lang": "python"}, "classes": "compiler"}, {"data": {"id": "diagnosischeck", "label": "diagnosis\u2713", "fullName": "diagnosischeck", "layer": "compiler", "layerLabel": "Compilers", "color": "#d47e7e", "shape": "triangle", "layerShape": "triangle", "kindShape": "triangle", "kind": "python_script", "path": "scripts/diagnosischeck.py", "layerOrder": -1, "source": "#!/usr/bin/env python3\n\"\"\"diagnosischeck.py - Validate diagnosis YAML definitions.\n\nChecks structure, cross-references hypothesis and probe IDs,\nand validates confidence ranges and tri-lingual text fields.\n\nUsage:\n    python3 scripts/diagnosischeck.py                          # validate all\n    python3 scripts/diagnosischeck.py diagnoses/diag_foo.yaml  # validate one\n\"\"\"\n\nimport sys\nfrom pathlib import Path\n\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent\nDIAGNOSES_DIR = REPO_ROOT / \"diagnoses\"\nHYPOTHESES_DIR = REPO_ROOT / \"hypotheses\"\nPROBES_DIR = REPO_ROOT / \"probes\"\n\nVALID_ROOT_CAUSE_CATEGORIES = {\n    \"process_failure\", \"system_failure\", \"data_quality\",\n    \"behavioral\", \"structural\", \"external\",\n}\nREQUIRED_LANGS = {\"en\", \"de\", \"fr\"}\n\n\ndef validate_diagnosis(diag: dict, filename: str) -> list[str]:\n    errors = []\n\n    # Required top-level fields\n    for field in (\"diagnosis_id\", \"version\", \"hypothesis_id\",\n                  \"root_cause_category\", \"root_cause_id\",\n                  \"conditions\", \"confidence\", \"explanation\", \"recommendation\"):\n        if not diag.get(field):\n            errors.append(f\"Missing required field: '{field}'\")\n\n    # diagnosis_id matches filename\n    did = diag.get(\"diagnosis_id\", \"\")\n    expected_id = Path(filename).stem\n    if did != expected_id:\n        errors.append(f\"diagnosis_id '{did}' does not match filename '{expected_id}'\")\n\n    # hypothesis_id exists\n    hid = diag.get(\"hypothesis_id\", \"\")\n    if hid:\n        hyp_yamls = {p.stem for p in HYPOTHESES_DIR.glob(\"*.yaml\")}\n        if hid not in hyp_yamls:\n            errors.append(f\"hypothesis_id '{hid}' has no corresponding \"\n                          f\"hypotheses/{hid}.yaml\")\n\n    # root_cause_category\n    rcc = diag.get(\"root_cause_category\")\n    if rcc and rcc not in VALID_ROOT_CAUSE_CATEGORIES:\n        errors.append(f\"Invalid root_cause_category '{rcc}'. \"\n                      f\"Valid: {sorted(VALID_ROOT_CAUSE_CATEGORIES)}\")\n\n    # conditions\n    conditions = diag.get(\"conditions\")\n    if conditions is not None:\n        if not isinstance(conditions, list) or len(conditions) == 0:\n            errors.append(\"conditions: must be a non-empty list\")\n        else:\n            probe_yamls = {p.stem for p in PROBES_DIR.glob(\"*.yaml\")}\n            for i, cond in enumerate(conditions):\n                ctx = f\"conditions[{i}]\"\n                pid = cond.get(\"probe_id\")\n                if not pid:\n                    errors.append(f\"{ctx}: missing 'probe_id'\")\n                elif pid not in probe_yamls:\n                    errors.append(f\"{ctx}: probe_id '{pid}' has no \"\n                                  f\"corresponding probes/{pid}.yaml\")\n\n                if not cond.get(\"field\"):\n                    errors.append(f\"{ctx}: missing 'field'\")\n\n                above = cond.get(\"above\")\n                if above is None:\n                    errors.append(f\"{ctx}: missing 'above'\")\n                elif not isinstance(above, (int, float)):\n                    errors.append(f\"{ctx}: 'above' must be a number, got {type(above).__name__}\")\n\n    # confidence\n    confidence = diag.get(\"confidence\")\n    if isinstance(confidence, dict):\n        base = confidence.get(\"base\")\n        if base is None:\n            errors.append(\"confidence: missing 'base'\")\n        elif not isinstance(base, (int, float)) or base < 0 or base > 1:\n            errors.append(f\"confidence.base: must be a float 0.0-1.0, got {base}\")\n\n        total = base if isinstance(base, (int, float)) else 0\n\n        boost_if = confidence.get(\"boost_if\")\n        if boost_if is not None:\n            if not isinstance(boost_if, list):\n                errors.append(\"confidence.boost_if: must be a list\")\n            else:\n                probe_yamls = {p.stem for p in PROBES_DIR.glob(\"*.yaml\")}\n                for j, boost in enumerate(boost_if):\n                    bctx = f\"confidence.boost_if[{j}]\"\n                    bpid = boost.get(\"probe_id\")\n                    if not bpid:\n                        errors.append(f\"{bctx}: missing 'probe_id'\")\n                    elif bpid not in probe_yamls:\n                        errors.append(f\"{bctx}: probe_id '{bpid}' has no \"\n                                      f\"corresponding probes/{bpid}.yaml\")\n\n                    if not boost.get(\"field\"):\n                        errors.append(f\"{bctx}: missing 'field'\")\n\n                    babove = boost.get(\"above\")\n                    if babove is None:\n                        errors.append(f\"{bctx}: missing 'above'\")\n\n                    bval = boost.get(\"boost\")\n                    if bval is None:\n                        errors.append(f\"{bctx}: missing 'boost'\")\n                    elif not isinstance(bval, (int, float)) or bval < 0 or bval > 0.3:\n                        errors.append(f\"{bctx}: boost must be a float 0.0-0.3, got {bval}\")\n                    else:\n                        total += bval\n\n                if isinstance(base, (int, float)) and total > 1.0:\n                    errors.append(\n                        f\"confidence: total (base + all boosts) = {total:.2f} exceeds 1.0\"\n                    )\n    elif confidence is not None:\n        errors.append(\"confidence: must be a mapping\")\n\n    # explanation\n    explanation = diag.get(\"explanation\")\n    if isinstance(explanation, dict):\n        missing = REQUIRED_LANGS - set(explanation.keys())\n        if missing:\n            errors.append(f\"explanation: missing languages: {sorted(missing)}\")\n    elif explanation is not None:\n        errors.append(\"explanation: must be a mapping with en/de/fr keys\")\n\n    # recommendation\n    recommendation = diag.get(\"recommendation\")\n    if isinstance(recommendation, dict):\n        missing = REQUIRED_LANGS - set(recommendation.keys())\n        if missing:\n            errors.append(f\"recommendation: missing languages: {sorted(missing)}\")\n    elif recommendation is not None:\n        errors.append(\"recommendation: must be a mapping with en/de/fr keys\")\n\n    return errors\n\n\ndef main():\n    if len(sys.argv) > 1:\n        paths = [Path(a) for a in sys.argv[1:]]\n    else:\n        paths = sorted(DIAGNOSES_DIR.glob(\"*.yaml\"))\n\n    if not paths:\n        print(\"No diagnosis YAML files found.\")\n        sys.exit(1)\n\n    total_errors = 0\n    for path in paths:\n        with open(path) as f:\n            diag = yaml.safe_load(f)\n        errors = validate_diagnosis(diag, path.name)\n        if errors:\n            print(f\"FAIL  {path.name}\")\n            for e in errors:\n                print(f\"  - {e}\")\n            total_errors += len(errors)\n        else:\n            print(f\"OK    {path.name}\")\n\n    print()\n    if total_errors:\n        print(f\"{total_errors} error(s) found.\")\n        sys.exit(1)\n    else:\n        print(f\"All {len(paths)} diagnosis(es) valid.\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "lang": "python"}, "classes": "compiler"}, {"data": {"id": "lineagecompile", "label": "lineage", "fullName": "lineagecompile", "layer": "compiler", "layerLabel": "Compilers", "color": "#d47e7e", "shape": "triangle", "layerShape": "triangle", "kindShape": "triangle", "kind": "python_script", "path": "scripts/lineagecompile.py", "layerOrder": -1, "source": "#!/usr/bin/env python3\n\"\"\"lineagecompile.py - Compile lineage YAMLs into dbt SQL models.\n\nGenerates:\n  - dbt/numetrix/models/lineage/lineage_registry.sql + .yml\n  - dbt/numetrix/models/lineage/lineage_validation_rules.sql + .yml\n  - dbt/numetrix/models/lineage/lineage_pipeline_metrics.sql + .yml\n  - dbt/numetrix/models/lineage/lineage_validation_counts.sql + .yml\n\nUsage:\n    python3 scripts/lineagecompile.py          # compile all\n    python3 scripts/lineagecompile.py --check  # dry-run\n\"\"\"\n\nimport sys\nfrom pathlib import Path\n\nimport yaml\n\nREPO_ROOT = Path(__file__).resolve().parent.parent\nLINEAGE_DIR = REPO_ROOT / \"lineage\"\nOUTPUT_DIR = REPO_ROOT / \"dbt\" / \"numetrix\" / \"models\" / \"lineage\"\n\n# Import validation\nsys.path.insert(0, str(REPO_ROOT / \"scripts\"))\nfrom lineagecheck import validate_lineage\n\n\ndef sql_escape(s: str) -> str:\n    \"\"\"Escape single quotes for SQL string literals.\"\"\"\n    return s.replace(\"'\", \"''\")\n\n\ndef compile_registry(entities: list[dict]) -> str:\n    \"\"\"Generate lineage_registry.sql \u2014 one row per entity with static metadata.\"\"\"\n    lines = [\n        \"-- lineage_registry: Tri-lingual metadata for all validated entities\",\n        \"-- Auto-generated by lineagecompile.py \u2014 do not edit manually.\",\n        \"{{ config(materialized='table', tags=['lineage']) }}\",\n        \"\",\n    ]\n\n    for i, e in enumerate(entities):\n        eid = e[\"entity_id\"]\n        version = e[\"version\"]\n        dn = e[\"display_name\"]\n        desc = e[\"description\"]\n        sf = e.get(\"source_files\", {})\n        bronze = e[\"bronze\"]\n        silver = e[\"silver\"]\n        gold = e[\"gold\"]\n\n        lines.append(\n            f\"select\\n\"\n            f\"    '{eid}' as entity_id,\\n\"\n            f\"    '{sql_escape(version)}' as version,\\n\"\n            f\"    '{sql_escape(dn['en'])}' as display_name_en,\\n\"\n            f\"    '{sql_escape(dn['de'])}' as display_name_de,\\n\"\n            f\"    '{sql_escape(dn['fr'])}' as display_name_fr,\\n\"\n            f\"    '{sql_escape(desc['en'])}' as description_en,\\n\"\n            f\"    '{sql_escape(desc['de'])}' as description_de,\\n\"\n            f\"    '{sql_escape(desc['fr'])}' as description_fr,\\n\"\n            f\"    '{sql_escape(sf.get('opale', ''))}' as source_file_opale,\\n\"\n            f\"    '{sql_escape(sf.get('sap', ''))}' as source_file_sap,\\n\"\n            f\"    '{sql_escape(sf.get('navision', ''))}' as source_file_navision,\\n\"\n            f\"    '{sql_escape(bronze['description']['en'])}' as bronze_description_en,\\n\"\n            f\"    '{sql_escape(bronze['description']['de'])}' as bronze_description_de,\\n\"\n            f\"    '{sql_escape(bronze['description']['fr'])}' as bronze_description_fr,\\n\"\n            f\"    '{sql_escape(silver['description']['en'])}' as silver_description_en,\\n\"\n            f\"    '{sql_escape(silver['description']['de'])}' as silver_description_de,\\n\"\n            f\"    '{sql_escape(silver['description']['fr'])}' as silver_description_fr,\\n\"\n            f\"    '{sql_escape(gold['description']['en'])}' as gold_description_en,\\n\"\n            f\"    '{sql_escape(gold['description']['de'])}' as gold_description_de,\\n\"\n            f\"    '{sql_escape(gold['description']['fr'])}' as gold_description_fr\"\n        )\n\n        if i < len(entities) - 1:\n            lines.append(\"union all\")\n        lines.append(\"\")\n\n    return \"\\n\".join(lines)\n\n\ndef compile_validation_rules(entities: list[dict]) -> str:\n    \"\"\"Generate lineage_validation_rules.sql \u2014 one row per entity per rule.\"\"\"\n    lines = [\n        \"-- lineage_validation_rules: Silver validation rules with tri-lingual descriptions\",\n        \"-- Auto-generated by lineagecompile.py \u2014 do not edit manually.\",\n        \"{{ config(materialized='table', tags=['lineage']) }}\",\n        \"\",\n    ]\n\n    first = True\n    for e in entities:\n        eid = e[\"entity_id\"]\n        validations = e[\"silver\"].get(\"validations\", [])\n\n        for j, v in enumerate(validations):\n            if not first:\n                lines.append(\"union all\")\n            first = False\n\n            reason = v[\"invalid_reason\"]\n            vdesc = v[\"description\"]\n\n            lines.append(\n                f\"select\\n\"\n                f\"    '{eid}' as entity_id,\\n\"\n                f\"    {j + 1} as rule_order,\\n\"\n                f\"    '{sql_escape(reason)}' as invalid_reason,\\n\"\n                f\"    '{sql_escape(vdesc['en'])}' as description_en,\\n\"\n                f\"    '{sql_escape(vdesc['de'])}' as description_de,\\n\"\n                f\"    '{sql_escape(vdesc['fr'])}' as description_fr\"\n            )\n            lines.append(\"\")\n\n    return \"\\n\".join(lines)\n\n\ndef compile_pipeline_metrics(entities: list[dict]) -> str:\n    \"\"\"Generate lineage_pipeline_metrics.sql \u2014 runtime row counts per entity.\"\"\"\n    lines = [\n        \"-- lineage_pipeline_metrics: Runtime row counts at each pipeline layer\",\n        \"-- Auto-generated by lineagecompile.py \u2014 do not edit manually.\",\n        \"{{ config(materialized='table', tags=['lineage']) }}\",\n        \"\",\n    ]\n\n    # Build one CTE per entity, then UNION ALL\n    cte_names = []\n    lines.append(\"with\")\n    lines.append(\"\")\n\n    for i, e in enumerate(entities):\n        eid = e[\"entity_id\"]\n        safe_id = eid.replace(\"-\", \"_\")\n        cte_name = f\"{safe_id}__metrics\"\n        cte_names.append(cte_name)\n\n        bronze_ref = \"{{ ref('bronze_\" + eid + \"') }}\"\n        silver_ref = \"{{ ref('silver_\" + eid + \"') }}\"\n        gold_ref = \"{{ ref('gold_\" + eid + \"') }}\"\n\n        lines.append(\n            f\"{cte_name} as (\\n\"\n            f\"    select\\n\"\n            f\"        '{eid}' as entity_id,\\n\"\n            f\"        (select count(*) from {bronze_ref}) as bronze_rows,\\n\"\n            f\"        (select count(*) from {silver_ref}) as silver_total,\\n\"\n            f\"        (select count(*) from {silver_ref} where is_valid) as silver_valid,\\n\"\n            f\"        (select count(*) from {silver_ref} where not is_valid) as silver_invalid,\\n\"\n            f\"        (select count(*) from {gold_ref}) as gold_rows\\n\"\n            f\"){(',' if i < len(entities) - 1 else '')}\"\n        )\n        lines.append(\"\")\n\n    # Final SELECT: UNION ALL + computed columns\n    for i, name in enumerate(cte_names):\n        lines.append(\n            f\"select\\n\"\n            f\"    entity_id,\\n\"\n            f\"    bronze_rows,\\n\"\n            f\"    silver_total,\\n\"\n            f\"    silver_valid,\\n\"\n            f\"    silver_invalid,\\n\"\n            f\"    round(100.0 * silver_valid / nullif(silver_total, 0), 2) as silver_valid_pct,\\n\"\n            f\"    gold_rows,\\n\"\n            f\"    silver_valid - gold_rows as silver_to_gold_loss\\n\"\n            f\"from {name}\"\n        )\n        if i < len(cte_names) - 1:\n            lines.append(\"union all\")\n        lines.append(\"\")\n\n    return \"\\n\".join(lines)\n\n\ndef compile_validation_counts(entities: list[dict]) -> str:\n    \"\"\"Generate lineage_validation_counts.sql \u2014 invalid_reason breakdown per entity.\"\"\"\n    lines = [\n        \"-- lineage_validation_counts: Breakdown of Silver validation failures by reason\",\n        \"-- Auto-generated by lineagecompile.py \u2014 do not edit manually.\",\n        \"{{ config(materialized='table', tags=['lineage']) }}\",\n        \"\",\n    ]\n\n    for i, e in enumerate(entities):\n        eid = e[\"entity_id\"]\n        silver_ref = \"{{ ref('silver_\" + eid + \"') }}\"\n\n        lines.append(\n            f\"select\\n\"\n            f\"    '{eid}' as entity_id,\\n\"\n            f\"    invalid_reason,\\n\"\n            f\"    count(*) as count\\n\"\n            f\"from {silver_ref}\\n\"\n            f\"where not is_valid\\n\"\n            f\"group by invalid_reason\"\n        )\n        if i < len(entities) - 1:\n            lines.append(\"union all\")\n        lines.append(\"\")\n\n    return \"\\n\".join(lines)\n\n\n# \u2500\u2500 YML schema definitions \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\nREGISTRY_COLUMNS = [\n    {\"name\": \"entity_id\", \"description\": \"Entity identifier matching YAML filename\"},\n    {\"name\": \"version\", \"description\": \"Lineage definition version\"},\n    {\"name\": \"display_name_en\", \"description\": \"Entity display name (English)\"},\n    {\"name\": \"display_name_de\", \"description\": \"Entity display name (German)\"},\n    {\"name\": \"display_name_fr\", \"description\": \"Entity display name (French)\"},\n    {\"name\": \"description_en\", \"description\": \"Entity description (English)\"},\n    {\"name\": \"description_de\", \"description\": \"Entity description (German)\"},\n    {\"name\": \"description_fr\", \"description\": \"Entity description (French)\"},\n    {\"name\": \"source_file_opale\", \"description\": \"OPALE source CSV filename\"},\n    {\"name\": \"source_file_sap\", \"description\": \"SAP source CSV filename\"},\n    {\"name\": \"source_file_navision\", \"description\": \"Navision source CSV filename\"},\n    {\"name\": \"bronze_description_en\", \"description\": \"Bronze layer description (English)\"},\n    {\"name\": \"bronze_description_de\", \"description\": \"Bronze layer description (German)\"},\n    {\"name\": \"bronze_description_fr\", \"description\": \"Bronze layer description (French)\"},\n    {\"name\": \"silver_description_en\", \"description\": \"Silver layer description (English)\"},\n    {\"name\": \"silver_description_de\", \"description\": \"Silver layer description (German)\"},\n    {\"name\": \"silver_description_fr\", \"description\": \"Silver layer description (French)\"},\n    {\"name\": \"gold_description_en\", \"description\": \"Gold layer description (English)\"},\n    {\"name\": \"gold_description_de\", \"description\": \"Gold layer description (German)\"},\n    {\"name\": \"gold_description_fr\", \"description\": \"Gold layer description (French)\"},\n]\n\nVALIDATION_RULES_COLUMNS = [\n    {\"name\": \"entity_id\", \"description\": \"Entity identifier\"},\n    {\"name\": \"rule_order\", \"description\": \"Order of the validation rule in the Silver model\"},\n    {\"name\": \"invalid_reason\", \"description\": \"The invalid_reason string used in Silver\"},\n    {\"name\": \"description_en\", \"description\": \"Validation rule description (English)\"},\n    {\"name\": \"description_de\", \"description\": \"Validation rule description (German)\"},\n    {\"name\": \"description_fr\", \"description\": \"Validation rule description (French)\"},\n]\n\nPIPELINE_METRICS_COLUMNS = [\n    {\"name\": \"entity_id\", \"description\": \"Entity identifier\"},\n    {\"name\": \"bronze_rows\", \"description\": \"Total rows ingested at Bronze layer\"},\n    {\"name\": \"silver_total\", \"description\": \"Total rows at Silver layer\"},\n    {\"name\": \"silver_valid\", \"description\": \"Rows passing all Silver validations\"},\n    {\"name\": \"silver_invalid\", \"description\": \"Rows failing Silver validation\"},\n    {\"name\": \"silver_valid_pct\", \"description\": \"Percentage of Silver rows that are valid\"},\n    {\"name\": \"gold_rows\", \"description\": \"Total rows at Gold layer\"},\n    {\"name\": \"silver_to_gold_loss\", \"description\": \"Rows lost between Silver valid and Gold\"},\n]\n\nVALIDATION_COUNTS_COLUMNS = [\n    {\"name\": \"entity_id\", \"description\": \"Entity identifier\"},\n    {\"name\": \"invalid_reason\", \"description\": \"The invalid_reason string from Silver\"},\n    {\"name\": \"count\", \"description\": \"Number of rows with this invalid_reason\"},\n]\n\n\ndef generate_yml(model_name: str, description: str, columns: list[dict]) -> str:\n    doc = {\n        \"version\": 2,\n        \"models\": [{\n            \"name\": model_name,\n            \"description\": description,\n            \"config\": {\"tags\": [\"lineage\"]},\n            \"columns\": columns,\n        }],\n    }\n    return yaml.dump(doc, default_flow_style=False, sort_keys=False)\n\n\ndef main():\n    check_only = \"--check\" in sys.argv\n\n    entity_paths = sorted(LINEAGE_DIR.glob(\"*.yaml\"))\n    if not entity_paths:\n        print(\"No lineage YAML files found in lineage/\")\n        sys.exit(1)\n\n    # Validate all entities first\n    all_entities = []\n    has_errors = False\n    for path in entity_paths:\n        with open(path) as f:\n            entity = yaml.safe_load(f)\n        errors = validate_lineage(entity, path.name)\n        if errors:\n            print(f\"FAIL  {path.name}\")\n            for e in errors:\n                print(f\"  - {e}\")\n            has_errors = True\n        else:\n            all_entities.append(entity)\n\n    if has_errors:\n        print(\"\\nValidation failed. Fix errors before compiling.\")\n        sys.exit(1)\n\n    # Compile\n    OUTPUT_DIR.mkdir(parents=True, exist_ok=True)\n\n    registry_sql = compile_registry(all_entities)\n    rules_sql = compile_validation_rules(all_entities)\n    metrics_sql = compile_pipeline_metrics(all_entities)\n    counts_sql = compile_validation_counts(all_entities)\n\n    registry_yml = generate_yml(\n        \"lineage_registry\",\n        \"Tri-lingual metadata for all validated pipeline entities.\",\n        REGISTRY_COLUMNS,\n    )\n    rules_yml = generate_yml(\n        \"lineage_validation_rules\",\n        \"Silver validation rules with tri-lingual descriptions.\",\n        VALIDATION_RULES_COLUMNS,\n    )\n    metrics_yml = generate_yml(\n        \"lineage_pipeline_metrics\",\n        \"Runtime row counts at each pipeline layer per entity.\",\n        PIPELINE_METRICS_COLUMNS,\n    )\n    counts_yml = generate_yml(\n        \"lineage_validation_counts\",\n        \"Breakdown of Silver validation failures by entity and reason.\",\n        VALIDATION_COUNTS_COLUMNS,\n    )\n\n    files = {\n        OUTPUT_DIR / \"lineage_registry.sql\": registry_sql,\n        OUTPUT_DIR / \"lineage_registry.yml\": registry_yml,\n        OUTPUT_DIR / \"lineage_validation_rules.sql\": rules_sql,\n        OUTPUT_DIR / \"lineage_validation_rules.yml\": rules_yml,\n        OUTPUT_DIR / \"lineage_pipeline_metrics.sql\": metrics_sql,\n        OUTPUT_DIR / \"lineage_pipeline_metrics.yml\": metrics_yml,\n        OUTPUT_DIR / \"lineage_validation_counts.sql\": counts_sql,\n        OUTPUT_DIR / \"lineage_validation_counts.yml\": counts_yml,\n    }\n\n    if check_only:\n        changes = []\n        for path, content in files.items():\n            if not path.exists() or path.read_text() != content:\n                label = \"NEW\" if not path.exists() else \"CHANGED\"\n                changes.append(f\"{label:8s} {path.name}\")\n            else:\n                print(f\"OK       {path.name}\")\n        if changes:\n            print()\n            for c in changes:\n                print(c)\n            print(f\"\\n{len(changes)} file(s) would change.\")\n            sys.exit(1)\n        else:\n            print(\"\\nAll generated files up to date.\")\n    else:\n        for path, content in files.items():\n            path.write_text(content)\n            print(f\"  {path.name}\")\n        print(f\"\\n{len(all_entities)} lineage definition(s) compiled to {OUTPUT_DIR.relative_to(REPO_ROOT)}\")\n\n\nif __name__ == \"__main__\":\n    main()\n", "lang": "python"}, "classes": "compiler"}, {"data": {"id": "lineagecheck", "label": "lineage\u271
